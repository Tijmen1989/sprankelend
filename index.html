          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem">
            <p style="font-size:.7rem;color:${catKleur};text-transform:uppercase;letter-spacing:.5px">${catLabel} · ${oef.duur}</p>
            <p style="font-size:.7rem;color:var(--text3)">Tip van de week</p>
          </div>
          <p style="font-size:.95rem;color:var(--text1);font-weight:500;margin-bottom:.4rem">${oef.titel}</p>
          <p style="font-size:.85rem;color:var(--text2);line-height:1.5;margin-bottom:.6rem">${oef.uitleg}</p>
          <div style="display:flex;gap:.4rem">
            <button class="btn btn-primary" style="flex:1;font-size:.85rem" onclick="markeerOefeningGedaan()">Gedaan</button>
            <button class="btn btn-ghost" style="flex:1;font-size:.85rem" onclick="slaOefeningOver()">Nu niet</button>
          </div>
        </div>`;
      }
    }
  }

  // Zachte avond-afsluiting (only after 20:00)
  const avondUur = new Date(debugNow()).getHours();
  if(avondUur >= 20 && !isRustigeDag()){
    const dagSc = getDagritmeScore();
    const weinigGedaan = dagSc.total > 0 && dagSc.gedaan < dagSc.total * 0.5;
    const AVOND_AFSLUITING = weinigGedaan
      ? ['Niet alles hoeft elke dag. Morgen is er weer.','Soms is er gewoon minder ruimte. Dat is oké.','Niet elke dag hoeft vol. Je bent er.']
      : ['Fijne avond samen.','De dag zit erop. Geniet van vanavond.','Rustig aan nu. Jullie avond.'];
    html += `<div style="text-align:center;padding:.6rem;margin:.3rem 0">
      <p style="font-size:.8rem;color:var(--text3);font-style:italic">${pickStabiel(AVOND_AFSLUITING, today()+'avondsluit')}</p>
    </div>`;
  }

  // Stille avond prompt
  const moments = getDisciplineState().momentLog;
  const recentMoment = moments.find(m => daysSince(m.datum) < 2);
  if(!recentMoment && new Date(debugNow()).getHours() >= 18){
    html += `<div class="card" style="border-color:rgba(196,138,138,.15)">
      <div class="card-text" style="font-style:italic">${pickStabiel(STILLE_AVOND_PROMPTS, today()+'stille')}</div>
    </div>`;
  }

  // ── P1: Tim's emotionele reis (spaarzaam, max 1/week) ──
  const emotieBericht = getTimEmotieBericht();
  if(emotieBericht){
    html += `<div class="card" style="border-color:rgba(214,179,106,.2);background:rgba(214,179,106,.04)">
      <p style="font-size:.9rem;color:var(--text2);line-height:1.5;font-style:italic">${emotieBericht.tekst}</p>
      <button onclick="dismissTimEmotieBericht()" style="all:unset;font-size:.8rem;color:var(--text3);cursor:pointer;margin-top:.4rem;display:block;padding:.3rem 0;min-height:44px">Begrepen</button>
    </div>`;
  }

  // ── P1: Tim's wens-kanaal (verborgen achter extra tik) ──
  const huidigeWens = getTimWens();
  html += `<div style="text-align:center;margin:.6rem 0">
    <button onclick="toggleTimWensKanaal()" style="all:unset;font-size:.82rem;color:var(--text3);cursor:pointer;padding:.5rem 0">
      ${huidigeWens ? '💭 Je wens is actief' : '💭 Wens delen →'}
    </button>
  </div>`;
  html += `<div id="timWensKanaal" style="display:none;margin-bottom:.8rem">`;
  if(huidigeWens){
    const omgezet = isWensOmgezet();
    html += `<div class="card" style="border-color:rgba(196,138,138,.15)">
      <p style="font-size:.85rem;color:var(--text2)">Je wens: <strong>${huidigeWens.type}</strong></p>
      ${huidigeWens.tekst ? `<p style="font-size:.82rem;color:var(--text3);margin-top:.2rem">"${huidigeWens.tekst}"</p>` : ''}
      <p style="font-size:.8rem;color:var(--text3);margin-top:.3rem">${omgezet ? '✓ Je wens is meegenomen.' : 'Je wens is meegenomen. Timing komt als het past.'}</p>
      <button onclick="clearTimWens();renderApp()" style="all:unset;font-size:.8rem;color:var(--danger);cursor:pointer;margin-top:.4rem;display:block;padding:.3rem 0">Wens verwijderen</button>
    </div>`;
  } else {
    html += `<div class="card">
      <div class="card-title" style="font-size:.9rem">Waar heb je behoefte aan?</div>
      <div style="display:flex;flex-wrap:wrap;gap:.5rem;margin:.6rem 0">
        <button class="btn btn-secondary" style="flex:1;font-size:.82rem" onclick="setTimWens('spanning','');renderApp()">Meer spanning</button>
        <button class="btn btn-secondary" style="flex:1;font-size:.82rem" onclick="setTimWens('aanraking','');renderApp()">Meer aanraking</button>
        <button class="btn btn-secondary" style="flex:1;font-size:.82rem" onclick="setTimWens('leiding','');renderApp()">Meer leiding</button>
      </div>
      <div style="margin-top:.4rem">
        <input type="text" id="wensVrijTekst" placeholder="Of typ iets..." maxlength="80" style="width:100%;padding:.5rem .7rem;background:var(--surface);border:1px solid var(--card-border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:.85rem">
        <button onclick="const t=document.getElementById('wensVrijTekst').value;if(t)setTimWens('vrij',t);renderApp()" class="btn btn-primary" style="width:100%;margin-top:.4rem;font-size:.85rem">Verstuur wens</button>
      </div>
    </div>`;
  }
  html += `</div>`;

  // ── P1: Ruzie-modus indicator ──
  if(isRuzieModus()){
    const rm = getRuzieModus();
    html += `<div class="card" style="border-color:rgba(191,106,106,.2);background:rgba(191,106,106,.04)">
      <p style="font-size:.85rem;color:var(--text2)">Jullie nemen het even rustig aan. Alleen zachte suggesties.</p>
      <button onclick="deactiveerRuzieModus();renderApp()" style="all:unset;font-size:.8rem;color:var(--accent);cursor:pointer;margin-top:.4rem;display:block;padding:.3rem 0;min-height:44px">Het gaat weer beter</button>
    </div>`;
  }

  // Emotie-check (only after 20:00)
  const emoties = LS.get('t_emoties',[]);
  const emotieVandaag = emoties.find(e=>e.datum===today());
  if(!emotieVandaag && new Date(debugNow()).getHours() >= 20){
    html += `<div class="card">
      <div class="card-title">Hoe voel je je vandaag?</div>
      <div class="emotie-grid">
        <button class="emotie-btn" onclick="logEmotie('tim','gevoed')">😌</button>
        <button class="emotie-btn" onclick="logEmotie('tim','oke')">🙂</button>
        <button class="emotie-btn" onclick="logEmotie('tim','neutraal')">😐</button>
        <button class="emotie-btn" onclick="logEmotie('tim','leeg')">😕</button>
      </div>
    </div>`;
  }

  // Empty state if nothing to show
  if(html === ''){
    html = `<div class="empty-state" style="padding:3rem 1rem;text-align:center">
      <p style="font-size:1rem;color:var(--text2);margin-bottom:.5rem">Nog niks nieuws</p>
      <p style="font-size:.85rem;color:var(--text3)">Berichten, reflecties en oefeningen verschijnen hier.</p>
    </div>`;
  }

  return html;
}

function renderTimVandaag(){
  let html = '';
  const rustig = isRustigeDag();
  const vandaag = today();
  const uur = new Date(debugNow()).getHours();
  const isAvond = uur >= 19;
  const blokken = getDagritmeBlokkenVandaag();
  const blocks = getDagBlocks(vandaag);

  // ════════════════════════════════════════════
  //  TIM ZONE 1 — STATUSBALK
  // ════════════════════════════════════════════
  const DAGEN = ['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];
  const dagNaamStr = DAGEN[new Date(debugNow()).getDay()];
  const isWeekend = [0,5,6].includes(new Date(debugNow()).getDay());
  const _s4Tim = getSpoor4State();
  const _lisEnergy = _s4Tim.energieVandaag || LS.get('l_standaard_energie', null);
  const _lisLabel = _lisEnergy === 'goed' ? 'Lisanne voelt zich goed' : _lisEnergy === 'laag' ? 'Lisanne is moe' : 'Rustige dag';

  // Agenda preview voor Tim (Lisanne's planning)
  const _agVandaag = getAgendaDag(today());
  const _agSlots = ['ochtend','middag','avond'].filter(dd => _agVandaag[dd]);
  let _timAgPreview;
  if(_agSlots.length === 0){
    _timAgPreview = '&#x1f4c5; Geen plannen &#x25be;';
  } else {
    const nuDeel = uur < 12 ? 'ochtend' : uur < 17 ? 'middag' : 'avond';
    const toekomst = _agSlots.filter(s => {
      const order = {ochtend:0, middag:1, avond:2};
      return order[s] >= order[nuDeel];
    });
    if(toekomst.length > 0){
      const dd = toekomst[0] === 'ochtend' ? 'Ochtend' : toekomst[0] === 'middag' ? 'Middag' : 'Vanavond';
      _timAgPreview = '&#x1f4c5; ' + dd + ' &#x25be;';
    } else {
      _timAgPreview = '&#x1f4c5; Gedaan &#x25be;';
    }
  }

  // Agenda expand rows
  let _timAgRows = '';
  ['ochtend','middag','avond'].forEach(dd => {
    const label = dd === 'ochtend' ? 'Ochtend' : dd === 'middag' ? 'Middag' : 'Avond';
    const slot = _agVandaag[dd];
    const val = slot ? slot.tekst : 'geen plannen';
    const style = slot ? 'color:var(--text1)' : 'color:var(--text3);font-style:italic';
    _timAgRows += `<div style="display:flex;justify-content:space-between;padding:.15rem 0;font-size:.8rem"><span style="color:var(--text3)">${label}</span><span style="${style}">${val}</span></div>`;
  });

  // Dagritme blokken in expand
  let _timDagplanRows = '';
  if(!rustig){
    blokken.forEach(def => {
      const bs = blocks[def.id] || {};
      const completed = isBlokCompleted(bs);
      const hasOverride = hasActiveOverride(bs);
      const isHuidig = def.uurRange[0] <= uur && uur < def.uurRange[1];
      let statusIcon = completed ? '&#x2713;' : isHuidig ? '&#x25cf;' : '&#x25cb;';
      let statusColor = completed ? 'var(--success)' : isHuidig ? 'var(--accent)' : 'var(--text3)';
      let label = def.label;
      if(hasOverride) label += ' &#x2022; aangepast';
      _timDagplanRows += `<div style="display:flex;align-items:center;gap:.4rem;padding:.15rem 0;font-size:.8rem"><span style="color:${statusColor};font-size:.6rem">${statusIcon}</span><span style="color:${completed ? 'var(--text3)' : 'var(--text1)'};${completed ? 'text-decoration:line-through;opacity:.6' : ''}">${label}</span></div>`;
    });
  }

  html += `<div style="position:relative;margin-bottom:.6rem">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--surface);border:1px solid var(--card-border);border-radius:var(--radius-sm);min-height:44px">
      <span style="font-size:.82rem;color:var(--text1)">${dagNaamStr} <span style="color:var(--text3);font-size:.78rem">&#xb7; ${_lisLabel}</span></span>
      <button id="timAgendaBtn" onclick="toggleTimAgenda()" style="all:unset;cursor:pointer;font-size:.78rem;color:var(--text3);white-space:nowrap">${_timAgPreview}</button>
    </div>
    <div id="timAgendaExpand" style="max-height:0px;opacity:0;overflow:hidden;transition:max-height .18s ease,opacity .12s ease;padding:0 10px;background:var(--surface);border:1px solid var(--card-border);border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm);margin-top:-1px">
      <div style="padding:.4rem 0;border-top:1px solid var(--card-border)">
        ${_agSlots.length > 0 ? `<p style="font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.3rem">Lisanne&#39;s planning</p>` : ''}
        ${_timAgRows}
        ${_timDagplanRows ? `<div style="border-top:1px solid var(--card-border);margin-top:.4rem;padding-top:.4rem"><p style="font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.3rem">Dagritme</p>${_timDagplanRows}</div>` : ''}
      </div>
    </div>
  </div>`;

  // ════════════════════════════════════════════
  //  TIM ZONE 2 — HOOFDKAART (priority resolver)
  // ════════════════════════════════════════════
  let timHoofdHtml = '';
  let timHoofdContext = '';
  let timHoofdActies = '';
  let timHoofdMode = 'rust';

  const lState = getSuggestieState();
  const actiefDef = getActiveBlock();
  const unseenOverrides = getUnseenFutureOverrides();

  // ── P1: THEMA-OVERGANG ──
  if(!timHoofdHtml && checkThemaProgressie()){
    const ts = getThemaState();
    const key = ts.actiefThema + '\u2192' + (ts.actiefThema+1);
    const overgang = THEMA_OVERGANG_TEKSTEN[key];
    if(overgang && ts.laatsteThemaWissel !== today()){
      timHoofdMode = 'thema';
      timHoofdContext = 'Nieuw hoofdstuk';
      timHoofdHtml = `<p style="font-size:.9rem;color:var(--text2);line-height:1.5">${overgang.tim}</p>`;
      timHoofdActies = `<div style="display:flex;gap:.5rem;margin-top:.6rem">
        <button class="btn btn-primary" style="flex:1;font-size:.85rem" onclick="advanceThema();renderApp()">Volgende thema</button>
        <button class="btn btn-ghost" style="flex:1;font-size:.85rem" onclick="renderApp()">Nog even niet</button>
      </div>`;
    }
  }

  // ── P2: LISANNE OVERRIDE (zij wil iets) ──
  if(!timHoofdHtml && actiefDef){
    const bs = blocks[actiefDef.id] || {};
    const overrideActive = hasActiveOverride(bs);
    const completed = isBlokCompleted(bs);
    if(overrideActive && !completed){
      timHoofdMode = 'override';
      timHoofdContext = 'Lisanne wil iets';
      const overrideTaken = bs.override.text.split(' + ');
      const isMulti = overrideTaken.length > 1;
      timHoofdHtml = `<div style="background:rgba(168,138,155,.06);border-radius:var(--radius-sm);padding:.7rem;margin-bottom:.3rem">
        ${isMulti
          ? overrideTaken.map(function(t){ return '<p style="font-size:.9rem;color:var(--text1);padding:.15rem 0">\u2022 ' + t.trim() + '</p>'; }).join('')
          : '<p style="font-size:.95rem;color:var(--text1)">' + bs.override.text + '</p>'}
      </div>`;
      timHoofdActies = `<button class="btn btn-primary" style="width:100%" onclick="dagritmeOverrideDoneMetFeedback(this,'${actiefDef.id}')">&#x2713; Gedaan</button>`;
    }
  }

  // ── P3: ACTIEF DAGRITME KEUZEBLOK ──
  if(!timHoofdHtml && actiefDef){
    const bs = blocks[actiefDef.id] || {};
    const completed = isBlokCompleted(bs);
    if(!completed && actiefDef.kind === 'choice'){
      timHoofdMode = 'dagritme';
      const isHuidigBlok = actiefDef.uurRange[0] <= uur && uur < actiefDef.uurRange[1];
      timHoofdContext = isHuidigBlok ? actiefDef.label : actiefDef.label;
      timHoofdHtml = `<p style="font-size:.8rem;color:var(--text3);margin-bottom:.6rem">${actiefDef.framing}</p>`;
      const opties = getBlokOpties(actiefDef);
      let optHtml = '';
      opties.forEach(function(o){
        optHtml += `<button class="btn btn-ghost dagritme-keuze" style="text-align:left;justify-content:flex-start;font-size:.9rem;padding:.7rem .9rem;width:100%;margin-bottom:.3rem" onclick="dagritmeKeuzeMetFeedback(this,'${actiefDef.id}','${o.id}')">${o.tekst}</button>`;
      });
      timHoofdActies = optHtml;
    } else if(completed){
      // Done variant
      const overrideActive = hasActiveOverride(bs);
      const doneLabel = overrideActive ? bs.override.text : (bs.choiceLabel || 'Gedaan');
      timHoofdMode = 'done';
      timHoofdContext = '\u2713 ' + actiefDef.label;
      timHoofdHtml = `<p style="font-size:.85rem;color:var(--text2)">${doneLabel}</p>`;
    }
  }

  // ── P4: OEFENING MET TERUGBLIK ──
  if(!timHoofdHtml && heeftTimActieveOefening()){
    const toState = getTimOefeningState();
    const toef = TIM_OEFENING_POOL.find(function(o){ return o.id === toState.actief.id; });
    if(toef){
      timHoofdMode = 'oefening';
      timHoofdContext = 'Kleine oefening';
      timHoofdHtml = `<p style="font-size:.95rem;color:var(--text1);font-weight:500;margin-bottom:.3rem">${toef.titel}</p>
        <p style="font-size:.8rem;color:var(--text3);margin-bottom:.5rem">${toef.focus}</p>
        <p style="font-size:.9rem;color:var(--text2);line-height:1.5;margin-bottom:.7rem">${toef.instructie}</p>
        <p style="font-size:.85rem;color:var(--text2);margin-bottom:.4rem">${toef.terugblik}</p>`;
      let tbOptHtml = '';
      toef.terugblikOpties.forEach(function(opt){
        tbOptHtml += `<button class="btn btn-ghost" style="text-align:left;font-size:.85rem;padding:.5rem .7rem;width:100%;margin-bottom:.2rem" onclick="beantwoordTimOefeningTerugblik('${opt.replace(/'/g, "\\'")}')">${opt}</button>`;
      });
      timHoofdActies = tbOptHtml;
    }
  }

  // ── P5: SAMEN-OEFENING ──
  if(!timHoofdHtml && heeftSamenOefening()){
    timHoofdMode = 'samen';
    timHoofdContext = 'Samen oefenen';
    timHoofdHtml = ''; // renderSamenOefeningKaart handles its own content
    // Special case: render directly
  }

  // ── P6: VRAAGMODUS ACTIEF ──
  if(!timHoofdHtml && isVraagmodusActief()){
    const vmState = getVraagmodusState();
    const openSituaties = vmState.situaties.filter(function(s){ return !s.gevraagd; });
    if(openSituaties.length > 0){
      timHoofdMode = 'vraagmodus';
      timHoofdContext = 'Vandaag vraag je het';
      timHoofdHtml = `<p style="font-size:.85rem;color:var(--text2);margin-bottom:.6rem;line-height:1.5">Vandaag pak je niet zelf \u2014 je vraagt het aan Lisanne.</p>`;
      let vmOptHtml = '';
      openSituaties.forEach(function(s){
        vmOptHtml += `<div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem;padding:.5rem .6rem;background:rgba(168,138,155,.06);border-radius:var(--radius-sm)">
          <span style="flex:1;font-size:.9rem;color:var(--text1)">"${s.tekst}"</span>
          <button class="btn btn-primary" style="font-size:.8rem;padding:.3rem .7rem;white-space:nowrap" onclick="markeerGevraagd('${s.id}')">Gevraagd</button>
        </div>`;
      });
      const gedaanSituaties = vmState.situaties.filter(function(s){ return s.gevraagd; });
      if(gedaanSituaties.length > 0){
        vmOptHtml += `<p style="font-size:.75rem;color:var(--success);margin-top:.4rem">\u2713 ${gedaanSituaties.length} al gevraagd</p>`;
      }
      timHoofdActies = vmOptHtml;
    }
  }

  // ── P7: DISCIPLINE-TAAK ──
  if(!timHoofdHtml){
    const dagTaak = getDagTaak();
    if(dagTaak.gedaan === null){
      timHoofdMode = 'discipline';
      timHoofdContext = 'Iets extra\u2019s';
      timHoofdHtml = `<p style="font-size:.9rem;color:var(--text2);margin-bottom:.3rem">${dagTaak.taak.tekst}</p>`;
      timHoofdActies = `<div style="display:flex;gap:.6rem">
        <button class="btn btn-primary" style="flex:1" onclick="logDiscipline('${dagTaak.taak.id}',true)">\u2713 Gedaan</button>
        <button class="btn btn-ghost" style="flex:1" onclick="logDiscipline('${dagTaak.taak.id}',false)">\u2717 Niet gelukt</button>
      </div>`;
    }
  }

  // ── P8: ALLES GEDAAN ──
  if(!timHoofdHtml && !rustig){
    const actionableCount = blokken.filter(function(d){ return isActionable(d, blocks[d.id]||{}); }).length;
    if(actionableCount === 0 && blokken.length === 0){
      timHoofdMode = 'weekend';
      const WEEKEND_TEKSTEN = [
        'Weekend. Gewoon samen zijn.',
        'Geen taken vandaag. Geniet van de dag.',
        'Vandaag niks gepland. De dag is van jullie.'
      ];
      timHoofdContext = '';
      timHoofdHtml = `<p style="font-size:.9rem;color:var(--text2);text-align:center">${pickStabiel(WEEKEND_TEKSTEN, today()+'weekend')}</p>`;
    } else {
      timHoofdMode = 'klaar';
      const dagScore = getDagritmeScore();
      const streak = getDagritmeStreak();
      const ALLES_GEDAAN = [
        'Lisanne hoeft nergens aan te denken vanavond.',
        'Alles gedaan. De rest is voor jullie samen.',
        'Klaar. Lisanne kan ontspannen.',
        'De avond is van jullie. Jij hebt het geregeld.'
      ];
      timHoofdContext = '\u2713 Klaar';
      timHoofdHtml = `<p style="font-size:.95rem;color:var(--text1);font-weight:500;margin-bottom:.5rem;text-align:center">${pickStabiel(ALLES_GEDAAN, vandaag+'klaar')}</p>
        ${renderVoortgangsBalk(dagScore.gedaan, dagScore.total, streak)}`;
    }
  }

  // ── P9: UITNODIGINGEN (lagere prioriteit) ──
  if(!timHoofdHtml && moetVraagmodusSuggestie()){
    timHoofdMode = 'uitnodiging';
    timHoofdContext = 'Idee voor vandaag';
    timHoofdHtml = `<p style="font-size:.85rem;color:var(--text2);margin-bottom:.5rem">Zin om vandaag wat dingen te vragen aan Lisanne?</p>
      <p style="font-size:.8rem;color:var(--text3);margin-bottom:.3rem">Niet zelf pakken \u2014 haar om toestemming vragen.</p>`;
    timHoofdActies = `<div style="display:flex;gap:.5rem">
      <button class="btn btn-primary" style="flex:1;font-size:.85rem" onclick="startVraagmodus()">Ja, doe maar</button>
      <button class="btn btn-ghost" style="flex:1;font-size:.85rem" onclick="LS.set('t_vraagmodus_skip',today());renderApp()">Niet vandaag</button>
    </div>`;
  }
  if(!timHoofdHtml && moetTimOefeningSuggestie()){
    const toef = kiesTimOefening();
    if(toef){
      timHoofdMode = 'uitnodiging';
      timHoofdContext = 'Kleine oefening';
      timHoofdHtml = `<p style="font-size:.85rem;color:var(--text2);margin-bottom:.5rem">Er is een oefening voor je vandaag.</p>
        <p style="font-size:.8rem;color:var(--text3);margin-bottom:.3rem">${toef.titel}</p>`;
      timHoofdActies = `<div style="display:flex;gap:.5rem">
        <button class="btn btn-primary" style="flex:1;font-size:.85rem" onclick="startTimOefening()">Bekijken</button>
        <button class="btn btn-ghost" style="flex:1;font-size:.85rem" onclick="LS.set('t_oef_skip',today());renderApp()">Niet vandaag</button>
      </div>`;
    }
  }
  if(!timHoofdHtml && moetSamenOefeningSuggestie()){
    startSamenOefening();
    timHoofdMode = 'samen';
  }

  // ── P10: RUSTIGE DAG ──
  if(!timHoofdHtml && rustig){
    timHoofdMode = 'rust';
    timHoofdContext = '';
    timHoofdHtml = `<p style="font-size:.9rem;color:var(--text2);text-align:center">Vandaag is een vrije dag.</p>
      <p style="font-size:.85rem;color:var(--text3);margin-top:.3rem;text-align:center">Gewoon samen zijn is genoeg.</p>`;
  }

  // ── RENDER ZONE 2 ──
  if(timHoofdMode === 'samen' && !timHoofdHtml){
    // Samen-oefening renders its own card
    html += renderSamenOefeningKaart('tim');
  } else {
    html += `<div style="background:var(--surface);border:1px solid var(--card-border);border-radius:var(--radius);padding:1.2rem 1rem;margin-bottom:.6rem">`;
    if(timHoofdContext){
      html += `<p style="font-size:.7rem;color:var(--accent);text-transform:uppercase;letter-spacing:.6px;margin-bottom:.5rem">${timHoofdContext}</p>`;
    }
    html += timHoofdHtml;
    if(timHoofdActies){
      html += `<div style="margin-top:.8rem">${timHoofdActies}</div>`;
    }
    html += `</div>`;
  }

  // Override alert (ongelezen toekomstige overrides)
  if(unseenOverrides.length >= 1){
    const tekst = unseenOverrides.length === 1
      ? '\ud83d\udcac Lisanne heeft iets voor je klaar: <strong>' + unseenOverrides[0].def.label + '</strong>'
      : '\ud83d\udcac Lisanne heeft ' + unseenOverrides.length + ' blokken aangepast';
    html += `<div style="text-align:center;padding:.3rem .6rem;font-size:.8rem;color:var(--text3);cursor:pointer" onclick="toggleTimAgenda()">${tekst}</div>`;
  }

  // ════════════════════════════════════════════
  //  TIM ZONE 3 — SIGNAAL + INSPIRATIE + ACTIES
  // ════════════════════════════════════════════

  // Inspiratieregel (max 1, geen kaart, geen knop)
  let _inspTekst = '';
  const _trDismiss = LS.get('t_spoorReminder_dismiss','');
  const _tgDismiss = LS.get('t_gebaar_dismiss','');
  const _wpDismiss = LS.get('t_werkpunt_dismiss','');

  // Prioriteit 1: Spoor-reminder
  if(!_inspTekst && _trDismiss !== today() && typeof TIM_SPOOR_REMINDERS !== 'undefined'){
    let _timReminder = TIM_SPOOR_REMINDERS['default'];
    if(lState.huidig){
      const _sp = getSpoor4(lState.huidig);
      if(TIM_SPOOR_REMINDERS[_sp]) _timReminder = TIM_SPOOR_REMINDERS[_sp];
    }
    if(_s4Tim.laatsteNeutralReactie && daysSince(_s4Tim.laatsteNeutralReactie) <= 1){
      _timReminder = TIM_SPOOR_REMINDERS['reactie_viel_tegen'];
    }
    if(_s4Tim.eigenInitiatiefCount > 0){
      const _latestInit = lState.historie.slice().reverse().find(function(h){
        const s = SUGGESTIE_POOL.find(function(x){ return x.id === h.id; });
        return s && s.eigenInitiatief && h.status === 'ja';
      });
      if(_latestInit && daysSince(_latestInit.datum) <= 1){
        _timReminder = TIM_SPOOR_REMINDERS['eigen_initiatief'];
      }
    }
    _inspTekst = _timReminder;
  }

  // Prioriteit 2: Werkpunt (33% kans)
  if(!_inspTekst && _wpDismiss !== today()){
    const _wpSeed = today() + 'werkpunt';
    const _wpHash = Math.abs([..._wpSeed].reduce(function(h,c){ return (h*31 + c.charCodeAt(0))|0; }, 0));
    if(_wpHash % 3 === 0){
      const _wpIdx = _wpHash % TIM_WERKPUNTEN.length;
      _inspTekst = TIM_WERKPUNTEN[_wpIdx].timInzicht;
    }
  }

  // Prioriteit 3: Gebaar van de dag
  if(!_inspTekst && _tgDismiss !== today()){
    const _tgSeed = today() + 'gebaar';
    const _tgIdx = Math.abs([..._tgSeed].reduce(function(h,c){ return (h*31 + c.charCodeAt(0))|0; }, 0)) % TIM_GEBAAR_POOL.length;
    _inspTekst = TIM_GEBAAR_POOL[_tgIdx].tekst;
  }

  // Prioriteit 4: Geduld-inzicht
  if(!_inspTekst){
    const _engStatus = getEngagementStatus();
    if(_engStatus.status === 'stil' || _engStatus.status === 'lang_weg'){
      const _geduldTeksten = [
        'Lisanne is even rustig. Dat is ok\xe9. Geduld is ook een gebaar.',
        'Niet reageren is niet hetzelfde als niet willen.',
        'Het moeilijkste: niks doen. Maar soms is dat precies wat Lisanne nodig heeft.'
      ];
      const _geduldSeed = today() + 'geduld';
      const _geduldHash = Math.abs([..._geduldSeed].reduce(function(h,c){ return (h*31 + c.charCodeAt(0))|0; }, 0));
      _inspTekst = _geduldTeksten[_geduldHash % _geduldTeksten.length];
    }
  }

  if(_inspTekst){
    html += `<div style="text-align:center;padding:.4rem .8rem;margin-bottom:.4rem">
      <p style="font-size:.82rem;color:var(--text3);font-style:italic;line-height:1.4">${_inspTekst}</p>
      <button onclick="LS.set('t_spoorReminder_dismiss',today());LS.set('t_gebaar_dismiss',today());LS.set('t_werkpunt_dismiss',today());renderApp()" style="all:unset;font-size:.7rem;color:var(--text3);cursor:pointer;opacity:.4;margin-top:.2rem;display:inline-block">\u2715</button>
    </div>`;
  }

  // Datum-herinnering (Lisanne heeft vanavond plannen)
  const TIM_HERINNERING_ZINNEN = [
    'Lisanne heeft vanavond plannen met je.',
    'Vanavond ben je van haar. Zij bepaalt.',
    'Hou vanavond vrij. Lisanne wil iets.',
    'Lisanne heeft vanavond de leiding. Meer info volgt niet.'
  ];
  const timDatumAfspraken = getAfspraken().filter(function(a){ return a.type === 'datum' && a.datum === today(); });
  if(timDatumAfspraken.length > 0){
    timDatumAfspraken.forEach(function(a){
      const timVoorbHtml = (a.voorbereidingen && a.voorbereidingen.length > 0 && a.voorbereidingenZichtbaar)
        ? '<div style="margin-top:.3rem">' + a.voorbereidingen.map(function(v){ return '<p style="font-size:.82rem;color:var(--text1);padding:.15rem 0">\u2022 ' + v + '</p>'; }).join('') + '</div>'
        : '';
      const timItemsNamen = (a.items && a.items.length > 0 && a.voorbereidingenZichtbaar) ? a.items.map(function(k){ return SPULLEN_DB[k] ? SPULLEN_DB[k].naam : k; }) : [];
      const timItemsHtml = timItemsNamen.length > 0 ? '<p style="font-size:.82rem;color:var(--text1);margin-top:.3rem">\ud83d\udd17 Leg klaar: ' + timItemsNamen.join(', ').toLowerCase() + '</p>' : '';
      html += `<div style="text-align:center;padding:.5rem .8rem;margin-bottom:.3rem;background:rgba(168,138,155,.04);border-radius:var(--radius-sm)">
        <p style="font-size:.85rem;color:var(--text2);font-style:italic">${pickStabiel(TIM_HERINNERING_ZINNEN, today()+a.id)}</p>
        ${timVoorbHtml}${timItemsHtml}
      </div>`;
    });
  }

  // Morgen-herinnering
  const timMorgenAfspraken = getAfspraken().filter(function(a){ return a.type === 'datum' && a.datum === tomorrow(); });
  if(timMorgenAfspraken.length > 0){
    html += `<div style="text-align:center;padding:.3rem .6rem;font-size:.8rem;color:var(--text3)">\ud83d\udccc Lisanne heeft morgen iets met je voor.</div>`;
  }

  // Afspraken van Lisanne (compact)
  const timAfspraken = opschonenAfspraken();
  if(timAfspraken.length > 0){
    html += `<div style="padding:.3rem .6rem;margin-bottom:.3rem">`;
    timAfspraken.forEach(function(a){
      const datumLabel = a.type === 'datum' ? ' <span style="font-size:.75rem;color:var(--text3)">(' + leesbareDatum(a.datum) + ')</span>' : '';
      const kanGezien = a.type === 'week' || a.type === 'datum';
      const gezienHtml = kanGezien
        ? (a.gezien
          ? '<span style="font-size:.75rem;color:var(--success);margin-left:.3rem">\u2713</span>'
          : '<button onclick="markeerGezien(\'' + a.id + '\')" style="all:unset;font-size:.75rem;color:var(--accent);cursor:pointer;margin-left:.3rem">Gezien</button>')
        : '';
      html += `<div style="display:flex;align-items:center;font-size:.82rem;color:var(--text2);padding:.15rem 0">
        <span>\ud83d\udccc ${a.tekst}${datumLabel}</span>${gezienHtml}
      </div>`;
    });
    html += `</div>`;
  }

  // Gecombineerde "iets melden" link
  let _meldenItems = [];
  if(faseActief(2)){
    _meldenItems.push({label:'Iets doorgeven aan Lisanne', type:'initiatief'});
  }
  _meldenItems.push({label:'Iets extra\u2019s gedaan', type:'spontaan'});

  // Bestaande eigen initiatieven
  if(faseActief(2)){
    const eigenInit = getEigenInitiatieven();
    if(eigenInit.length > 0){
      html += `<div style="padding:.2rem .8rem">`;
      eigenInit.forEach(function(ei){
        html += `<div style="display:flex;align-items:center;gap:.3rem;padding:.1rem 0;font-size:.8rem;color:var(--text2)"><span style="color:var(--accent)">\u2605</span>${ei.tekst}</div>`;
      });
      html += `</div>`;
    }
  }

  // Spontane services
  const spontaan = getSpontaneServices(today());
  if(spontaan.length > 0){
    html += `<div style="padding:.1rem .8rem">`;
    spontaan.forEach(function(s){
      html += `<div style="font-size:.78rem;color:var(--text3);padding:.1rem 0">+ ${s.tekst}</div>`;
    });
    html += `</div>`;
  }

  html += `<div style="text-align:center;margin:.5rem 0">
    <button id="timMeldenToggle" onclick="toggleTimMelden()" style="all:unset;font-size:.8rem;color:var(--text3);cursor:pointer;padding:.3rem 0">+ Iets melden</button>
    <div id="timMeldenInput" style="display:none;margin-top:.4rem;max-width:300px;margin-left:auto;margin-right:auto">
      <input id="timMeldenTekst" type="text" placeholder="Wat wil je melden?" maxlength="60"
        style="width:100%;padding:.5rem;border-radius:var(--radius-sm);border:1px solid var(--card-border);background:var(--surface);color:var(--text);font-family:inherit;font-size:.85rem;margin-bottom:.3rem">
      <div style="display:flex;gap:.3rem">
        ${faseActief(2) ? '<button class="btn btn-primary" style="flex:1;font-size:.83rem;padding:.4rem" onclick="submitTimMelden(\'initiatief\')">Voor Lisanne</button>' : ''}
        <button class="btn btn-ghost" style="flex:1;font-size:.83rem;padding:.4rem" onclick="submitTimMelden('spontaan')">Extra gedaan</button>
      </div>
    </div>
  </div>`;

  // "We hebben het moeilijk" — subtiele link onderaan
  if(!isRuzieModus()){
    html += `<div style="text-align:center;margin:1rem 0">
      <button onclick="if(confirm('Dit zet de app 2 weken op alleen zachte suggesties. Weet je het zeker?')){activeerRuzieModus('tim');renderApp()}" style="all:unset;font-size:.75rem;color:var(--text3);cursor:pointer;opacity:.35">We hebben het moeilijk</button>
    </div>`;
  }

  return html;
}

function renderVandaag(state){
  let html = '';
  const uurNu = new Date(debugNow()).getHours();
  const isAvond = uurNu >= 17;
  const vrijeDagActief = isRustigeDag();

  // ════════════════════════════════════════════
  //  BLOKKEREND: Terugkom-check / Evaluatie
  //  (deze nemen de hele pagina over)
  // ════════════════════════════════════════════
  if(moetTerugkomCheck()){
    html += `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:2rem">
      <p style="font-size:1rem;color:var(--text1);margin-bottom:.3rem">Welkom terug.</p>
      <p style="font-size:.85rem;color:var(--text3);margin-bottom:1rem">Fijn dat je er weer bent. Even een vraagje:</p>
      <div style="display:flex;flex-direction:column;gap:.5rem;width:100%;max-width:280px">
        <button class="experience-btn" onclick="logTerugkomAntwoord('druk')"><span class="experience-btn-emoji">&#x1f60a;</span><span>Alles goed, was gewoon druk</span></button>
        <button class="experience-btn" onclick="logTerugkomAntwoord('teveel')"><span class="experience-btn-emoji">&#x1f610;</span><span>Was even te veel</span></button>
        <button class="experience-btn" onclick="logTerugkomAntwoord('praten')"><span class="experience-btn-emoji">&#x1f4ac;</span><span>Wil er even over praten met Tim</span></button>
      </div>
    </div>`;
    return html;
  }
  registreerInteractie();
  if(needsEvaluatie()){
    html += `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:2rem">
      <p style="font-size:1rem;color:var(--text1);margin-bottom:.3rem">Hoe voelde de afgelopen weken?</p>
      <div style="display:flex;flex-direction:column;gap:.6rem;margin-top:.8rem;width:100%;max-width:280px">
        <button class="experience-btn" onclick="logEvaluatie('goed')"><span class="experience-btn-emoji">&#x1f7e2;</span><span>Zo is het goed</span></button>
        <button class="experience-btn" onclick="logEvaluatie('meer')"><span class="experience-btn-emoji">&#x1f7e1;</span><span>Mag iets meer</span></button>
        <button class="experience-btn" onclick="logEvaluatie('veel')"><span class="experience-btn-emoji">&#x1f7e0;</span><span>Was best veel</span></button>
        <button class="experience-btn" onclick="logEvaluatie('pauze')"><span class="experience-btn-emoji">&#x1f534;</span><span>Even pauze</span></button>
      </div>
    </div>`;
    return html;
  }

  // ════════════════════════════════════════════
  //  ZONE 1 — STATUSBALK (verfijnd: dagstatus + agenda expand)
  // ════════════════════════════════════════════
  const _s4State = getSpoor4State();
  const _energieNu = _s4State.energieVandaag || LS.get('l_standaard_energie', null);

  const _agVandaag = getAgendaDag(today());
  const _agSlots = ['ochtend','middag','avond'].filter(dd => _agVandaag[dd]);

  // Lopende opdracht check
  let _lopend = null;
  if(state.lopend && !isLopendExpired(state)){
    _lopend = state.lopend;
  } else if(state.lopend){
    state.lopend = null; saveSuggestieState(state);
  }

  // Dagstatus links (menselijke samenvatting)
  const _ds = getDagstatusLinks(_energieNu, _agSlots, _lopend);

  // Agenda preview rechts (alleen tijdblok)
  const _agPreview = getAgendaPreview(_agSlots, _lopend);

  // Agenda expand content
  let _agExpandRows = '';
  ['ochtend','middag','avond'].forEach(dd => {
    const label = dd === 'ochtend' ? 'Ochtend' : dd === 'middag' ? 'Middag' : 'Avond';
    const slot = _agVandaag[dd];
    const val = slot ? slot.tekst : 'geen plannen';
    const style = slot ? 'color:var(--text1)' : 'color:var(--text3);font-style:italic';
    _agExpandRows += `<div style="display:flex;justify-content:space-between;padding:.15rem 0;font-size:.8rem"><span style="color:var(--text3)">${label}</span><span style="${style}">${val}</span></div>`;
  });

  html += `<div style="position:relative;margin-bottom:.6rem">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--surface);border:1px solid var(--card-border);border-radius:var(--radius-sm);min-height:44px;gap:.6rem">
      <button onclick="toggleStatusEnergie()" style="all:unset;cursor:pointer;font-size:.82rem;color:var(--text1);display:flex;align-items:center;gap:.3rem;flex-shrink:1;min-width:0">
        <span>${_ds.icon}</span> <span>${_ds.label}</span> <span style="color:var(--text3);font-size:.75rem">&middot; ${_ds.context}</span>
      </button>
      <button id="statusAgendaBtn" onclick="toggleStatusAgenda()" style="all:unset;cursor:pointer;font-size:.72rem;color:var(--text3);white-space:nowrap;flex-shrink:0">${_agPreview}</button>
    </div>
    <div id="statusAgendaExpand" style="max-height:0px;opacity:0;overflow:hidden;transition:max-height .18s ease,opacity .12s ease;padding:0 10px;background:var(--surface);border:1px solid var(--card-border);border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm);margin-top:-1px">
      <div style="padding:.4rem 0;border-top:1px solid var(--card-border)">
        ${_agExpandRows}
        <div style="text-align:right;padding-top:.3rem"><button onclick="setTab('regelen')" style="all:unset;cursor:pointer;font-size:.75rem;color:var(--accent);opacity:.7">+ Iets plannen</button></div>
      </div>
    </div>
  </div>`;

  // Energie-kiezer (hidden, toggled)
  html += `<div id="statusEnergieKiezer" style="display:none;margin:-0.3rem 0 .6rem;padding:.4rem;text-align:center">
    <div style="display:flex;gap:.4rem;justify-content:center">
      ${['laag','normaal','goed'].map(v => {
        const ic = v === 'goed' ? '&#x1f60a;' : v === 'laag' ? '&#x1f634;' : '&#x1f33f;';
        const lb = v === 'goed' ? 'Goed' : v === 'laag' ? 'Moe' : 'Normaal';
        const act = _energieNu === v;
        return `<button onclick="setEnergieVandaag('${v}')" style="all:unset;flex:1;text-align:center;padding:.4rem;border-radius:var(--radius-sm);cursor:pointer;font-size:.8rem;${act ? 'background:rgba(196,168,138,.15);color:var(--text1);font-weight:500' : 'color:var(--text3);opacity:.6'}">${ic} ${lb}</button>`;
      }).join('')}
    </div>
  </div>`;

  // ════════════════════════════════════════════
  //  ZONE 1B — WEEK-THEMA KAART (subtiel, boven hoofdkaart)
  //  Toont huidige leerpad + beschrijving
  // ════════════════════════════════════════════
  const _wtFase = _s4State.fase || 0;
  const _wtThema = LEERPAD_THEMAS[_wtFase];
  if(_wtThema){
    const _wtTotaal = Object.keys(LEERPAD_THEMAS).length; // 7 (fase 0-6)
    let _wtBalk = '';
    for(let i=0; i<_wtTotaal; i++){
      _wtBalk += `<div class="wtk-seg${i <= _wtFase ? ' actief' : ''}"></div>`;
    }
    html += `<div class="week-thema-kaart">
      <div class="wtk-naam">${_wtThema.naam}</div>
      <div class="wtk-balk">${_wtBalk}</div>
      <div class="wtk-beschrijving">${_wtThema.beschrijving}</div>
    </div>`;
  }

  // ════════════════════════════════════════════
  //  ZONE 2 — HOOFDKAART (precies een)
  //  Priority resolver bepaalt welke mode
  // ════════════════════════════════════════════

  let hoofdkaartHtml = '';
  let hoofdkaartContext = '';  // kleine label bovenaan
  let hoofdkaartActies = '';   // knoppen onderaan
  let hoofdkaartMode = 'rust'; // voor debug

  const lState = getSuggestieState();

  // ── MODE: ERVARINGSCHECK ──
  if(lState.wachtOpErvaring){
    hoofdkaartMode = 'ervaring';
    const laatsteJaEntry = lState.historie.slice().reverse().find(h => h.status === 'ja');
    const laatsteId = laatsteJaEntry ? laatsteJaEntry.id : null;
    const isAlFav = laatsteId && (lState.lisanneFavorieten||[]).includes(laatsteId);
    const laatsteSug = laatsteId && SUGGESTIE_POOL.find(s => s.id === laatsteId);
    const aftercareTeksten = [
      'Daarna gewoon even naast elkaar zitten.',
      'Daarna mag hij even dicht bij je komen.',
      'Laat het moment daarna gewoon rustig landen.'
    ];
    hoofdkaartContext = 'Even terugkijken';
    if(laatsteSug && laatsteSug.zwaarte >= 2){
      hoofdkaartHtml += `<p style="text-align:center;font-size:.9rem;color:var(--text2);margin-bottom:.8rem;line-height:1.5">${aftercareTeksten[Math.floor(Math.random()*aftercareTeksten.length)]}</p>`;
    }
    hoofdkaartHtml += `<p style="font-size:1rem;color:var(--text1);text-align:center;margin-bottom:.8rem">Hoe voelde dit voor jullie?</p>
      <div class="experience-grid">
        <button class="experience-btn" onclick="logErvaringMetUndo('fijn')"><span class="experience-btn-emoji">&#x1f60a;</span><span>Leuk</span></button>
        <button class="experience-btn" onclick="logErvaringMetUndo('neutraal')"><span class="experience-btn-emoji">&#x1f610;</span><span>Ok&#xe9;</span></button>
        <button class="experience-btn" onclick="logErvaringMetUndo('teveel')"><span class="experience-btn-emoji">&#x1f614;</span><span>Te veel</span></button>
      </div>
      <div style="text-align:center;margin-top:.5rem;display:flex;gap:.5rem;justify-content:center">
        <button onclick="logErvaringMetUndo('reactie_viel_tegen')" style="background:none;border:none;font-size:.75rem;color:var(--text3);cursor:pointer;text-decoration:underline;opacity:.7">Reactie viel tegen</button>
        <button onclick="toonIetsMisProtocol()" style="background:none;border:none;font-size:.75rem;color:var(--text3);cursor:pointer;text-decoration:underline;opacity:.7">Er ging iets mis</button>
      </div>`;
    if(laatsteId){
      hoofdkaartHtml += `<div style="text-align:center;margin-top:.8rem">
        <button onclick="toggleLisanneFavoriet('${laatsteId}')" style="background:none;border:none;font-size:1.5rem;cursor:pointer;opacity:${isAlFav ? '1' : '.4'};transition:opacity .2s" title="Bewaar als favoriet">${isAlFav ? '&#x2764;&#xfe0f;' : '&#x1f90d;'}</button>
        <div style="font-size:.7rem;color:var(--text3);margin-top:.2rem">Vaker dit soort idee&#xeb;n</div>
      </div>`;
    }
    hoofdkaartHtml += `<div class="experience-skip"><a onclick="skipExperienceCheck()">overslaan</a></div>`;

  // ── MODE: REFLECTIEVRAAG ──
  } else if(!state.wachtOpErvaring && LS.get('l_reflectieVraag',null) && LS.get('l_reflectieVraag').datum === today() && !LS.get('l_reflectieBeantwoord_'+today())){
    hoofdkaartMode = 'reflectie';
    const _rv = LS.get('l_reflectieVraag');
    hoofdkaartContext = 'Even terugkijken';
    if(_rv.context){
      hoofdkaartHtml += `<p style="font-size:.8rem;color:var(--text3);margin-bottom:.4rem;line-height:1.4">Over: "${_rv.context.substring(0,80)}${_rv.context.length>80?'...':''}"</p>`;
    }
    hoofdkaartHtml += `<p style="font-size:.95rem;color:var(--text1);line-height:1.5;margin-bottom:.8rem;font-style:italic">${_rv.tekst}</p>
      <textarea id="reflectieAntwoord" placeholder="Je hoeft niks te typen." maxlength="200"
        style="width:100%;min-height:50px;padding:.5rem;border-radius:var(--radius-sm);border:1px solid var(--card-border);background:var(--bg);color:var(--text);font-family:inherit;font-size:.85rem;resize:none;margin-bottom:.5rem"></textarea>
      <div style="display:flex;gap:.4rem">
        <button class="btn btn-primary" style="flex:1;font-size:.85rem" onclick="beantwoordReflectie()">Bewaar</button>
        <button class="btn btn-ghost" style="flex:1;font-size:.85rem" onclick="LS.set('l_reflectieBeantwoord_'+today(),true);renderApp()">Overslaan</button>
      </div>`;

  // ── MODE: SUGGESTIE ──
  } else if(state.huidig && (!isMilouAanwezig() || state.huidig.subtiel !== false)){
    hoofdkaartMode = 'suggestie';
    const s = state.huidig;

    // Zachte intro-regel: altijd menselijk, nooit als opdracht
    const _introOpties = isAvond
      ? ['Idee voor vanavond:', 'Misschien leuk vanavond:', 'Voor als je zin hebt:']
      : ['Misschien leuk vandaag:', 'Idee voor vandaag:', 'Klein ideetje:'];
    const _zachteIntro = pickStabiel(_introOpties, today() + (s.id||'') + 'intro');
    hoofdkaartContext = _zachteIntro;

    // BDSM-framing OF opdrachttaal prefix — nooit beide tegelijk
    const sugSpoor = getSpoor(s);
    if(sugSpoor === 'C'){
      const framing = getBDSMFraming();
      hoofdkaartHtml += `<p style="font-size:.8rem;color:var(--text3);margin-bottom:.5rem;font-style:italic">${framing.prefix}</p>`;
    } else {
      const _taalPrefix = getOpdrachttaalPrefix(s);
      if(_taalPrefix){
        hoofdkaartHtml += `<p style="font-size:.78rem;color:var(--text3);margin-bottom:.3rem;font-style:italic">${_taalPrefix}</p>`;
      }
    }
    // Suggestietekst
    hoofdkaartHtml += `<div class="suggestie-tekst">${s.tekst}</div>`;

    // Spreektekst
    const _milouBij = isMilouAanwezig();
    let zegText = null;
    if(_milouBij && s.zegSubtiel){ zegText = s.zegSubtiel; }
    else if(!_milouBij && s.zegPrive){ zegText = s.zegPrive; }
    if(zegText){
      hoofdkaartHtml += `<div class="zeg-voorbeeld"><span class="zeg-label">&#x1f4ac;</span><span class="zeg-tekst">"${zegText}"</span></div>`;
      hoofdkaartHtml += renderGeleendeAutoriteitToggle(zegText, 'lisanne');
    }

    // Knoppen
    hoofdkaartActies = `<div class="suggestie-actions">
      <button class="btn btn-primary" onclick="verwerkKeuze('ja')">&#x2713; Dit doe ik</button>
      <button class="btn btn-secondary" onclick="verwerkKeuze('ander')">&#x21bb; Ander idee</button>
    </div>`;

    // Meer info toggle (alles samengevouwen)
    let _meerInfoHtml = '';
    if(s.disclaimer) _meerInfoHtml += `<p style="font-size:.8rem;color:var(--text3);font-style:italic;margin-bottom:.5rem;line-height:1.4">${s.disclaimer}</p>`;
    const _inzicht = getInzichtVoorSuggestie(s);
    if(_inzicht){
      _meerInfoHtml += `<div style="margin-bottom:.5rem;padding:.5rem .7rem;background:rgba(196,138,138,.04);border-radius:var(--radius-sm);border-left:2px solid rgba(196,138,138,.2)">
        <p style="font-size:.75rem;color:var(--text3);margin-bottom:.2rem">Waarom dit werkt</p>
        <p style="font-size:.85rem;color:var(--text2);line-height:1.5">${_inzicht.tekst}</p>
        ${_inzicht.uitleg ? `<p style="font-size:.8rem;color:var(--text3);line-height:1.4;margin-top:.3rem">${_inzicht.uitleg}</p>` : ''}
      </div>`;
    } else if(s.waarom){
      _meerInfoHtml += `<div style="margin-bottom:.5rem;padding:.5rem .7rem;background:rgba(196,138,138,.04);border-radius:var(--radius-sm);border-left:2px solid rgba(196,138,138,.2)">
        <p style="font-size:.85rem;color:var(--text2);line-height:1.5">${s.waarom}</p>
      </div>`;
    }
    const _timErvaart = getTimErvaartTekst(s);
    if(_timErvaart){
      _meerInfoHtml += `<div style="margin-bottom:.5rem;padding:.5rem .7rem;background:rgba(100,140,180,.06);border-radius:var(--radius-sm);border-left:2px solid rgba(100,140,180,.25)">
        <p style="font-size:.75rem;color:var(--text3);margin-bottom:.2rem">Wat je kunt merken</p>
        <p style="font-size:.85rem;color:var(--text2);line-height:1.5;font-style:italic">${_timErvaart}</p>
      </div>`;
    }
    const _observatie = getObservatieOpdracht(s);
    if(_observatie){
      _meerInfoHtml += `<div style="margin-bottom:.5rem;padding:.5rem .7rem;background:rgba(140,160,100,.06);border-radius:var(--radius-sm);border-left:2px solid rgba(140,160,100,.25)">
        <p style="font-size:.75rem;color:var(--text3);margin-bottom:.2rem">Let eens op</p>
        <p style="font-size:.85rem;color:var(--text2);line-height:1.5">${_observatie}</p>
      </div>`;
    }
    if(s.handleidingKeys && s.handleidingKeys.length > 0){
      _meerInfoHtml += `<div style="margin-bottom:.5rem;padding:.5rem .7rem;background:rgba(196,168,138,.06);border-radius:var(--radius-sm);border-left:2px solid rgba(196,168,138,.25)">`;
      s.handleidingKeys.forEach(key => {
        const item = SPULLEN_DB[key];
        if(item){
          _meerInfoHtml += `<p style="font-size:.85rem;color:var(--text1);margin-bottom:.2rem"><strong>${item.naam}</strong>: ${item.handleiding.substring(0, 120)}${item.handleiding.length > 120 ? '...' : ''}</p>`;
          if(item.veiligheid) _meerInfoHtml += `<p style="font-size:.8rem;color:var(--danger);margin-bottom:.2rem">&#x26a0;&#xfe0f; ${item.veiligheid}</p>`;
        }
      });
      _meerInfoHtml += `</div>`;
    }
    if(s.duur) _meerInfoHtml += `<p style="font-size:.85rem;color:var(--text3);margin-bottom:.5rem">&#x23f1; Ongeveer ${s.duur}</p>`;
    if(s.stappen && s.stappen.length > 0){
      _meerInfoHtml += `<div class="stap-lijst" style="margin-bottom:.5rem">`;
      s.stappen.forEach(stap => { _meerInfoHtml += `<div class="stap-item"><div class="stap-tekst">${stap}</div></div>`; });
      _meerInfoHtml += `</div>`;
    }
    if(s.ritueel) _meerInfoHtml += `<p style="font-size:.78rem;color:var(--text3);margin-top:.3rem;line-height:1.4;opacity:.8;font-style:italic">Dit kan een fijn terugkerend moment worden -- als jullie dat willen.</p>`;
    // Aftercare / afronding — per suggestie of fallback per categorie
    const _naAfloop = s.naAfloop || getAfloopFallback(s);
    if(_naAfloop){
      _meerInfoHtml += `<div style="margin-top:.5rem;padding:.5rem .7rem;background:rgba(140,180,140,.06);border-radius:var(--radius-sm);border-left:2px solid rgba(140,180,140,.2)">
        <p style="font-size:.75rem;color:var(--text3);margin-bottom:.2rem">Na afloop</p>
        <p style="font-size:.85rem;color:var(--text2);line-height:1.5;font-style:italic">${_naAfloop}</p>
      </div>`;
    }
    const _s4Fase = (getSpoor4State().fase || 0);
    if(s.leerpad && s.leerpad > 0 && LEERPAD_THEMAS[s.leerpad] && _s4Fase >= 1){
      _meerInfoHtml += `<p style="font-size:.75rem;color:var(--text3);margin-top:.3rem;opacity:.7">Past bij: ${LEERPAD_THEMAS[s.leerpad].naam}</p>`;
    }
    if(_meerInfoHtml){
      hoofdkaartHtml += `<div style="margin-top:.5rem">
        <button onclick="var d=document.getElementById('spotlightMeerInfo');d.style.display=d.style.display==='none'?'block':'none';this.textContent=d.style.display==='none'?'Meer info &#x25bc;':'Minder &#x25b2;'" style="all:unset;font-size:.8rem;color:var(--text3);cursor:pointer;display:block;padding:.3rem 0">Meer info &#x25bc;</button>
        <div id="spotlightMeerInfo" style="display:none;margin-top:.4rem">${_meerInfoHtml}</div>
      </div>`;
    }

    // Mini-lesje toggle ("Goed om te weten") — v2 hybride UI
    const _miniLesje = kiesMiniLesje(s);
    if(_miniLesje){
      hoofdkaartHtml += `<div style="margin-top:.3rem">
        <button onclick="var d=document.getElementById('miniLesjeContent');d.style.display=d.style.display==='none'?'block':'none';this.textContent=d.style.display==='none'?'&#x25b8; Goed om te weten':'&#x25be; Goed om te weten'" style="all:unset;font-size:.8rem;color:var(--text3);cursor:pointer;display:block;padding:.3rem 0">&#x25b8; Goed om te weten</button>
        <div id="miniLesjeContent" style="display:none;margin-top:.3rem;padding:.5rem .7rem;background:rgba(196,168,138,.05);border-radius:var(--radius-sm);border-left:2px solid rgba(196,168,138,.2)">
          ${renderLesjeHtml(_miniLesje, 'kaart')}
        </div>
      </div>`;
    }

    // Afwijzing (inclusief pauze-optie)
    hoofdkaartActies += `<div style="margin-top:.4rem">
      <button onclick="toonAfwijzingOpties(this)" style="all:unset;font-size:.82rem;color:var(--text3);cursor:pointer;display:block;text-align:center;width:100%;padding:.5rem 0">Liever niet &#x2192;</button>
      <div class="afwijzing-opties" style="display:none">
        <button class="afwijzing-btn" onclick="verwerkNietNu()"><span class="afwijzing-label">Niet nu</span><span class="afwijzing-sub">Komt later een keer terug</span></button>
        <button class="afwijzing-btn" onclick="verwerkNiksVoorMij()"><span class="afwijzing-label">Niks voor mij</span><span class="afwijzing-sub">Dit past niet bij me</span></button>
        <button class="afwijzing-btn" onclick="bewaarVoorMorgen()"><span class="afwijzing-label">Bewaar voor morgen</span><span class="afwijzing-sub">Vandaag niet, morgen misschien</span></button>
        <button class="afwijzing-btn" onclick="verwerkKeuze('lichter')"><span class="afwijzing-label">Wel een kleiner idee</span><span class="afwijzing-sub">Iets anders, minder groot</span></button>
        <button class="afwijzing-btn" onclick="toonPauzeKeuze()" style="border-top:1px solid var(--card-border);margin-top:.3rem;padding-top:.5rem"><span class="afwijzing-label">Vandaag even niet</span><span class="afwijzing-sub">Helemaal niks vandaag</span></button>
      </div>
    </div>`;

  // ── MODE: MILOU ERBIJ + NIET SUBTIEL ──
  } else if(state.huidig && isMilouAanwezig() && state.huidig.subtiel === false){
    hoofdkaartMode = 'wachten';
    const herinnering = getHerinnering();
    if(herinnering){
      markeerHerinneringGezien();
      hoofdkaartContext = 'Terugblik';
      hoofdkaartHtml += `<p style="font-size:.85rem;color:var(--text2);line-height:1.5;font-style:italic;text-align:center">"${herinnering.substring(0,80)}${herinnering.length > 80 ? '...' : ''}"</p>
        <p style="font-size:.8rem;color:var(--text3);margin-top:.5rem;text-align:center">Dat was fijn.</p>`;
    } else {
      hoofdkaartContext = 'Later vandaag';
      hoofdkaartHtml += `<p style="font-size:.85rem;color:var(--text2);line-height:1.5;text-align:center">Er staat iets klaar voor als Milou naar bed is.</p>
        <p style="font-size:.8rem;color:var(--text3);margin-top:.3rem;text-align:center">Tot dan hoef je niks te doen.</p>`;
    }

  // ── MODE: AUTOPILOT ──
  } else if(getLisanneToon() === 1 && !isAutopilotUsedToday() && !isRustigeDag() && isAutopilotDag()){
    hoofdkaartMode = 'autopilot';
    const actie = getAutopilotActie();
    hoofdkaartContext = 'Snel idee';
    hoofdkaartHtml += `<p style="font-size:.9rem;color:var(--text);line-height:1.5;margin-bottom:.6rem;font-style:italic">"${actie}"</p>
      ${isBeginPeriode() ? `<p style="font-size:.75rem;color:var(--text3);margin-bottom:.6rem;font-style:italic">Je mag ook zeggen: "De app zegt dat jij vanavond..."</p>` : ''}`;
    hoofdkaartActies = `<button class="btn btn-primary" style="width:100%;font-size:.85rem" onclick="sendAutopilotActie()">Stuur dit naar Tim &#x2192;</button>
      <button onclick="LS.set('autopilot_used_'+today(),true);renderApp()" style="all:unset;font-size:.8rem;color:var(--text3);cursor:pointer;display:block;text-align:center;margin-top:.4rem;padding:.3rem 0;min-height:44px">Liever niet</button>`;

  // Onboarding toont nu zachte suggesties via kiesSuggestie (geen apart blok meer)

  // ── MODE: OEFENING (actief) ──
  } else if(heeftActieveOefening()){
    hoofdkaartMode = 'oefening';
    const oefState = getOefeningState();
    const oef = OEFENING_POOL.find(o => o.id === oefState.actief.id);
    if(oef){
      hoofdkaartContext = 'Oefening';
      hoofdkaartHtml += `<p style="font-size:.95rem;color:var(--text1);font-weight:500;margin-bottom:.3rem">${oef.titel}</p>
        <p style="font-size:.8rem;color:var(--text3);margin-bottom:.5rem">${oef.focus}</p>
        <p style="font-size:.9rem;color:var(--text2);line-height:1.5;margin-bottom:.7rem">${oef.instructie}</p>
        <p style="font-size:.8rem;color:var(--text2);margin-bottom:.4rem">${oef.terugblik}</p>
        <div style="display:flex;flex-direction:column;gap:.3rem">
          ${oef.terugblikOpties.map(opt => `<button class="btn btn-ghost" style="text-align:left;font-size:.85rem;padding:.5rem .7rem" onclick="beantwoordOefeningTerugblik('${opt.replace(/'/g,"\\'")}')">${opt}</button>`).join('')}
        </div>`;
    }

  // ── MODE: SAMEN-OEFENING ──
  } else if(heeftSamenOefening()){
    hoofdkaartMode = 'samen_oefening';
    hoofdkaartContext = 'Samen oefenen';
    hoofdkaartHtml += renderSamenOefeningKaart('lisanne');

  // ── MODE: MICRO-KEUZE ──
  } else if(moetMicroKeuzeSuggestie() || (function(){ const mk = toonMicroKeuze(); return mk && !mk.gekozen; })()){
    hoofdkaartMode = 'micro_keuze';
    const mk = toonMicroKeuze() || startMicroKeuze();
    if(mk){
      hoofdkaartContext = 'Kies even voor Tim';
      hoofdkaartHtml += `<p style="font-size:.9rem;color:var(--text2);margin-bottom:.7rem">${mk.vraag}</p>
        <div style="display:flex;gap:.5rem">
          <button class="btn btn-ghost" style="flex:1;font-size:.9rem;padding:.6rem" onclick="kiesMicroKeuze('A')">${mk.optieA}</button>
          <button class="btn btn-ghost" style="flex:1;font-size:.9rem;padding:.6rem" onclick="kiesMicroKeuze('B')">${mk.optieB}</button>
        </div>
        <p style="font-size:.72rem;color:var(--text3);text-align:center;margin-top:.4rem">Het maakt niet uit wat je kiest. Het gaat erom dat jij het zegt.</p>`;
    }

  // Stilteweek toont nu zachte suggesties (geen apart blok meer nodig)

  // ── MODE: VRIJE DAG ──
  } else if(vrijeDagActief){
    hoofdkaartMode = 'vrij';
    hoofdkaartContext = 'Vrije dag';
    const VRIJE_DAG_TEKSTEN = ['Vandaag is rustig. Dat is ook goed.','Vrije dag. Niks moet.','Vandaag gewoon samen zijn.'];
    hoofdkaartHtml += `<p style="font-size:1rem;color:var(--text2);text-align:center;line-height:1.6">${pickStabiel(VRIJE_DAG_TEKSTEN, today()+'vrijspot')}</p>`;

  // ── MODE: RUSTDAG (fallback) ──
  } else {
    hoofdkaartMode = 'rust';
    const laatsteDatum = LS.get('l_lastSuggestieDatum', null);
    const dagenWeg = laatsteDatum ? daysSince(laatsteDatum) : 0;
    const terugkom = dagenWeg >= 14;
    const rustState = getSuggestieState();
    const rustWeekCount = getSuggestiesDezeWeek(rustState);

    // Soft reset intro
    const _laatsteAct = state.historie.length > 0 ? state.historie[state.historie.length-1].datum : null;
    const _dagenWeg = _laatsteAct ? daysSince(_laatsteAct) : 0;
    if(_dagenWeg >= 3 && state.historie.length > 0 && !LS.get('l_softResetGezien_'+today())){
      hoofdkaartContext = 'Welkom terug';
      hoofdkaartHtml += `<p style="font-size:.9rem;color:var(--text1);line-height:1.5;text-align:center">Geen probleem dat je even niks deed. Pak gewoon iets kleins op.</p>`;
      hoofdkaartActies = `<button onclick="LS.set('l_softResetGezien_'+today(),true);renderApp()" class="btn btn-ghost" style="width:100%;font-size:.85rem">Ik snap het</button>`;
    // Success loop
    } else if(LS.get('l_successLoopBericht', null) && !LS.get('l_successGezien_'+today())){
      const _successMsg = LS.get('l_successLoopBericht');
      hoofdkaartContext = 'Goed bezig';
      hoofdkaartHtml += `<p style="font-size:.9rem;color:var(--text1);line-height:1.5;text-align:center">${_successMsg}</p>`;
      hoofdkaartActies = `<button onclick="LS.set('l_successGezien_'+today(),true);LS.del('l_successLoopBericht');renderApp()" class="btn btn-ghost" style="width:100%;font-size:.85rem">Fijn!</button>`;
    // Fase-overgang
    } else if((function(){ const _s4=getSpoor4State(); const _ap=_s4.fase||0; const _th=LEERPAD_THEMAS[_ap]; return _s4.laatsteLeerpad!==null && _s4.laatsteLeerpad!==_ap && _th && _th.overgang && !LS.get('l_faseOvergangGezien_'+_ap); })()){
      const _s4=getSpoor4State(); const _ap=_s4.fase||0; const _th=LEERPAD_THEMAS[_ap];
      hoofdkaartContext = 'Nieuw hoofdstuk';
      hoofdkaartHtml += `<p style="font-size:.95rem;color:var(--text1);line-height:1.5;text-align:center">${_th.overgang}</p>`;
      hoofdkaartActies = `<button onclick="LS.set('l_faseOvergangGezien_'+${_ap},true);renderApp()" class="btn btn-ghost" style="width:100%;font-size:.85rem">Ik ben er klaar voor</button>`;
    // Normale rustdag
    } else {
      hoofdkaartContext = terugkom ? 'Welkom terug' : 'Rustige dag';
      if(terugkom){
        const terugkomTeksten = ['Leuk dat je er weer bent.','Welkom terug. Geen haast.','Fijn dat je even kijkt.'];
        hoofdkaartHtml += `<p style="font-size:1rem;color:var(--text1);text-align:center;margin-bottom:.3rem">${pickStabiel(terugkomTeksten, today()+'terugkom')}</p>`;
      } else {
        const RUST_TEKSTEN = [
          rustWeekCount > 0 ? `Je hebt deze week al ${rustWeekCount} keer iets gedaan. Even niks is ook goed.` : 'Niet elke dag hoeft iets. Dat hoort erbij.',
          'Vandaag geen idee. Soms is dat precies goed.',
          'Rustige dag. Het hoeft niet elke dag.'
        ];
        hoofdkaartHtml += `<p style="font-size:1rem;color:var(--text2);text-align:center;line-height:1.6">${pickStabiel(RUST_TEKSTEN, today()+'rustdag')}</p>`;
      }
      // Link naar plannen
      hoofdkaartActies = `<a onclick="setTab('regelen')" style="font-size:.85rem;color:var(--purple);cursor:pointer;text-decoration:none;display:block;text-align:center;padding:.3rem 0">Zelf iets kiezen &#x2192;</a>`;
    }
  }

  // ── RENDER ZONE 2: Hoofdkaart ──
  html += `<div style="background:var(--surface);border:1px solid var(--card-border);border-radius:var(--radius);padding:1.2rem 1rem;margin-bottom:.6rem">`;
  if(hoofdkaartContext){
    const _isZachteIntro = hoofdkaartMode === 'suggestie';
    if(_isZachteIntro){
      html += `<p style="font-size:.82rem;color:var(--text3);margin-bottom:.5rem;font-style:italic">${hoofdkaartContext}</p>`;
    } else {
      html += `<p style="font-size:.7rem;color:var(--accent);text-transform:uppercase;letter-spacing:.6px;margin-bottom:.5rem">${hoofdkaartContext}</p>`;
    }
  }
  html += hoofdkaartHtml;
  if(hoofdkaartActies){
    html += `<div style="margin-top:.8rem">${hoofdkaartActies}</div>`;
  }
  // "Vandaag even niet" zit nu in het afwijzing-menu (geen losse knop meer)
  html += `</div>`;

  // Pauze-keuze panel (verborgen, menselijke taal)
  html += `<div id="pauzeKeuzePanel" style="display:none;margin-bottom:.8rem;padding:.8rem 1rem;background:var(--surface);border:1px solid var(--card-border);border-radius:var(--radius);text-align:center">
    <p style="font-size:.88rem;color:var(--text1);margin-bottom:.7rem">Helemaal oké. Hoe voelt het?</p>
    <button class="btn btn-ghost" style="width:100%;margin-bottom:.4rem;font-size:.83rem;text-align:left;padding:.5rem .8rem" onclick="activeerPauze('lisanne',0)">😴 Te moe vandaag</button>
    <button class="btn btn-ghost" style="width:100%;margin-bottom:.4rem;font-size:.83rem;text-align:left;padding:.5rem .8rem" onclick="activeerPauze('lisanne',0)">🤷 Geen zin vandaag</button>
    <button class="btn btn-ghost" style="width:100%;margin-bottom:.4rem;font-size:.83rem;text-align:left;padding:.5rem .8rem" onclick="activeerPauze('lisanne',0)">🙅 Voelt niet passend</button>
    <button class="btn btn-ghost" style="width:100%;margin-bottom:.1rem;font-size:.83rem;text-align:left;padding:.5rem .8rem" onclick="activeerPauze('lisanne',7)">🌿 Even rust, een paar dagen</button>
  </div>`;

  // ════════════════════════════════════════════
  //  ZONE 2B — PERIODIEKE LEERPAD-TERUGBLIK
  //  Elke ~14 dagen, als leerpad >= 1
  // ════════════════════════════════════════════
  const _tbFase = _s4State.fase || 0;
  const _tbLaatsteDatum = _s4State.laatsteTerugblik;
  const _tbDagenSinds = _tbLaatsteDatum ? daysSince(_tbLaatsteDatum) : 999;
  const _tbGezienKey = 'l_leerpadTerugblik_'+today();
  if(_tbFase >= 1 && _tbDagenSinds >= 14 && !LS.get(_tbGezienKey) && hoofdkaartMode === 'rust'){
    const _tbVragen = LEERPAD_TERUGBLIK[_tbFase] || LEERPAD_TERUGBLIK[0];
    const _tbVraag = pickStabiel(_tbVragen, today()+'lptb');
    html += `<div class="leerpad-terugblik-card">
      <div class="ltb-titel">Even terugkijken</div>
      <p class="ltb-vraag">${_tbVraag}</p>
      <div style="display:flex;flex-direction:column;gap:.4rem">
        <button class="btn btn-ghost" style="font-size:.83rem;text-align:left;padding:.5rem .7rem" onclick="beantwoordLeerpadTerugblik(this.textContent)">Ja, dat herken ik</button>
        <button class="btn btn-ghost" style="font-size:.83rem;text-align:left;padding:.5rem .7rem" onclick="beantwoordLeerpadTerugblik(this.textContent)">Nog niet echt</button>
        <button class="btn btn-ghost" style="font-size:.83rem;text-align:left;padding:.5rem .7rem" onclick="beantwoordLeerpadTerugblik(this.textContent)">Weet ik niet</button>
      </div>
    </div>`;
  }

  // ════════════════════════════════════════════
  //  ZONE 3 — SUBSIGNAAL (max een regel)
  // ════════════════════════════════════════════
  let signaalHtml = '';

  // Prioriteit 1: Tim's feedback
  const _timFb = getTimFeedbackVoorLisanne();
  if(!signaalHtml && _timFb && !_timFb.gelezen && daysSince(_timFb.datum) < 3){
    signaalHtml = `<div onclick="toggleSignaal('timFeedback')" style="padding:.5rem .6rem;cursor:pointer;display:flex;align-items:center;gap:.4rem">
      <span>&#x1f48c;</span>
      <span style="font-size:.82rem;color:var(--text2)">Tim liet iets weten</span>
      <span style="font-size:.75rem;color:var(--text3);margin-left:auto">tik om te lezen</span>
    </div>
    <div id="signaal_timFeedback" style="display:none;padding:.5rem .8rem;border-top:1px solid var(--card-border)">
      <p style="font-size:.9rem;color:var(--text1);font-style:italic;line-height:1.5;margin-bottom:.4rem">"${_timFb.tekst}"</p>
      <button onclick="event.stopPropagation();markeerFeedbackGelezen();renderApp()" style="all:unset;font-size:.8rem;color:var(--text3);cursor:pointer;padding:.3rem 0">Gezien</button>
    </div>`;
  }

  // Prioriteit 2: Berichtje van Tim
  if(!signaalHtml && faseActief(4)){
    const berichtjes = getOngelezenBerichtjes('lisanne');
    if(berichtjes.length > 0){
      const bt = berichtjes[berichtjes.length - 1];
      signaalHtml = `<div onclick="toggleSignaal('berichtTim')" style="padding:.5rem .6rem;cursor:pointer;display:flex;align-items:center;gap:.4rem">
        <span>&#x1f48c;</span>
        <span style="font-size:.82rem;color:var(--text2)">Nieuw berichtje van Tim</span>
        <span style="font-size:.75rem;color:var(--text3);margin-left:auto">tik</span>
      </div>
      <div id="signaal_berichtTim" style="display:none;padding:.5rem .8rem;border-top:1px solid var(--card-border)">
        <p style="font-size:.9rem;color:var(--text1);font-style:italic;line-height:1.5;margin-bottom:.4rem">"${bt.tekst}"</p>
        <button onclick="event.stopPropagation();markeerBerichtjesGelezen('lisanne');renderApp()" style="all:unset;font-size:.8rem;color:var(--text3);cursor:pointer;padding:.3rem 0">Gelezen</button>
      </div>`;
    }
  }

  // Prioriteit 3: Reflectie van Tim
  if(!signaalHtml){
    const timReflecties = getReflecties().filter(r => r.wie === 'tim' && r.type === 'moment' && r.tekst && daysSince(r.datum) < 3);
    const gezienKey = 'reflectie_gezien_lisanne';
    const laatstGezien = LS.get(gezienKey, 0);
    const ongelezen = timReflecties.filter(r => r.ts > laatstGezien);
    if(ongelezen.length > 0){
      const tr = ongelezen[ongelezen.length - 1];
      signaalHtml = `<div onclick="toggleSignaal('reflectieTim')" style="padding:.5rem .6rem;cursor:pointer;display:flex;align-items:center;gap:.4rem">
        <span>&#x1f4dd;</span>
        <span style="font-size:.82rem;color:var(--text2)">Nieuwe reflectie van Tim</span>
        <span style="font-size:.75rem;color:var(--text3);margin-left:auto">tik</span>
      </div>
      <div id="signaal_reflectieTim" style="display:none;padding:.5rem .8rem;border-top:1px solid var(--card-border)">
        <p style="font-size:.9rem;color:var(--text1);font-style:italic;line-height:1.5;margin-bottom:.4rem">"${tr.tekst}"</p>
        <button onclick="event.stopPropagation();LS.set('${gezienKey}',Date.now());renderApp()" style="all:unset;font-size:.8rem;color:var(--text3);cursor:pointer;padding:.3rem 0">Gelezen</button>
      </div>`;
    }
  }

  // Prioriteit 4: Vandaag afspraak
  if(!signaalHtml){
    const vandaagAfspraken = getAfspraken().filter(a => a.type === 'datum' && a.datum === today());
    if(vandaagAfspraken.length > 0){
      signaalHtml = `<div onclick="toggleSignaal('vandaagAfspraak')" style="padding:.5rem .6rem;cursor:pointer;display:flex;align-items:center;gap:.4rem">
        <span>&#x1f4cc;</span>
        <span style="font-size:.82rem;color:var(--text2)">Vandaag: ${vandaagAfspraken[0].tekst.substring(0,40)}</span>
        <span style="font-size:.75rem;color:var(--text3);margin-left:auto">tik</span>
      </div>
      <div id="signaal_vandaagAfspraak" style="display:none;padding:.5rem .8rem;border-top:1px solid var(--card-border)">
        ${vandaagAfspraken.map(a => `<p style="font-size:.9rem;color:var(--text1);padding:.2rem 0">${a.tekst}</p>`).join('')}
      </div>`;
    }
  }

  if(signaalHtml){
    html += `<div style="background:var(--surface);border:1px solid var(--card-border);border-radius:var(--radius-sm);overflow:hidden">${signaalHtml}</div>`;
  }

  // ════════════════════════════════════════════
  //  LES-ACTIE & OEFENKAART — na het lezen van een les
  // ════════════════════════════════════════════
  const _lesV = getLesVoortgang();
  if(_lesV.gelezen.length > 0){
    // Vind de laatst gelezen les
    const _laatsteLesId = _lesV.gelezen[_lesV.gelezen.length - 1];
    const _laatsteLes = LESSEN_INHOUD.find(l => l.id === _laatsteLesId);
    const _lesDatum = _lesV.gelezenOp[_laatsteLesId];

    if(_laatsteLes && _lesDatum){
      const _dagenSinds = daysSince(_lesDatum);
      const _lk = DOMEIN_KLEUREN[_laatsteLes.domein] || '196,168,138';

      if(_dagenSinds === 0){
        // Dag 0: toon "actie vandaag" uit de les — klik opent les op stap 4 (vandaag = index 3)
        html += `<div onclick="toonLes(${_laatsteLes.id},3)" style="margin-top:.6rem;padding:.6rem .8rem;background:rgba(${_lk},.06);border:1px solid rgba(${_lk},.15);border-radius:var(--radius);text-align:center;cursor:pointer">
          <p style="font-size:.68rem;color:rgba(${_lk},.6);text-transform:uppercase;letter-spacing:.4px;margin-bottom:.3rem">Les ${_laatsteLes.id} — actie vandaag</p>
          <p style="font-size:.88rem;color:var(--text1);line-height:1.5;font-weight:500">${_laatsteLes.zichtbaar.vandaag}</p>
          <p style="font-size:.7rem;color:rgba(${_lk},.4);margin-top:.3rem">Tik om les te openen</p>
        </div>`;
      } else if(_dagenSinds <= 5 && _laatsteLes.meerLezen.herhaling){
        // Dag 1-5: toon oefenkaart (herhaling) — klik opent les op stap 3 (oefening = index 2)
        html += `<div onclick="toonLes(${_laatsteLes.id},2)" style="margin-top:.6rem;padding:.6rem .8rem;background:rgba(${_lk},.04);border:1px solid rgba(${_lk},.1);border-radius:var(--radius-sm);cursor:pointer">
          <p style="font-size:.68rem;color:rgba(${_lk},.6);text-transform:uppercase;letter-spacing:.4px;margin-bottom:.3rem">📝 Les ${_laatsteLes.id} oefenen</p>
          <p style="font-size:.82rem;color:var(--text2);line-height:1.5">${_laatsteLes.meerLezen.herhaling}</p>
          <p style="font-size:.7rem;color:rgba(${_lk},.35);margin-top:.3rem">Tik om les te openen</p>
        </div>`;
      }
    }
  }

  // ════════════════════════════════════════════
  //  LES-NUDGE — subtiel, alleen als er een volgende les beschikbaar is
  // ════════════════════════════════════════════
  const _volgendeLes = LESSEN_INHOUD.find(l => !_lesV.gelezen.includes(l.id) && getLesGate(l.id));
  if(_volgendeLes){
    const _lk = DOMEIN_KLEUREN[_volgendeLes.domein] || '196,168,138';
    html += `<div onclick="toonLes(${_volgendeLes.id})" style="margin-top:.6rem;padding:.5rem .7rem;background:rgba(${_lk},.04);border:1px solid rgba(${_lk},.1);border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;gap:.5rem">
      <span style="font-size:.9rem">📖</span>
      <div>
        <p style="font-size:.8rem;color:var(--text2)">Les ${_volgendeLes.id}: ${_volgendeLes.titel}</p>
        <p style="font-size:.7rem;color:var(--text3)">${_volgendeLes.subtitel || ''}</p>
      </div>
      <span style="margin-left:auto;font-size:.75rem;color:var(--accent)">Lees →</span>
    </div>`;
  }

  return html;
}


// ─── Rituelen & Regels UI ────────────────────────────────────
function renderRituelenRegels() {
  const ritState = getRitueelState();
  const regState = getRegelState();
  const sp4 = getSpoor4State();

  let html = '';

  // Active Rituelen
  if (ritState.actief.length > 0) {
    html += '<div class="card" style="margin-bottom:1rem"><div class="card-body">';
    html += '<h3 style="margin:0 0 .8rem">🔄 Rituelen</h3>';
    const vandaag = new Date().toISOString().slice(0,10);
    ritState.actief.forEach(a => {
      const rit = RITUEEL_POOL.find(r => r.id === a.id);
      if (!rit) return;
      const vandaagGedaan = ritState.log.some(l => l.id === a.id && l.datum === vandaag && l.gedaan);
      html += `<div style="display:flex;align-items:center;gap:.8rem;padding:.6rem 0;border-bottom:1px solid var(--card-border)">
        <button class="btn ${vandaagGedaan ? 'btn-primary' : 'btn-ghost'}" style="min-width:2.5rem;height:2.5rem;padding:0;font-size:1.2rem"
          onclick="toggleRitueel('${a.id}','${vandaag}')">
          ${vandaagGedaan ? '✓' : '○'}
        </button>
        <div><strong>${rit.titel}</strong><br><small style="opacity:.7">${rit.lisanneTaak || rit.beschrijving}</small></div>
      </div>`;
    });
    html += '</div></div>';
  }

  // Active Regels
  if (regState.actief.length > 0) {
    html += '<div class="card" style="margin-bottom:1rem"><div class="card-body">';
    html += '<h3 style="margin:0 0 .8rem">📋 Regels</h3>';
    regState.actief.forEach(a => {
      const reg = REGEL_POOL.find(r => r.id === a.id);
      if (!reg) return;
      const isAan = a.aanStatus === 'aan';
      html += `<div style="display:flex;align-items:center;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid var(--card-border)">
        <div><strong>${reg.titel}</strong><br><small style="opacity:.7">${reg.watLisanneDoet || reg.beschrijving}</small></div>
        <button class="btn ${isAan ? 'btn-primary' : 'btn-ghost'}" style="min-width:3.5rem"
          onclick="toggleRegel('${a.id}')">
          ${isAan ? 'Aan' : 'Pauze'}
        </button>
      </div>`;
    });
    html += '</div></div>';
  }

  // Suggest new
  const beschikbareRituelen = RITUEEL_POOL.filter(r => r.fase <= sp4.fase && !ritState.actief.some(a => a.id === r.id));
  const beschikbareRegels = REGEL_POOL.filter(r => r.fase <= sp4.fase && !regState.actief.some(a => a.id === r.id));

  if (beschikbareRituelen.length > 0 || beschikbareRegels.length > 0) {
    html += '<div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.5rem">';
    if (beschikbareRituelen.length > 0) {
      html += `<button class="btn btn-ghost" onclick="suggestRitueel()">+ Ritueel</button>`;
    }
    if (beschikbareRegels.length > 0) {
      html += `<button class="btn btn-ghost" onclick="suggestRegel()">+ Regel</button>`;
    }
    html += '</div>';
  }

  return html;
}

  //  RITUELEN & REGELS
  // ════════════════════════════════════════════

  // ════════════════════════════════════════════

    <button class="btn btn-primary" style="flex:1;font-size:.85rem;padding:.7rem" onclick="toggleLisanneBericht()">💬 Zeggen</button>
    <button class="btn btn-secondary" style="flex:1;font-size:.85rem;padding:.7rem" onclick="openKiezenFlow()">🎯 Kiezen</button>

  </div>`;
  // Zelf-leren link
  html += `<div style="text-align:center;margin-bottom:.8rem">
    <button onclick="toonVolgendeV26Les()" style="all:unset;font-size:.82rem;color:var(--accent);cursor:pointer;padding:.4rem .8rem;opacity:.8">📖 Meer leren over Tim</button>
  </div>`;

  // ── BERICHTJE-COMPOSER (alleen in Plannen) ──
  const alGestuurdLisanne = getBerichtjes().find(b => b.van === 'lisanne' && b.datum === today());
  if(!alGestuurdLisanne){

function renderHandleiding(){
  let html = `<input class="search-bar" type="text" placeholder="Zoek item..." oninput="filterHandleiding(this.value)">`;

  const groepen = {};
  const groepNamen = {bondage:'Bondage',sensorisch:'Sensorisch',stimulatie:'Stimulatie','e-stim':'E-stim',overig:'Overig',aanraking:'Aanraking'};

  Object.values(SPULLEN_DB).forEach(item => {
    if(!groepen[item.groep]) groepen[item.groep] = [];
    groepen[item.groep].push(item);
  });

  const favorieten = LS.get('l_favorieten',[]);

  for(const [groep, items] of Object.entries(groepen)){
    html += `<div class="handleiding-groep" data-groep="${groep}">`;
    html += `<div class="groep-titel">${groepNamen[groep]||groep}</div>`;
    items.forEach(item => {
      const isFav = favorieten.includes(item.key);
      html += `<div class="item-card" data-naam="${item.naam.toLowerCase()}">
        <div class="item-header" onclick="toggleItem(this)">
          <span>${item.naam}</span>
          <span>
            <span class="item-fav" onclick="event.stopPropagation();toggleFav('${item.key}')">${isFav?'⭐':'☆'}</span>
            ▼
          </span>
        </div>
        <div class="item-body">
          <div class="item-body-inner">
            <p>${item.handleiding}</p>
            ${item.tip ? `<div class="item-tip">💡 ${item.tip}</div>` : ''}
            ${item.veiligheid ? `<div class="item-warning">⚠️ ${item.veiligheid}</div>` : ''}
            ${item.vastmaakTekst ? `<p style="margin-top:.5rem;font-style:italic;color:var(--text3)">Als vastmaakmoment: ${item.vastmaakTekst}</p>` : ''}
            ${item.combineerNietMet.length > 0 ? `<p style="font-size:.8rem;color:var(--text3);margin-top:.4rem">Niet combineren met: ${item.combineerNietMet.map(k=>SPULLEN_DB[k]?.naam||k).join(', ')}</p>` : ''}
          </div>
        </div>
      </div>`;
    });
    html += `</div>`;
  }
  return html;
}

          <p style="font-size:.7rem;color:rgba(${kleur},.7);text-transform:uppercase;letter-spacing:.4px;margin-bottom:.2rem">Stappen</p>
