<style>
/* ═══════════════════════════════════════════════════
   SPRANKELEND SOUFFLEUR — CSS
   ═══════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;600&display=swap');

:root {
  --bg: #1e1a1a;
  --bg2: #272121;
  --bg3: #332b2b;
  --surface: rgba(255,255,255,.06);
  --surface2: rgba(255,255,255,.10);
  --surface3: rgba(255,255,255,.15);
  --text: #e8ddd6;
  --text2: #bda99b;
  --text3: #8a7b72;
  --accent: #c48a8a;
  --accent2: #b07a7a;
  --warm: #d6b36a;
  --warm2: #c4a35a;
  --success: #6abf8a;
  --danger: #bf6a6a;
  --purple: #a88a9b;
  --card: rgba(255,255,255,.03);
  --card-border: rgba(255,255,255,.06);
  --radius: 18px;
  --radius-sm: 12px;
  --shadow: 0 2px 16px rgba(0,0,0,.15);
}

* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; overflow:hidden; }
body {
  font-family:'DM Sans',sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* ── App Container ── */
#app {
  height:100%; display:flex; flex-direction:column;
  max-width:480px; margin:0 auto;
  position:relative; overflow:hidden;
}

/* ── View Selection (pin screen) ── */
#viewSelect {
  height:100%; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:2rem; text-align:center;
}
#viewSelect h1 {
  font-family:'Playfair Display',serif;
  font-size:1.8rem; font-weight:600;
  margin-bottom:.5rem; color:var(--text);
}
#viewSelect p { color:var(--text2); margin-bottom:2.5rem; font-size:.95rem; }
.view-buttons { display:flex; flex-direction:column; gap:1rem; width:100%; max-width:280px; }
.view-btn {
  padding:1.2rem 1.5rem; border-radius:var(--radius);
  border:1px solid var(--card-border); background:var(--surface);
  color:var(--text); font-size:1.05rem; font-family:inherit;
  cursor:pointer; transition:all .2s; text-align:left;
}
.view-btn:hover,.view-btn:active { background:var(--surface2); border-color:var(--accent); }
.view-btn .btn-name { font-weight:600; display:block; margin-bottom:.25rem; }
.view-btn .btn-desc { font-size:.82rem; color:var(--text2); }

/* ── Header ── */
.header {
  padding:1rem 1.2rem .6rem; display:flex;
  align-items:center; justify-content:space-between;
}
.header h2 {
  font-family:'Playfair Display',serif;
  font-size:1.3rem; font-weight:600;
}
.header-right { display:flex; gap:.6rem; align-items:center; }
.header-btn {
  background:none; border:none; color:var(--text2);
  font-size:1.1rem; cursor:pointer; padding:.3rem;
}
.header-btn:hover { color:var(--text); }

/* ── Content Area ── */
.content {
  flex:1; overflow-y:auto; padding:0 1.2rem 1rem;
  -webkit-overflow-scrolling:touch;
  scroll-behavior:smooth;
}
.content::-webkit-scrollbar { width:4px; }
.content::-webkit-scrollbar-thumb { background:var(--surface3); border-radius:2px; }

/* ── Tab Bar ── */
.tabs {
  display:flex; border-top:1px solid var(--card-border);
  background:var(--bg2); padding:.4rem .8rem;
  padding-bottom:env(safe-area-inset-bottom);
}
.tab {
  flex:1; display:flex; flex-direction:column;
  align-items:center; gap:.2rem; padding:.6rem .2rem;
  background:none; border:none; color:var(--text3);
  font-size:.7rem; font-family:inherit; cursor:pointer;
  transition:color .2s; min-height:48px;
}
.tab.active { color:var(--accent); }
.tab-icon { font-size:1.3rem; }

/* ── Cards ── */
.card {
  background: linear-gradient(135deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
  border:1px solid rgba(255,255,255,.05);
  border-radius:var(--radius); padding:1.3rem 1.4rem;
  margin-bottom:.9rem;
}
.card-title {
  font-weight:600; font-size:1rem; margin-bottom:.5rem;
}
.card-text { color:var(--text2); font-size:.9rem; line-height:1.5; }

/* ── Suggestie Card ── */
.suggestie-card {
  background: linear-gradient(135deg, rgba(196,138,138,.10), rgba(196,138,138,.03));
  border:1px solid rgba(196,138,138,.14);
  border-radius:var(--radius); padding:1.5rem 1.4rem;
  margin-bottom:1rem;
}
.suggestie-label {
  font-size:.75rem; color:var(--accent); text-transform:uppercase;
  letter-spacing:.05em; margin-bottom:.6rem; font-weight:600;
}
.suggestie-tekst {
  font-size:1.05rem; line-height:1.6; margin-bottom:1rem;
  color:var(--text);
}
.zeg-voorbeeld {
  background:rgba(196,138,138,.08); border-left:3px solid var(--accent);
  padding:.7rem .9rem; border-radius:var(--radius-sm);
  margin-bottom:1rem; display:flex; gap:.6rem; align-items:flex-start;
}
.zeg-label {
  flex-shrink:0; font-size:1.1rem;
}
.zeg-tekst {
  color:var(--text2); font-size:.95rem; font-style:italic;
  line-height:1.5;
}
.suggestie-handleiding {
  background:var(--surface); border-radius:var(--radius-sm);
  overflow:hidden; margin-bottom:1rem;
}
.handleiding-toggle {
  width:100%; padding:.7rem 1rem; background:none; border:none;
  color:var(--text2); font-family:inherit; font-size:.85rem;
  cursor:pointer; text-align:left; display:flex;
  justify-content:space-between; align-items:center;
}
.handleiding-toggle:hover { color:var(--text); }
.handleiding-content {
  padding:0 1rem; max-height:0; overflow:hidden;
  transition:max-height .3s ease, padding .3s ease;
  font-size:.85rem; color:var(--text2); line-height:1.5;
}
.handleiding-content.open {
  max-height:500px; padding:0 1rem .8rem;
}

/* ── Suggestie Buttons ── */
.suggestie-actions {
  display:flex; gap:.6rem;
}
.btn {
  flex:1; padding:.75rem; border-radius:var(--radius-sm);
  border:none; font-family:inherit; font-size:.9rem;
  font-weight:500; cursor:pointer; transition:all .15s;
  min-height:44px; display:inline-flex; align-items:center; justify-content:center;
}
.btn-feedback {
  background:var(--success) !important; color:#fff !important; border-color:var(--success) !important;
  pointer-events:none;
}
@keyframes fadeUp { from{opacity:1;transform:translateY(0)} to{opacity:0;transform:translateY(-8px)} }
.btn-primary {
  background:var(--accent); color:var(--bg);
}
.btn-primary:hover { background:var(--accent2); }
.btn-secondary {
  background:var(--surface2); color:var(--text);
}
.btn-secondary:hover { background:var(--surface3); }
.btn-ghost {
  background:none; color:var(--text3); border:1px solid var(--card-border);
}
.btn-ghost:hover { color:var(--text2); border-color:var(--text3); }
.btn-warm {
  background:var(--warm); color:var(--bg);
}
.btn-warm:hover { background:var(--warm2); }
.btn-full { width:100%; }
.btn-lg { padding:.75rem 1.5rem; font-size:.95rem; }

/* ── Initiatief Knop ── */
.initiatief-btn {
  width:100%; padding:1rem; border-radius:var(--radius);
  border:1px solid var(--accent);
  background:rgba(196,138,138,.08); color:var(--accent);
  font-family:inherit; font-size:1rem; font-weight:600;
  cursor:pointer; margin-bottom:1rem; transition:all .2s;
}
.initiatief-btn:hover { background:rgba(196,138,138,.15); }

/* ── Handleiding Items ── */
.handleiding-groep {
  margin-bottom:1.5rem;
}
.groep-titel {
  font-size:.8rem; color:var(--accent); text-transform:uppercase;
  letter-spacing:.05em; font-weight:600; margin-bottom:.6rem;
  padding-left:.2rem;
}
.item-card {
  background:var(--card); border:1px solid var(--card-border);
  border-radius:var(--radius-sm); margin-bottom:.5rem;
  overflow:hidden;
}
.item-header {
  padding:.8rem 1rem; cursor:pointer; display:flex;
  justify-content:space-between; align-items:center;
  font-weight:500; font-size:.95rem;
}
.item-header:hover { background:var(--surface); }
.item-body {
  max-height:0; overflow:hidden; transition:max-height .3s ease;
}
.item-body.open { max-height:600px; }
.item-body-inner {
  padding:0 1rem .8rem; font-size:.88rem;
  color:var(--text2); line-height:1.6;
}
.item-body-inner p { margin-bottom:.5rem; }
.item-tip {
  background:rgba(196,138,138,.1); border-radius:6px;
  padding:.5rem .7rem; font-size:.82rem; margin-top:.5rem;
}
.item-warning {
  background:rgba(191,106,106,.1); border-radius:6px;
  padding:.5rem .7rem; font-size:.82rem; margin-top:.5rem;
  color:var(--danger);
}
.item-fav {
  font-size:1.1rem; cursor:pointer; padding:.2rem;
  transition:transform .2s;
}
.item-fav:hover { transform:scale(1.2); }

/* ── Tim's Track ── */
.discipline-card {
  background: linear-gradient(135deg, rgba(214,179,106,.1), rgba(214,179,106,.03));
  border:1px solid rgba(214,179,106,.2);
  border-radius:var(--radius); padding:1.2rem;
  margin-bottom:.8rem;
}
.week-dots {
  display:flex; gap:.4rem; margin-top:.6rem;
}
.dot {
  width:28px; height:28px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:.75rem; font-weight:600;
}
.dot.done { background:var(--success); color:var(--bg); }
.dot.miss { background:var(--surface2); color:var(--text3); }
.dot.today { border:2px solid var(--warm); background:var(--surface); color:var(--text); }

.warmte-container {
  text-align:center; padding:1.5rem 0;
}
.warmte-ring {
  width:120px; height:120px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:2rem; margin:0 auto 1rem;
  transition: all .3s;
}
.warmte-ring.warm { background:rgba(106,191,138,.15); border:3px solid var(--success); }
.warmte-ring.neutraal { background:rgba(214,179,106,.15); border:3px solid var(--warm); }
.warmte-ring.koud { background:rgba(191,106,106,.1); border:3px solid var(--danger); }

/* ── Emotie Check ── */
.emotie-grid {
  display:flex; gap:.5rem; justify-content:center;
  margin-top:.8rem;
}
.emotie-btn {
  width:50px; height:50px; border-radius:50%;
  border:2px solid var(--card-border); background:var(--surface);
  font-size:1.4rem; cursor:pointer; transition:all .2s;
  display:flex; align-items:center; justify-content:center;
}
.emotie-btn:hover,.emotie-btn.selected {
  border-color:var(--accent); background:var(--surface2);
  transform:scale(1.1);
}

/* ── Stap-voor-stap sessie ── */
.stap-lijst { counter-reset:stap; }
.stap-item {
  position:relative; padding-left:2.2rem; margin-bottom:1rem;
}
.stap-item::before {
  counter-increment:stap; content:counter(stap);
  position:absolute; left:0; top:0;
  width:1.6rem; height:1.6rem; border-radius:50%;
  background:var(--accent); color:var(--bg);
  display:flex; align-items:center; justify-content:center;
  font-size:.8rem; font-weight:700;
}
.stap-tekst { font-size:.92rem; line-height:1.5; }

/* ── Onboarding ── */
.onboarding {
  height:100%; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:2rem; text-align:center;
}
.onboarding h1 {
  font-family:'Playfair Display',serif;
  font-size:1.6rem; margin-bottom:1rem;
}
.onboarding p {
  color:var(--text2); font-size:.95rem;
  line-height:1.6; margin-bottom:1.5rem;
  max-width:320px;
}

/* ── Zoekbalk ── */
.search-bar {
  width:100%; padding:.7rem 1rem; border-radius:var(--radius-sm);
  border:1px solid var(--card-border); background:var(--surface);
  color:var(--text); font-family:inherit; font-size:.9rem;
  margin-bottom:1rem;
}
.search-bar::placeholder { color:var(--text3); }
.search-bar:focus { outline:none; border-color:var(--accent); }

/* ── Section Headers ── */
.section-label {
  font-size:.7rem; color:var(--accent); text-transform:uppercase;
  letter-spacing:.5px; margin-bottom:.5rem; font-weight:600;
  padding-left:.1rem;
}
.section-label-purple { color:var(--purple); }
.section-label-warm { color:var(--warm); }

/* ── Signal Cards ── */
.signal-card {
  background:var(--surface); border-radius:var(--radius-sm);
  padding:.5rem .8rem; margin-bottom:.4rem; cursor:pointer;
  border:1px solid var(--card-border); transition:all .2s;
}
.signal-card-accent { border-color:rgba(196,138,138,.15); }
.signal-card-warm { border-color:rgba(214,179,106,.15); }
.signal-card-purple { border-color:rgba(168,138,155,.15); }
.signal-title { font-size:.85rem; }
.signal-body {
  display:none; margin-top:.5rem; border-top:1px solid var(--card-border);
  padding-top:.5rem;
}

/* ── Quick Actions ── */
.quick-actions {
  display:flex; gap:.5rem; margin:.8rem 0;
}
.quick-action-btn {
  flex:1; padding:.7rem .5rem; border-radius:var(--radius-sm);
  border:1px solid var(--card-border); background:var(--surface);
  color:var(--text2); font-family:inherit; font-size:.82rem;
  cursor:pointer; text-align:center; transition:all .2s;
  min-height:44px; display:flex; align-items:center;
  justify-content:center; gap:.3rem;
}
.quick-action-btn:hover { background:var(--surface2); border-color:var(--accent); color:var(--text); }

/* ── Stat Lines ── */
.stat-line {
  font-size:.85rem; color:var(--text2); padding:.3rem 0;
}
.stat-line-subtle {
  font-size:.8rem; color:var(--text3); padding:.2rem 0;
}

/* ── Info Panel ── */
.info-panel {
  background:rgba(196,138,138,.03); border:1px solid rgba(196,138,138,.06);
  border-radius:var(--radius); padding:.8rem 1rem; margin-bottom:.6rem;
}

/* ── Misc ── */
.empty-state {
  text-align:center; padding:3rem 1rem;
  color:var(--text3); font-size:.95rem;
}
.badge {
  display:inline-block; padding:.15rem .5rem;
  border-radius:20px; font-size:.72rem; font-weight:600;
}
.badge-micro { background:rgba(196,138,138,.15); color:var(--accent); }
.badge-vastmaak { background:rgba(214,179,106,.15); color:var(--warm); }
.badge-sessie { background:rgba(168,138,155,.15); color:var(--purple); }
.badge-opdracht { background:rgba(106,191,138,.15); color:var(--success); }
.badge-rel { background:rgba(191,106,106,.1); color:var(--danger); }

/* ── Settings Overlay (Frequency) ── */
.settings-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.6);
  display:flex; align-items:center; justify-content:center;
  z-index:100; opacity:0; pointer-events:none;
  transition:opacity .2s;
}
.settings-overlay.show { opacity:1; pointer-events:all; }
.settings-modal {
  background:var(--bg2); border-radius:var(--radius);
  padding:2rem; width:90%; max-width:360px;
  box-shadow:var(--shadow);
}
.settings-modal h3 { font-size:1.05rem; margin-bottom:1.5rem; }
.frequency-slider {
  width:100%; height:6px; border-radius:3px;
  background:var(--surface2); outline:none;
  -webkit-appearance:none; appearance:none;
}
.frequency-slider::-webkit-slider-thumb {
  -webkit-appearance:none; appearance:none;
  width:20px; height:20px; border-radius:50%;
  background:var(--accent); cursor:pointer;
}
.frequency-slider::-moz-range-thumb {
  width:20px; height:20px; border-radius:50%;
  background:var(--accent); cursor:pointer; border:none;
}
.frequency-labels {
  display:flex; justify-content:space-between;
  margin-top:.8rem; font-size:.8rem; color:var(--text2);
}
.settings-close {
  width:100%; padding:.8rem; margin-top:1.5rem;
  border-radius:var(--radius-sm); border:none;
  background:var(--surface2); color:var(--text);
  font-family:inherit; font-size:.9rem; cursor:pointer;
}
.settings-close:hover { background:var(--surface3); }

/* ── Experience Check Card ── */
.experience-card {
  background:linear-gradient(135deg, rgba(255,255,255,.035), rgba(255,255,255,.01));
  border:1px solid rgba(255,255,255,.05);
  border-radius:var(--radius); padding:1.4rem;
  margin-bottom:1rem; text-align:center;
}
.experience-card .card-title {
  margin-bottom:1.2rem;
}
.experience-grid {
  display:flex; flex-direction:column; gap:.8rem;
  margin-bottom:1rem;
}
.experience-btn {
  padding:.8rem; border-radius:var(--radius-sm);
  border:1px solid var(--card-border); background:var(--surface);
  color:var(--text); font-family:inherit; font-size:.95rem;
  cursor:pointer; transition:all .15s;
  display:flex; align-items:center; justify-content:center; gap:.6rem;
}
.experience-btn:hover { background:var(--surface2); border-color:var(--accent); }
.experience-btn-emoji { font-size:1.4rem; }
.experience-skip {
  text-align:center; margin-top:.6rem;
}
.experience-skip a {
  color:var(--text3); font-size:.8rem; text-decoration:none;
  cursor:pointer;
}
.experience-skip a:hover { color:var(--text2); }

/* ── Info/Waarom Toggle ── */
.info-btn {
  background:none; border:none; color:var(--text2);
  font-size:.95rem; cursor:pointer; padding:.2rem .4rem;
  margin-left:.4rem; transition:color .2s;
}
.info-btn:hover { color:var(--text); }
.waarom-text {
  background:var(--surface); border-radius:var(--radius-sm);
  padding:0 .8rem; margin-top:0; font-size:.9rem;
  color:var(--text2); line-height:1.5;
  max-height:0; overflow:hidden; transition:max-height .3s ease, padding .3s ease, margin .3s ease;
}
.waarom-text.show { max-height:500px; padding:.8rem; margin-top:.8rem; }

.fade-in { animation:fadeIn .3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes bevestigPop { 0%{opacity:0;transform:translate(-50%,-50%) scale(.7)} 15%{opacity:1;transform:translate(-50%,-50%) scale(1.05)} 30%{transform:translate(-50%,-50%) scale(1)} 80%{opacity:1} 100%{opacity:0;transform:translate(-50%,-50%) scale(.95)} }
.bevestig-overlay { position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:200;pointer-events:none;background:rgba(20,20,22,.88);color:white;padding:.8rem 1.6rem;border-radius:var(--radius);font-size:1rem;font-weight:600;letter-spacing:.3px;animation:bevestigPop .9s ease forwards; }

.divider { height:1px; background:var(--card-border); margin:1.2rem 0; }

/* ── Initiatief keuze modal ── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.6);
  display:flex; align-items:flex-end; justify-content:center;
  z-index:100; opacity:0; pointer-events:none;
  transition:opacity .2s;
}
.modal-overlay.show { opacity:1; pointer-events:all; }
.modal {
  background:var(--bg2); border-radius:var(--radius) var(--radius) 0 0;
  width:100%; max-width:480px; padding:1.5rem;
  transform:translateY(100%); transition:transform .3s ease;
}
.modal-overlay.show .modal { transform:translateY(0); }
.modal h3 { font-size:1.1rem; margin-bottom:1rem; }
.modal-option {
  width:100%; padding:1rem; margin-bottom:.5rem;
  border-radius:var(--radius-sm); border:1px solid var(--card-border);
  background:var(--surface); color:var(--text);
  font-family:inherit; font-size:.95rem; cursor:pointer;
  text-align:left; transition:all .15s;
}
.modal-option:hover { background:var(--surface2); border-color:var(--accent); }
.modal-close {
  width:100%; padding:.8rem; margin-top:.5rem;
  border-radius:var(--radius-sm); border:none;
  background:none; color:var(--text3); font-family:inherit;
  font-size:.9rem; cursor:pointer;
}

/* ── Afspraak type knoppen ── */
.afspraak-type-btn {
  flex:1; padding:.5rem .8rem; border-radius:var(--radius-sm);
  border:1px solid var(--card-border); background:var(--surface);
  color:var(--text2); font-family:inherit; font-size:.85rem;
  cursor:pointer; transition:all .15s;
}
.afspraak-type-btn.active { border-color:var(--purple); color:var(--purple); background:rgba(168,138,155,.1); }
.afspraak-cat-btn {
  padding:.45rem .7rem; border-radius:var(--radius-sm);
  border:1px solid var(--card-border); background:var(--surface);

// ─── P1: SPOOR/THEMA MAPPING ───────────────────────────────
// Spoor A = "Samen leven" (relatie, verbinding, dates, humor, speelse straffen)
// Spoor B = "Bevestiging en intimiteit" (complimenten, aanraking, dienstbaar)
// Spoor C = "De dynamiek" (thema's 1-5)
const SPOOR_MAP = {
  // Spoor A cats
  'relationeel':'A', 'verbinding':'A', 'aanwezigheid':'A', 'geduld':'A',
  'waardering':'A', 'betrouwbaarheid':'A',
  // Spoor B cats
  'dienstbaar':'B',
  // Spoor C cats (dynamiek)
  'micro':'C', 'vastmaak':'C', 'sessie':'C', 'opdracht':'C', 'dynamiek':'C'
};

function getSpoor(sug){
  if(sug.spoor) return sug.spoor; // Expliciet als het er is
  return SPOOR_MAP[sug.cat] || 'C';
}

// Thema-afleiding voor Spoor C suggesties (1-5)
function getThema(sug){
  if(sug.thema) return sug.thema; // Expliciet
  const sp = getSpoor(sug);
  if(sp !== 'C') return 0; // Niet van toepassing
  // Thema 1: Zeggen, niet vragen — stem-acties, basis mededelen
  if(sug.actieType === 'stem' && sug.zwaarte <= 1) return 1;
  // Thema 2: Ontdek wat het doet — bewustzijn, controle
  if(sug.vibe === 'controle' && sug.zwaarte <= 2 && !sug.items?.length) return 2;
  if(sug.actieType === 'stem' && sug.zwaarte === 2) return 2;
  // Thema 3: Dit doe ik voor Tim — items, fysiek
  if(sug.items && sug.items.length > 0 && sug.cat !== 'sessie') return 3;
  if(sug.actieType === 'item') return 3;
  // Thema 4: Een moment bouwen — sessies, gecombineerd
  if(sug.cat === 'sessie') return 4;
  if(sug.stappen && sug.stappen.length >= 3) return 4;
  // Thema 5: Jullie eigen stijl — alles met hoge dynamiek
  if(sug.cat === 'dynamiek') return 5;
  // Default: thema 1-2 range op basis van zwaarte
  return sug.zwaarte <= 1 ? 1 : 2;
}

// ─── P1: THEMA-TRACKING ────────────────────────────────────
// Trackt progressie door de 5 thema's: welk thema is actief, scores per thema
function getThemaState(){
  return LS.get('l_thema_state', {
    actiefThema: 1,          // Huidig thema (1-5)
    themaScores: {           // Per thema: ja/nee/pogingen
      1: { ja:0, nee:0, pogingen:0, eigenInitiatief:0, startDatum:null },
      2: { ja:0, nee:0, pogingen:0, eigenInitiatief:0, startDatum:null },
      3: { ja:0, nee:0, pogingen:0, eigenInitiatief:0, startDatum:null },
      4: { ja:0, nee:0, pogingen:0, eigenInitiatief:0, startDatum:null },
      5: { ja:0, nee:0, pogingen:0, eigenInitiatief:0, startDatum:null }
    },
    laatsteThemaWissel: null, // Datum van laatste thema-overgang
    terugval: []              // [{van, naar, datum, reden}]
  });
}
function saveThemaState(s){ LS.set('l_thema_state', s); }

// Update thema-score na elke suggestie-actie
function updateThemaScore(sugId, status){
  const sug = SUGGESTIE_POOL.find(s => s.id === sugId);
  if(!sug) return;
  const thema = getThema(sug);
  if(thema === 0) return; // Niet Spoor C
  const state = getThemaState();
  const score = state.themaScores[thema];
  if(!score) return;
  if(!score.startDatum) score.startDatum = today();
  score.pogingen++;
  if(status === 'ja') score.ja++;
  else score.nee++;
  saveThemaState(state);
}

// Check of thema klaar is voor progressie (non-lineair, signaal-based)
function checkThemaProgressie(){
  const state = getThemaState();
  const thema = state.actiefThema;
  if(thema >= 5) return false;
  const score = state.themaScores[thema];
  if(!score || !score.startDatum) return false;
  const weken = Math.floor(daysSince(score.startDatum) / 7);
  // Minimum criteria per thema
  const minima = {
    1: { ja:3, weken:2, pogingen:4 },    // 3+ ja, 2+ weken, 4+ pogingen
    2: { ja:3, weken:2, pogingen:4, eigenInitiatief:1 }, // + 1 eigen initiatief
    3: { ja:2, weken:3, pogingen:3 },     // 2+ ja met items, 3+ weken
    4: { ja:2, weken:3, pogingen:3 }      // 2+ sessies, 3+ weken
  };
  const min = minima[thema];
  if(!min) return false;
  if(score.ja < min.ja) return false;
  if(weken < min.weken) return false;
  if(score.pogingen < min.pogingen) return false;
  if(min.eigenInitiatief && score.eigenInitiatief < min.eigenInitiatief) return false;
  return true; // Klaar voor volgende thema
}

// Ga naar volgend thema
function advanceThema(){
  const state = getThemaState();
  if(state.actiefThema >= 5) return;
  state.actiefThema++;
  state.laatsteThemaWissel = today();
  saveThemaState(state);
}

// Zachte terugval naar eerder thema
function themaTermgval(reden){
  const state = getThemaState();
  if(state.actiefThema <= 1) return;
  const van = state.actiefThema;
  state.actiefThema--;
  state.terugval.push({ van, naar:state.actiefThema, datum:today(), reden });
  saveThemaState(state);
}

    B: { niveau:1, laatstePositief:null, laatsteNegatief:null },
    C: { niveau:1, laatstePositief:null, laatsteNegatief:null }
  });
}
function saveComfortState(s){ LS.set('l_comfort', s); }

function updateComfort(sugId, positief){
  const sug = SUGGESTIE_POOL.find(s => s.id === sugId);
  if(!sug) return;
  const spoor = getSpoor(sug);
  const state = getComfortState();
  const cs = state[spoor];
  if(!cs) return;
  if(positief){
    cs.laatstePositief = today();
    // Langzaam omhoog: 3 positieve ervaringen = +1
    const hist = getSuggestieState().ervaringLog || [];
    const recentFijn = hist.filter(e => e.val === 'fijn' && daysSince(e.datum) < 21).length;
    if(recentFijn >= 3 && cs.niveau < 3) cs.niveau = Math.min(3, cs.niveau + 0.5);
  } else {
    cs.laatsteNegatief = today();
    if(cs.niveau > 1) cs.niveau = Math.max(1, cs.niveau - 0.5);
  }
  saveComfortState(state);
}

const BEWUSTWORDING_VRAGEN = [
  'Heb je het gevraagd of medegedeeld?',
  'Hoe reageerde Tim?',
  'Hoe voelde het om dit te zeggen?',
  'Was dit makkelijker of moeilijker dan verwacht?',
  'Zou je dit nog eens doen?',
  'Merkte je iets bij Tim na afloop?',
  'Hoe was de sfeer erna?',
  'Was dit spannend, of voelde het al normaal?'
];

function moetBewustwordingVraag(){
  // 1 op 3 keer na een 'ja' suggestie — maar NIET als er nog een actieve suggestie loopt
  const state = getSuggestieState();
  // Geen bewustwordingsvraag als er nu een suggestie actief is of wacht op ervaring
  if(state.huidig || state.wachtOpErvaring) return false;
  const hist = state.historie || [];
  const laatsteJas = hist.filter(h => h.status === 'ja');
  if(laatsteJas.length === 0) return false;
  // Alleen als de laatste ja van vandaag is (recent context)
  const laatsteJa = laatsteJas[laatsteJas.length - 1];
  if(laatsteJa.datum !== today()) return false;
  // Check of we al een vraag hadden vandaag
  const laatsteVraag = LS.get('l_laatsteBewustwording', null);
  if(laatsteVraag === today()) return false;
  // 1 op 3 kans (deterministisch per dag)
  const seed = today() + 'bewust';
  let h = 0; for(let i=0;i<seed.length;i++){h=((h<<5)-h)+seed.charCodeAt(i);h|=0;}
  return Math.abs(h % 3) === 0;
}

function getBewustwordingVraag(){
  const seed = today() + 'bvraag';
  let h = 0; for(let i=0;i<seed.length;i++){h=((h<<5)-h)+seed.charCodeAt(i);h|=0;}
  return BEWUSTWORDING_VRAGEN[Math.abs(h) % BEWUSTWORDING_VRAGEN.length];
}

function beantwoordBewustwording(antwoord){
  LS.set('l_laatsteBewustwording', today());
  const reflecties = getReflecties();
  reflecties.push({ wie:'lisanne', type:'bewustwording', vraag:getBewustwordingVraag(), antwoord, datum:today() });
  saveReflecties(reflecties);
  renderApp();
}

// ─── P1: TIM'S WENS-KANAAL ─────────────────────────────────
function getTimWens(){
  return LS.get('t_wens', null);
  // { type:'spanning'|'aanraking'|'leiding'|'vrij', tekst:string, datum:string }
}
function setTimWens(type, tekst){
  // Nieuwe wens overschrijft oude
  LS.set('t_wens', { type, tekst: tekst||'', datum: today() });
}
function clearTimWens(){
  LS.set('t_wens', null);
}
// Wens is "omgezet" als er een suggestie in die richting is geweest
function isWensOmgezet(){
  const wens = getTimWens();
  if(!wens) return false;
  const state = getSuggestieState();
  const naDatum = (state.historie||[]).filter(h => h.status === 'ja' && h.datum >= wens.datum);
  return naDatum.length > 0;
}

// Fase 1 (thema 1-2): "Dit kan fijn zijn voor Tim."
// Fase 2 (thema 3): "Tim vindt dit fijn."
// Fase 3 (thema 4): "Hoe was dit voor jou?"
// Fase 4 (thema 5): "Dit is iets van jullie."
function getBDSMFraming(){
  const ts = getThemaState();
  const t = ts.actiefThema;
  if(t <= 2) return { fase:1, prefix:'Dit kan fijn zijn voor Tim.', toon:'uitleggend' };
  if(t === 3) return { fase:2, prefix:'Tim vindt dit fijn.', toon:'meedenkend' };
  if(t === 4) return { fase:3, prefix:'Hoe was dit voor jou?', toon:'incheckend' };
  return { fase:4, prefix:'Dit is iets van jullie.', toon:'loslatend' };
}

function getVraagmodusState(){
  return LS.get('t_vraagmodus', {
    actief: false,
    vandaag: null,        // datum waarop vraagmodus actief is
    situaties: [],        // [{id, gevraagd:bool}]
    geschiedenis: [],     // [{datum, situaties:[{id,gevraagd}]}]
    laatsteKeer: null
  });
}

function isVraagmodusActief(){
  const state = getVraagmodusState();
  return state.actief && state.vandaag === today();
}

function startVraagmodus(){
  const state = getVraagmodusState();
  const ts = getThemaState();
  // Kies situaties op basis van thema
  let pool = VRAAGMODUS_SITUATIES.filter(s => s.cat === 'alledaags');
  if(ts.actiefThema >= 2) pool = pool.concat(VRAAGMODUS_SITUATIES.filter(s => s.cat === 'persoonlijk'));
  if(ts.actiefThema >= 3) pool = pool.concat(VRAAGMODUS_SITUATIES.filter(s => s.cat === 'dynamiek'));
  // Kies 3-4 random situaties
  const shuffled = pool.sort(() => Math.random() - 0.5);
  const gekozen = shuffled.slice(0, 3 + (Math.random() < 0.3 ? 1 : 0));
  state.actief = true;
  state.vandaag = today();
  state.situaties = gekozen.map(s => ({id:s.id, tekst:s.tekst, gevraagd:false}));
  state.laatsteKeer = today();
  LS.set('t_vraagmodus', state);
  renderApp();
}

function markeerGevraagd(vmId){
  const state = getVraagmodusState();
  const sit = state.situaties.find(s => s.id === vmId);
  if(sit) sit.gevraagd = true;
  // Check of alles gevraagd is
  const alleDone = state.situaties.every(s => s.gevraagd);
  if(alleDone){
    state.geschiedenis.push({datum:today(), situaties:state.situaties});
    state.actief = false;
    toonBevestiging('Goed gedaan. Lisanne bepaalt, jij vraagt.');
  }
  LS.set('t_vraagmodus', state);
  renderApp();
}

function moetVraagmodusSuggestie(){
  const state = getVraagmodusState();
  if(state.actief) return false; // Loopt al
  // Max 1-2x per week
  if(state.laatsteKeer && daysSince(state.laatsteKeer) < 4) return false;
  // Deterministisch: ~2x per week
  const seed = today() + 'vraagmodus';
  let h = 0; for(let i=0;i<seed.length;i++){h=((h<<5)-h)+seed.charCodeAt(i);h|=0;}
  return Math.abs(h % 4) === 0; // ~25% van de dagen = ~1.75x per week
}

function getMicroKeuzeState(){
  return LS.get('l_micro_keuze', {
    actief: null,         // {id, vraag, optieA, optieB, gekozen:null|'A'|'B'}
    geschiedenis: [],     // [{datum, id, gekozen}]
    laatsteKeer: null
  });
}

function toonMicroKeuze(){
  const state = getMicroKeuzeState();
  if(state.actief && state.actief.datum === today()) return state.actief;
  return null;
}

function startMicroKeuze(){
  const state = getMicroKeuzeState();
  const ts = getThemaState();
  // Pool op basis van thema
  let pool = MICRO_KEUZE_POOL.filter(k => k.cat === 'alledaags');
  if(ts.actiefThema >= 2) pool = pool.concat(MICRO_KEUZE_POOL.filter(k => k.cat === 'persoonlijk'));
  if(ts.actiefThema >= 3) pool = pool.concat(MICRO_KEUZE_POOL.filter(k => k.cat === 'dynamiek'));
  // Vermijd recente keuzes
  const recentIds = state.geschiedenis.slice(-5).map(g => g.id);
  const filtered = pool.filter(k => !recentIds.includes(k.id));
  const finalPool = filtered.length > 0 ? filtered : pool;
  // Kies er één
  const seed = today() + 'microkeuze';
  let h = 0; for(let i=0;i<seed.length;i++){h=((h<<5)-h)+seed.charCodeAt(i);h|=0;}
  const keuze = finalPool[Math.abs(h) % finalPool.length];
  state.actief = {id:keuze.id, vraag:keuze.vraag, optieA:keuze.optieA, optieB:keuze.optieB, resultaat:keuze.resultaat, datum:today(), gekozen:null};
  state.laatsteKeer = today();
  LS.set('l_micro_keuze', state);
  return state.actief;
}

function kiesMicroKeuze(optie){
  const state = getMicroKeuzeState();
  if(!state.actief) return;
  state.actief.gekozen = optie;
  state.geschiedenis.push({datum:today(), id:state.actief.id, gekozen:optie});
  LS.set('l_micro_keuze', state);
  toonBevestiging('Gekozen. Tim ziet het.');
  renderApp();
}

function getMicroKeuzeResultaat(){
  const state = getMicroKeuzeState();
  if(!state.actief || !state.actief.gekozen) return null;
  if(state.actief.datum !== today()) return null;
  const optieWaarde = state.actief.gekozen === 'A' ? state.actief.optieA : state.actief.optieB;
  return state.actief.resultaat.replace('{keuze}', optieWaarde.toLowerCase());
}

function moetMicroKeuzeSuggestie(){
  const state = getMicroKeuzeState();
  if(state.actief && state.actief.datum === today()) return false; // Vandaag al
  // Max 1-2x per week, pas vanaf thema 2 (maand 2+)
  const ts = getThemaState();
  if(ts.actiefThema < 2) return false;
  if(state.laatsteKeer && daysSince(state.laatsteKeer) < 4) return false;
  const seed = today() + 'moetmicro';
  let h = 0; for(let i=0;i<seed.length;i++){h=((h<<5)-h)+seed.charCodeAt(i);h|=0;}
  return Math.abs(h % 4) === 0;
}

function getOefeningState(){
  return LS.get('l_oefening', {
    actief: null,           // {id, titel, datum} — huidige oefening
    geschiedenis: [],       // [{id, datum, terugblik:'optie tekst'}]
    laatsteKeer: null
  });
}

function kiesOefening(){
  const state = getOefeningState();
  const ts = getThemaState();
  const thema = ts.actiefThema || 1;
  // Filter pool: alleen oefeningen voor huidig thema en lager
  const pool = OEFENING_POOL.filter(o => o.thema <= thema);
  // Vermijd recente oefeningen
  const recentIds = state.geschiedenis.slice(-8).map(g => g.id);
  const filtered = pool.filter(o => !recentIds.includes(o.id));
  const finalPool = filtered.length > 0 ? filtered : pool;
  // Kies deterministisch
  const seed = today() + 'oefening';
  let h = 0; for(let i=0;i<seed.length;i++){h=((h<<5)-h)+seed.charCodeAt(i);h|=0;}
  return finalPool[Math.abs(h) % finalPool.length];
}

function startOefening(){
  const state = getOefeningState();
  const oef = kiesOefening();
  state.actief = {id:oef.id, titel:oef.titel, datum:today()};
  state.laatsteKeer = today();
  LS.set('l_oefening', state);
  renderApp();
}

function beantwoordOefeningTerugblik(antwoord){
  const state = getOefeningState();

  state.geschiedenis.push({

    datum: state.actief.datum,
    terugblik: antwoord

  state.actief = null;
  LS.set('l_oefening', state);

function getRuzieModus(){
  return LS.get('l_ruzie_modus', null);
  // { sinds:string, door:'tim'|'lisanne' }
}
function activeerRuzieModus(door){
  LS.set('l_ruzie_modus', { sinds:today(), door });
  // Automatisch alleen Spoor A of pauze
}
function deactiveerRuzieModus(){
  LS.set('l_ruzie_modus', null);
}
function isRuzieModus(){
  const rm = getRuzieModus();
  if(!rm) return false;
  // Auto-deactiveer na 14 dagen
  if(daysSince(rm.sinds) > 14){
    deactiveerRuzieModus();
    return false;
  }
  return true;
}

// Veiligheidsklep: beide views negatief → automatisch 2 weken Spoor A
function checkVeiligheidsklep(){
  const sugState = getSuggestieState();
  const timState = getDisciplineState();
  // Lisanne: 3+ negatief in laatste week
  const lisNegatief = (sugState.ervaringLog||[]).filter(e =>
    (e.val === 'teveel' || e.val === 'neutraal') && daysSince(e.datum) < 7
  ).length;
  // Tim: negatieve emoties recent
  const timNegatief = (timState.emotieLog||[]).filter(e =>
    (e.emotie === 'leeg' || e.emotie === 'neutraal') && daysSince(e.datum) < 7
  ).length;
  if(lisNegatief >= 3 && timNegatief >= 2){
    activeerRuzieModus('systeem');
    return true;
  }
  return false;
}

// ─── Debug Mode ─────────────────────────────────────────────
let DEBUG = { active: new URLSearchParams(location.search).has('debug'), offset:0, uurOffset:0 }; // offset in dagen + uren

function debugNow(){
  const d = new Date();
  d.setDate(d.getDate() + DEBUG.offset);
  d.setHours(d.getHours() + (DEBUG.uurOffset || 0));
  return d;
}

// ─── Utility ────────────────────────────────────────────────
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const today = () => debugNow().toISOString().split('T')[0];
const tomorrow = () => { const d = new Date(debugNow()); d.setDate(d.getDate()+1); return d.toISOString().split('T')[0]; };
const daysSince = (d) => d ? Math.floor((debugNow().getTime()-new Date(d).getTime())/86400000) : 999;
const weekNum = () => { const d=debugNow();const s=new Date(d.getFullYear(),0,1);return Math.ceil(((d-s)/86400000+s.getDay()+1)/7)};
const pick = arr => arr[Math.floor(Math.random()*arr.length)];
function pickStabiel(arr, seed){
  if(!arr || arr.length === 0) return '';
  seed = String(seed || today());
  let hash = 0;
  for(let i = 0; i < seed.length; i++) hash = ((hash << 5) - hash) + seed.charCodeAt(i);
  return arr[Math.abs(hash) % arr.length];
}

function getWeekStart(){
  const d=debugNow(); d.setHours(0,0,0,0);
  const day=d.getDay()||7; d.setDate(d.getDate()-day+1);
  return d.toISOString().split('T')[0];
}

function voegAfspraakToe(tekst, type, datumVal, categorie, voorbereidingen, voorbereidingenZichtbaar, items){
  const afspraken = getAfspraken();
  if(afspraken.length >= 3) return false; // max 3
  const id = 'a' + Date.now();
  const obj = {
    id,
    tekst: tekst.trim(),
    type: type || 'doorlopend',
    datum: type === 'datum' && datumVal ? datumVal : today(),
    aangemaakt: today()
  };
  if(categorie) obj.categorie = categorie;
  if(voorbereidingen && voorbereidingen.length > 0){
    obj.voorbereidingen = voorbereidingen.slice(0, 4);
    obj.voorbereidingenZichtbaar = !!voorbereidingenZichtbaar;
    // Onthoud custom voorbereidingen voor slimme chips
    const standaardChips = ['Gedouched','Kleding klaar','Telefoon weg','Woonkamer vrij'];
    const custom = voorbereidingen.filter(v => !standaardChips.includes(v));
    if(custom.length > 0){
      let recent = LS.get('l_recenteVoorb', []);
      custom.forEach(v => { recent = recent.filter(r => r !== v); recent.unshift(v); });
      LS.set('l_recenteVoorb', recent.slice(0, 4));
    }
  }
  if(items && items.length > 0) obj.items = items.slice(0, 6);
  afspraken.push(obj);
  saveAfspraken(afspraken);
  return true;
}

function isAfspraakVerlopen(a){
  if(a.type === 'doorlopend') return false;
  if(a.type === 'week') return daysSince(a.aangemaakt) > 7;
  if(a.type === 'datum') return a.datum < today();
  return false;
}

function opschonenAfspraken(){
  let afspraken = getAfspraken();
  const voor = afspraken.length;
  afspraken = afspraken.filter(a => !isAfspraakVerlopen(a));
  if(afspraken.length !== voor) saveAfspraken(afspraken);
  return afspraken;
}

function telInWeek(state, cat){
  const ws = getWeekStart();
  return state.historie.filter(h => h.datum >= ws && h.cat === cat).length;
}

function isLopendExpired(state){
  if(!state.lopend) return true;
  return daysSince(state.lopend.startDatum) >= (state.lopend.duurDagen || 1);
}

// Item-validatie: check combineerNietMet en vereist
function isTemplateItemsValid(suggestie){
  if(!suggestie.items || suggestie.items.length < 2) return true;
  for(let i = 0; i < suggestie.items.length; i++){
    const itemA = SPULLEN_DB[suggestie.items[i]];
    if(!itemA) return false; // onbekend item → reject
    if(itemA.vereist && itemA.vereist.length > 0){
      for(const req of itemA.vereist){
        if(!suggestie.items.includes(req) && !SPULLEN_DB[req]) return false;
      }
    }
    for(let j = i+1; j < suggestie.items.length; j++){
      if(itemA.combineerNietMet && itemA.combineerNietMet.includes(suggestie.items[j])) return false;
    }
  }
  return true;
}

const KERN_TYPES = ['stem','correctie','timing','positie','item','beslissing'];

function getBegroeting(naam){
  const h = debugNow().getHours();
  const t = h < 12 ? 'Goedemorgen' : h < 18 ? 'Goedemiddag' : 'Fijne avond';
  return `${t}, ${naam}`;
}
function getDominantType(state){
  const hist = (state.typeHistorie || []).slice(-5)
    .filter(h => h.status === 'ja' && KERN_TYPES.includes(h.type));
  if(hist.length === 0) return null;
  const counts = {};
  hist.forEach(h => counts[h.type] = (counts[h.type]||0)+1);
  return Object.entries(counts).sort((a,b) => b[1]-a[1])[0][0];
}

function isAfgekoeld(state, type){
  return (state.typeHistorie || []).some(h =>
    h.type === type && h.status === 'nee' && daysSince(h.datum) < 14
  );
}

function heeftDrieKeerJa(state, type){
  const recent = (state.typeHistorie || []).slice(-3);
  return recent.length === 3 && recent.every(h => h.type === type && h.status === 'ja');
}

function needsEvaluatie(){
  const state = getSuggestieState();
  const wc = state.weekCounter || 0;
  if(wc < 2) return false;
  if((wc - 1) % 4 === 0){
    const laatsteEval = LS.get('l_laatsteEvaluatie', null);
    if(!laatsteEval || daysSince(laatsteEval) > 14) return true;
  }
  return false;
}

function isOnboarding(){
  const start = LS.get('l_startdatum', null);
  if(!start) return true;
  return daysSince(start) < 7;
}

function getWeekMaxSuggesties(){
  // Max suggesties per week, groeit mee met fases
  const startDatum = LS.get('l_startdatum', null);
  const dagenActief = startDatum ? daysSince(startDatum) : 0;
  if(dagenActief < 21) return 3;       // Fase 1-3: max 3 per week
  if(dagenActief < 42) return 4;       // Fase 4: max 4 per week
  return 5;                            // Fase 5+: max 5 per week
}

function getSuggestiesDezeWeek(state){
  const ws = getWeekStart();
  return state.historie.filter(h => h.datum >= ws).length;
}

function moetNieuweSuggestie(state){
  // P1: Ruzie-modus blokkeert Spoor C suggesties
  if(isRuzieModus()) return false;
  if(state.huidig){
    if(daysSince(state.huidig.datum) > 10){
      state.huidig = null;
      saveSuggestieState(state);
      return true;
    }
    return false;
  }
  if(isOnboarding()) return false;
  if(state.historie.length === 0) return true;
  if(needsEvaluatie()) return false;

  // ── WEEKMAXIMUM: niet meer dan X suggesties per week ──
  const weekMax = getWeekMaxSuggesties();
  const dezeWeek = getSuggestiesDezeWeek(state);
  if(dezeWeek >= weekMax) return false;

  const laatsteDatum = LS.get('l_lastSuggestieDatum', null);
  if(!laatsteDatum) return true;

  const dagenSinds = daysSince(laatsteDatum);
  const frequentie = LS.get('l_frequentie', 'normaal');
  const pauzeAanpassing = LS.get('l_pauzeAanpassing', 0);

  let minDagen;
  if(frequentie === 'rustig') minDagen = 4 + pauzeAanpassing;
  else if(frequentie === 'vaker') minDagen = 1 + pauzeAanpassing;
  else minDagen = 2 + pauzeAanpassing;

  minDagen = Math.max(1, minDagen);
  return dagenSinds >= minDagen;
}

function kiesSuggestie(state){
  const vorige3Weken = state.historie.filter(h => daysSince(h.datum) < 21);
  const alleNee = vorige3Weken.length > 0 && vorige3Weken.every(h => h.status === 'nee');
  const initiatiefsLastMonth = LS.get('l_initiatief_log', []).filter(i => daysSince(i.datum) < 30).length;
  const tevelTeveel = state.ervaringLog.filter(e => e.val === 'teveel' && daysSince(e.datum) < 30).length;
  if(alleNee && initiatiefsLastMonth === 0 && tevelTeveel >= 2) return null;

  state.weekCounter = (state.weekCounter||0);
  const ws = getWeekStart();
  const vorige_ws = LS.get('l_laatsteWeekStart','');
  if(ws !== vorige_ws){ state.weekCounter++; LS.set('l_laatsteWeekStart', ws); }

  state.stilteWeek = (state.weekCounter % 4 === 0) && state.weekCounter > 0;
  if(state.stilteWeek){
    if(state.lopend){ state.lopend = null; saveSuggestieState(state); }
    return null;
  }

  if(state.uitgesteld && state.uitgesteld.cat){
    const dagenSinds = daysSince(state.uitgesteld.terugOp);
    if(dagenSinds >= 2 && dagenSinds <= 5){
      const cat = state.uitgesteld.cat;
      state.uitgesteld = null; saveSuggestieState(state);
      const recenteIds = state.historie.slice(-15).map(h => h.id);
      let pool = SUGGESTIE_POOL.filter(s => s.cat === cat && !recenteIds.includes(s.id) && s.zwaarte <= state.niveau + 1);
      if(pool.length === 0) pool = SUGGESTIE_POOL.filter(s => s.cat === cat);
      return pool.length > 0 ? pick(pool) : null;
    }
  }

  if(state.lopend && isLopendExpired(state)){ state.lopend = null; saveSuggestieState(state); }

  const vastmaakInWeek = telInWeek(state, 'vastmaak');
  const sessieInWeek = telInWeek(state, 'sessie');
  const microRelInWeek = state.historie.filter(h => h.datum >= ws && (h.cat === 'micro' || h.cat === 'relationeel' || h.cat === 'opdracht')).length;
  const lastSessieDatum = LS.get('l_lastSessieDatum', null);
  const dagenSindsSessie = lastSessieDatum ? daysSince(lastSessieDatum) : 999;

  if(sessieInWeek > 0 && vastmaakInWeek > 0 && microRelInWeek >= 1) return null;

  // Anti-clustering: min 2 dagen tussen avond-dingen (vastmaak/sessie)
  const lastEvening = LS.get('l_lastEveningDate', null);
  const dagenSindsEvening = lastEvening ? daysSince(lastEvening) : 999;
  const avondBlocked = dagenSindsEvening < 2;

  // Opbouw-gate: zwaardere categorieën pas na voldoende tijd
  const startDatum = LS.get('l_startdatum', null);
  const dagenActief = startDatum ? daysSince(startDatum) : 0;
  const aantalJa = state.historie.filter(h => h.status === 'ja').length;
  const vastmaakOpen = dagenActief >= 21 && aantalJa >= 3; // na 3 weken + 3x ja
  const sessieOpen = dagenActief >= 35 && aantalJa >= 5;   // na 5 weken + 5x ja

  let mogelijkeCategorieen = [];
  if(state.lopend && !isLopendExpired(state)){
    if(microRelInWeek < 2) mogelijkeCategorieen.push('micro','relationeel');
    if(mogelijkeCategorieen.length === 0) mogelijkeCategorieen = ['micro'];
  } else {
    if(vastmaakOpen && vastmaakInWeek < 1 && !avondBlocked) mogelijkeCategorieen.push('vastmaak','vastmaak');
    const minDagenSessie = LS.get('l_minDagenSessie', 14);
    if(sessieOpen && dagenSindsSessie >= minDagenSessie && sessieInWeek < 1 && state.niveau >= 1 && !avondBlocked) mogelijkeCategorieen.push('sessie');
    if(microRelInWeek < 2) mogelijkeCategorieen.push('micro','opdracht','relationeel');
    if(mogelijkeCategorieen.length === 0) mogelijkeCategorieen = ['micro'];
  }

  if(state.laatsteCategorie && mogelijkeCategorieen.length > 1){
    mogelijkeCategorieen = mogelijkeCategorieen.filter(c => c !== state.laatsteCategorie);
  }
  if(mogelijkeCategorieen.length === 0) mogelijkeCategorieen = ['micro'];

  // Na nee-reeks: zachte herstart — alleen micro/relationeel
  const laatste2Status = state.historie.slice(-2);
  const reedsNee = laatste2Status.length >= 2 && laatste2Status.every(h => ['nee','rustig','nietnu','niksvoormij'].includes(h.status));
  if(reedsNee){
    mogelijkeCategorieen = ['micro','relationeel'];
  }

  // ── DATUM-AFSPRAAK CATEGORIE-BOOST ──
  // Als Lisanne vandaag een categorie heeft gekozen → die categorie 2× boost
  const vandaagDatumCat = getAfspraken().filter(a => a.type === 'datum' && a.datum === today() && a.categorie).map(a => a.categorie);
  if(vandaagDatumCat.length > 0 && !reedsNee){
    const boostCat = vandaagDatumCat[0];
    // Recent-guard: niet boosten als categorie al 2× in laatste 3 suggesties
    const recentCats = state.historie.slice(-3).map(h => h.cat);
    const recentCatCount = recentCats.filter(c => c === boostCat).length;
    if(recentCatCount < 2 && mogelijkeCategorieen.includes(boostCat)){
      mogelijkeCategorieen.push(boostCat, boostCat); // 2× extra = ~verdubbeling
    }
  }

  const gekozenCat = pick(mogelijkeCategorieen);
  const recenteIds = state.historie.slice(-15).map(h => h.id);
  const now = debugNow();
  const hour = now.getHours();
  const dayOfWeek = now.getDay();
  const isWeekend = dayOfWeek === 0 || dayOfWeek === 5 || dayOfWeek === 6;
  const isDaytime = hour >= 7 && hour < 19.5;
  const isKindTijd = isDaytime || isWeekend;

  // ── ZWAARTE-GOLF: ademhaling in intensiteit ──
  const recenteZwaarten = state.historie.slice(-3).map(h => {
    const s = SUGGESTIE_POOL.find(x => x.id === h.id);
    return s ? s.zwaarte : 1;
  });
  let maxZwaarte = state.niveau + 1; // standaard
  const laatsteZwaarte = recenteZwaarten.length > 0 ? recenteZwaarten[recenteZwaarten.length - 1] : 1;
  if(laatsteZwaarte >= 3) maxZwaarte = Math.min(maxZwaarte, 2); // na zwaar → max middel
  if(recenteZwaarten.length >= 2 && recenteZwaarten.slice(-2).every(z => z >= 2)) maxZwaarte = Math.min(maxZwaarte, 1); // na 2× middel+ → moet licht
  if(reedsNee) maxZwaarte = Math.min(maxZwaarte, 1); // na 2× nee → forceer licht

  // ── STAP 1: HARDE FILTERS ──
  let pool = SUGGESTIE_POOL.filter(s => {
    if(s.cat !== gekozenCat) return false;
    if(recenteIds.includes(s.id)) return false;
    if(s.zwaarte > maxZwaarte) return false;
    if(isKindTijd && s.subtiel === false) return false;
    if(!isTemplateItemsValid(s)) return false; // combineerNietMet + vereist
    if(s.actieType && isAfgekoeld(state, s.actieType)) return false; // afkoel vóór weging
    if(isSuggestieGeblokkeerd(state, s.id)) return false; // P0: drie-lagen afwijzing
    if(s.cat === 'micro' && state.niveau === 1 && s.type === 'face_to_face') return Math.random() > 0.8;
    return true;
  });

  // Fallback: als pool leeg na harde filters
  if(pool.length === 0){
    pool = SUGGESTIE_POOL.filter(s => s.cat === gekozenCat && s.zwaarte <= state.niveau + 1);
    pool = pool.filter(s => !isKindTijd || s.subtiel !== false);
  }
  if(pool.length === 0){
    pool = SUGGESTIE_POOL.filter(s => s.cat === 'micro' && (!isKindTijd || s.subtiel !== false));
  }
  if(pool.length === 0){
    // Ultieme fallback: relationeel
    pool = SUGGESTIE_POOL.filter(s => s.cat === 'relationeel');
  }

  // ── WEEK-HERHALING DEMPEN: zelfde suggestie max 1×/week ──
  const jaDezeWeek = state.historie.filter(h => h.status === 'ja' && daysSince(h.datum) < 7).map(h => h.id);
  if(jaDezeWeek.length > 0){
    // Niet blokkeren (pool kan te klein worden), maar gewicht halveren
    const frisse = pool.filter(s => !jaDezeWeek.includes(s.id));
    if(frisse.length >= 2){
      pool = [...frisse, ...frisse, ...pool.filter(s => jaDezeWeek.includes(s.id))];
    }
  }

  // ── OVERDAG-BOOST: vóór 15:00 → op_afstand/subtiel voorrang ──
  const isOverdag = hour < 15;
  if(isOverdag){
    pool = pool.flatMap(s => {
      let copies = [s];
      if(s.type === 'op_afstand' && s.subtiel !== false) copies.push(s, s); // 3× kans
      return copies;
    });
    // Lichte rem op zware categorieën overdag
    const lichtPool = pool.filter(s => s.cat !== 'sessie' && s.cat !== 'vastmaak');
    if(lichtPool.length >= 3) pool = lichtPool;
  }

  // ── P1: THEMA-AWARE FILTERING ──
  // Boost suggesties van het actieve thema (alleen Spoor C)
  const themaState = getThemaState();
  const actiefThema = themaState.actiefThema;
  pool = pool.flatMap(s => {
    const sThema = getThema(s);
    if(sThema === 0) return [s]; // Niet Spoor C
    if(sThema === actiefThema) return [s, s, s]; // 3× boost actief thema
    if(sThema === actiefThema - 1) return [s, s]; // 2× eerder thema (herhaling)
    if(sThema > actiefThema + 1) return []; // Filter: 2+ thema's vooruit → skip
    return [s]; // 1 thema vooruit: 1× (zachte uitstap)
  });

  // ── P1: RUZIE-MODUS — alleen Spoor A ──
  if(isRuzieModus()){
    const spoorAPool = pool.filter(s => getSpoor(s) === 'A');
    if(spoorAPool.length >= 2) pool = spoorAPool;
  }

  // ── STAP 2: WEGING — SYSTEEM-PAD 60/30/10 ──
  // 60% comfort (bekend, fijn, favoriet)
  // 30% nieuw (andere actieTypes, onontdekte hoeken)
  // 10% stretch (iets hogere zwaarte, minder vertrouwd)
  const systeemRoll = Math.random();
  const lisanneFavs = state.lisanneFavorieten || [];
  const favorieten = LS.get('l_favorieten', []);
  const recenteActieTypes = state.historie.slice(-4).map(h => {
    const s = SUGGESTIE_POOL.find(x => x.id === h.id);
    return s ? s.actieType : null;
  }).filter(Boolean);
  // Verdeling verschuift als Lisanne op "meer variatie" klikt
  const variatieShift = Math.max(0, Math.min(0.20, LS.get('l_exploreRate', 0.15) - 0.15));
  const comfortGrens = 0.60 - variatieShift; // 0.60 → min 0.40
  const nieuwGrens = 0.90; // nieuw-zone groeit mee (comfort krimpt, nieuw groeit)

  if(systeemRoll < comfortGrens){
    // ── COMFORT (60%): dominant type, favorieten, bekend terrein ──
    const dominant = getDominantType(state);
    if(dominant && pool.some(s => s.actieType === dominant)){
      pool = pool.flatMap(s => s.actieType === dominant ? [s, s] : [s]);
    }
    if(dominant && heeftDrieKeerJa(state, dominant)){
      const zwaarder = pool.filter(s => s.actieType === dominant && s.zwaarte >= 2);
      if(zwaarder.length > 0) pool = zwaarder;
    }
    // Lisanne-favorieten extra sterk in comfort-modus
    if(lisanneFavs.length > 0){
      pool = pool.flatMap(s => lisanneFavs.includes(s.id) ? [s, s, s] : [s]);
    }
    // Tim's item-favorieten
    if(favorieten.length > 0){
      pool = pool.flatMap(s => {
        const hasFav = s.handleidingKeys && s.handleidingKeys.some(k => favorieten.includes(k));
        return hasFav ? [s, s] : [s];
      });
    }
  } else if(systeemRoll < nieuwGrens){
    // ── NIEUW (30%+): andere actieTypes, onbekende hoeken ──
    // Guard: geen nooit-gedane categorie bij niveau < 3
    const gedaneCats = [...new Set(state.historie.map(h => h.cat).filter(Boolean))];
    if(state.niveau < 3){
      pool = pool.filter(s => gedaneCats.includes(s.cat));
      if(pool.length === 0) pool = SUGGESTIE_POOL.filter(s => s.cat === gekozenCat && s.zwaarte <= maxZwaarte);
    }
    const nieuwPool = pool.filter(s => !recenteActieTypes.includes(s.actieType));
    if(nieuwPool.length >= 3) pool = nieuwPool;
    // Lichte voorkeur voor suggesties die Lisanne nog niet geprobeerd heeft
    const geprobeerdIds = state.historie.map(h => h.id);
    pool = pool.flatMap(s => geprobeerdIds.includes(s.id) ? [s] : [s, s]);
    // Lisanne-favorieten nog lichte boost (niet dominant)
    if(lisanneFavs.length > 0){
      pool = pool.flatMap(s => lisanneFavs.includes(s.id) ? [s, s] : [s]);
    }
  } else {
    // ── STRETCH (10%): iets hogere zwaarte, minder vertrouwd ──
    // Safety-gate: stretch alleen als het echt goed gaat
    const laatste3 = state.historie.slice(-3);
    const jaOfFijnCount = laatste3.filter(h => h.status === 'ja').length;
    const laatste5Erv = (state.ervaringLog||[]).slice(-5);
    const heeftFijn = laatste5Erv.some(e => e.val === 'fijn');
    const vorigeStatus = state.historie.length > 0 ? state.historie[state.historie.length-1].status : 'ja';
    const stretchToegestaan = state.niveau >= 2
      && jaOfFijnCount >= 2
      && heeftFijn
      && vorigeStatus !== 'nee' && vorigeStatus !== 'rustig'
      && !isKindTijd;

    if(stretchToegestaan){
      // Sta één niveau hoger toe dan normaal (maar max 4)
      const stretchMax = Math.min(maxZwaarte + 1, 4);
      const stretchExtra = SUGGESTIE_POOL.filter(s => {
        if(s.cat !== gekozenCat) return false;
        if(recenteIds.includes(s.id)) return false;
        if(s.zwaarte > stretchMax) return false;
        if(s.zwaarte <= maxZwaarte) return false;
        if(isKindTijd && s.subtiel === false) return false;
        if(!isTemplateItemsValid(s)) return false;
        if(s.actieType && isAfgekoeld(state, s.actieType)) return false;
        return true;
      });
      if(stretchExtra.length > 0){
        pool = [...pool, ...stretchExtra, ...stretchExtra];
      }
      const nieuwPool = pool.filter(s => !recenteActieTypes.includes(s.actieType));
      if(nieuwPool.length >= 2) pool = nieuwPool;
    }
    // Gate faalt → val terug op comfort-selectie
    if(!stretchToegestaan){
      const dominant = getDominantType(state);
      if(dominant && pool.some(s => s.actieType === dominant)){
        pool = pool.flatMap(s => s.actieType === dominant ? [s, s] : [s]);
      }
    }
  }

  // ── NIVEAU-1 BOOST: laagdrempelige suggesties voorrang ──
  if(state.niveau === 1){
    pool = pool.flatMap(s => {
      let copies = [s];
      if(s.type === 'op_afstand') copies.push(s);
      if(s.items && s.items.length > 0) copies.push(s);
      return copies;
    });
  }

  // ── STEM-REM: voorkom twee verbale suggesties achter elkaar ──
  if(state.laatsteActieType === 'stem'){
    const nietStem = pool.filter(s => s.actieType !== 'stem');
    if(nietStem.length > 0) pool = [...nietStem, ...nietStem, ...pool.filter(s => s.actieType === 'stem')];
  }

  // ── MENTALE-REM: voorkom twee mentale/observatie suggesties achter elkaar ──
  const mentaleTypes = ['relationeel','face_to_face'];
  if(mentaleTypes.includes(state.laatsteActieType)){
    const fysiekOfHumor = pool.filter(s => !mentaleTypes.includes(s.actieType));
    if(fysiekOfHumor.length > 0) pool = [...fysiekOfHumor, ...fysiekOfHumor, ...pool.filter(s => mentaleTypes.includes(s.actieType))];
  }

  // ── HUMOR-BOOST: na 2+ serieuze suggesties, meer kans op humor ──
  const laatste3Hist = state.historie.slice(-3);
  const serieuzeReeks = laatste3Hist.filter(h => {
    const sug = SUGGESTIE_POOL.find(s => s.id === h.id);
    return sug && sug.zwaarte >= 2;
  }).length;
  if(serieuzeReeks >= 2){
    pool = pool.flatMap(s => s.id.startsWith('fun') ? [s, s, s] : [s]);
  }

  // ── VIBE-LIMIET: max 2× dezelfde vibe in 7 dagen ──
  const vibeHistorie = state.historie.filter(h => h.datum && daysSince(h.datum) < 7).map(h => {
    const s = SUGGESTIE_POOL.find(x => x.id === h.id);
    return s ? s.vibe : null;
  }).filter(Boolean);
  const vibeTellingen = {};
  vibeHistorie.forEach(v => { vibeTellingen[v] = (vibeTellingen[v]||0) + 1; });
  const overvoerdeVibes = Object.keys(vibeTellingen).filter(v => vibeTellingen[v] >= 2);
  if(overvoerdeVibes.length > 0){
    const vibeFiltered = pool.filter(s => !overvoerdeVibes.includes(s.vibe));
    if(vibeFiltered.length >= 2) pool = vibeFiltered;
  }

  // ── WEEK-INTENSITEIT: na ≥3 zware suggesties in 7 dagen → forceer licht ──
  const zwaarIn7d = state.historie.filter(h => daysSince(h.datum) < 7).filter(h => {
    const s = SUGGESTIE_POOL.find(x => x.id === h.id);
    return s && s.zwaarte >= 2;
  }).length;
  if(zwaarIn7d >= 3){
    const lichtPool = pool.filter(s => s.zwaarte <= 1);
    if(lichtPool.length >= 2) pool = lichtPool;
  }

  // ── STAP 3: RANDOM DRAW ──
  return pick(pool);
}

function verwerkKeuze(keuze){ // 'ja','nee','ander'
  const state = getSuggestieState();
  if(!state.huidig) return;

  const vorigeCat = state.huidig.cat;

  state.historie.push({
    id: state.huidig.id,
    datum: today(),
    status: keuze,
    cat: vorigeCat
  });

  // Track datum voor kalenderpauze
  if(keuze !== 'ander') LS.set('l_lastSuggestieDatum', today());
  if(vorigeCat === 'sessie') LS.set('l_lastSessieDatum', today());
  if(vorigeCat === 'vastmaak' || vorigeCat === 'sessie') LS.set('l_lastEveningDate', today());

  // Comfort-spiraal: typeHistorie
  const actieType = state.huidig.actieType;
  if(actieType && keuze !== 'ander'){
    if(!state.typeHistorie) state.typeHistorie = [];
    const status = (keuze === 'ja') ? 'ja' : 'nee';
    state.typeHistorie.push({ type: actieType, status, datum: today() });
    if(state.typeHistorie.length > 20) state.typeHistorie = state.typeHistorie.slice(-20);
  }

  // Escalatie/deëscalatie
  const laatste3 = state.historie.slice(-3);
  if(keuze === 'ja'){
    if(state.huidig.lopend){
      state.lopend = {
        id: state.huidig.id, cat: state.huidig.cat, tekst: state.huidig.tekst,
        startDatum: today(), duurDagen: state.huidig.duurDagen || 1
      };
    }
    // Selectieve ervaringscheck: niet na elke micro
    const huidigeZwaarte = state.huidig.zwaarte || 1;
    const gedaneCats = [...new Set(state.historie.slice(0,-1).map(h=>h.cat))];
    const eersteKeerCat = !gedaneCats.includes(vorigeCat);
    const vraagErvaring = huidigeZwaarte >= 2 || eersteKeerCat || Math.random() < 0.33;
    state.wachtOpErvaring = vraagErvaring;
    state.wachtOpErvaringDatum = vraagErvaring ? today() : null;
    const alJa = laatste3.every(h => h.status === 'ja');
    if(alJa && state.niveau < 3) state.niveau++;
  } else if(keuze === 'rustig'){
    // Afwijzing — telt als 'nee' voor escalatie
    const laatste2 = state.historie.slice(-2);
    const alNee = laatste2.every(h => h.status === 'nee' || h.status === 'rustig' || h.status === 'nietnu' || h.status === 'niksvoormij');
    if(alNee && state.niveau > 1) state.niveau--;
  }

  state.laatsteCategorie = vorigeCat;
  state.laatsteActieType = actieType || null;
  state.huidig = null;

  if(keuze === 'ander'){
    // FIX: Block 'ander' during ruzie-modus (alleen Spoor A)
    if(isRuzieModus()){
      state.huidig = null;
      saveSuggestieState(state);
      toonBevestiging('Rustige periode — geen alternatieven');
      renderApp();
      return;
    }
    anderCount = (anderCount||0) + 1;
    const recenteIds = state.historie.slice(-15).map(h => h.id);
    let pool;
    if(anderCount >= 3){
      anderCount = 0;
      const andereCats = ['micro','opdracht','relationeel','vastmaak'].filter(c => c !== vorigeCat);
      pool = SUGGESTIE_POOL.filter(s =>
        andereCats.includes(s.cat) &&
        !recenteIds.includes(s.id) &&
        !isSuggestieGeblokkeerd(state, s.id) && // FIX: Check blokkering
        s.zwaarte <= state.niveau + 1
      );
    } else {
      pool = SUGGESTIE_POOL.filter(s =>
        s.cat === vorigeCat &&
        !recenteIds.includes(s.id) &&
        !isSuggestieGeblokkeerd(state, s.id) && // FIX: Check blokkering
        s.zwaarte <= state.niveau + 1
      );
      if(pool.length === 0) pool = SUGGESTIE_POOL.filter(s => s.cat === vorigeCat && !isSuggestieGeblokkeerd(state, s.id));
    }
    if(pool.length === 0) pool = SUGGESTIE_POOL.filter(s => s.cat === 'micro'); // FIX: Ultieme fallback
    const nieuwe = pool.length > 0 ? pick(pool) : null;
    if(nieuwe){
      state.huidig = { ...nieuwe, datum: today() };
    } else {
      state.huidig = null;
      saveSuggestieState(state);
      const app = document.getElementById('app');
      if(app){
        const container = app.querySelector('.suggestie-card');
        if(container) {
          container.outerHTML = `<div class="empty-state" style="padding:2rem 1rem;text-align:center">
            <p style="font-size:1rem;color:var(--text2);margin-bottom:.5rem">Even geen nieuw idee.</p>
            <p style="font-size:.85rem;color:var(--text3)">Morgen is er weer iets.</p>
          </div>`;
        } else {
          renderApp();
        }
      }
      return;
    }
  } else if(keuze === 'lichter'){
    // Iets lichters nu, maar onthoud dat deze categorie over 2-3 dagen terug moet komen
    state.uitgesteld = { cat: vorigeCat, terugOp: today() };
    // Geef nu iets lichters
    const lichterCat = {sessie:'vastmaak', vastmaak:'micro', opdracht:'micro', micro:'micro', relationeel:'relationeel'}[vorigeCat] || 'micro';
    const recenteIds = state.historie.slice(-15).map(h => h.id);
    let pool = SUGGESTIE_POOL.filter(s =>
      s.cat === lichterCat &&
      !recenteIds.includes(s.id) &&
      s.zwaarte <= state.niveau + 1
    );
    if(pool.length === 0) pool = SUGGESTIE_POOL.filter(s => s.cat === lichterCat);
    const nieuwe = pool.length > 0 ? pick(pool) : null;
    if(nieuwe){
      state.huidig = { ...nieuwe, datum: today() };
    }
  }
  // 'rustig' → geen nieuwe suggestie, rustige avond

  saveSuggestieState(state);
  // P1: Update thema-tracking en comfortzone
  if(keuze === 'ja' || keuze === 'rustig' || keuze === 'nee'){
    const sugId = state.historie.length > 0 ? state.historie[state.historie.length-1].id : null;
    if(sugId){
      updateThemaScore(sugId, keuze === 'ja' ? 'ja' : 'nee');
      if(keuze === 'ja') updateComfort(sugId, true);
      else updateComfort(sugId, false);
    }
  }
  // P1: Check veiligheidsklep
  checkVeiligheidsklep();
  if(keuze === 'ja') toonBevestiging('✓ Aangenomen');
  else if(keuze === 'rustig') toonBevestiging('✓ Rustige avond');
  renderApp();
}

// ─── P0: Drie-lagen afwijzingssysteem ─────────────────────────

// "Niet nu" = korte rem. Suggestie komt later (volgende week) terug.
function verwerkNietNu(){
  const state = getSuggestieState();
  if(!state.huidig) return;
  const id = state.huidig.id;
  state.historie.push({ id, datum: today(), status:'nietnu', cat: state.huidig.cat });
  if(!state.korteRem) state.korteRem = [];
  state.korteRem.push({ id, datum: today(), terugNa: 7 });
  state.korteRem = state.korteRem.filter(r => daysSince(r.datum) < 30);
  LS.set('l_lastSuggestieDatum', today());
  // FIX: Track thema/comfort bij afwijzing
  updateThemaScore(id, 'nee');
  updateComfort(id, false);
  state.huidig = null;
  saveSuggestieState(state);
  toonBevestiging('✓ Een andere keer');
  renderApp();
}

// "Niks voor mij" = lange rem. Verdwijnt 4-8 weken, komt alleen terug in zachtere vorm.
function verwerkNiksVoorMij(){
  const state = getSuggestieState();
  if(!state.huidig) return;
  const id = state.huidig.id;
  const cat = state.huidig.cat;
  const actieType = state.huidig.actieType;
  state.historie.push({ id, datum: today(), status:'niksvoormij', cat });
  // Lange rem: 4-8 weken (random, zodat het niet voorspelbaar is)
  if(!state.langeRem) state.langeRem = [];
  const weken = 4 + Math.floor(Math.random() * 5); // 4-8 weken
  state.langeRem.push({ id, cat, actieType: actieType||null, datum: today(), terugNaDagen: weken * 7 });
  // Tel negatieven voor deze categorie — bij 3+ zachte reset
  const recentNegatief = state.historie.slice(-10).filter(h =>
    (h.status === 'niksvoormij' || h.status === 'nietnu') && h.cat === cat
  );
  if(recentNegatief.length >= 3){
    // Zachte reset: verlaag niveau en switch focus
    if(state.niveau > 1) state.niveau--;
  }
  LS.set('l_lastSuggestieDatum', today());
  // FIX: Track thema/comfort bij afwijzing
  updateThemaScore(id, 'nee');
  updateComfort(id, false);
  state.huidig = null;
  saveSuggestieState(state);
  toonBevestiging('✓ Begrepen');
  toonTimAfwijzingSignaal(id, cat);

}

// Check of een suggestie-id geblokkeerd is door korte of lange rem
function isSuggestieGeblokkeerd(state, id){
  // Korte rem: check of afkoelperiode voorbij is
  const korteRem = (state.korteRem || []).find(r => r.id === id);
  if(korteRem && daysSince(korteRem.datum) < (korteRem.terugNa || 7)) return true;
  // Lange rem: check of terugkeerperiode voorbij is
  const langeRem = (state.langeRem || []).find(r => r.id === id);
  if(langeRem && daysSince(langeRem.datum) < (langeRem.terugNaDagen || 28)) return true;
  return false;
}

// Periodieke herwaardering: "Zijn er dingen die anders voelen?" (na maanden, zacht)
function getHerwaarderingVraag(){
  const state = getSuggestieState();
  const langeRem = state.langeRem || [];
  // Alleen als er items zijn die 8+ weken geleden afgewezen zijn
  const verlopen = langeRem.filter(r => daysSince(r.datum) > (r.terugNaDagen || 28) + 14);
  if(verlopen.length === 0) return null;
  // Max 1x per 8 weken vragen
  const laatsteHerw = LS.get('l_laatsteHerwaardering', null);
  if(laatsteHerw && daysSince(laatsteHerw) < 56) return null;
  return { aantalItems: verlopen.length };
}

function bevestigHerwaardering(accepteer){

    state.langeRem = (state.langeRem || []).filter(r => daysSince(r.datum) <= (r.terugNaDagen || 28) + 14);
    saveSuggestieState(state);

// ─── P0: Lisanne-waardering systeem ─────────────────────────
function getWaardering(){
  const state = getSuggestieState();
  const hist = state.historie || [];
  const laatsteJa = hist.slice().reverse().find(h => h.status === 'ja');
  if(!laatsteJa) return null;
  // Alleen tonen als het vandaag of gisteren was
  if(daysSince(laatsteJa.datum) > 1) return null;
  // Niet tonen als al gezien
  const laatsteWaard = LS.get('l_laatsteWaardering', null);
  if(laatsteWaard === laatsteJa.datum) return null;
  // Waarderingsteksten per context
  const eersteKeer = hist.filter(h => h.status === 'ja').length <= 1;
  const sug = SUGGESTIE_POOL.find(s => s.id === laatsteJa.id);
  const wasZwaar = sug && sug.zwaarte >= 2;
  if(eersteKeer) return { tekst: 'Je probeerde iets nieuws. Dat is al veel.', emoji: '✨' };
  if(wasZwaar) return { tekst: 'Dit vroeg moed. Goed dat je het deed.', emoji: '💛' };
  // Wisselende zachte waardering
  const waarderingen = [
    { tekst: 'Fijn dat je dit deed.', emoji: '🌿' },
    { tekst: 'Dat was lief van je.', emoji: '💛' },
    { tekst: 'Je doet precies genoeg.', emoji: '🌸' },
    { tekst: 'Tim waardeert dit soort dingen.', emoji: '💛' }
  ];
  return waarderingen[Math.abs(hashStr(laatsteJa.datum + laatsteJa.id)) % waarderingen.length];
}

function dismissWaardering(){
  const state = getSuggestieState();
  const laatsteJa = (state.historie||[]).slice().reverse().find(h => h.status === 'ja');
  if(laatsteJa) LS.set('l_laatsteWaardering', laatsteJa.datum);
  renderApp();
}

// ─── P0: Undo systeem ──────────────────────────────────────
let _undoTimer = null;
let _undoData = null;

function logErvaringMetUndo(val){
  const state = getSuggestieState();
  const laatsteJa = state.historie.slice().reverse().find(h => h.status === 'ja');
  // Bewaar huidige staat voor undo
  _undoData = {
    val,
    prevWachtOpErvaring: state.wachtOpErvaring,
    prevErvaringLogLen: (state.ervaringLog||[]).length
  };
  // Voer de logErvaring uit
  logErvaring(val);
  // Toon undo toast
  toonUndoToast(val);
}

function toonUndoToast(val){
  // Verwijder bestaande toast
  const existing = document.querySelector('.undo-toast');
  if(existing) existing.remove();
  if(_undoTimer) clearTimeout(_undoTimer);
  const labels = { fijn:'Leuk', neutraal:'Oké', teveel:'Te veel' };
  const toast = document.createElement('div');
  toast.className = 'undo-toast';
  toast.innerHTML = `<span>"${labels[val]||val}" opgeslagen</span><button onclick="undoErvaring()">Ongedaan maken</button>`;
  document.body.appendChild(toast);
  _undoTimer = setTimeout(() => {
    toast.remove();
    _undoData = null;
    _undoTimer = null;
  }, 30000); // 30 seconden
}

function undoErvaring(){
  if(!_undoData) return;
  const state = getSuggestieState();
  // Verwijder laatste ervaringLog entry
  if(state.ervaringLog && state.ervaringLog.length > (_undoData.prevErvaringLogLen || 0)){
    state.ervaringLog.pop();
  }
  // FIX: Herstel de ORIGINELE wachtOpErvaring staat
  state.wachtOpErvaring = _undoData.prevWachtOpErvaring !== undefined ? _undoData.prevWachtOpErvaring : true;
  state.wachtOpErvaringDatum = state.wachtOpErvaring ? today() : null;
  saveSuggestieState(state);
  // Opruimen
  const toast = document.querySelector('.undo-toast');
  if(toast) toast.remove();
  if(_undoTimer) clearTimeout(_undoTimer);
  _undoData = null;
  _undoTimer = null;
  toonBevestiging('↩ Ongedaan gemaakt');
  renderApp();
}

// Helper: simpele string hash voor deterministische keuzes
function hashStr(s){
  let h=0; for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;} return h;
}

// ─── P0: Positieve terugblik voor rustdagen ─────────────────
function getPositieveTerugblik(){
  const state = getSuggestieState();
  const fijne = (state.ervaringLog||[]).filter(e => e.val === 'fijn' && e.sugTekst);
  if(fijne.length === 0) return null;
  // Kies max 2 recente positieve momenten
  const gesorteerd = fijne.slice().sort((a,b) => b.datum > a.datum ? 1 : -1);
  const resultaat = [];
  for(let i=0; i<Math.min(2, gesorteerd.length); i++){
    const t = gesorteerd[i].sugTekst || '';
    resultaat.push({
      tekst: t.substring(0, 60) + (t.length > 60 ? '…' : ''),
      datum: gesorteerd[i].datum
    });
  }
  return resultaat;
}


// ─── Tim's Discipline Logic ─────────────────────────────────
function getDisciplineState(){
  return LS.get('t_discipline',{
    log:[], // [{datum,taakId,gedaan:bool}]
    momentLog:[], // [{datum}]
    reactieLog:[], // [{datum,notitie}]
    emotieLog:[] // [{datum,emotie,wie:'tim'}]
  });
}
function saveDisciplineState(s){ LS.set('t_discipline',s) }

function getDisciplineStreak(){
  const state = getDisciplineState();
  const log = state.log.slice().sort((a,b) => b.datum.localeCompare(a.datum));
  let streak = 0;
  let checkDate = new Date(debugNow());
  // Als vandaag nog niet gelogd, begin bij gisteren
  if(!log.find(l => l.datum === today())) checkDate.setDate(checkDate.getDate() - 1);
  for(let i = 0; i < 60; i++){
    const ds = checkDate.toISOString().split('T')[0];
    const entry = log.find(l => l.datum === ds);
    if(entry && entry.gedaan) streak++;
    else break;
    checkDate.setDate(checkDate.getDate() - 1);
  }
  return streak;
}

function getDagTaak(){
  const state = getDisciplineState();
  const vandaag = today();
  const alGedaan = state.log.find(l => l.datum === vandaag);
  if(alGedaan) return { taak: DISCIPLINE_POOL.find(t=>t.id===alGedaan.taakId), gedaan: alGedaan.gedaan };

  // Kies nieuwe taak — deterministic per dag (zelfde dag = zelfde taak)
  const recenteIds = state.log.slice(-7).map(l => l.taakId);
  let pool = DISCIPLINE_POOL.filter(t => !recenteIds.includes(t.id));
  if(pool.length === 0) pool = DISCIPLINE_POOL;
  let hash = 0;
  for(let i = 0; i < vandaag.length; i++) hash = ((hash << 5) - hash) + vandaag.charCodeAt(i);
  return { taak: pool[Math.abs(hash) % pool.length], gedaan: null };
}

function getWeekScore(){
  const state = getDisciplineState();
  const ws = getWeekStart();
  const weekLogs = state.log.filter(l => l.datum >= ws);
  const gedaan = weekLogs.filter(l => l.gedaan).length;
  return { gedaan, total: weekLogs.length };
}

function getWarmte(){
  const week = getWeekScore();
  const state = getDisciplineState();
  const recenteMomenten = state.momentLog.filter(m => daysSince(m.datum) < 14).length;

  // Dagritme score (laatste 7 dagen)
  const dagState = getDagritmeState();
  let dagDoneCount = 0;
  const weekGeleden = new Date(debugNow()); weekGeleden.setDate(weekGeleden.getDate()-7);
  const ws7 = weekGeleden.toISOString().split('T')[0];
  for(const datum in dagState.days){
    if(datum >= ws7){
      const blks = dagState.days[datum].blocks || {};
      for(const bId in blks){ if(isBlokCompleted(blks[bId])) dagDoneCount++; }
    }
  }
  const dagRitmeScore = Math.min(dagDoneCount / 10, 1);

  const discScore = week.total > 0 ? week.gedaan / week.total : 0;
  const momentScore = Math.min(recenteMomenten / 2, 1);

  const totaal = (discScore * 0.3) + (momentScore * 0.3) + (dagRitmeScore * 0.4);
  if(totaal > 0.55) return 'warm';
  if(totaal > 0.3) return 'neutraal';
  return 'koud';
}


// ─── Dagritme Logic ─────────────────────────────────────────────
// ─── Dagritme Data Model ─────────────────────────────────────
// State per datum: { days: { "2026-03-05": { blocks: { blockId: BlockState } } } }
// BlockState: { choiceId, choiceLabel, chosenAt, doneAt, override: { text, createdAt, seenAt, completedAt } }

function getDagritmeState(){ return LS.get('t_dagritme2',{ days:{} }) }
function saveDagritmeState(s){ LS.set('t_dagritme2',s) }

// Read-only: returns copy of blocks for datum (never mutates LS)
function getDagBlocks(datum){
  const state = getDagritmeState();
  return (state.days[datum] && state.days[datum].blocks) ? state.days[datum].blocks : {};
}
// Read-only: returns copy of blockstate (never mutates LS)
function getBlockState(datum, blokId){
  const blocks = getDagBlocks(datum);
  return blocks[blokId] || {};
}
function saveBlockState(datum, blokId, bs){
  const state = getDagritmeState();
  if(!state.days[datum]) state.days[datum] = { blocks:{} };
  state.days[datum].blocks[blokId] = bs;
  // Cleanup: verwijder dagen ouder dan 14 dagen
  const keys = Object.keys(state.days);
  if(keys.length > 20){
    keys.sort();
    const cutoff = keys.length - 14;
    for(let i=0; i<cutoff; i++) delete state.days[keys[i]];
  }
  saveDagritmeState(state);
}

function getWeekNr(){
  const d = new Date(debugNow());
  const start = new Date(d.getFullYear(),0,1);
  return Math.ceil(((d - start)/86400000 + start.getDay()+1)/7);
}

function getDagritmeBlokkenVandaag(){
  const dag = new Date(debugNow()).getDay();
  return DAGRITME_BLOKKEN.filter(b => b.weekdagen.includes(dag));
}

function getDagritmeBlokkenVoorDag(datum){
  // datum = 'YYYY-MM-DD' string
  const d = new Date(datum + 'T12:00:00');
  const dag = d.getDay();
  return DAGRITME_BLOKKEN.filter(b => b.weekdagen.includes(dag));
}

function getMorgen(){
  const d = new Date(debugNow());
  d.setDate(d.getDate() + 1);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function isBlokCompleted(bs){
  if(bs && bs.override){
    // Override wint als die na keuze kwam
    if(bs.chosenAt && bs.override.createdAt > bs.chosenAt){
      return !!bs.override.completedAt;
    }
    if(bs.override.createdAt) return !!bs.override.completedAt;
  }
  return !!bs?.doneAt;
}

function hasActiveOverride(bs){
  if(!bs?.override) return false;
  // Override wint altijd als er geen keuze is, of als override na keuze kwam
  if(!bs.chosenAt) return true;
  return bs.override.createdAt > bs.chosenAt;
}

// Is er iets voor Tim te doen op dit blok? (choice of override)
function isActionable(def, bs){
  if(def.kind === 'choice') return true;
  if(hasActiveOverride(bs)) return true;
  return false;
}

function getActiveBlock(){
  const blokken = getDagritmeBlokkenVandaag();
  const vandaag = today();
  const uur = new Date(debugNow()).getHours();
  const blocks = getDagBlocks(vandaag);

  // Eerste actionable blok waarvan endHour > nu EN niet completed
  for(const def of blokken){
    const bs = blocks[def.id] || {};
    if(isActionable(def, bs) && def.uurRange[1] > uur && !isBlokCompleted(bs)) return def;
  }
  // Fallback: laatste gemiste blok (alleen als max 2 uur geleden afgelopen)
  for(let i = blokken.length - 1; i >= 0; i--){
    const def = blokken[i];
    const bs = blocks[def.id] || {};
    if(isActionable(def, bs) && !isBlokCompleted(bs) && (uur - def.uurRange[1]) <= 2) return def;
  }
  return null; // alles gedaan of te lang geleden
}

function getBlokInteractivity(def, bs, nowHour){
  const isPastOrActive = def.uurRange[0] <= nowHour;
  const overrideActive = hasActiveOverride(bs);
  if(isPastOrActive){
    if(overrideActive) return 'overrideComplete';
    if(def.kind === 'choice') return 'chooseAndComplete';
    return 'fixedOnly';
  }
  // Future
  if(overrideActive) return 'readOnly';
  return 'locked';
}

function getBlokOpties(blok){
  const weekSeed = String(getWeekNr()) + blok.id;
  // Roteer 2 uit vast-pool (niet altijd dezelfde 2)
  let vast2;
  if(blok.vast.length <= 2){
    vast2 = blok.vast;
  } else {
    // Gebruik weeknr als seed om 2 te kiezen
    const idx = pickStabiel(blok.vast, weekSeed);
    const rest = blok.vast.filter(v => v.id !== idx.id);
    const idx2 = pickStabiel(rest, weekSeed + 'b');
    vast2 = [idx, idx2];
  }
  const wc = blok.wildcards;
  if(wc.length === 0) return vast2;
  const wildcard = pickStabiel(wc, weekSeed + 'w');
  return [...vast2, wildcard];
}

function getUnseenFutureOverrides(){
  const vandaag = today();
  const blocks = getDagBlocks(vandaag);
  const uur = new Date(debugNow()).getHours();
  const blokken = getDagritmeBlokkenVandaag();
  const unseen = [];
  for(const def of blokken){
    const bs = blocks[def.id];
    if(bs?.override && !bs.override.seenAt && def.uurRange[0] > uur){
      unseen.push({ def, override: bs.override });
    }
  }
  return unseen;
}

function markOverridesSeen(){
  const vandaag = today();
  const state = getDagritmeState();
  if(!state.days[vandaag]) return;
  const blocks = state.days[vandaag].blocks;
  let changed = false;
  for(const blokId in blocks){
    const bs = blocks[blokId];
    if(bs.override && !bs.override.seenAt){
      bs.override.seenAt = Date.now();
      changed = true;
    }
  }
  if(changed) saveDagritmeState(state);
}

function logDagritmeKeuze(blokId, optieId){
  const vandaag = today();
  // Lookup optie tekst via blok definitie
  const def = DAGRITME_BLOKKEN.find(b => b.id === blokId);
  const alleOpties = def ? [...def.vast, ...def.wildcards] : [];
  const optie = alleOpties.find(o => o.id === optieId);
  const bs = getBlockState(vandaag, blokId);
  bs.choiceId = optieId;
  bs.choiceLabel = optie ? optie.tekst : optieId;
  bs.chosenAt = Date.now();
  bs.doneAt = Date.now(); // 1 tap = gekozen + gedaan
  saveBlockState(vandaag, blokId, bs);
