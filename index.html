<style>
/* ═══════════════════════════════════════════════════
   SPRANKELEND SOUFFLEUR — CSS
   ═══════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;600&display=swap');

:root {
  --bg: #1e1a1a;
  --bg2: #272121;
  --bg3: #332b2b;
  --surface: rgba(255,255,255,.06);
  --surface2: rgba(255,255,255,.10);
  --surface3: rgba(255,255,255,.15);
  --text: #e8ddd6;
  --text2: #bda99b;
  --text3: #8a7b72;
  --accent: #c48a8a;
  --accent2: #b07a7a;
  --warm: #d6b36a;
  --warm2: #c4a35a;
  --success: #6abf8a;
  --danger: #bf6a6a;
  --purple: #a88a9b;
  --card: rgba(255,255,255,.03);
  --card-border: rgba(255,255,255,.06);
  --radius: 18px;
  --radius-sm: 12px;
  --shadow: 0 2px 16px rgba(0,0,0,.15);
}

* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; overflow:hidden; }
body {
  font-family:'DM Sans',sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* ── App Container ── */
#app {
  height:100%; display:flex; flex-direction:column;
  max-width:480px; margin:0 auto;
  position:relative; overflow:hidden;
}

/* ── View Selection (pin screen) ── */
#viewSelect {
  height:100%; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:2rem; text-align:center;
}
#viewSelect h1 {
  font-family:'Playfair Display',serif;
  font-size:1.8rem; font-weight:600;
  margin-bottom:.5rem; color:var(--text);
}
#viewSelect p { color:var(--text2); margin-bottom:2.5rem; font-size:.95rem; }
.view-buttons { display:flex; flex-direction:column; gap:1rem; width:100%; max-width:280px; }
.view-btn {
  padding:1.2rem 1.5rem; border-radius:var(--radius);
  border:1px solid var(--card-border); background:var(--surface);
  color:var(--text); font-size:1.05rem; font-family:inherit;
  cursor:pointer; transition:all .2s; text-align:left;
}
.view-btn:hover,.view-btn:active { background:var(--surface2); border-color:var(--accent); }
.view-btn .btn-name { font-weight:600; display:block; margin-bottom:.25rem; }
.view-btn .btn-desc { font-size:.82rem; color:var(--text2); }

/* ── Header ── */
.header {
  padding:1rem 1.2rem .6rem; display:flex;
  align-items:center; justify-content:space-between;
}
.header h2 {
  font-family:'Playfair Display',serif;
  font-size:1.3rem; font-weight:600;
}
.header-right { display:flex; gap:.6rem; align-items:center; }
.header-btn {
  background:none; border:none; color:var(--text2);
  font-size:1.1rem; cursor:pointer; padding:.3rem;
}
.header-btn:hover { color:var(--text); }

/* ── Content Area ── */
.content {
  flex:1; overflow-y:auto; padding:0 1.2rem 1rem;
  -webkit-overflow-scrolling:touch;
  scroll-behavior:smooth;
}
.content::-webkit-scrollbar { width:4px; }
.content::-webkit-scrollbar-thumb { background:var(--surface3); border-radius:2px; }

/* ── Tab Bar ── */
.tabs {
  display:flex; border-top:1px solid var(--card-border);
  background:var(--bg2); padding:.4rem .8rem;
  padding-bottom:env(safe-area-inset-bottom);
}
.tab {
  flex:1; display:flex; flex-direction:column;
  align-items:center; gap:.2rem; padding:.6rem .2rem;
  background:none; border:none; color:var(--text3);
  font-size:.7rem; font-family:inherit; cursor:pointer;
  transition:color .2s; min-height:48px;
}
.tab.active { color:var(--accent); }
.tab-icon { font-size:1.3rem; }

/* ── Cards ── */
.card {
  background: linear-gradient(135deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
  border:1px solid rgba(255,255,255,.05);
  border-radius:var(--radius); padding:1.3rem 1.4rem;
  margin-bottom:.9rem;
}
.card-title {
  font-weight:600; font-size:1rem; margin-bottom:.5rem;
}
.card-text { color:var(--text2); font-size:.9rem; line-height:1.5; }

/* ── Suggestie Card ── */
.suggestie-card {
  background: linear-gradient(135deg, rgba(196,138,138,.10), rgba(196,138,138,.03));
  border:1px solid rgba(196,138,138,.14);
  border-radius:var(--radius); padding:1.5rem 1.4rem;
  margin-bottom:1rem;
}
.suggestie-label {
  font-size:.75rem; color:var(--accent); text-transform:uppercase;
  letter-spacing:.05em; margin-bottom:.6rem; font-weight:600;
}
.suggestie-tekst {
  font-size:1.05rem; line-height:1.6; margin-bottom:1rem;
  color:var(--text);
}
.zeg-voorbeeld {
  background:rgba(196,138,138,.08); border-left:3px solid var(--accent);
  padding:.7rem .9rem; border-radius:var(--radius-sm);
  margin-bottom:1rem; display:flex; gap:.6rem; align-items:flex-start;
}
.zeg-label {
  flex-shrink:0; font-size:1.1rem;
}
.zeg-tekst {
  color:var(--text2); font-size:.95rem; font-style:italic;
  line-height:1.5;
}
.suggestie-handleiding {
  background:var(--surface); border-radius:var(--radius-sm);
  overflow:hidden; margin-bottom:1rem;
}
.handleiding-toggle {
  width:100%; padding:.7rem 1rem; background:none; border:none;
  color:var(--text2); font-family:inherit; font-size:.85rem;
  cursor:pointer; text-align:left; display:flex;
  justify-content:space-between; align-items:center;
}
.handleiding-toggle:hover { color:var(--text); }
.handleiding-content {
  padding:0 1rem; max-height:0; overflow:hidden;
  transition:max-height .3s ease, padding .3s ease;
  font-size:.85rem; color:var(--text2); line-height:1.5;
}
.handleiding-content.open {
  max-height:500px; padding:0 1rem .8rem;
}

/* ── Suggestie Buttons ── */
.suggestie-actions {
  display:flex; gap:.6rem;
}
.btn {
  flex:1; padding:.75rem; border-radius:var(--radius-sm);
  border:none; font-family:inherit; font-size:.9rem;
  font-weight:500; cursor:pointer; transition:all .15s;
  min-height:44px; display:inline-flex; align-items:center; justify-content:center;
}
.btn-feedback {
  background:var(--success) !important; color:#fff !important; border-color:var(--success) !important;
  pointer-events:none;
}
@keyframes fadeUp { from{opacity:1;transform:translateY(0)} to{opacity:0;transform:translateY(-8px)} }
.btn-primary {
  background:var(--accent); color:var(--bg);
}
.btn-primary:hover { background:var(--accent2); }
.btn-secondary {
  background:var(--surface2); color:var(--text);
}
.btn-secondary:hover { background:var(--surface3); }
.btn-ghost {
  background:none; color:var(--text3); border:1px solid var(--card-border);
}
.btn-ghost:hover { color:var(--text2); border-color:var(--text3); }
.btn-warm {
  background:var(--warm); color:var(--bg);
}
.btn-warm:hover { background:var(--warm2); }
.btn-full { width:100%; }
.btn-lg { padding:.75rem 1.5rem; font-size:.95rem; }

/* ── Initiatief Knop ── */
.initiatief-btn {
  width:100%; padding:1rem; border-radius:var(--radius);
  border:1px solid var(--accent);
  background:rgba(196,138,138,.08); color:var(--accent);
  font-family:inherit; font-size:1rem; font-weight:600;
  cursor:pointer; margin-bottom:1rem; transition:all .2s;
}
.initiatief-btn:hover { background:rgba(196,138,138,.15); }

/* ── Handleiding Items ── */
.handleiding-groep {
  margin-bottom:1.5rem;
}
.groep-titel {
  font-size:.8rem; color:var(--accent); text-transform:uppercase;
  letter-spacing:.05em; font-weight:600; margin-bottom:.6rem;
  padding-left:.2rem;
}
.item-card {
  background:var(--card); border:1px solid var(--card-border);
  border-radius:var(--radius-sm); margin-bottom:.5rem;
  overflow:hidden;
}
.item-header {
  padding:.8rem 1rem; cursor:pointer; display:flex;
  justify-content:space-between; align-items:center;
  font-weight:500; font-size:.95rem;
}
.item-header:hover { background:var(--surface); }
.item-body {
  max-height:0; overflow:hidden; transition:max-height .3s ease;
}
.item-body.open { max-height:600px; }
.item-body-inner {
  padding:0 1rem .8rem; font-size:.88rem;
  color:var(--text2); line-height:1.6;
}
.item-body-inner p { margin-bottom:.5rem; }
.item-tip {
  background:rgba(196,138,138,.1); border-radius:6px;
  padding:.5rem .7rem; font-size:.82rem; margin-top:.5rem;
}
.item-warning {
  background:rgba(191,106,106,.1); border-radius:6px;
  padding:.5rem .7rem; font-size:.82rem; margin-top:.5rem;
  color:var(--danger);
}
.item-fav {
  font-size:1.1rem; cursor:pointer; padding:.2rem;
  transition:transform .2s;
}
.item-fav:hover { transform:scale(1.2); }

/* ── Tim's Track ── */
.discipline-card {
  background: linear-gradient(135deg, rgba(214,179,106,.1), rgba(214,179,106,.03));
  border:1px solid rgba(214,179,106,.2);
  border-radius:var(--radius); padding:1.2rem;
  margin-bottom:.8rem;
}
.week-dots {
  display:flex; gap:.4rem; margin-top:.6rem;
}
.dot {
  width:28px; height:28px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:.75rem; font-weight:600;
}
.dot.done { background:var(--success); color:var(--bg); }
.dot.miss { background:var(--surface2); color:var(--text3); }
.dot.today { border:2px solid var(--warm); background:var(--surface); color:var(--text); }

.warmte-container {
  text-align:center; padding:1.5rem 0;
}
.warmte-ring {
  width:120px; height:120px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:2rem; margin:0 auto 1rem;
  transition: all .3s;
}
.warmte-ring.warm { background:rgba(106,191,138,.15); border:3px solid var(--success); }
.warmte-ring.neutraal { background:rgba(214,179,106,.15); border:3px solid var(--warm); }
.warmte-ring.koud { background:rgba(191,106,106,.1); border:3px solid var(--danger); }

/* ── Emotie Check ── */
.emotie-grid {
  display:flex; gap:.5rem; justify-content:center;
  margin-top:.8rem;
}
.emotie-btn {
  width:50px; height:50px; border-radius:50%;
  border:2px solid var(--card-border); background:var(--surface);
  font-size:1.4rem; cursor:pointer; transition:all .2s;
  display:flex; align-items:center; justify-content:center;
}
.emotie-btn:hover,.emotie-btn.selected {
  border-color:var(--accent); background:var(--surface2);
  transform:scale(1.1);
}

/* ── Stap-voor-stap sessie ── */
.stap-lijst { counter-reset:stap; }
.stap-item {
  position:relative; padding-left:2.2rem; margin-bottom:1rem;
}
.stap-item::before {
  counter-increment:stap; content:counter(stap);
  position:absolute; left:0; top:0;
  width:1.6rem; height:1.6rem; border-radius:50%;
  background:var(--accent); color:var(--bg);
  display:flex; align-items:center; justify-content:center;
  font-size:.8rem; font-weight:700;
}
.stap-tekst { font-size:.92rem; line-height:1.5; }

/* ── Onboarding ── */
.onboarding {
  height:100%; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:2rem; text-align:center;
}
.onboarding h1 {
  font-family:'Playfair Display',serif;
  font-size:1.6rem; margin-bottom:1rem;
}
.onboarding p {
  color:var(--text2); font-size:.95rem;
  line-height:1.6; margin-bottom:1.5rem;
  max-width:320px;
}

/* ── Zoekbalk ── */
.search-bar {
  width:100%; padding:.7rem 1rem; border-radius:var(--radius-sm);
  border:1px solid var(--card-border); background:var(--surface);
  color:var(--text); font-family:inherit; font-size:.9rem;
  margin-bottom:1rem;
}
.search-bar::placeholder { color:var(--text3); }
.search-bar:focus { outline:none; border-color:var(--accent); }

/* ── Section Headers ── */
.section-label {
  font-size:.7rem; color:var(--accent); text-transform:uppercase;
  letter-spacing:.5px; margin-bottom:.5rem; font-weight:600;
  padding-left:.1rem;
}
.section-label-purple { color:var(--purple); }
.section-label-warm { color:var(--warm); }

/* ── Signal Cards ── */
.signal-card {
  background:var(--surface); border-radius:var(--radius-sm);
  padding:.5rem .8rem; margin-bottom:.4rem; cursor:pointer;
  border:1px solid var(--card-border); transition:all .2s;
}
.signal-card-accent { border-color:rgba(196,138,138,.15); }
.signal-card-warm { border-color:rgba(214,179,106,.15); }
.signal-card-purple { border-color:rgba(168,138,155,.15); }
.signal-title { font-size:.85rem; }
.signal-body {
  display:none; margin-top:.5rem; border-top:1px solid var(--card-border);
  padding-top:.5rem;
}

/* ── Quick Actions ── */
.quick-actions {
  display:flex; gap:.5rem; margin:.8rem 0;
}
.quick-action-btn {
  flex:1; padding:.7rem .5rem; border-radius:var(--radius-sm);
  border:1px solid var(--card-border); background:var(--surface);
  color:var(--text2); font-family:inherit; font-size:.82rem;
  cursor:pointer; text-align:center; transition:all .2s;
  min-height:44px; display:flex; align-items:center;
  justify-content:center; gap:.3rem;
}
.quick-action-btn:hover { background:var(--surface2); border-color:var(--accent); color:var(--text); }

/* ── Stat Lines ── */
.stat-line {
  font-size:.85rem; color:var(--text2); padding:.3rem 0;
}
.stat-line-subtle {
  font-size:.8rem; color:var(--text3); padding:.2rem 0;
}

/* ── Info Panel ── */
.info-panel {
  background:rgba(196,138,138,.03); border:1px solid rgba(196,138,138,.06);
  border-radius:var(--radius); padding:.8rem 1rem; margin-bottom:.6rem;
}

/* ── Misc ── */
.empty-state {
  text-align:center; padding:3rem 1rem;
  color:var(--text3); font-size:.95rem;
}
.badge {
  display:inline-block; padding:.15rem .5rem;
  border-radius:20px; font-size:.72rem; font-weight:600;
}
.badge-micro { background:rgba(196,138,138,.15); color:var(--accent); }
.badge-vastmaak { background:rgba(214,179,106,.15); color:var(--warm); }
.badge-sessie { background:rgba(168,138,155,.15); color:var(--purple); }
.badge-opdracht { background:rgba(106,191,138,.15); color:var(--success); }
.badge-rel { background:rgba(191,106,106,.1); color:var(--danger); }

/* ── Settings Overlay (Frequency) ── */
.settings-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.6);
  display:flex; align-items:center; justify-content:center;
  z-index:100; opacity:0; pointer-events:none;
  transition:opacity .2s;
}
.settings-overlay.show { opacity:1; pointer-events:all; }
.settings-modal {
  background:var(--bg2); border-radius:var(--radius);
  padding:2rem; width:90%; max-width:360px;
  box-shadow:var(--shadow);
}
.settings-modal h3 { font-size:1.05rem; margin-bottom:1.5rem; }
.frequency-slider {
  width:100%; height:6px; border-radius:3px;
  background:var(--surface2); outline:none;
  -webkit-appearance:none; appearance:none;
}
.frequency-slider::-webkit-slider-thumb {
  -webkit-appearance:none; appearance:none;
  width:20px; height:20px; border-radius:50%;
  background:var(--accent); cursor:pointer;
}
.frequency-slider::-moz-range-thumb {
  width:20px; height:20px; border-radius:50%;
  background:var(--accent); cursor:pointer; border:none;
}
.frequency-labels {
  display:flex; justify-content:space-between;
  margin-top:.8rem; font-size:.8rem; color:var(--text2);
}
.settings-close {
  width:100%; padding:.8rem; margin-top:1.5rem;
  border-radius:var(--radius-sm); border:none;
  background:var(--surface2); color:var(--text);
  font-family:inherit; font-size:.9rem; cursor:pointer;
}
.settings-close:hover { background:var(--surface3); }

/* ── Visual Hierarchy: Moment Cards ── */
.moment-card-primary {
  border-left: 3px solid var(--accent);
  background: linear-gradient(135deg, rgba(196,138,138,.08), rgba(196,138,138,.02));
  padding: 1.2rem 1.3rem;
  border-radius: var(--radius);
  margin-bottom: .6rem;
}

.moment-card-secondary {
  background: rgba(255,255,255,.02);
  border: 1px solid rgba(255,255,255,.04);
  border-radius: var(--radius);
  padding: .8rem 1rem;
  margin-bottom: .5rem;
}

/* Tab subtitle */
.tab-sub {
  display: block;
  font-size: .55rem;
  color: var(--text3);
  font-weight: 400;
  margin-top: .1rem;
  letter-spacing: .3px;
}
.tab.active .tab-sub {
  color: var(--accent);
}

/* ── Experience Check Card ── */
.experience-card {
  background:linear-gradient(135deg, rgba(255,255,255,.035), rgba(255,255,255,.01));
  border:1px solid rgba(255,255,255,.05);
  border-radius:var(--radius); padding:1.4rem;
  margin-bottom:1rem; text-align:center;
}
.experience-card .card-title {
  margin-bottom:1.2rem;
}
.experience-grid {
  display:flex; flex-direction:column; gap:.8rem;
  margin-bottom:1rem;
}
.experience-btn {
  padding:.8rem; border-radius:var(--radius-sm);
  border:1px solid var(--card-border); background:var(--surface);
  color:var(--text); font-family:inherit; font-size:.95rem;
  cursor:pointer; transition:all .15s;
  display:flex; align-items:center; justify-content:center; gap:.6rem;
}
.experience-btn:hover { background:var(--surface2); border-color:var(--accent); }
.experience-btn-emoji { font-size:1.4rem; }
.experience-skip {
  text-align:center; margin-top:.6rem;
}
.experience-skip a {
  color:var(--text3); font-size:.8rem; text-decoration:none;
  cursor:pointer;
}
.experience-skip a:hover { color:var(--text2); }

/* ── Info/Waarom Toggle ── */
.info-btn {
  background:none; border:none; color:var(--text2);
  font-size:.95rem; cursor:pointer; padding:.2rem .4rem;
  margin-left:.4rem; transition:color .2s;
}
.info-btn:hover { color:var(--text); }
.waarom-text {
  background:var(--surface); border-radius:var(--radius-sm);
  padding:0 .8rem; margin-top:0; font-size:.9rem;
  color:var(--text2); line-height:1.5;
  max-height:0; overflow:hidden; transition:max-height .3s ease, padding .3s ease, margin .3s ease;
}
.waarom-text.show { max-height:500px; padding:.8rem; margin-top:.8rem; }

.fade-in { animation:fadeIn .2s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
#app { transition:opacity .12s ease; }
#app.app-fading { opacity:0; }
@keyframes bevestigPop { 0%{opacity:0;transform:translate(-50%,-50%) scale(.7)} 15%{opacity:1;transform:translate(-50%,-50%) scale(1.05)} 30%{transform:translate(-50%,-50%) scale(1)} 80%{opacity:1} 100%{opacity:0;transform:translate(-50%,-50%) scale(.95)} }
.bevestig-overlay { position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:200;pointer-events:none;background:rgba(20,20,22,.88);color:white;padding:.8rem 1.6rem;border-radius:var(--radius);font-size:1rem;font-weight:600;letter-spacing:.3px;animation:bevestigPop .9s ease forwards; }

.divider { height:1px; background:var(--card-border); margin:1.2rem 0; }

/* ── Initiatief keuze modal ── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.6);
  display:flex; align-items:flex-end; justify-content:center;
  z-index:100; opacity:0; pointer-events:none;
  transition:opacity .2s;
}
.modal-overlay.show { opacity:1; pointer-events:all; }
.modal {
  background:var(--bg2); border-radius:var(--radius) var(--radius) 0 0;
  width:100%; max-width:480px; padding:1.5rem;
  transform:translateY(100%); transition:transform .3s ease;
}
.modal-overlay.show .modal { transform:translateY(0); }
.modal h3 { font-size:1.1rem; margin-bottom:1rem; }
.modal-option {
  width:100%; padding:1rem; margin-bottom:.5rem;
  border-radius:var(--radius-sm); border:1px solid var(--card-border);
  background:var(--surface); color:var(--text);
  font-family:inherit; font-size:.95rem; cursor:pointer;
  text-align:left; transition:all .15s;

// ─── P1: SPOOR/THEMA MAPPING ───────────────────────────────
// Spoor A = "Samen leven" (relatie, verbinding, dates, humor, speelse straffen)
// Spoor B = "Bevestiging en intimiteit" (complimenten, aanraking, dienstbaar)
// Spoor C = "De dynamiek" (thema's 1-5)
const SPOOR_MAP = {
  // Spoor A cats
  'relationeel':'A', 'verbinding':'A', 'aanwezigheid':'A', 'geduld':'A',
  'waardering':'A', 'betrouwbaarheid':'A',
  // Spoor B cats
  'dienstbaar':'B',
  // Spoor C cats (dynamiek)
  'micro':'C', 'vastmaak':'C', 'sessie':'C', 'opdracht':'C', 'dynamiek':'C'
};

function getSpoor(sug){
  if(sug.spoor) return sug.spoor; // Expliciet als het er is
  return SPOOR_MAP[sug.cat] || 'C';
}

// Thema-afleiding voor Spoor C suggesties (1-5)
function getThema(sug){
  if(sug.thema) return sug.thema; // Expliciet
  const sp = getSpoor(sug);
  if(sp !== 'C') return 0; // Niet van toepassing
  // Thema 1: Zeggen, niet vragen — stem-acties, basis mededelen
  if(sug.actieType === 'stem' && sug.zwaarte <= 1) return 1;
  // Thema 2: Ontdek wat het doet — bewustzijn, controle
  if(sug.vibe === 'controle' && sug.zwaarte <= 2 && !sug.items?.length) return 2;
  if(sug.actieType === 'stem' && sug.zwaarte === 2) return 2;
  // Thema 3: Dit doe ik voor Tim — items, fysiek
  if(sug.items && sug.items.length > 0 && sug.cat !== 'sessie') return 3;
  if(sug.actieType === 'item') return 3;
  // Thema 4: Een moment bouwen — sessies, gecombineerd
  if(sug.cat === 'sessie') return 4;
  if(sug.stappen && sug.stappen.length >= 3) return 4;
  // Thema 5: Jullie eigen stijl — alles met hoge dynamiek
  if(sug.cat === 'dynamiek') return 5;
  // Default: thema 1-2 range op basis van zwaarte
  return sug.zwaarte <= 1 ? 1 : 2;
}

// INSIGHT MAPPING — koppelt suggestie aan inzicht
// ═══════════════════════════════════════════════════════════════
function getInzichtVoorSuggestie(sug){
  // Directe inzicht-tekst uit suggestie (4-sporen systeem)
  if(sug.inzicht){
    return { nr: 0, label: '', tekst: sug.inzicht, uitleg: sug.inzichtUitleg || null };
  }
  // Fase-inzicht (als geen suggestie-specifiek inzicht)
  if(typeof FASE_INZICHTEN !== 'undefined'){
    const s4 = getSpoor4State();
    const faseInzichten = FASE_INZICHTEN.filter(i => i.fase === s4.fase);
    if(faseInzichten.length > 0 && Math.random() < 0.3){
      const fi = pick(faseInzichten);
      return { nr: 0, label: '', tekst: fi.tekst, uitleg: fi.uitleg || null };
    }
  }

  const themaState = getThemaState();
  const niveau = themaState.actiefThema || 1;

  // Gebruik inzichtNr als die er is (handmatig gezet)
  let nr = sug.inzichtNr || null;

  // Auto-mapping op basis van suggestie-eigenschappen
  if(!nr){
    if(sug.actieType === 'stem' && (sug.vibe === 'controle' || sug.cat === 'opdracht')) nr = 1;
    else if(sug.actieType === 'beslissing') nr = 2;
    else if(sug.cat === 'micro' && sug.actieType === 'item' && sug.type !== 'face_to_face') nr = 3;
    else if(sug.vibe === 'speels') nr = 5;
    else if(sug.cat === 'opdracht' && sug.actieType === 'timing') nr = 6;
    else if(sug.cat === 'vastmaak') nr = 13;
    else if(sug.cat === 'sessie') nr = 7;
    else if(sug.opbouw === true || sug.planVooruit) nr = 8;
    else if(sug.cat === 'dienstbaar') nr = 11;
    else if(sug.cat === 'relationeel' && sug.vibe === 'zacht') nr = 10;
    else if(sug.cat === 'micro' && sug.vibe === 'spanning') nr = 4;
    else if(sug.vibe === 'zorg') nr = 15;
    else if(sug.cat === 'relationeel') nr = 9;
    else nr = 9; // fallback
  }

  const inzicht = INZICHT_POOL.find(i => i.id === nr);
  if(!inzicht) return null;

  // Kies de juiste variant voor het huidige thema-niveau
  const variant = inzicht.varianten.find(v => niveau >= v.min && niveau <= v.max)
    || inzicht.varianten[inzicht.varianten.length - 1];

  return { nr, label: inzicht.label, tekst: variant.tekst, uitleg: variant.uitleg };
}

// Fase 4: Ontdekking-detectie — bijhouden hoe Lisanne reageert
function getOntdekkingStatus(){
  const state = getSuggestieState();
  const ontdekkingIds = ONTDEKKING_SUGGESTIES.map(s => s.id);
  const historie = state.historie.filter(h => ontdekkingIds.includes(h.id));
  const fijnCount = historie.filter(h => h.ervaring === 'fijn').length;
  const teveelCount = historie.filter(h => h.ervaring === 'teveel').length;
  const neeCount = historie.filter(h => ['nee','niksvoormij'].includes(h.status)).length;
  const totaal = historie.length;
  return {
    pogingen: totaal,
    fijn: fijnCount,
    teveel: teveelCount,
    afgewezen: neeCount,
    // Tempo: als 2+ teveel of 3+ nee → vertraag
    tempoOmlaag: teveelCount >= 2 || neeCount >= 3,
    // Klaar voor volgende fase: 3+ fijn en geen recente teveel
    klaarVoorMeer: fijnCount >= 3 && teveelCount === 0
  };
}

function getTimErvaartTekst(sug){
  // Prioriteit 1: per-suggestie tekst (watJeKuntMerken)
  if(sug.watJeKuntMerken) return sug.watJeKuntMerken;

  // Prioriteit 2: generieke tekst per categorie
  let categorie = null;

  // Specifieke mapping op basis van suggestie-eigenschappen
  if(sug.cat === 'vastmaak') categorie = 'vastmaak';
  else if(sug.cat === 'sessie') categorie = 'sessie';
  else if(sug.actieType === 'beslissing') categorie = 'beslissing';
  else if(sug.actieType === 'item' && sug.items && sug.items.length > 0) categorie = 'item';
  else if(sug.vibe === 'spanning') categorie = 'spanning';
  else if(sug.vibe === 'controle') categorie = 'controle';
  else if(sug.actieType === 'stem' && (sug.cat === 'opdracht' || sug.cat === 'micro')) categorie = 'stem';
  else if(sug.vibe === 'zacht') categorie = 'zacht';
  else if(sug.cat === 'relationeel') categorie = 'relationeel';

  // Pijn-detectie: crop, cane, impact items
  if(sug.items && (sug.items.includes('crop') || sug.items.includes('cane'))) categorie = 'pijn';

  if(!categorie) return null;
  const teksten = TIM_ERVAART[categorie];
  if(!teksten || teksten.length === 0) return null;

  // Stabiele selectie per suggestie-id
  const seed = sug.id + 'ervaart';
  const hash = Math.abs([...seed].reduce((h,c) => (h*31 + c.charCodeAt(0))|0, 0));
  return teksten[hash % teksten.length];
}

// OPDRACHTTAAL PER FASE — hoe de app Lisanne aanspreekt
// Fase 0-1: uitnodigend ("Probeer eens...", "Kijk hoe het voelt als...")
// Fase 2-3: duidelijk ("Zeg tegen Tim...", "Doe dit vanavond...")
// Fase 4+: stellig ("Tim doet vanavond...", directe instructie)
// ═══════════════════════════════════════════════════════════════
// Effectieve lesjesfase: echte fase, of fallback als fase nog 0 is
// Fallback: fase 1 als app 7+ dagen bestaat OF 5+ suggesties bekeken OF 3+ unieke open dagen
function getEffectieveLesjesFase(){
  const s4 = getSpoor4State();
  const fase = s4.fase || 0;
  if(fase >= 1) return fase;

  // Fallback checks
  const startDatum = LS.get('l_startdatum', null);
  const dagenOud = startDatum ? daysSince(startDatum) : 0;
  const historie = (getSuggestieState().historie || []);
  const sugBekeken = historie.length;
  const uniekeDagen = new Set(historie.map(h => h.datum)).size;

  if(sugBekeken >= 5 || uniekeDagen >= 3 || dagenOud >= 7) return 1;
  return 0;
}

// ── MINI-LESJES SCHEDULER — lineair, feedback-onafhankelijk ──
// Slaat les van vandaag op zodat re-renders dezelfde les teruggeven
function kiesMiniLesje(sug){
  const s4 = getSpoor4State();
  const fase = getEffectieveLesjesFase();
  const energie = s4.energieVandaag || LS.get('l_standaard_energie','normaal');

  // Gates
  if(fase < 1) return null;
  if(energie === 'laag') return null;

  const lesjeState = LS.get('l_miniLesjes', {laatsteDatum:null, getoond:[], vandaagLesId:null});

  // Al een les gekozen vandaag? Geef dezelfde terug (idempotent bij re-renders)
  if(lesjeState.laatsteDatum === today() && lesjeState.vandaagLesId){
    return MINI_LESJES.find(l => l.id === lesjeState.vandaagLesId) || null;
  }

  // Advanced gate: 5x fijn OF 10+ suggesties zonder afwijzing
  const lState = getSuggestieState();
  const totaalFijn = (lState.ervaringLog||[]).filter(e => e.val === 'fijn').length;
  const sugZonderAfwijzing = LS.get('l_sugZonderAfwijzing', 0);
  const advancedOpen = totaalFijn >= 5 || sugZonderAfwijzing >= 10;

  // Lineair: volgende ongelezen les in volgorde
  const getoond = lesjeState.getoond || [];
  const volgende = MINI_LESJES
    .filter(les => {
      if(getoond.includes(les.id)) return false;
      if(!les.fase.includes(fase) && !les.fase.includes(Math.min(fase, 5))) return false;
      if(!les.live && !advancedOpen) return false;
      return true;
    })
    .sort((a,b) => a.volgorde - b.volgorde)[0];

  if(!volgende) return null;

  // Track + bewaar les van vandaag
  lesjeState.getoond.push(volgende.id);
  lesjeState.laatsteDatum = today();
  lesjeState.vandaagLesId = volgende.id;
  LS.set('l_miniLesjes', lesjeState);

  return volgende;
}

    html += '<button onclick="var d=document.getElementById(\'' + toggleId + '\');var open=d.style.display!==\'none\';d.style.display=open?\'none\':\'block\';this.textContent=open?\'\u25b8 Meer lezen\':\'\u25be Inklappen\';if(!open){var st=LS.get(\'l_miniLesjes\',{});if(!st.expanded)st.expanded=[];if(!st.expanded.includes(\'' + les.id + '\'))st.expanded.push(\'' + les.id + '\');LS.set(\'l_miniLesjes\',st)}" '

// ── ZELF-LEZEN: Lisanne bladert door lesjes (lineair) ──
function toonVolgendLesje(){
  const s4 = getSpoor4State();
  const fase = Math.max(getEffectieveLesjesFase(), 1);
  const lesjeState = LS.get('l_miniLesjes', {laatsteDatum:null, getoond:[]});
  const getoond = lesjeState.getoond || [];

  // Advanced gate: 5x fijn OF 10+ suggesties zonder afwijzing
  const lState = getSuggestieState();
  const totaalFijn = (lState.ervaringLog||[]).filter(e => e.val === 'fijn').length;
  const sugZonderAfwijzing = LS.get('l_sugZonderAfwijzing', 0);
  const advancedOpen = totaalFijn >= 5 || sugZonderAfwijzing >= 10;

  // Lineair: volgende ongelezen les in volgorde
  let volgende = MINI_LESJES
    .filter(les => {
      if(getoond.includes(les.id)) return false;
      if(!les.fase.includes(fase) && !les.fase.includes(Math.min(fase, 5))) return false;
      if(!les.live && !advancedOpen) return false;
      return true;
    })
    .sort((a,b) => a.volgorde - b.volgorde)[0];

  // Alles gezien? Reset en begin opnieuw
  if(!volgende){
    lesjeState.getoond = [];
    LS.set('l_miniLesjes', lesjeState);
    volgende = MINI_LESJES
      .filter(les => {
        if(!les.fase.includes(fase) && !les.fase.includes(Math.min(fase, 5))) return false;
        if(!les.live && !advancedOpen) return false;
        return true;
      })
      .sort((a,b) => a.volgorde - b.volgorde)[0];
  }

  if(!volgende) return;

  // Track
  lesjeState.getoond.push(volgende.id);
  LS.set('l_miniLesjes', lesjeState);

  // Render in modal
  const overlay = document.createElement('div');
  overlay.id = 'lesjeOverlay';
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:1rem;overflow-y:auto';
  overlay.onclick = function(e){ if(e.target === overlay) overlay.remove(); };

  // Check of er nog meer lessen zijn na deze
  const restBeschikbaar = MINI_LESJES.filter(les => {
    if(lesjeState.getoond.includes(les.id)) return false;
    if(!les.fase.includes(fase) && !les.fase.includes(Math.min(fase, 5))) return false;
    if(!les.live && !advancedOpen) return false;
    return true;
  });
  const nogMeerBtn = restBeschikbaar.length > 0
    ? '<button onclick="document.getElementById(\'lesjeOverlay\').remove();toonVolgendLesje()" style="all:unset;font-size:.82rem;color:var(--accent);cursor:pointer;padding:.3rem 0">Volgende les</button>'
    : '<span style="font-size:.78rem;color:var(--text3)">Alles gezien voor nu</span>';

  overlay.innerHTML = '<div style="background:var(--surface);border:1px solid var(--card-border);border-radius:var(--radius);padding:1.2rem;max-width:340px;width:100%;max-height:85vh;overflow-y:auto">'
    + '<p style="font-size:.7rem;color:var(--accent);text-transform:uppercase;letter-spacing:.6px;margin-bottom:.5rem">\ud83d\udcd6 Goed om te weten</p>'
    + renderLesjeHtml(volgende, 'modal')
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:.8rem;padding-top:.5rem;border-top:1px solid var(--card-border)">'
    + nogMeerBtn
    + '<button onclick="document.getElementById(\'lesjeOverlay\').remove()" style="all:unset;font-size:.82rem;color:var(--text3);cursor:pointer;padding:.3rem 0">Sluiten</button>'
    + '</div></div>';

  document.body.appendChild(overlay);
}

function getLesVoortgang(){
  const v = LS.get('l_lesVoortgang', {gelezen:[], huidig:1, meerLezenGeopend:[], gelezenOp:{}});
  if(!v.gelezenOp) v.gelezenOp = {}; // migratie voor bestaande data
  return v;
}

function setLesVoortgang(v){
  LS.set('l_lesVoortgang', v);
}

function getLesGate(lesId){
  // Les 1-4: fase 0+ (direct beschikbaar)
  // Les 5-7: fase 1+ (na eerste paar suggesties)
  // Les 8-12: fase 2+ (na verdieping)
  const les = LESSEN_INHOUD.find(l => l.id === lesId);
  if(!les) return false;
  const s4 = getSpoor4State();
  const fase = Math.max(getEffectieveLesjesFase(), s4.fase || 0);
  if(fase < les.fase) return false;

  // Les 1 is altijd beschikbaar
  if(lesId <= 1) return true;

  // Vorige les moet minstens 3 dagen geleden gelezen zijn
  const v = getLesVoortgang();
  const vorigeLesId = lesId - 1;
  if(!v.gelezen.includes(vorigeLesId)) return false;
  const gelezenDatum = v.gelezenOp[vorigeLesId];
  if(!gelezenDatum) return true; // migratie: geen datum = oude data, laat door
  return daysSince(gelezenDatum) >= 3;
}

function toonLes(lesNr, startStap){
  const les = LESSEN_INHOUD.find(l => l.id === lesNr);
  if(!les) return;

  // Verwijder bestaande overlay
  const bestaand = document.getElementById('lesOverlay');
  if(bestaand) bestaand.remove();

  const kleur = DOMEIN_KLEUREN[les.domein] || '196,168,138';
  const stappen = getLesStappen(les);
  const voortgang = getLesVoortgang();
  let alGelezen = voortgang.gelezen.includes(lesNr);
  let huidigStap = (typeof startStap === 'number' && startStap >= 0 && startStap < stappen.length) ? startStap : 0;
  let meerLezenOpen = false;

  // Full-screen overlay met gecenterde container
  const overlay = document.createElement('div');
  overlay.id = 'lesOverlay';
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:9999;display:flex;justify-content:center';

  function renderHuidigeStap(){
    const stap = stappen[huidigStap];
    const isLaatste = huidigStap === stappen.length - 1;
    const isVandaag = stap.type === 'vandaag';

    // Stap-indicator bolletjes
    let dots = '';
    for(let i = 0; i < stappen.length; i++){
      const active = i === huidigStap;
      const done = i < huidigStap;
      dots += `<div style="width:${active?'1.5rem':'.5rem'};height:.35rem;border-radius:.2rem;background:${active?`rgba(${kleur},.8)`:done?`rgba(${kleur},.4)`:'rgba(196,168,138,.15)'};transition:all .3s"></div>`;
    }

    // Content styling per type
    let contentHtml = '';
    const tekst = stap.tekst.replace(/\n/g,'<br><br>');

    if(stap.type === 'voorbeeld'){
      contentHtml = `<div style="padding:.8rem 1rem;background:rgba(${kleur},.04);border-radius:var(--radius-sm);border-left:3px solid rgba(${kleur},.25)">
        <p style="font-size:.9rem;color:var(--text2);line-height:1.65;font-style:italic">${tekst}</p>
      </div>`;
    } else if(stap.type === 'vandaag'){
      contentHtml = `<div style="padding:1rem;background:rgba(${kleur},.06);border-radius:var(--radius);text-align:center">
        <p style="font-size:.95rem;color:var(--text1);line-height:1.6;font-weight:500">${tekst}</p>
      </div>`;
    } else {
      contentHtml = `<p style="font-size:.9rem;color:var(--text1);line-height:1.7">${tekst}</p>`;
    }

    // Meer lezen sectie (alleen op laatste stap) — altijd zichtbaar, geen toggle
    let meerLezenHtml = '';
    if(isLaatste){
      const meerContent = renderMeerLezen(les);
      if(meerContent){
        meerLezenHtml = `
          <div style="margin-top:1.2rem;padding-top:.8rem;border-top:1px solid var(--card-border)">
            ${meerContent}
          </div>`;
      }
    }

    // Gelezen-knop of volgende-les-knop
    let actieHtml = '';
    if(isLaatste && !alGelezen){
      actieHtml = `<button onclick="window._lesMarkeerGelezen()" style="all:unset;display:block;width:100%;padding:.7rem;margin-top:1rem;background:rgba(${kleur},.12);border:1px solid rgba(${kleur},.2);border-radius:var(--radius);text-align:center;font-size:.88rem;color:var(--text1);font-weight:500;cursor:pointer">
        Gelezen ✓
      </button>`;
    } else if(isLaatste && alGelezen){
      // CTA: "Oefenen!" knop — sluit les, terug naar Vandaag
      actieHtml = `<button onclick="window._lesSluit()" style="all:unset;display:block;width:100%;padding:.7rem;margin-top:1rem;background:rgba(${kleur},.12);border:1px solid rgba(${kleur},.2);border-radius:var(--radius);text-align:center;font-size:.88rem;color:var(--text1);font-weight:500;cursor:pointer">
        Oefenen!
      </button>`;
    }

    overlay.innerHTML = `<div style="width:100%;max-width:480px;display:flex;flex-direction:column;height:100%;overflow:hidden">
      <div style="padding:.8rem 1rem .5rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
        <div>
          <p style="font-size:.68rem;color:rgba(${kleur},.7);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.15rem">${les.domein}</p>
          <p style="font-size:.88rem;color:var(--text1);font-weight:600">Les ${les.id} — ${les.titel}</p>
        </div>
        <button onclick="window._lesSluit()" style="all:unset;font-size:1.2rem;color:var(--text3);cursor:pointer;padding:.3rem .5rem;line-height:1">×</button>
      </div>

      <div style="padding:0 1rem .3rem;display:flex;gap:.3rem;flex-shrink:0">
        ${dots}
      </div>

      <div style="flex:1;overflow-y:auto;padding:1rem;-webkit-overflow-scrolling:touch">
        <div class="info-panel" style="margin-bottom:.8rem;padding:1rem">
          <p style="font-size:.72rem;color:rgba(${kleur},.7);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.6rem">${stap.label}</p>
          ${contentHtml}
        </div>
        ${actieHtml}
        ${meerLezenHtml}
      </div>

      <div style="padding:.6rem 1rem;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--card-border);flex-shrink:0;background:var(--bg)">
        ${huidigStap > 0
          ? `<button onclick="window._lesVorige()" style="all:unset;font-size:.84rem;color:var(--accent);cursor:pointer;padding:.3rem 0">← Terug</button>`
          : `<span style="font-size:.78rem;color:var(--text3)">${lesNr > 1 ? `<button onclick="window._lesGaNaar(${lesNr-1})" style="all:unset;font-size:.82rem;color:var(--text3);cursor:pointer">← Les ${lesNr-1}</button>` : ''}</span>`
        }
        <span style="font-size:.75rem;color:var(--text3)">${huidigStap + 1} / ${stappen.length}</span>
        ${!isLaatste
          ? `<button onclick="window._lesVolgende()" style="all:unset;font-size:.84rem;color:var(--accent);cursor:pointer;padding:.3rem 0">Volgende →</button>`
          : `<span></span>`
        }
      </div>
    </div>`;
  }

  // Globale handlers (nodig voor onclick in innerHTML)
  window._lesVolgende = function(){
    if(huidigStap < stappen.length - 1){
      huidigStap++;
      meerLezenOpen = false;
      renderHuidigeStap();
    }
  };
  window._lesVorige = function(){
    if(huidigStap > 0){
      huidigStap--;
      meerLezenOpen = false;
      renderHuidigeStap();
    }
  };
  window._lesSluit = function(){
    overlay.remove();
    // Cleanup globals
    delete window._lesVolgende;
    delete window._lesVorige;
    delete window._lesSluit;
    delete window._lesMarkeerGelezen;
    delete window._lesGaNaar;
    // _lesToggleMeerLezen verwijderd
    // Re-render gids
    if(typeof render === 'function') render();
  };
  window._lesMarkeerGelezen = function(){
    const v = getLesVoortgang();
    if(!v.gelezen.includes(lesNr)){
      v.gelezen.push(lesNr);
      v.huidig = Math.max(v.huidig, lesNr + 1);
      v.gelezenOp[lesNr] = today(); // sla datum op voor oefenkaart
      setLesVoortgang(v);
    }
    alGelezen = true;
    renderHuidigeStap();
  };
  window._lesGaNaar = function(nr){
    overlay.remove();
    delete window._lesVolgende;
    delete window._lesVorige;
    delete window._lesSluit;
    delete window._lesMarkeerGelezen;
    delete window._lesGaNaar;
    // _lesToggleMeerLezen verwijderd
    toonLes(nr);
  };
  // _lesToggleMeerLezen verwijderd — meer lezen is nu altijd zichtbaar

  // ── Swipe-navigatie ──
  let _swipeStartX = 0;
  let _swipeStartY = 0;
  let _swiping = false;
  overlay.addEventListener('touchstart', function(e){
    const t = e.touches[0];
    _swipeStartX = t.clientX;
    _swipeStartY = t.clientY;
    _swiping = true;
  }, {passive: true});
  overlay.addEventListener('touchend', function(e){
    if(!_swiping) return;
    _swiping = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - _swipeStartX;
    const dy = t.clientY - _swipeStartY;
    // Alleen horizontale swipes (dx groter dan dy, minimaal 50px)
    if(Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5){
      if(dx < 0 && huidigStap < stappen.length - 1){
        // Swipe links → volgende stap
        huidigStap++;
        renderHuidigeStap();
      } else if(dx > 0 && huidigStap > 0){
        // Swipe rechts → vorige stap
        huidigStap--;
        renderHuidigeStap();
      }
    }
  }, {passive: true});

  renderHuidigeStap();
  document.body.appendChild(overlay);
}

    if(!beschikbaar){
      html += `<div style="margin-bottom:.3rem;padding:.4rem .7rem;background:rgba(100,100,100,.03);border-radius:var(--radius-sm);opacity:.35">
        <p style="font-size:.82rem;color:var(--text3)">🔒 Les ${les.id} — ${les.titel}</p>
      </div>`;
    } else {
      const icon = gelezen ? '✓' : '○';
      const iconColor = gelezen ? 'rgba(100,160,100,.8)' : 'var(--text3)';

      html += `<div onclick="toonLes(${les.id})" style="margin-bottom:.3rem;padding:.4rem .7rem;background:rgba(${kleur},.03);border-radius:var(--radius-sm);cursor:pointer">
        <div style="display:flex;align-items:flex-start;gap:.5rem">
          <span style="font-size:.8rem;color:${iconColor};min-width:1rem;margin-top:.1rem">${icon}</span>
          <div>
            <p style="font-size:.82rem;color:var(--text1);${gelezen?'opacity:.7':'font-weight:500'}">${les.titel}</p>
            <p style="font-size:.7rem;color:var(--text3);margin-top:.1rem;line-height:1.3">${les.subtitel || les.domein}</p>
          </div>
        </div>
      </div>`;
    }
  });

  html += `</div>`;
  return html;
}

function toonVolgendeV26Les(){

const AFLOOP_FALLBACKS = {
  vastmaak: [
    'Doe alles rustig af. Even naast hem zitten.',
    'Neem de tijd om alles af te doen. Daarna even samen.',
    'Alles eraf. Hand op zijn borst. Even niks zeggen.',
    'Rustig losmaken. Laat hem even bij je zijn.'
  ],
  sessie: [
    'Daarna even samen zitten. Geen haast.',
    'Na afloop: dicht bij hem. Even niks doen.',
    'Laat het moment rustig landen. Samen op de bank.',
    'Even niks erna. Gewoon naast elkaar.'
  ],
  opdracht: [
    'Als hij klaar is: "Goed zo." Meer hoeft niet.',
    'Daarna even normaal samen verder.'
  ],
  micro: null // geen aftercare nodig bij micro
};
function getAfloopFallback(sug){
  if(sug.naAfloop) return sug.naAfloop;
  const cat = sug.cat;
  const opts = AFLOOP_FALLBACKS[cat];
  if(!opts) return null;
  // Alleen bij zwaarte >= 2 of vastmaak/sessie
  if(cat !== 'vastmaak' && cat !== 'sessie' && (sug.zwaarte||0) < 2) return null;
  const seed = sug.id + today() + 'afloop';
  const hash = Math.abs([...seed].reduce((h,c) => (h*31 + c.charCodeAt(0))|0, 0));
  return opts[hash % opts.length];
}

function getObservatieOpdracht(sug){
  let cat = null;
  if(sug.cat === 'vastmaak') cat = 'vastmaak';
  else if(sug.cat === 'sessie') cat = 'sessie';
  else if(sug.actieType === 'beslissing') cat = 'beslissing';
  else if(sug.actieType === 'stem' && sug.vibe !== 'zacht') cat = 'stem';
  else if(sug.actieType === 'item') cat = 'item';
  if(sug.items && (sug.items.includes('crop') || sug.items.includes('cane'))) cat = 'pijn';
  if(!cat || !OBSERVATIE_OPDRACHTEN[cat]) return null;
  const opts = OBSERVATIE_OPDRACHTEN[cat];
  const seed = sug.id + today() + 'obs';
  const hash = Math.abs([...seed].reduce((h,c) => (h*31 + c.charCodeAt(0))|0, 0));
  return opts[hash % opts.length];
}

// Milou aanwezig? Enige echte beperking voor suggesties
function isMilouAanwezig(){
  const now = debugNow();
  const dag = now.getDay();
  const uur = now.getHours();
  // Na 19:00 slaapt Milou altijd
  if(uur >= 19) return false;
  // Ma-Do: Milou op school 8-15
  if(dag >= 1 && dag <= 4 && uur >= 8 && uur < 15) return false;
  // Ma-Do voor 8 of 15-19: Milou kan er zijn
  if(dag >= 1 && dag <= 4) return true;
  // Vrijdag overdag: thuis
  if(dag === 5) return true;
  // Weekend overdag: thuis
  return true;
}

function getWeekStart(){
  const d = new Date(debugNow());
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const ws = new Date(d);
  ws.setDate(diff);
  return ws.getFullYear() + '-' + String(ws.getMonth()+1).padStart(2,'0') + '-' + String(ws.getDate()).padStart(2,'0');
}

  const laatsteInteractie = LS.get('l_laatsteInteractie', null);
  if(!laatsteInteractie) return { status:'nieuw', dagenWeg:0 };
  const dagen = daysSince(laatsteInteractie);
  if(dagen <= 2) return { status:'actief', dagenWeg:dagen };
  if(dagen <= 7) return { status:'rustig', dagenWeg:dagen };

function getThemaState(){
  return LS.get('l_thema_state', {
    actiefThema: 1,          // Huidig thema (1-5)
    themaScores: {           // Per thema: ja/nee/pogingen
      1: { ja:0, nee:0, pogingen:0, eigenInitiatief:0, startDatum:null },
      2: { ja:0, nee:0, pogingen:0, eigenInitiatief:0, startDatum:null },
      3: { ja:0, nee:0, pogingen:0, eigenInitiatief:0, startDatum:null },
      4: { ja:0, nee:0, pogingen:0, eigenInitiatief:0, startDatum:null },
      5: { ja:0, nee:0, pogingen:0, eigenInitiatief:0, startDatum:null }
    },
    laatsteThemaWissel: null, // Datum van laatste thema-overgang
    terugval: []              // [{van, naar, datum, reden}]
  });
}
function saveThemaState(s){ LS.set('l_thema_state', s); }

// Update thema-score na elke suggestie-actie
function updateThemaScore(sugId, status){
  const sug = SUGGESTIE_POOL.find(s => s.id === sugId);
  if(!sug) return;
  const thema = getThema(sug);
  if(thema === 0) return; // Niet Spoor C
  const state = getThemaState();
  const score = state.themaScores[thema];
  if(!score) return;
  if(!score.startDatum) score.startDatum = today();
  score.pogingen++;
  if(status === 'ja') score.ja++;
  else score.nee++;
  saveThemaState(state);
}

// Check of thema klaar is voor progressie (non-lineair, signaal-based)
function checkThemaProgressie(){
  const state = getThemaState();
  const thema = state.actiefThema;
  if(thema >= 5) return false;
  const score = state.themaScores[thema];
  if(!score || !score.startDatum) return false;
  const weken = Math.floor(daysSince(score.startDatum) / 7);
  // Minimum criteria per thema
  const minima = {
    1: { ja:3, weken:2, pogingen:4 },    // 3+ ja, 2+ weken, 4+ pogingen
    2: { ja:3, weken:2, pogingen:4, eigenInitiatief:1 }, // + 1 eigen initiatief
    3: { ja:2, weken:3, pogingen:3 },     // 2+ ja met items, 3+ weken
    4: { ja:2, weken:3, pogingen:3 }      // 2+ sessies, 3+ weken
  };
  const min = minima[thema];
  if(!min) return false;
  if(score.ja < min.ja) return false;
  if(weken < min.weken) return false;
  if(score.pogingen < min.pogingen) return false;
  if(min.eigenInitiatief && score.eigenInitiatief < min.eigenInitiatief) return false;
  return true; // Klaar voor volgende thema
}

// Ga naar volgend thema
function advanceThema(){
  const state = getThemaState();
  if(state.actiefThema >= 5) return;
  state.actiefThema++;
  state.laatsteThemaWissel = today();
  saveThemaState(state);
}

  const sug = SUGGESTIE_POOL.find(s => s.id === sugId);
  if(!sug) return;
  const spoor = getSpoor(sug);
  const state = getComfortState();
  const cs = state[spoor];
  if(!cs) return;
  if(positief){
    cs.laatstePositief = today();
    // Langzaam omhoog: 3 positieve ervaringen = +1
    const hist = getSuggestieState().ervaringLog || [];
    const recentFijn = hist.filter(e => e.val === 'fijn' && daysSince(e.datum) < 21).length;
    if(recentFijn >= 3 && cs.niveau < 3) cs.niveau = Math.min(3, cs.niveau + 0.5);
  } else {
    cs.laatsteNegatief = today();
    if(cs.niveau > 1) cs.niveau = Math.max(1, cs.niveau - 0.5);
  }
  saveComfortState(state);
}

   opties:['Gezegd','Gevraagd','Iets ertussenin']},
  {tekst:'Was dit makkelijker of moeilijker dan verwacht?', meet:'comfort',

   opties:['Warmer dan anders','Gewoon','Beetje ongemakkelijk']},
  {tekst:'Voelde dit al normaal of nog spannend?', meet:'gewenning',
   opties:['Al normaal','Beetje spannend','Best spannend']},
  {tekst:'Deed Tim wat je vroeg zonder vragen?', meet:'opvolging',
   opties:['Meteen','Na even','Niet echt']},

   opties:['Leuk voor mij','Beetje van allebei','Meer voor Tim']}
];

function moetBewustwordingVraag(){
  // 1 op 3 keer na een 'ja' suggestie — maar NIET als er nog een actieve suggestie loopt
  const state = getSuggestieState();
  // Geen bewustwordingsvraag als er nu een suggestie actief is of wacht op ervaring
  if(state.huidig || state.wachtOpErvaring) return false;
  const hist = state.historie || [];
  const laatsteJas = hist.filter(h => h.status === 'ja');
  if(laatsteJas.length === 0) return false;
  // Alleen als de laatste ja van vandaag is (recent context)
  const laatsteJa = laatsteJas[laatsteJas.length - 1];
  if(laatsteJa.datum !== today()) return false;
  // Check of we al een vraag hadden vandaag
  const laatsteVraag = LS.get('l_laatsteBewustwording', null);
  if(laatsteVraag === today()) return false;
  // 1 op 3 kans (deterministisch per dag)
  const seed = today() + 'bewust';
  let h = 0; for(let i=0;i<seed.length;i++){h=((h<<5)-h)+seed.charCodeAt(i);h|=0;}
  return Math.abs(h % 3) === 0;
}

function getBewustwordingVraag(){
  const seed = today() + 'bvraag';
  let h = 0; for(let i=0;i<seed.length;i++){h=((h<<5)-h)+seed.charCodeAt(i);h|=0;}
  return BEWUSTWORDING_VRAGEN[Math.abs(h) % BEWUSTWORDING_VRAGEN.length];
}

// Wens is "omgezet" als er een RELEVANTE suggestie na de wens is geweest
function isWensOmgezet(){
  const wens = getTimWens();
  if(!wens) return false;
  const state = getSuggestieState();
  const naDatum = (state.historie||[]).filter(h => h.status === 'ja' && h.datum >= wens.datum);
  // Check of minstens 1 suggestie relevant was voor het wens-type
  return naDatum.some(h => {
    const sug = SUGGESTIE_POOL.find(s => s.id === h.id);
    if(!sug) return false;
    if(wens.type === 'spanning') return sug.vibe === 'spanning' || sug.vibe === 'controle' || sug.cat === 'vastmaak' || sug.cat === 'sessie';
    if(wens.type === 'aanraking') return sug.actieType === 'item' || (sug.items && sug.items.length > 0);
    if(wens.type === 'leiding') return sug.vibe === 'controle' || sug.actieType === 'beslissing' || sug.cat === 'opdracht';
    if(wens.type === 'vrij') return getSpoor(sug) === 'C';
    return false;
  });
}

// Wens auto-expire: na 3 relevante suggesties of 14 dagen
function checkWensExpiry(){
  const wens = getTimWens();
  if(!wens) return;
  if(daysSince(wens.datum) >= 14){ clearTimWens(); return; }
  const state = getSuggestieState();
  const naDatum = (state.historie||[]).filter(h => h.status === 'ja' && h.datum >= wens.datum);
  const relevantCount = naDatum.filter(h => {
    const sug = SUGGESTIE_POOL.find(s => s.id === h.id);
    if(!sug) return false;
    if(wens.type === 'spanning') return sug.vibe === 'spanning' || sug.vibe === 'controle';
    if(wens.type === 'aanraking') return sug.actieType === 'item';
    if(wens.type === 'leiding') return sug.vibe === 'controle' || sug.actieType === 'beslissing';
    return false;
  }).length;
  if(relevantCount >= 3) clearTimWens(); // Auto-expire na 3 relevante
}

// ─── LISANNE'S "GEEF ME EEN IDEE" ─────────────────────────────
// Lisanne kan zelf een suggestie aanvragen op basis van sfeer.
// Selectie hergebruikt dezelfde guards als kiesSuggestie().
function openGeefMeEenIdee(){
  document.getElementById('geefMeEenIdeePanel').style.display =
    document.getElementById('geefMeEenIdeePanel').style.display === 'none' ? 'block' : 'none';
  // Sluit andere panels
  const bp = document.getElementById('lisanneBerichtInput');
  const kp = document.getElementById('kiezenFlowPanel');
  if(bp) bp.style.display = 'none';
  if(kp) kp.style.display = 'none';

function startLisanneIdee(sfeer){
  const state = getSuggestieState();
  const recenteIds = state.historie.slice(-15).map(h => h.id);
  const now = debugNow();
  const hour = now.getHours();
  const dayOfWeek = now.getDay();
  const isWeekend = dayOfWeek === 0 || dayOfWeek === 5 || dayOfWeek === 6;
  const isKindTijd = isMilouAanwezig(); // Milou erbij = alleen subtiel
  const themaState = getThemaState();
  const actiefThema = themaState.actiefThema;

  // Sfeer → pool-filter mapping
  let pool = SUGGESTIE_POOL.filter(s => {
    // Basis-guards (zelfde als kiesSuggestie)
    if(recenteIds.includes(s.id)) return false;
    if(isKindTijd && s.subtiel === false) return false;
    if(!isTemplateItemsValid(s)) return false;
    if(isSuggestieGeblokkeerd(state, s.id)) return false;
    // Thema-gate: niet 2+ thema's vooruit
    const sThema = getThema(s);
    if(sThema > 0 && sThema > actiefThema + 1) return false;
    return true;
  });

  // Sfeer-specifieke filtering
  if(sfeer === 'sexy'){
    // Fysiek/intiem, ALLE sporen — niet per se FLR
    pool = pool.filter(s =>
      s.vibe === 'spanning' || s.vibe === 'controle' ||
      s.cat === 'vastmaak' || s.cat === 'sessie' ||
      (s.actieType === 'item' && s.items && s.items.length > 0)
    );
  } else if(sfeer === 'romantisch'){
    // Warm, verbindend — spoor A/B
    pool = pool.filter(s =>
      s.vibe === 'zacht' || s.cat === 'relationeel' ||
      (getSpoor(s) === 'A') || (getSpoor(s) === 'B' && s.zwaarte <= 1)
    );
  } else if(sfeer === 'speels'){
    // Luchtig, humor, verrassing
    pool = pool.filter(s =>
      s.vibe === 'speels' || s.id.startsWith('fun') ||
      (s.cat === 'micro' && s.zwaarte <= 1)
    );
  } else if(sfeer === 'spanning'){
    // Expliciet FLR/BDSM — spoor C
    pool = pool.filter(s =>
      getSpoor(s) === 'C' && s.zwaarte <= state.niveau + 1
    );
  }

  // Fallback als pool leeg
  if(pool.length === 0){
    pool = SUGGESTIE_POOL.filter(s =>
      !recenteIds.includes(s.id) && s.cat === 'micro' && s.zwaarte <= 1
    );
  }
  if(pool.length === 0){
    toonBevestiging('Geen passend idee gevonden');
    return;
  }

  const gekozen = pick(pool);
  const ideeState = LS.get('l_lisanneIdee', { datum: null, pogingen: 0, huidig: null, sfeer: null });
  if(ideeState.datum !== today()){ ideeState.pogingen = 0; ideeState.datum = today(); }
  ideeState.huidig = gekozen.id;
  ideeState.sfeer = sfeer;
  ideeState.pogingen++;
  LS.set('l_lisanneIdee', ideeState);
  renderApp();
}

function skipLisanneIdee(){
  const ideeState = LS.get('l_lisanneIdee', null);
  if(!ideeState) return;
  if(ideeState.pogingen >= 3){
    toonBevestiging('Morgen weer nieuwe ideeën');
    ideeState.huidig = null;
    LS.set('l_lisanneIdee', ideeState);
    renderApp();
    return;
  }
  // Kies een nieuw idee in dezelfde sfeer
  startLisanneIdee(ideeState.sfeer);
}

function sluitLisanneIdee(){
  const ideeState = LS.get('l_lisanneIdee', null);
  if(ideeState){ ideeState.huidig = null; LS.set('l_lisanneIdee', ideeState); }
  renderApp();
}

function activeerLisanneIdee(){
  const ideeState = LS.get('l_lisanneIdee', null);
  if(!ideeState || !ideeState.huidig) return;
  const sug = SUGGESTIE_POOL.find(s => s.id === ideeState.huidig);
  if(!sug) return;

  // Optie 1: Als er al een huidig suggestie is → vervang die
  const state = getSuggestieState();
  state.huidig = sug;
  state.historie.push({ id: sug.id, datum: today(), status: 'ja', cat: sug.cat, bron: 'lisanne_initiatief' });
  LS.set('l_lastSuggestieDatum', today());
  if(sug.cat === 'sessie') LS.set('l_lastSessieDatum', today());
  if(sug.cat === 'vastmaak' || sug.cat === 'sessie') LS.set('l_lastEveningDate', today());
  saveSuggestieState(state);

  // Optie 2: Override in Tim's dagritme (avondblok)
  const dagState = getDagritmeState();
  const vandaag = today();
  if(!dagState.days[vandaag]) dagState.days[vandaag] = { blocks: {} };
  // Zoek avondblok of eerstvolgende open blok
  const avondBlok = getDagritmeBlokkenVandaag().find(b => b.id === 'avond' || b.id === 'overgang');
  if(avondBlok){
    dagState.days[vandaag].blocks[avondBlok.id] = dagState.days[vandaag].blocks[avondBlok.id] || {};
    dagState.days[vandaag].blocks[avondBlok.id].override = {
      text: sug.tekst.substring(0, 80),
      bron: 'lisanne',
      datum: today()
    };
    LS.set('dagritme', dagState);
  }

  // Log als Lisanne-initiatief
  const initLog = LS.get('l_initiatief_log', []);
  initLog.push({ datum: today(), type: 'idee', sfeer: ideeState.sfeer, sugId: sug.id });
  LS.set('l_initiatief_log', initLog);

  // Reset idee-state
  ideeState.huidig = null;
  LS.set('l_lisanneIdee', ideeState);

  toonBevestiging('Tim ziet dit vanavond');
  renderApp();
}

// Fase 1 (thema 1-2): "Dit kan fijn zijn voor Tim."
// Fase 2 (thema 3): "Tim vindt dit fijn."
// Fase 3 (thema 4): "Hoe was dit voor jou?"
// Fase 4 (thema 5): "Dit is iets van jullie."
function getBDSMFraming(){
  const ts = getThemaState();
  const t = ts.actiefThema;
  if(t <= 2) return { fase:1, prefix:'Dit kan fijn zijn voor Tim.', toon:'uitleggend' };
  if(t === 3) return { fase:2, prefix:'Tim vindt dit fijn.', toon:'meedenkend' };
  if(t === 4) return { fase:3, prefix:'Hoe was dit voor jou?', toon:'incheckend' };
  return { fase:4, prefix:'Dit is iets van jullie.', toon:'loslatend' };
}

function getVraagmodusState(){
  return LS.get('t_vraagmodus', {
    actief: false,
    vandaag: null,        // datum waarop vraagmodus actief is
    situaties: [],        // [{id, gevraagd:bool}]
    geschiedenis: [],     // [{datum, situaties:[{id,gevraagd}]}]
    laatsteKeer: null
  });
}

function isVraagmodusActief(){
  const state = getVraagmodusState();
  return state.actief && state.vandaag === today();
}

function startVraagmodus(){
  const state = getVraagmodusState();
  const ts = getThemaState();
  // Kies situaties op basis van thema
  let pool = VRAAGMODUS_SITUATIES.filter(s => s.cat === 'alledaags');
  if(ts.actiefThema >= 2) pool = pool.concat(VRAAGMODUS_SITUATIES.filter(s => s.cat === 'persoonlijk'));
  if(ts.actiefThema >= 3) pool = pool.concat(VRAAGMODUS_SITUATIES.filter(s => s.cat === 'dynamiek'));
  // Kies 3-4 random situaties
  const shuffled = pool.sort(() => Math.random() - 0.5);
  const gekozen = shuffled.slice(0, 3 + (Math.random() < 0.3 ? 1 : 0));
  state.actief = true;
  state.vandaag = today();
  state.situaties = gekozen.map(s => ({id:s.id, tekst:s.tekst, gevraagd:false}));
  state.laatsteKeer = today();
  LS.set('t_vraagmodus', state);
  renderApp();
}

function markeerGevraagd(vmId){
  const state = getVraagmodusState();
  const sit = state.situaties.find(s => s.id === vmId);
  if(sit) sit.gevraagd = true;
  // Check of alles gevraagd is
  const alleDone = state.situaties.every(s => s.gevraagd);
  if(alleDone){
    state.geschiedenis.push({datum:today(), situaties:state.situaties});
    state.actief = false;
    toonBevestiging('Goed gedaan. Lisanne bepaalt, jij vraagt.');
  }
  LS.set('t_vraagmodus', state);
  renderApp();
}

function moetVraagmodusSuggestie(){
  const state = getVraagmodusState();
  if(state.actief) return false; // Loopt al
  if(LS.get('t_vraagmodus_skip','') === today()) return false; // Niet vandaag geklikt
  // Max 1-2x per week
  if(state.laatsteKeer && daysSince(state.laatsteKeer) < 4) return false;
  // Deterministisch: ~2x per week
  const seed = today() + 'vraagmodus';
  let h = 0; for(let i=0;i<seed.length;i++){h=((h<<5)-h)+seed.charCodeAt(i);h|=0;}
  return Math.abs(h % 4) === 0; // ~25% van de dagen = ~1.75x per week
}

function getMicroKeuzeState(){
  return LS.get('l_micro_keuze', {
    actief: null,         // {id, vraag, optieA, optieB, gekozen:null|'A'|'B'}
    geschiedenis: [],     // [{datum, id, gekozen}]
    laatsteKeer: null
  });
}

function toonMicroKeuze(){
  const state = getMicroKeuzeState();
  if(state.actief && state.actief.datum === today()) return state.actief;
  return null;
}

function startMicroKeuze(){
  const state = getMicroKeuzeState();
  const ts = getThemaState();
  // Pool op basis van thema
  let pool = MICRO_KEUZE_POOL.filter(k => k.cat === 'alledaags');
  if(ts.actiefThema >= 2) pool = pool.concat(MICRO_KEUZE_POOL.filter(k => k.cat === 'persoonlijk'));
  if(ts.actiefThema >= 3) pool = pool.concat(MICRO_KEUZE_POOL.filter(k => k.cat === 'dynamiek'));
  // Vermijd recente keuzes
  const recentIds = state.geschiedenis.slice(-5).map(g => g.id);
  const filtered = pool.filter(k => !recentIds.includes(k.id));
  const finalPool = filtered.length > 0 ? filtered : pool;
  // Kies er één
  const seed = today() + 'microkeuze';
  let h = 0; for(let i=0;i<seed.length;i++){h=((h<<5)-h)+seed.charCodeAt(i);h|=0;}
  const keuze = finalPool[Math.abs(h) % finalPool.length];
  state.actief = {id:keuze.id, vraag:keuze.vraag, optieA:keuze.optieA, optieB:keuze.optieB, resultaat:keuze.resultaat, datum:today(), gekozen:null};
  state.laatsteKeer = today();
  LS.set('l_micro_keuze', state);
  return state.actief;
}

function kiesMicroKeuze(optie){
  const state = getMicroKeuzeState();
  if(!state.actief) return;
  state.actief.gekozen = optie;
  state.geschiedenis.push({datum:today(), id:state.actief.id, gekozen:optie});
  LS.set('l_micro_keuze', state);
  toonBevestiging('Gekozen. Tim ziet het.');
  renderApp();
}

function getMicroKeuzeResultaat(){
  const state = getMicroKeuzeState();
  if(!state.actief || !state.actief.gekozen) return null;
  if(state.actief.datum !== today()) return null;
  const optieWaarde = state.actief.gekozen === 'A' ? state.actief.optieA : state.actief.optieB;
  return state.actief.resultaat.replace('{keuze}', optieWaarde.toLowerCase());
}

function moetMicroKeuzeSuggestie(){
  const state = getMicroKeuzeState();
  if(state.actief && state.actief.datum === today()) return false; // Vandaag al
  // Max 1-2x per week, pas vanaf thema 2 (maand 2+)
  const ts = getThemaState();
  if(ts.actiefThema < 2) return false;
  if(state.laatsteKeer && daysSince(state.laatsteKeer) < 4) return false;
  const seed = today() + 'moetmicro';
  let h = 0; for(let i=0;i<seed.length;i++){h=((h<<5)-h)+seed.charCodeAt(i);h|=0;}
  return Math.abs(h % 4) === 0;
}

function getOefeningState(){
  return LS.get('l_oefening', {
    actief: null,           // {id, titel, datum} — huidige oefening
    geschiedenis: [],       // [{id, datum, terugblik:'optie tekst'}]
    laatsteKeer: null
  });
}

function kiesOefening(){
  const state = getOefeningState();
  const ts = getThemaState();
  const thema = ts.actiefThema || 1;
  // Filter pool: alleen oefeningen voor huidig thema en lager
  const pool = OEFENING_POOL.filter(o => o.thema <= thema);
  // Vermijd recente oefeningen
  const recentIds = state.geschiedenis.slice(-8).map(g => g.id);
  const filtered = pool.filter(o => !recentIds.includes(o.id));
  const finalPool = filtered.length > 0 ? filtered : pool;
  // Kies deterministisch
  const seed = today() + 'oefening';
  let h = 0; for(let i=0;i<seed.length;i++){h=((h<<5)-h)+seed.charCodeAt(i);h|=0;}
  return finalPool[Math.abs(h) % finalPool.length];
}

function startOefening(){
  const state = getOefeningState();
  const oef = kiesOefening();
  state.actief = {id:oef.id, titel:oef.titel, datum:today()};
  state.laatsteKeer = today();
  LS.set('l_oefening', state);
  renderApp();
}

function beantwoordOefeningTerugblik(antwoord){
  const state = getOefeningState();
  if(!state.actief) return;
  state.geschiedenis.push({
    id: state.actief.id,
    datum: state.actief.datum,
    terugblik: antwoord
  });
  state.actief = null;
  LS.set('l_oefening', state);
  toonBevestiging('Fijn dat je dit deelt. Elke keer een beetje meer.');
  renderApp();
}

function heeftActieveOefening(){
  const state = getOefeningState();
  return state.actief && state.actief.datum === today();
}

function moetOefeningSuggestie(){
  const state = getOefeningState();
  if(state.actief) return false; // Er loopt er al één
  // Max 1x per week
  if(state.laatsteKeer && daysSince(state.laatsteKeer) < 5) return false;
  const seed = today() + 'moetoef';
  let h = 0; for(let i=0;i<seed.length;i++){h=((h<<5)-h)+seed.charCodeAt(i);h|=0;}
  return Math.abs(h % 5) === 0; // ~20% = ~1.4x per week
}

// ─── P2: TIM'S OEFENINGEN SYSTEEM ───────────────────────────
function getTimOefeningState(){
  return LS.get('t_oefening', {
    actief: null,
    geschiedenis: [],
    laatsteKeer: null
  });
}

function kiesTimOefening(){
  const state = getTimOefeningState();
  const ts = getThemaState();
  const thema = ts.actiefThema || 1;
  const pool = TIM_OEFENING_POOL.filter(o => o.thema <= thema);
  const recentIds = state.geschiedenis.slice(-8).map(g => g.id);
  const filtered = pool.filter(o => !recentIds.includes(o.id));
  const finalPool = filtered.length > 0 ? filtered : pool;
  const seed = today() + 'timoef';
  let h = 0; for(let i=0;i<seed.length;i++){h=((h<<5)-h)+seed.charCodeAt(i);h|=0;}
  return finalPool[Math.abs(h) % finalPool.length];
}

function startTimOefening(){
  const state = getTimOefeningState();
  const oef = kiesTimOefening();
  state.actief = {id:oef.id, titel:oef.titel, datum:today()};
  state.laatsteKeer = today();
  LS.set('t_oefening', state);
  renderApp();
}

function beantwoordTimOefeningTerugblik(antwoord){
  const state = getTimOefeningState();
  if(!state.actief) return;
  state.geschiedenis.push({id:state.actief.id, datum:state.actief.datum, terugblik:antwoord});
  state.actief = null;
  LS.set('t_oefening', state);
  toonBevestiging('Elke keer een beetje meer. Goed bezig.');
  renderApp();
}

function heeftTimActieveOefening(){
  const state = getTimOefeningState();
  return state.actief && state.actief.datum === today();
}

function moetTimOefeningSuggestie(){
  const state = getTimOefeningState();
  if(state.actief) return false;
  if(LS.get('t_oef_skip','') === today()) return false; // Niet vandaag geklikt
  if(state.laatsteKeer && daysSince(state.laatsteKeer) < 5) return false;
  const seed = today() + 'moettimoef';
  let h = 0; for(let i=0;i<seed.length;i++){h=((h<<5)-h)+seed.charCodeAt(i);h|=0;}
  return Math.abs(h % 5) === 0;
}

  return LS.get('samen_oefening', {

    geschiedenis: [],

  });
}

function kiesSamenOefening(){
  const state = getSamenOefeningState();
  const ts = getThemaState();
  const thema = ts.actiefThema || 1;
  const pool = SAMEN_OEFENING_POOL.filter(o => o.thema <= thema);
  const recentIds = state.geschiedenis.slice(-5).map(g => g.id);
  const filtered = pool.filter(o => !recentIds.includes(o.id));
  const finalPool = filtered.length > 0 ? filtered : pool;
  const seed = today() + 'samenoef';
  let h = 0; for(let i=0;i<seed.length;i++){h=((h<<5)-h)+seed.charCodeAt(i);h|=0;}
  return finalPool[Math.abs(h) % finalPool.length];
}

function startSamenOefening(){
  const state = getSamenOefeningState();
  const oef = kiesSamenOefening();
  state.actief = {id:oef.id, titel:oef.titel, datum:today(), lisanneAccepted:false, timAccepted:false, lisanneTerugblik:null, timTerugblik:null};
  state.laatsteKeer = today();
  LS.set('samen_oefening', state);
  renderApp();
}

function accepteerSamenOefening(wie){
  const state = getSamenOefeningState();
  if(!state.actief) return;
  if(wie === 'lisanne') state.actief.lisanneAccepted = true;
  if(wie === 'tim') state.actief.timAccepted = true;
  LS.set('samen_oefening', state);
  if(state.actief.lisanneAccepted && state.actief.timAccepted){
    toonBevestiging('Jullie doen het samen vanavond.');
  } else {
    toonBevestiging(wie === 'lisanne' ? 'Tim ziet dat je meedoet.' : 'Lisanne ziet dat je meedoet.');
  }
  renderApp();
}

function skipSamenOefening(wie){
  const state = getSamenOefeningState();
  if(!state.actief) return;
  // Markeer als overgeslagen voor vandaag
  if(wie === 'lisanne') state.actief.lisanneSkip = today();
  if(wie === 'tim') state.actief.timSkip = today();
  LS.set('samen_oefening', state);
  toonBevestiging('Oké, niet vanavond');
  renderApp();
}

function beantwoordSamenTerugblik(wie, antwoord){
  const state = getSamenOefeningState();
  if(!state.actief) return;
  if(wie === 'lisanne') state.actief.lisanneTerugblik = antwoord;
  if(wie === 'tim') state.actief.timTerugblik = antwoord;
  // Als beiden hebben gereageerd, archiveer
  if(state.actief.lisanneTerugblik && state.actief.timTerugblik){
    state.geschiedenis.push({
      id:state.actief.id, datum:state.actief.datum,
      lisanne:state.actief.lisanneTerugblik, tim:state.actief.timTerugblik
    });
    state.actief = null;
    toonBevestiging('Jullie hebben allebei gereageerd. Mooi.');
  } else {
    toonBevestiging('Opgeslagen. Wachten op de ander.');
  }
  LS.set('samen_oefening', state);
  renderApp();
}

function heeftSamenOefening(){
  const state = getSamenOefeningState();
  return state.actief && state.actief.datum === today();
}

function moetSamenOefeningSuggestie(){
  const state = getSamenOefeningState();
  if(state.actief) return false;
  if(state.laatsteKeer && daysSince(state.laatsteKeer) < 6) return false;
  const seed = today() + 'moetsamen';
  let h = 0; for(let i=0;i<seed.length;i++){h=((h<<5)-h)+seed.charCodeAt(i);h|=0;}
  return Math.abs(h % 6) === 0; // ~1x per week
}

// Helper: render samen-oefening kaart voor een specifieke view
function renderSamenOefeningKaart(wie){
  const state = getSamenOefeningState();
  if(!state.actief) return '';
  // Skip-check: als deze persoon vandaag heeft geskipt, toon niks
  const skipDatum = wie === 'lisanne' ? state.actief.lisanneSkip : state.actief.timSkip;
  if(skipDatum === today()) return '';
  const oef = SAMEN_OEFENING_POOL.find(o => o.id === state.actief.id);
  if(!oef) return '';
  const accepted = wie === 'lisanne' ? state.actief.lisanneAccepted : state.actief.timAccepted;
  const otherAccepted = wie === 'lisanne' ? state.actief.timAccepted : state.actief.lisanneAccepted;
  const terugblik = wie === 'lisanne' ? state.actief.lisanneTerugblik : state.actief.timTerugblik;
  const otherTerugblik = wie === 'lisanne' ? state.actief.timTerugblik : state.actief.lisanneTerugblik;
  const instructie = wie === 'lisanne' ? oef.instructieLisanne : oef.instructieTim;
  // Speciale handling voor "Eén vraag" type
  let vraagTekst = '';
  if(oef.vraagVanDeDag){
    const seed = today() + 'samenvraag';
    let h = 0; for(let i=0;i<seed.length;i++){h=((h<<5)-h)+seed.charCodeAt(i);h|=0;}
    vraagTekst = oef.vraagVanDeDag[Math.abs(h) % oef.vraagVanDeDag.length];
  }

  let html = `<div class="card" style="border-color:rgba(196,138,138,.25);background:rgba(196,138,138,.04)">
    <p style="font-size:.7rem;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.3rem">Samen-oefening</p>
    <p style="font-size:.95rem;color:var(--text1);font-weight:500;margin-bottom:.3rem">${oef.titel}</p>
    <p style="font-size:.8rem;color:var(--text3);margin-bottom:.5rem">${oef.focus}</p>`;
  if(vraagTekst){
    html += `<p style="font-size:.95rem;color:var(--text1);font-style:italic;margin-bottom:.5rem;padding:.5rem;background:rgba(196,138,138,.06);border-radius:var(--radius-sm)">"${vraagTekst}"</p>`;
  }
  html += `<p style="font-size:.9rem;color:var(--text2);line-height:1.5;margin-bottom:.6rem">${instructie}</p>`;

  if(!accepted){
    html += `<div style="display:flex;gap:.5rem">
      <button class="btn btn-primary" style="flex:1;font-size:.85rem" onclick="accepteerSamenOefening('${wie}')">Ik doe mee</button>
      <button class="btn btn-ghost" style="flex:1;font-size:.85rem" onclick="skipSamenOefening('${wie}')">Niet vanavond</button>
    </div>`;
    if(otherAccepted) html += `<p style="font-size:.75rem;color:var(--success);text-align:center;margin-top:.4rem">✓ ${wie==='lisanne'?'Tim':'Lisanne'} doet al mee</p>`;
  } else if(!terugblik){
    html += `<p style="font-size:.8rem;color:var(--success);margin-bottom:.5rem">✓ Je doet mee${otherAccepted ? ' — '+( wie==='lisanne'?'Tim':'Lisanne')+' ook!' : ''}</p>`;
    html += `<p style="font-size:.85rem;color:var(--text2);margin-bottom:.4rem">${oef.terugblikVraag}</p>
    <div style="display:flex;flex-direction:column;gap:.3rem">
      ${oef.terugblikOpties.map(opt => `<button class="btn btn-ghost" style="text-align:left;font-size:.85rem;padding:.5rem .7rem" onclick="beantwoordSamenTerugblik('${wie}','${opt.replace(/'/g,"\\'")}')">${opt}</button>`).join('')}
    </div>`;
  } else {
    html += `<p style="font-size:.8rem;color:var(--success)">✓ Jouw reactie: "${terugblik}"</p>`;
    if(otherTerugblik) html += `<p style="font-size:.8rem;color:var(--text2);margin-top:.3rem">${wie==='lisanne'?'Tim':'Lisanne'}: "${otherTerugblik}"</p>`;
    else html += `<p style="font-size:.75rem;color:var(--text3);margin-top:.3rem">Wachten op ${wie==='lisanne'?'Tim':'Lisanne'}...</p>`;
  }
  html += `</div>`;
  return html;
}

// ─── P1: RUZIE-MODUS + VEILIGHEIDSKLEP ─────────────────────
function getRuzieModus(){
  return LS.get('l_ruzie_modus', null);
  // { sinds:string, door:'tim'|'lisanne' }
}
function activeerRuzieModus(door){
  LS.set('l_ruzie_modus', { sinds:today(), door });
  // Automatisch alleen Spoor A of pauze
}
function deactiveerRuzieModus(){
  LS.set('l_ruzie_modus', null);
}
function isRuzieModus(){
  const rm = getRuzieModus();
  if(!rm) return false;
  // Auto-deactiveer na 14 dagen
  if(daysSince(rm.sinds) > 14){
    deactiveerRuzieModus();
    return false;
  }
  return true;
}

// Veiligheidsklep: beide views negatief → automatisch 2 weken Spoor A
function checkVeiligheidsklep(){
  const sugState = getSuggestieState();
  const timState = getDisciplineState();
  // Lisanne: 3+ negatief in laatste week
  const lisNegatief = (sugState.ervaringLog||[]).filter(e =>
    (e.val === 'teveel' || e.val === 'neutraal') && daysSince(e.datum) < 7
  ).length;
  // Tim: negatieve emoties recent
  const timNegatief = (timState.emotieLog||[]).filter(e =>
    (e.emotie === 'leeg' || e.emotie === 'neutraal') && daysSince(e.datum) < 7
  ).length;
  if(lisNegatief >= 3 && timNegatief >= 2){
    activeerRuzieModus('systeem');
    return true;
  }
  return false;
}

function getTimEmotieBericht(){
  // Max 1 per week, deterministisch
  const laatsteEmotie = LS.get('t_laatsteEmotieBericht', null);
  if(laatsteEmotie && daysSince(laatsteEmotie) < 7) return null;
  const state = getDisciplineState();
  // Check triggers in volgorde
  for(const [key, config] of Object.entries(TIM_EMOTIE_BERICHTEN)){
    try {
      if(config.trigger(state)){
        return { key, tekst:config.tekst };
      }
    } catch(e){ /* Skip bij errors */ }
  }
  return null;
}

// ─── Debug Mode ─────────────────────────────────────────────
let DEBUG = { active: new URLSearchParams(location.search).has('debug'), offset:0, uurOffset:0 }; // offset in dagen + uren

function debugNow(){
  const d = new Date();
  d.setDate(d.getDate() + DEBUG.offset);
  d.setHours(d.getHours() + (DEBUG.uurOffset || 0));
  return d;
}

// ─── Utility ────────────────────────────────────────────────
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const today = () => debugNow().toISOString().split('T')[0];
const tomorrow = () => { const d = new Date(debugNow()); d.setDate(d.getDate()+1); return d.toISOString().split('T')[0]; };
const daysSince = (d) => d ? Math.floor((debugNow().getTime()-new Date(d).getTime())/86400000) : 999;
const leesbareDatum = (d) => {
  if(!d) return '';
  const t = today(), m = tomorrow();
  if(d === t) return 'vandaag';
  if(d === m) return 'morgen';
  const datum = new Date(d + 'T12:00:00');
  const dagen = ['zo','ma','di','wo','do','vr','za'];
  const maanden = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
  const verschil = Math.round((datum.getTime() - new Date(t+'T12:00:00').getTime()) / 86400000);
  if(verschil === -1) return 'gisteren';
  if(verschil > 1 && verschil <= 6) return dagen[datum.getDay()];
  return `${dagen[datum.getDay()]} ${datum.getDate()} ${maanden[datum.getMonth()]}`;
};
const weekNum = () => { const d=debugNow();const s=new Date(d.getFullYear(),0,1);return Math.ceil(((d-s)/86400000+s.getDay()+1)/7)};
const pick = arr => arr[Math.floor(Math.random()*arr.length)];
function pickStabiel(arr, seed){
  if(!arr || arr.length === 0) return '';
  seed = String(seed || today());
  let hash = 0;
  for(let i = 0; i < seed.length; i++) hash = ((hash << 5) - hash) + seed.charCodeAt(i);
  return arr[Math.abs(hash) % arr.length];
}

function getWeekStart(){
  const d=debugNow(); d.setHours(0,0,0,0);
  const day=d.getDay()||7; d.setDate(d.getDate()-day+1);
  return d.toISOString().split('T')[0];
}

function voegAfspraakToe(tekst, type, datumVal, categorie, voorbereidingen, voorbereidingenZichtbaar, items){
  const afspraken = getAfspraken();
  if(afspraken.length >= 3) return false; // max 3
  const id = 'a' + Date.now();
  const obj = {
    id,
    tekst: tekst.trim(),
    type: type || 'doorlopend',
    datum: type === 'datum' && datumVal ? datumVal : today(),
    aangemaakt: today()
  };
  if(categorie) obj.categorie = categorie;
  if(voorbereidingen && voorbereidingen.length > 0){
    obj.voorbereidingen = voorbereidingen.slice(0, 4);
    obj.voorbereidingenZichtbaar = !!voorbereidingenZichtbaar;
    // Onthoud custom voorbereidingen voor slimme chips
    const standaardChips = ['Gedouched','Kleding klaar','Telefoon weg','Woonkamer vrij'];
    const custom = voorbereidingen.filter(v => !standaardChips.includes(v));
    if(custom.length > 0){
      let recent = LS.get('l_recenteVoorb', []);
      custom.forEach(v => { recent = recent.filter(r => r !== v); recent.unshift(v); });
      LS.set('l_recenteVoorb', recent.slice(0, 4));
    }
  }
  if(items && items.length > 0) obj.items = items.slice(0, 6);
  afspraken.push(obj);
  saveAfspraken(afspraken);
  return true;
}
