// ─── Lerende quick-picks ─────────────────────────────────────
function leerOverrideTekst(blokId, tekst){
  // Check of het een standaard-optie is (dan niet opslaan)
  const def = DAGRITME_BLOKKEN.find(b => b.id === blokId);
  if(def){
    const standaard = [...def.vast, ...def.wildcards].map(o => o.tekst.toLowerCase());
    // Multi-select: splits op " + " en check elke individuele taak
    const delen = tekst.split(' + ').map(t => t.trim().toLowerCase());
    const isAlleenStandaard = delen.every(d => standaard.includes(d));
    if(isAlleenStandaard) return;
  }
  // Sla individuele delen op (niet de gecombineerde string)
  const delen = tekst.split(' + ').map(t => t.trim());
  delen.forEach(deel => {
    if(!deel || deel.length < 3) return;
    const def2 = DAGRITME_BLOKKEN.find(b => b.id === blokId);
    if(def2){
      const standaard = [...def2.vast, ...def2.wildcards].map(o => o.tekst.toLowerCase());
      if(standaard.includes(deel.toLowerCase())) return;
    }
    const custom = LS.get('l_customOverrides', []);
    // [{tekst, count, laatst}]
    const bestaand = custom.find(c => c.tekst.toLowerCase() === deel.toLowerCase());
    if(bestaand){
      bestaand.count++;
      bestaand.laatst = today();
    } else {
      custom.push({ tekst: deel.substring(0,80), count: 1, laatst: today() });
    }
    // Max 30 onthouden, verwijder oudste als vol
    while(custom.length > 30) custom.shift();
    LS.set('l_customOverrides', custom);
  });
}

function getLisanneQuickPicks(){

  // Alleen tonen als 2+ keer gebruikt
  return custom.filter(c => c.count >= 2).sort((a,b) => b.count - a.count).slice(0,5);
}

function getDagritmeStreak(){
  const state = getDagritmeState();
  let streak = 0;
  let checkDate = new Date(debugNow());
  const vandaag = today();
  // Check of vandaag al iets gedaan
  const todayBlocks = state.days[vandaag]?.blocks || {};
  const todayDone = Object.values(todayBlocks).some(bs => isBlokCompleted(bs));
  if(!todayDone) checkDate.setDate(checkDate.getDate() - 1);
  for(let i = 0; i < 60; i++){
    const ds = checkDate.toISOString().split('T')[0];
    const dayData = state.days[ds];
    if(dayData && dayData.blocks){
      const anyDone = Object.values(dayData.blocks).some(bs => isBlokCompleted(bs));
      if(anyDone) streak++;
      else break;
    } else { break; }
    checkDate.setDate(checkDate.getDate() - 1);
  }
  return streak;
}

// ─── Data Export/Import ──────────────────────────────────────
function exportData(){
  const keys = Object.keys(localStorage).filter(k => k.startsWith('souffleur_'));
  const data = {};
  keys.forEach(k => { data[k] = localStorage.getItem(k); });
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'sprankelend_backup_' + today() + '.json';
  a.click();
  URL.revokeObjectURL(url);
  toonBevestiging('✓ Backup gedownload');
}

function importData(){
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        const keys = Object.keys(data).filter(k => k.startsWith('souffleur_'));
        if(keys.length === 0){ alert('Geen geldige backup gevonden.'); return; }
        if(!confirm('Alle huidige data vervangen door backup? Dit kan niet ongedaan worden.')){ return; }
        // Clear existing
        Object.keys(localStorage).filter(k => k.startsWith('souffleur_')).forEach(k => localStorage.removeItem(k));
        // Import
        keys.forEach(k => { localStorage.setItem(k, data[k]); });
        toonBevestiging('✓ Backup hersteld');
        renderApp();
      } catch(err){
        alert('Fout bij het lezen van het bestand.');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function heeftMomentReflectieNodig(wie){
  const state = getDisciplineState();
  const recentMoment = state.momentLog.find(m => daysSince(m.datum) < 2 && daysSince(m.datum) >= 0);
  if(!recentMoment) return false;
  // Al beantwoord of overgeslagen?
  const reflecties = getReflecties();
  const alBeantwoord = reflecties.find(r => r.wie === wie && r.type === 'moment' && daysSince(r.datum) < 2);
  if(alBeantwoord) return false;
  const overgeslagen = LS.get('reflectie_skip_'+wie+'_'+recentMoment.datum, false);
  if(overgeslagen) return false;
  // 50% kans — deterministic per dag+wie zodat het niet wisselt bij re-render
  let hash = 0;
  const seed = recentMoment.datum + wie + 'reflectie';
  for(let i=0;i<seed.length;i++) hash=((hash<<5)-hash)+seed.charCodeAt(i);
  return (Math.abs(hash) % 2) === 0;
}
function slaReflectieOver(wie){
  const state = getDisciplineState();
  const recentMoment = state.momentLog.find(m => daysSince(m.datum) < 2);
  if(recentMoment) LS.set('reflectie_skip_'+wie+'_'+recentMoment.datum, true);
  renderApp();
}

// ─── Notificaties (Notification API, werkt als tab open is) ─────
function initNotificaties(){
  if(!('Notification' in window)) return;
  if(Notification.permission === 'default'){
    // Vraag permission bij eerste interactie (niet meteen)
    document.addEventListener('click', function vraagPermissie(){
      Notification.requestPermission();
      document.removeEventListener('click', vraagPermissie);
    }, { once: true });
  }
  // Plan ochtend-check
  planOchtendNotificatie();
}

function planOchtendNotificatie(){
  const nu = new Date(debugNow());
  const target = new Date(nu);
  target.setHours(7, 30, 0, 0);
  if(nu >= target) target.setDate(target.getDate() + 1);
  const ms = target - nu;
  setTimeout(() => {
    stuurOchtendNotificatie();
    // Plan volgende dag
    setTimeout(planOchtendNotificatie, 1000);
  }, ms);
}

function stuurOchtendNotificatie(){
  if(Notification.permission !== 'granted') return;
  if(isRustigeDag()) return;
  const vandaag = today();
  const blocks = getDagBlocks(vandaag);
  const heeftOverrides = Object.values(blocks).some(bs => bs.override);
  // Alleen notificatie als Lisanne iets heeft klaargezet
  if(heeftOverrides){
    new Notification('Sprankelend', {
      body: 'Lisanne heeft vandaag iets voor je klaarstaan.',
      icon: '💬',
      tag: 'ochtend-' + vandaag,
      silent: false
    });
  }
}

function stuurOverrideNotificatie(blokLabel){
  if(Notification.permission !== 'granted') return;
  if(currentView === 'tim') return; // Tim kijkt al
  new Notification('Sprankelend', {

    icon: '💬',
    tag: 'override-' + today(),

  const laatsteJaSug = state.historie.slice().reverse().find(h => h.status === 'ja');
  const sugTekst = laatsteJaSug ? (SUGGESTIE_POOL.find(s => s.id === laatsteJaSug.id)||{}).tekst : null;
  state.ervaringLog.push({ datum: today(), val, sugId: laatsteJaSug ? laatsteJaSug.id : null, sugTekst: val === 'fijn' ? sugTekst : null });
  state.wachtOpErvaring = false;

  if(val === 'teveel'){
    const laatste5 = state.ervaringLog.slice(-5);
    if(laatste5.filter(e => e.val === 'teveel').length >= 2 && state.niveau > 1) state.niveau--;
    // Afkoelen in comfort-spiraal
    const laatsteJa = (state.typeHistorie||[]).slice().reverse().find(h => h.status === 'ja');
    if(laatsteJa){
      if(!state.typeHistorie) state.typeHistorie = [];
      state.typeHistorie.push({ type: laatsteJa.type, status: 'nee', datum: today() });
    }
  }

  saveSuggestieState(state);
  renderApp();
}

function toggleLisanneFavoriet(id){
  const state = getSuggestieState();
  if(!state.lisanneFavorieten) state.lisanneFavorieten = [];
  const idx = state.lisanneFavorieten.indexOf(id);
  if(idx === -1){
    state.lisanneFavorieten.push(id);
  } else {
    state.lisanneFavorieten.splice(idx, 1);
  }
  saveSuggestieState(state);
  renderApp();
}

function renderLisanne(app){
  const state = getSuggestieState();
  // Auto-expire ervaring na 3 dagen: voorkom vastgelopen app
  if(state.wachtOpErvaring && state.wachtOpErvaringDatum && daysSince(state.wachtOpErvaringDatum) >= 3){
    state.wachtOpErvaring = false;
    state.wachtOpErvaringDatum = null;
    // Geen ervaringLog entry → telt als "onbekend", geen scheduler-impact
    saveSuggestieState(state);
  }

  // Check for bewaard suggestie (saved for tomorrow)
  const bewaard = LS.get('bewaard_suggestie', null);
  if(bewaard && bewaard.bewaardOp === gisteren() && !state.huidig){
    state.huidig = { ...bewaard, datum: today(), bron: bewaard.bron || 'systeem' };
    LS.set('bewaard_suggestie', null);
    saveSuggestieState(state);
  }

  if(moetNieuweSuggestie(state) && !isOnboarding()){
    const suggestie = kiesSuggestie(state);
    if(suggestie){
      state.huidig = { ...suggestie, datum: today(), bron: 'systeem' };
      saveSuggestieState(state);
    }
  }

  let tabs = '';
  let headerTitle = getBegroeting('Lisanne');
  if(currentTab === 'home') { tabs = renderVandaag(state); }
  else if(currentTab === 'regelen') { tabs = renderRegelen(state); headerTitle = 'Plannen'; }
  else if(currentTab === 'gids') { tabs = renderGids(); headerTitle = 'Gids'; }
  else { tabs = renderVandaag(state); }

  app.innerHTML = `
    <div class="header">
      <h2>${headerTitle}</h2>
      <div class="header-right">
        <button class="header-btn" onclick="switchView()" title="Wissel view">👤</button>

      <button class="tab ${currentTab==='home'?'active':''}" onclick="setTab('home')">

      <button class="tab ${currentTab==='regelen'?'active':''}" onclick="setTab('regelen')">

      </button>
      <button class="tab ${currentTab==='gids'?'active':''}" onclick="setTab('gids')">
        <span class="tab-icon">📖</span>Gids
      </button>
    </nav>
    ${renderSettings()}
    ${renderModal()}

  const d = new Date(debugNow());
  d.setDate(d.getDate() - 1);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function getHerinnering(){
  const state = getSuggestieState();
  const fijne = (state.ervaringLog||[]).filter(e => e.val === 'fijn' && e.sugTekst && daysSince(e.datum) >= 7);
  if(fijne.length === 0) return null;
  // Toon max 1x per 10 dagen
  const laatsteHerinnering = LS.get('l_laatsteHerinnering', null);
  if(laatsteHerinnering && daysSince(laatsteHerinnering) < 10) return null;
  // ~30% kans per keer dat we het tonen (niet elke keer)
  const seed = today() + 'herinnering';
  let h = 0; for(let i=0;i<seed.length;i++){h=((h<<5)-h)+seed.charCodeAt(i);h|=0;}
  if(Math.abs(h % 10) > 2) return null;
  const gekozen = fijne[Math.abs(h % fijne.length)];
  return gekozen.sugTekst;
}
function markeerHerinneringGezien(){
  LS.set('l_laatsteHerinnering', today());
}

  // ═══ CONTEXTHEADER ═══
  const DAGEN = ['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];
  const dagNaam = DAGEN[new Date(debugNow()).getDay()];

  const dagType = isWeekend ? 'weekend' : 'werkdag';

    html += `<div class="card" style="border-color:rgba(196,138,138,.15);text-align:center">
      <p style="font-size:.9rem;color:var(--text2)">Vandaag is een vrije dag.</p>
      <p style="font-size:.85rem;color:var(--text3);margin-top:.3rem">Gewoon samen zijn is genoeg.</p>
    </div>`;
  }

  if(!rustig){
    const actiefDef = getActiveBlock();
    const unseenOverrides = getUnseenFutureOverrides();

    if(actiefDef){
      // ═══ ACTIEF BLOK (groot, bovenaan) ═══
      const bs = blocks[actiefDef.id] || {};
      const interact = getBlokInteractivity(actiefDef, bs, uur);
      const isHuidigBlok = actiefDef.uurRange[0] <= uur && uur < actiefDef.uurRange[1];
      const blokLabel = isHuidigBlok ? 'NU' : 'NOG OPEN';
      const overrideActive = hasActiveOverride(bs);
      const completed = isBlokCompleted(bs);

      if(completed){
        // Done-variant (compact)
        const doneLabel = overrideActive ? bs.override.text : (bs.choiceLabel || 'Gedaan');
        html += `<div class="card" style="border-color:rgba(196,138,138,.2)">
          <p style="font-size:.7rem;color:var(--success);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.2rem">✓ ${actiefDef.label}</p>
          <p style="font-size:.85rem;color:var(--text2)">${doneLabel}</p>
        </div>`;
      } else if(overrideActive){
        // Override kaart — actieknop sticky als kaart lang is
        const overrideTaken = bs.override.text.split(' + ');
        const isMulti = overrideTaken.length > 1;
        html += `<div class="card" style="border-color:rgba(168,138,155,.4);background:linear-gradient(135deg,rgba(168,138,155,.08),rgba(168,138,155,.02))">
          <p style="font-size:.65rem;color:var(--purple);text-transform:uppercase;letter-spacing:.8px;margin-bottom:.1rem">${blokLabel}</p>
          <p style="font-size:1rem;color:var(--text1);font-weight:600;margin-bottom:.3rem">${actiefDef.label}</p>
          <div style="background:rgba(168,138,155,.06);border-radius:var(--radius-sm);padding:.7rem;margin-bottom:.6rem">
            <p style="font-size:.8rem;color:var(--purple);margin-bottom:.3rem;font-weight:600">Lisanne wil dat je:</p>
            ${isMulti
              ? overrideTaken.map(t => `<p style="font-size:.9rem;color:var(--text1);padding:.15rem 0">• ${t.trim()}</p>`).join('')
              : `<p style="font-size:.95rem;color:var(--text1)">${bs.override.text}</p>`}
          </div>
          ${interact==='overrideComplete' ? `<div style="position:sticky;bottom:0;padding:.3rem 0;background:inherit"><button class="btn btn-primary" style="width:100%" onclick="dagritmeOverrideDoneMetFeedback(this,'${actiefDef.id}')">✓ Gedaan</button></div>` : ''}
        </div>`;
      } else if(actiefDef.kind === 'choice'){
        // Keuzeblok
        const opties = getBlokOpties(actiefDef);
        html += `<div class="card">
          <p style="font-size:.65rem;color:var(--purple);text-transform:uppercase;letter-spacing:.8px;margin-bottom:.1rem">${blokLabel}</p>
          <p style="font-size:1rem;color:var(--text1);font-weight:600;margin-bottom:.3rem">${actiefDef.label}</p>
          <p style="font-size:.8rem;color:var(--text3);margin-bottom:.6rem">${actiefDef.framing}</p>
          <div style="display:flex;flex-direction:column;gap:.4rem">`;
        opties.forEach(o => {
          html += `<button class="btn btn-ghost dagritme-keuze" style="text-align:left;justify-content:flex-start;font-size:.9rem;padding:.7rem .9rem" onclick="dagritmeKeuzeMetFeedback(this,'${actiefDef.id}','${o.id}')">${o.tekst}</button>`;
        });
        html += `</div></div>`;
      }

      // ═══ OVERRIDE ALERT (ongelezen future overrides) ═══
      if(unseenOverrides.length === 1){
        html += `<div class="card" style="border-color:rgba(168,138,155,.3);background:rgba(168,138,155,.04);padding:.6rem .8rem;cursor:pointer" onclick="toggleDagplan()">
          <p style="font-size:.85rem;color:var(--purple)">💬 Lisanne heeft iets voor je klaar: <strong>${unseenOverrides[0].def.label}</strong></p>
          <p style="font-size:.8rem;color:var(--text3);font-style:italic;margin-top:.2rem">${unseenOverrides[0].override.text}</p>
        </div>`;
      } else if(unseenOverrides.length > 1){
        html += `<div class="card" style="border-color:rgba(168,138,155,.3);background:rgba(168,138,155,.04);padding:.6rem .8rem;cursor:pointer" onclick="toggleDagplan()">
          <p style="font-size:.85rem;color:var(--purple)">💬 Lisanne heeft ${unseenOverrides.length} blokken aangepast voor vandaag</p>
        </div>`;
      }

      // ═══ DAGPLAN ACCORDION ═══
      html += renderDagplanAccordion(blokken, blocks, uur, actiefDef);

    } else {
      // ═══ ALLES GEDAAN ═══
      const actionableCount = blokken.filter(d => isActionable(d, blocks[d.id]||{})).length;
      if(actionableCount === 0){
        // Weekend of dag zonder choice-blokken
        const WEEKEND_TEKSTEN = [
          'Weekend. Gewoon samen zijn.',
          'Geen taken vandaag. Geniet van de dag.',
          'Vandaag niks gepland. De dag is van jullie.',
          'Rustig weekend. Morgen is er weer een dag.'
        ];
        const weekendBerichtje = pickStabiel(WEEKEND_TEKSTEN, today()+'weekend');
        html += `<div class="card" style="text-align:center">
          <p style="font-size:.9rem;color:var(--text2)">${weekendBerichtje}</p>
        </div>`;
      } else {
        const dagScore = getDagritmeScore();
        const streak = getDagritmeStreak();
        const ALLES_GEDAAN_TEKSTEN = [
          'Lisanne hoeft nergens aan te denken vanavond.',
          'Alles gedaan. De rest is voor jullie samen.',
          'Klaar. Lisanne kan ontspannen.',
          'De avond is van jullie. Jij hebt het geregeld.',
          'Lisanne hoeft vanavond niks te doen. Dat is jouw werk.',
          'Alles af. Nu gewoon samen zijn.'
        ];
        html += `<div class="card" style="border-color:rgba(196,138,138,.2);text-align:center">
          <p style="font-size:.65rem;color:var(--success);text-transform:uppercase;letter-spacing:.8px;margin-bottom:.3rem">✓ KLAAR</p>
          <p style="font-size:.95rem;color:var(--text1);font-weight:500;margin-bottom:.5rem">${pickStabiel(ALLES_GEDAAN_TEKSTEN, vandaag+'klaar')}</p>
          ${renderVoortgangsBalk(dagScore.gedaan, dagScore.total, streak)}
        </div>`;
        // Dagplan ook bij alles-gedaan (terugkijken)
        html += renderDagplanAccordion(blokken, blocks, uur, null);
      }
    }
  }

  // Discipline-taak van de dag (uit DISCIPLINE_POOL, als extra)
  const dagTaak = getDagTaak();
  html += `<div class="card" style="border-color:rgba(196,138,138,.15)">
    <p style="font-size:.7rem;color:var(--teal);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.3rem">Iets extra's</p>
    <p style="font-size:.9rem;color:var(--text2);margin-bottom:.6rem">${dagTaak.taak.tekst}</p>`;
  if(dagTaak.gedaan === null){
    html += `<div style="display:flex;gap:.6rem">
      <button class="btn btn-primary" style="flex:1" onclick="logDiscipline('${dagTaak.taak.id}',true)">✓ Gedaan</button>
      <button class="btn btn-ghost" style="flex:1" onclick="logDiscipline('${dagTaak.taak.id}',false)">✗ Niet gelukt</button>
    </div>`;
  } else {
    html += `<p style="color:${dagTaak.gedaan?'var(--success)':'var(--text3)'};font-weight:500">${dagTaak.gedaan?'✓ Gedaan':'✗ Niet gelukt'}</p>`;
  }
  html += `</div>`;

  // ── P2: TIM'S VRAAGMODUS ──
  if(isVraagmodusActief()){
    const vmState = getVraagmodusState();
    const openSituaties = vmState.situaties.filter(s => !s.gevraagd);
    const gedaanSituaties = vmState.situaties.filter(s => s.gevraagd);
    if(openSituaties.length > 0){
      html += `<div class="card" style="border-color:rgba(168,138,155,.3);background:rgba(168,138,155,.04)">
        <p style="font-size:.7rem;color:var(--purple);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.4rem">Vandaag vraag je het</p>
        <p style="font-size:.85rem;color:var(--text2);margin-bottom:.6rem;line-height:1.5">Vandaag pak je niet zelf — je vraagt het aan Lisanne. Via WhatsApp of face-to-face.</p>`;
      openSituaties.forEach(s => {
        html += `<div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem;padding:.5rem .6rem;background:rgba(168,138,155,.06);border-radius:var(--radius-sm)">
          <span style="flex:1;font-size:.9rem;color:var(--text1)">"${s.tekst}"</span>
          <button class="btn btn-primary" style="font-size:.8rem;padding:.3rem .7rem;white-space:nowrap" onclick="markeerGevraagd('${s.id}')">Gevraagd</button>
        </div>`;
      });
      if(gedaanSituaties.length > 0){
        html += `<p style="font-size:.75rem;color:var(--success);margin-top:.4rem">✓ ${gedaanSituaties.length} al gevraagd</p>`;
      }
      html += `</div>`;
    } else {
      html += `<div class="card" style="border-color:rgba(168,138,155,.2);text-align:center">
        <p style="font-size:.65rem;color:var(--success);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.3rem">✓ GEDAAN</p>
        <p style="font-size:.9rem;color:var(--text2)">Alles gevraagd vandaag. Goed zo.</p>
      </div>`;
    }
  } else if(moetVraagmodusSuggestie()){
    html += `<div class="card" style="border-color:rgba(168,138,155,.15);text-align:center">
      <p style="font-size:.85rem;color:var(--text2);margin-bottom:.5rem">Zin om vandaag wat dingen te vragen aan Lisanne?</p>
      <p style="font-size:.8rem;color:var(--text3);margin-bottom:.6rem">Niet zelf pakken — haar om toestemming vragen.</p>
      <div style="display:flex;gap:.5rem;justify-content:center">
        <button class="btn btn-primary" style="font-size:.85rem" onclick="startVraagmodus()">Ja, doe maar</button>
        <button class="btn btn-ghost" style="font-size:.85rem" onclick="LS.set('t_vraagmodus_skip',today());renderApp()">Niet vandaag</button>
      </div>
    </div>`;
  }

  // ── TIM'S EIGEN INITIATIEF ──
  if(faseActief(2)){
    const eigenInit = getEigenInitiatieven();
    if(eigenInit.length > 0){
      html += `<div style="margin-bottom:.3rem">`;
      eigenInit.forEach(ei => {
        html += `<div style="display:flex;align-items:center;gap:.4rem;padding:.3rem .8rem">
          <span style="font-size:.8rem;color:var(--purple)">★</span>
          <span style="font-size:.85rem;color:var(--text2)">${ei.tekst}</span>
        </div>`;
      });
      html += `</div>`;
    }
    html += `<div style="text-align:center;margin:.3rem 0 .6rem">
      <button id="eigenInitiatiefToggle" onclick="toggleEigenInitiatief()" style="all:unset;font-size:.8rem;color:var(--purple);cursor:pointer;padding:.3rem 0;min-height:44px">Iets doorgeven aan Lisanne</button>
      <div id="eigenInitiatiefInput" style="display:none;margin-top:.4rem;max-width:300px;margin-left:auto;margin-right:auto">
        <input id="eigenInitiatiefTekst" type="text" placeholder="Bijv. Milou ophalen" maxlength="60"
          style="width:100%;padding:.5rem;border-radius:var(--radius-sm);border:1px solid var(--card-border);background:var(--surface);color:var(--text);font-family:inherit;font-size:.85rem;margin-bottom:.3rem">
        <button class="btn btn-primary" style="width:100%;font-size:.85rem;padding:.4rem" onclick="submitEigenInitiatief()">Doorgeven</button>
      </div>
    </div>`;
  }

  // ── SPONTAAN SERVICE ──
  const spontaan = getSpontaneServices(today());
  html += `<div style="text-align:center;margin:.3rem 0 .6rem">`;
  if(spontaan.length > 0){
    html += `<p style="font-size:.75rem;color:var(--text3);margin-bottom:.3rem">${spontaan.map(s=>'+ '+s.tekst).join(' · ')}</p>`;
  }
  html += `<button id="spontaanToggle" onclick="toggleSpontaanInput()" style="all:unset;font-size:.8rem;color:var(--text3);cursor:pointer">+ Iets extra's gedaan</button>
    <div id="spontaanInput" style="display:none;margin-top:.4rem;max-width:300px;margin-left:auto;margin-right:auto">
      <input id="spontaanTekst" type="text" placeholder="Wat heb je gedaan?" maxlength="60"
        style="width:100%;padding:.5rem;border-radius:var(--radius-sm);border:1px solid var(--card-border);background:var(--surface);color:var(--text);font-family:inherit;font-size:.85rem;margin-bottom:.3rem">
      <button class="btn btn-primary" style="width:100%;font-size:.85rem;padding:.4rem" onclick="submitSpontaan()">Toevoegen</button>
    </div>
  </div>`;

  // ── MORGEN-HERINNERING VOOR TIM ──
  const timMorgenAfspraken = getAfspraken().filter(a => a.type === 'datum' && a.datum === tomorrow());
  if(timMorgenAfspraken.length > 0){
    html += `<div class="card" style="border-color:rgba(168,138,155,.25);border-style:dashed;background:rgba(168,138,155,.03)">
      <p style="font-size:.75rem;color:var(--purple);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.3rem">📌 Morgen</p>
      <p style="font-size:.9rem;color:var(--text2)">Lisanne heeft morgen iets met je voor.</p>
    </div>`;
  }

  // ── DATUM-HERINNERING VOOR TIM ──
  const TIM_HERINNERING_ZINNEN = [
    'Lisanne heeft vanavond plannen met je.',
    'Vanavond ben je van haar. Zij bepaalt.',
    'Lisanne heeft deze avond geclaimd.',
    'Hou vanavond vrij. Lisanne wil iets.',
    'Lisanne heeft vanavond wat met je voor.',
    'Lisanne heeft vanavond iets voor je. Wacht af.',
    'Je hebt vanavond geen plannen. Lisanne wel.',
    'Lisanne heeft vanavond de leiding. Meer info volgt niet.'
  ];
  const timDatumAfspraken = getAfspraken().filter(a => a.type === 'datum' && a.datum === today());
  if(timDatumAfspraken.length > 0){
    timDatumAfspraken.forEach(a => {
      const timVoorbHtml = (a.voorbereidingen && a.voorbereidingen.length > 0 && a.voorbereidingenZichtbaar)
        ? `<div style="margin-top:.5rem">${a.voorbereidingen.map(v => `<p style="font-size:.85rem;color:var(--text1);padding:.3rem .7rem;background:rgba(168,138,155,.08);border-radius:var(--radius-sm);margin-bottom:.2rem">• ${v}</p>`).join('')}</div>`
        : '';
      const timItemsNamen = (a.items && a.items.length > 0 && a.voorbereidingenZichtbaar) ? a.items.map(k => SPULLEN_DB[k] ? SPULLEN_DB[k].naam : k) : [];
      const timItemsHtml = timItemsNamen.length > 0 ? `<p style="font-size:.85rem;color:var(--text1);margin-top:.5rem">🔗 Leg klaar: ${timItemsNamen.join(', ').toLowerCase()}</p>` : '';
      html += `<div class="card" style="border-color:rgba(168,138,155,.4);background:linear-gradient(135deg,rgba(168,138,155,.1),rgba(168,138,155,.03))">
        <p style="font-size:.75rem;color:var(--purple);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.3rem">📌 Vanavond</p>
        <p style="font-size:.95rem;color:var(--text1);font-style:italic">${pickStabiel(TIM_HERINNERING_ZINNEN, today()+a.id)}</p>
        ${timVoorbHtml}
        ${timItemsHtml}
      </div>`;
    });
  }

  // Afspraken van Lisanne
  const timAfspraken = opschonenAfspraken();
  if(timAfspraken.length > 0){
    html += `<div class="card" style="border-color:rgba(168,138,155,.2)">`;
    html += `<p style="font-size:.75rem;color:var(--purple);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.5px">Van Lisanne</p>`;
    timAfspraken.forEach(a => {
      const datumLabel = a.type === 'datum' ? ` <span style="color:var(--purple);font-size:.8rem">(${a.datum})</span>` : '';
      const kanGezien = a.type === 'week' || a.type === 'datum';
      const gezienHtml = kanGezien
        ? (a.gezien
          ? `<span style="font-size:.8rem;color:var(--purple);margin-left:.5rem">Gezien ✓</span>`
          : `<button onclick="markeerGezien('${a.id}')" style="all:unset;font-size:.8rem;color:var(--purple);cursor:pointer;margin-left:.5rem;padding:.2rem .5rem;border:1px solid rgba(168,138,155,.3);border-radius:var(--radius-sm)">Gezien.</button>`)
        : '';
      html += `<div class="afspraak-tim" style="display:flex;align-items:center;justify-content:space-between">
        <span>📌 ${a.tekst}${datumLabel}</span>${gezienHtml}
      </div>`;
    });
    html += `</div>`;
  }

  // ── P1: "We hebben het moeilijk" knop ──
  if(!isRuzieModus()){
    html += `<div style="text-align:center;margin:1rem 0">
      <button onclick="if(confirm('Dit zet de app 2 weken op alleen zachte suggesties. Weet je het zeker?')){activeerRuzieModus('tim');renderApp()}" style="all:unset;font-size:.82rem;color:var(--text3);cursor:pointer;padding:.5rem 0">We hebben het moeilijk</button>
    </div>`;
  }

  // Jullie basis
  html += `<div style="margin:1rem 0;padding:.8rem 1rem;background:rgba(196,138,138,.03);border-radius:var(--radius);border:1px solid rgba(196,138,138,.06)">
    <p style="font-size:.7rem;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.5rem">Jullie basis</p>
    <p style="font-size:.85rem;color:var(--text2);line-height:1.6;margin-bottom:.2rem">Als iets niet goed voelt, zeg je dat.</p>
    <p style="font-size:.85rem;color:var(--text2);line-height:1.6;margin-bottom:.2rem">Lisanne kiest, jij mag altijd stop zeggen.</p>
    <p style="font-size:.85rem;color:var(--text2);line-height:1.6">Niks moet. Alles mag stoppen.</p>
  </div>`;

  // Hoe werkt dit?
  html += `<div style="text-align:center;margin-top:2rem">
    <a onclick="toonOnboardingOpnieuw()" style="font-size:.8rem;color:var(--text3);cursor:pointer;text-decoration:underline">Hoe werkt dit?</a>
  </div>`;

  return html;
}

function renderVandaag(state){
  let html = '';
  const uurNu = new Date(debugNow()).getHours();
  const isAvond = uurNu >= 17;
  const vrijeDagActief = isRustigeDag();

  // ── VANDAAG EVEN NIET (compact, rechtsboven) ──
  html += `<div style="text-align:right;margin-bottom:.4rem">
    <button onclick="toonPauzeKeuze()" style="all:unset;font-size:.8rem;color:var(--text3);cursor:pointer;padding:.4rem .8rem;border:1px solid var(--card-border);border-radius:20px;min-height:36px;transition:all .2s">Vandaag even niet</button>
  </div>
  <div id="pauzeKeuzePanel" style="display:none;margin-bottom:.8rem;padding:.8rem 1rem;background:var(--surface);border:1px solid var(--card-border);border-radius:var(--radius);text-align:center">
    <p style="font-size:.9rem;color:var(--text1);margin-bottom:.6rem">Helemaal prima.</p>
    <button class="btn btn-primary" style="width:100%;margin-bottom:.5rem;font-size:.85rem" onclick="activeerPauze('lisanne',0)">Alleen vandaag</button>
    <p style="font-size:.8rem;color:var(--text3);margin-bottom:.5rem">Of langer pauzeren?</p>
    <div style="display:flex;gap:.4rem;margin-bottom:.4rem">
      <button class="btn btn-ghost" style="flex:1;font-size:.8rem" onclick="activeerPauze('lisanne',1)">Tot morgen</button>
      <button class="btn btn-ghost" style="flex:1;font-size:.8rem" onclick="activeerPauze('lisanne',7)">Een week</button>
    </div>
    <div style="display:flex;align-items:center;gap:.4rem;justify-content:center">
      <label style="font-size:.8rem;color:var(--text3)">Of tot:</label>
      <input type="date" id="pauzeDatumKiezer" style="font-size:.8rem;padding:.3rem .5rem;border-radius:var(--radius-sm);border:1px solid var(--card-border);background:var(--surface);color:var(--text1);font-family:inherit" onchange="activeerPauzeTotDatum('lisanne')">
    </div>
  </div>`;

  // ── EVALUATIE (blokkeert alles) ──
  if(needsEvaluatie()){
    html += `<div class="card" style="border-color:rgba(196,138,138,.25)">
      <div class="card-title">Hoe voelde de afgelopen weken?</div>
      <div style="display:flex;flex-direction:column;gap:.6rem;margin-top:.8rem">
        <button class="experience-btn" onclick="logEvaluatie('goed')"><span class="experience-btn-emoji">🟢</span><span>Zo is het goed</span></button>
        <button class="experience-btn" onclick="logEvaluatie('meer')"><span class="experience-btn-emoji">🟡</span><span>Mag iets meer</span></button>
        <button class="experience-btn" onclick="logEvaluatie('veel')"><span class="experience-btn-emoji">🟠</span><span>Was best veel</span></button>
        <button class="experience-btn" onclick="logEvaluatie('pauze')"><span class="experience-btn-emoji">🔴</span><span>Even pauze</span></button>
      </div>
    </div>`;
    return html;
  }

  // ════════════════════════════════════════════
  //  LAAG 1: SPOTLIGHT — één kaart, het belangrijkste
  // ════════════════════════════════════════════

  // Lopende opdracht (compact bovenaan, blokkeert spotlight NIET)
  if(state.lopend && !isLopendExpired(state)){
    html += `<div style="background:var(--surface);border:1px solid var(--card-border);border-radius:var(--radius-sm);padding:.6rem .9rem;margin-bottom:.6rem;font-size:.85rem;color:var(--text2)">
      Loopt nog: ${state.lopend.tekst}
    </div>`;
  } else if(state.lopend){
    state.lopend = null; saveSuggestieState(state);
  }

  // ── SPOTLIGHT CONTEXT-LABEL helper ──
  function spotlightLabel(tekst){
    return `<p style="font-size:.7rem;color:var(--accent);text-transform:uppercase;letter-spacing:.6px;margin-bottom:.4rem">${tekst}</p>`;
  }

  // Ervaringscheck heeft voorrang (als Lisanne nog moet beoordelen)
  const lState = getSuggestieState();
  if(lState.wachtOpErvaring){
    const laatsteJaEntry = lState.historie.slice().reverse().find(h => h.status === 'ja');
    const laatsteId = laatsteJaEntry ? laatsteJaEntry.id : null;
    const isAlFav = laatsteId && (lState.lisanneFavorieten||[]).includes(laatsteId);
    const laatsteSug = laatsteId && SUGGESTIE_POOL.find(s => s.id === laatsteId);
    const aftercareTeksten = [
      'Daarna gewoon even naast elkaar zitten.',
      'Daarna mag hij even dicht bij je komen.',
      'Laat het moment daarna gewoon rustig landen.',
      'Even samen op de bank daarna. Niks moet.'
    ];
    html += spotlightLabel('Even checken');
    html += `<div class="experience-card">`;
    if(laatsteSug && laatsteSug.zwaarte >= 2){
      html += `<p style="text-align:center;font-size:.9rem;color:var(--text2);margin-bottom:.8rem;line-height:1.5">${aftercareTeksten[Math.floor(Math.random()*aftercareTeksten.length)]}</p>`;
    }
    html += `<div class="card-title">Hoe vond je dit?</div>
      <div class="experience-grid">
        <button class="experience-btn" onclick="logErvaringMetUndo('fijn')"><span class="experience-btn-emoji">😊</span><span>Leuk</span></button>
        <button class="experience-btn" onclick="logErvaringMetUndo('neutraal')"><span class="experience-btn-emoji">😐</span><span>Oké</span></button>
        <button class="experience-btn" onclick="logErvaringMetUndo('teveel')"><span class="experience-btn-emoji">😔</span><span>Te veel</span></button>
      </div>
      <div style="text-align:center;margin-top:.5rem">
        <button onclick="toonIetsMisProtocol()" style="background:none;border:none;font-size:.75rem;color:var(--text3);cursor:pointer;text-decoration:underline;opacity:.7">Er ging iets mis</button>
      </div>`;
    if(laatsteId){
      html += `<div style="text-align:center;margin-top:.8rem">
        <button onclick="toggleLisanneFavoriet('${laatsteId}')" style="background:none;border:none;font-size:1.5rem;cursor:pointer;opacity:${isAlFav ? '1' : '.4'};transition:opacity .2s" title="Bewaar als favoriet">${isAlFav ? '❤️' : '🤍'}</button>
        <div style="font-size:.7rem;color:var(--text3);margin-top:.2rem">Vaker dit soort ideeën</div>
      </div>`;
    }
    html += `<div class="experience-skip"><a onclick="skipExperienceCheck()">overslaan</a></div></div>`;

  // SPOTLIGHT: Suggestie (alleen 's avonds volledig, overdag licht)
  } else if(state.huidig && isAvond){
    const s = state.huidig;
    html += spotlightLabel('Voor vanavond');
    html += `<div class="suggestie-card">`;
    // ── P1: BDSM-framing per fase (alleen bij Spoor C) ──
    const sugSpoor = getSpoor(s);
    if(sugSpoor === 'C'){
      const framing = getBDSMFraming();
      html += `<p style="font-size:.8rem;color:var(--text3);margin-bottom:.5rem;font-style:italic">${framing.prefix}</p>`;
    }
    // ── ALTIJD ZICHTBAAR: tekst + spreektekst + knoppen ──
    html += `<div class="suggestie-tekst">${s.tekst}</div>`;

    const now = debugNow();
    const hour = now.getHours();
    const dayOfWeek = now.getDay();
    const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
    const isDaytime = isWeekend ? true : (hour >= 7 && hour < 19.5);
    let zegText = null;
    if(isDaytime && s.zegSubtiel){ zegText = s.zegSubtiel; }
    else if(!isDaytime && s.zegPrive){ zegText = s.zegPrive; }
    if(zegText){
      html += `<div class="zeg-voorbeeld"><span class="zeg-label">💬</span><span class="zeg-tekst">"${zegText}"</span></div>`;
    }

    // ── P0: INFO ACTIEF — essentiële info direct zichtbaar ──
    // Waarom + handleiding direct tonen, stappen achter toggle
    if(s.disclaimer){
      html += `<p style="font-size:.8rem;color:var(--text3);font-style:italic;margin-bottom:.6rem;line-height:1.4">${s.disclaimer}</p>`;
    }
    if(s.waarom){
      html += `<div class="suggestie-info-actief">${s.waarom}</div>`;
    }
    if(s.handleidingKeys && s.handleidingKeys.length > 0){
      // Direct tonen: korte samenvatting per item
      html += `<div class="suggestie-info-actief">`;
      s.handleidingKeys.forEach(key => {
        const item = SPULLEN_DB[key];
        if(item){
          html += `<strong>${item.naam}</strong>: ${item.handleiding.substring(0, 120)}${item.handleiding.length > 120 ? '…' : ''}<br>`;
          if(item.veiligheid) html += `<span style="color:var(--danger)">⚠️ ${item.veiligheid}</span><br>`;
        }
      });
      html += `</div>`;
    }
    if(s.duur){
      html += `<p style="font-size:.85rem;color:var(--text3);margin-bottom:.5rem">⏱ Ongeveer ${s.duur}</p>`;
    }
    // Stappen achter toggle (als ze er zijn)
    if(s.stappen && s.stappen.length > 0){
      html += `<button onclick="toggleSuggestieExtra()" style="all:unset;font-size:.8rem;color:var(--text3);cursor:pointer;display:block;margin-bottom:.8rem;padding:.2rem 0">Stap-voor-stap ▼</button>`;
      html += `<div id="suggestieExtra" style="display:none">`;
      html += `<div class="stap-lijst" style="margin-bottom:1rem">`;
      s.stappen.forEach(stap => { html += `<div class="stap-item"><div class="stap-tekst">${stap}</div></div>`; });
      html += `</div></div>`;
    }

    // ── KNOPPEN: Primair ──
    html += `<div class="suggestie-actions">
      <button class="btn btn-primary" onclick="verwerkKeuze('ja')">✓ Dit doe ik</button>
      <button class="btn btn-secondary" onclick="verwerkKeuze('ander')">↻ Ander idee</button>
    </div>`;
    // ── KNOPPEN: Afwijzing (drie lagen) ──
    html += `<div style="margin-top:.6rem">
      <button onclick="toonAfwijzingOpties(this)" style="all:unset;font-size:.82rem;color:var(--text3);cursor:pointer;display:block;text-align:center;width:100%;padding:.5rem 0">Liever niet →</button>
      <div class="afwijzing-opties" style="display:none">
        <button class="afwijzing-btn" onclick="verwerkNietNu()">
          <span class="afwijzing-label">Niet nu</span>
          <span class="afwijzing-sub">Komt later een keer terug</span>
        </button>
        <button class="afwijzing-btn" onclick="verwerkNiksVoorMij()">
          <span class="afwijzing-label">Niks voor mij</span>
          <span class="afwijzing-sub">Dit past niet bij me</span>
        </button>
        <button class="afwijzing-btn" onclick="bewaarVoorMorgen()">
          <span class="afwijzing-label">Bewaar voor morgen</span>
          <span class="afwijzing-sub">Vandaag niet, morgen misschien</span>
        </button>
        <button class="afwijzing-btn" onclick="verwerkKeuze('lichter')">
          <span class="afwijzing-label">Wel een kleiner idee</span>
          <span class="afwijzing-sub">Iets anders, minder groot</span>
        </button>
      </div>
    </div>`;
    // (veiligheidsnoot verwijderd — Tim: te uitnodigend tot stoppen)
    html += `</div>`;

  // SPOTLIGHT overdag: teaser + eventueel herinnering
  } else if(state.huidig && !isAvond){
    const herinnering = getHerinnering();
    if(herinnering){
      markeerHerinneringGezien();
      html += spotlightLabel('Terugblik');
      html += `<div style="background:rgba(196,138,138,.04);border:1px solid rgba(196,138,138,.12);border-radius:var(--radius);padding:1.2rem;text-align:center;margin-bottom:.8rem">
        <p style="font-size:.75rem;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.5rem">Weet je nog?</p>
        <p style="font-size:.85rem;color:var(--text2);line-height:1.5;font-style:italic">"${herinnering.substring(0,80)}${herinnering.length > 80 ? '…' : ''}"</p>
        <p style="font-size:.8rem;color:var(--text3);margin-top:.5rem">Dat was fijn.</p>
      </div>`;
    } else {
      html += spotlightLabel('Later vandaag');
      html += `<div style="background:rgba(196,138,138,.04);border:1px solid rgba(196,138,138,.12);border-radius:var(--radius);padding:1.2rem;text-align:center;margin-bottom:.8rem">
        <p style="font-size:.85rem;color:var(--text2);line-height:1.5">Vanavond verschijnt hier een idee.</p>
        <p style="font-size:.8rem;color:var(--text3);margin-top:.3rem">Tot dan hoef je niks te doen.</p>
      </div>`;
    }

  // SPOTLIGHT: Autopilot (vertrouwensniveau 1)
  } else if(getLisanneToon() === 1 && !isAutopilotUsedToday() && !isRustigeDag() && isAutopilotDag()){
    const actie = getAutopilotActie();
    html += spotlightLabel('Snel idee');
    html += `<div class="card" style="border-color:rgba(196,138,138,.2);background:linear-gradient(135deg,rgba(196,138,138,.08),rgba(196,138,138,.02))">
      <p style="font-size:.9rem;color:var(--text);line-height:1.5;margin-bottom:.6rem;font-style:italic">"${actie}"</p>
      <button class="btn btn-primary" style="width:100%;font-size:.85rem" onclick="sendAutopilotActie()">Stuur dit naar Tim →</button>
      <button onclick="LS.set('autopilot_used_'+today(),true);renderApp()" style="all:unset;font-size:.8rem;color:var(--text3);cursor:pointer;display:block;text-align:center;margin-top:.4rem;padding:.3rem 0;min-height:44px">Liever niet</button>
    </div>`;

  // SPOTLIGHT: Onboarding
  } else if(isOnboarding()){
    html += `<div class="empty-state">
      <p>Welkom! De eerste week is om te wennen.<br>Kijk gerust rond in de handleiding.<br>Over een paar dagen krijg je je eerste idee.</p>
    </div>`;

  // SPOTLIGHT: Stilte week
  } else if(state.stilteWeek){
    html += spotlightLabel('Rustige week');
    html += `<div class="empty-state" style="padding:3rem 1rem">
      <p style="font-size:1.1rem;margin-bottom:.5rem">Rustige week</p>
      <p style="color:var(--text3)">Geen suggesties deze week. Geniet van elkaar.</p>
    </div>`;

  // SPOTLIGHT: Vrije dag
  } else if(vrijeDagActief){
    html += spotlightLabel('Vrije dag');
    const VRIJE_DAG_TEKSTEN = [
      'Vandaag is rustig. Dat is ook goed.',
      'Vrije dag. Niks moet.',
      'Vandaag gewoon samen zijn.',
      'Lekker rustig vandaag.'
    ];
    html += `<div style="padding:2rem 1rem;text-align:center">
      <p style="font-size:1rem;color:var(--text2);line-height:1.6">${pickStabiel(VRIJE_DAG_TEKSTEN, today()+'vrijspot')}</p>
    </div>`;

  // SPOTLIGHT: Rustdag — bevestiging + waardering + terugblik + Tim's dag + link Plannen
  } else {
    const laatsteDatum = LS.get('l_lastSuggestieDatum', null);
    const dagenWeg = laatsteDatum ? daysSince(laatsteDatum) : 0;
    const terugkomTeksten = ['Leuk dat je er weer bent.','Welkom terug. Geen haast.','Fijn dat je even kijkt.','Hé, welkom terug.'];
    const terugkom = dagenWeg >= 14;

    // Data voor persoonlijke rustboodschap
    const rustState = getSuggestieState();
    const rustWeekCount = getSuggestiesDezeWeek(rustState);
    const rustDagSc = getDagritmeScore();

    // ── P0: Waardering na actie (als er iets was) ──
    const waardering = getWaardering();
    if(waardering){
      html += `<div class="waardering-card">
        <div class="waardering-emoji">${waardering.emoji}</div>
        <p>${waardering.tekst}</p>
        <button class="waardering-dismiss" onclick="dismissWaardering()">Begrepen</button>
      </div>`;
    }

    // ── LAAG 1: Warme bevestiging met context ──
    html += spotlightLabel('Rustige dag');
    html += `<div style="padding:1.5rem 1rem;text-align:center">`;
    if(terugkom){
      html += `<p style="font-size:1.05rem;color:var(--text1);margin-bottom:.3rem">${pickStabiel(terugkomTeksten, today()+'terugkom')}</p>`;
    } else {
      const RUST_TEKSTEN_MET_DATA = [
        rustWeekCount > 0
          ? `Je hebt deze week al ${rustWeekCount} ${rustWeekCount===1?'keer iets':'keer iets'} gedaan. Even niks is ook goed.`
          : 'Niet elke dag hoeft iets. Dat hoort erbij.',
        'Vandaag geen idee. Soms is dat precies goed.',
        'Rustige dag. Het hoeft niet elke dag.',
        'Geen suggestie vandaag. Geniet van de avond.'
      ];
      html += `<p style="font-size:1rem;color:var(--text2);line-height:1.6">${pickStabiel(RUST_TEKSTEN_MET_DATA, today()+'rustdag')}</p>`;
    }
    html += `</div>`;

    // ── P0: Positieve terugblik (alleen als er fijne momenten zijn) ──
    const terugblik = getPositieveTerugblik();
    if(terugblik && terugblik.length > 0){
      html += `<div class="terugblik-card">
        <div class="terugblik-titel">Weet je nog?</div>`;
      terugblik.forEach(t => {
        html += `<div class="terugblik-item">"${t.tekst}"</div>`;
      });
      html += `<p style="font-size:.8rem;color:var(--text3);margin-top:.4rem">Dat was fijn.</p>
      </div>`;
    }

    // ── LAAG 2: Tim's dag — wat hij doet/deed ──
    if(rustDagSc.total > 0){
      html += `<div style="text-align:center;padding:.6rem .8rem;background:rgba(168,138,155,.04);border-radius:var(--radius);border:1px solid rgba(168,138,155,.08);margin-bottom:.6rem">`;
      if(rustDagSc.gedaan > 0){
        html += `<p style="font-size:.85rem;color:var(--purple)">Tim heeft vandaag ${rustDagSc.gedaan} ${rustDagSc.gedaan===1?'ding':'dingen'} voor je gedaan.</p>`;
      } else {
        html += `<p style="font-size:.85rem;color:var(--text3)">Tim is vandaag bezig met zijn taken.</p>`;
      }
      html += `</div>`;
    }

    // ── LAAG 3: Subtiele link naar Plannen ──
    html += `<div style="text-align:center;padding:.3rem 0">
      <a onclick="setTab('regelen')" style="font-size:.85rem;color:var(--purple);cursor:pointer;text-decoration:none;padding:.5rem 0;display:inline-block">Zelf iets kiezen → Plannen</a>
    </div>`;
  }

  // ════════════════════════════════════════════
  //  LAAG 2: SIGNALEN — compacte banners, max 2-3
  // ════════════════════════════════════════════
  let signalenHtml = '';

  // Signaal: Berichtje van Tim
  if(faseActief(4)){
    const berichtjesVoorLisanne = getOngelezenBerichtjes('lisanne');
    if(berichtjesVoorLisanne.length > 0){
      const bt = berichtjesVoorLisanne[berichtjesVoorLisanne.length - 1];
      signalenHtml += `<div onclick="toggleSignaal('berichtTim')" style="background:var(--surface);border:1px solid rgba(196,138,138,.15);border-radius:var(--radius-sm);padding:.5rem .8rem;margin-bottom:.4rem;cursor:pointer">
        <p style="font-size:.85rem;color:var(--accent)">💌 Nieuw berichtje van Tim</p>
        <div id="signaal_berichtTim" style="display:none;margin-top:.5rem;border-top:1px solid var(--card-border);padding-top:.5rem">
          <p style="font-size:.9rem;color:var(--text1);font-style:italic;line-height:1.5">"${bt.tekst}"</p>
          <button onclick="event.stopPropagation();markeerBerichtjesGelezen('lisanne');renderApp()" style="all:unset;font-size:.8rem;color:var(--text3);cursor:pointer;margin-top:.4rem;display:block;padding:.3rem 0;min-height:44px">Gelezen</button>
        </div>
      </div>`;
    }
  }

  // Signaal: Reflectie van Tim
  const timReflecties = getReflecties().filter(r => r.wie === 'tim' && r.type === 'moment' && r.tekst && daysSince(r.datum) < 3);
  const gezienKey = 'reflectie_gezien_lisanne';
  const laatstGezienRefl = LS.get(gezienKey, 0);
  const ongelezenRefl = timReflecties.filter(r => r.ts > laatstGezienRefl);
  if(ongelezenRefl.length > 0){
    const tr = ongelezenRefl[ongelezenRefl.length - 1];
    signalenHtml += `<div onclick="toggleSignaal('reflectieTim')" style="background:var(--surface);border:1px solid rgba(214,179,106,.15);border-radius:var(--radius-sm);padding:.5rem .8rem;margin-bottom:.4rem;cursor:pointer">
      <p style="font-size:.85rem;color:var(--warm)">📝 Nieuwe reflectie van Tim</p>
      <div id="signaal_reflectieTim" style="display:none;margin-top:.5rem;border-top:1px solid var(--card-border);padding-top:.5rem">
        <p style="font-size:.9rem;color:var(--text1);font-style:italic;line-height:1.5">"${tr.tekst}"</p>
        <button onclick="event.stopPropagation();LS.set('${gezienKey}',Date.now());renderApp()" style="all:unset;font-size:.8rem;color:var(--text3);cursor:pointer;margin-top:.4rem;display:block;padding:.3rem 0;min-height:44px">Gelezen</button>
      </div>
    </div>`;
  }

  // Signaal: Tim's eigen initiatief
  if(faseActief(2)){
    const timInitiatieven = LS.get('t_eigenInitiatief_'+today(), []);
    if(timInitiatieven.length > 0){
      const hartjeKey = 'initiatief_hartje_'+today();
      const heeftHartje = LS.get(hartjeKey, false);
      signalenHtml += `<div onclick="toggleSignaal('timInitiatief')" style="background:var(--surface);border:1px solid rgba(168,138,155,.15);border-radius:var(--radius-sm);padding:.5rem .8rem;margin-bottom:.4rem;cursor:pointer">
        <p style="font-size:.85rem;color:var(--purple)">❤️ Van Tim</p>
        <div id="signaal_timInitiatief" style="display:none;margin-top:.5rem;border-top:1px solid var(--card-border);padding-top:.5rem">
          ${timInitiatieven.map(ei => `<p style="font-size:.9rem;color:var(--text1);padding:.2rem 0">${ei.tekst}</p>`).join('')}
          <button onclick="event.stopPropagation();toggleHartje()" style="all:unset;font-size:1.2rem;cursor:pointer;opacity:${heeftHartje?1:.4};margin-top:.3rem;display:block">${heeftHartje?'❤️':'🤍'}</button>
        </div>
      </div>`;
    }
  }

  // Signaal: Vandaag afspraak
  const vandaagAfspraken = getAfspraken().filter(a => a.type === 'datum' && a.datum === today());
  if(vandaagAfspraken.length > 0){
    const eerstAfspraak = vandaagAfspraken[0];
    signalenHtml += `<div onclick="toggleSignaal('vandaagAfspraak')" style="background:rgba(168,138,155,.04);border:1px solid rgba(168,138,155,.2);border-radius:var(--radius-sm);padding:.5rem .8rem;margin-bottom:.4rem;cursor:pointer">
      <p style="font-size:.85rem;color:var(--purple)">📌 Vandaag: ${eerstAfspraak.tekst}</p>
      <div id="signaal_vandaagAfspraak" style="display:none;margin-top:.5rem;border-top:1px solid var(--card-border);padding-top:.5rem">
        ${vandaagAfspraken.map(a => {
          const catLabels = {relationeel:'Samen zijn',vastmaak:'Vastmaken',sessie:'Sessie'};
          const catHtml = a.categorie ? `<p style="font-size:.8rem;color:var(--purple);margin-top:.3rem">🎯 ${catLabels[a.categorie] || a.categorie}-avond</p>` : '';
          const voorbHtml = (a.voorbereidingen && a.voorbereidingen.length > 0)
            ? a.voorbereidingen.map(v => `<p style="font-size:.85rem;color:var(--text1);padding:.2rem .5rem;background:rgba(168,138,155,.08);border-radius:var(--radius-sm);margin-bottom:.2rem">📝 ${v}</p>`).join('')
            : '';
          const itemsNamen = (a.items && a.items.length > 0) ? a.items.map(k => SPULLEN_DB[k] ? SPULLEN_DB[k].naam : k) : [];
          const itemsHtml = itemsNamen.length > 0 ? `<p style="font-size:.85rem;color:var(--text1);margin-top:.3rem">🔗 Klaarleggen: ${itemsNamen.join(', ').toLowerCase()}</p>` : '';
          return `<p style="font-size:.9rem;color:var(--text1);margin-bottom:.3rem">${a.tekst}</p>${catHtml}${voorbHtml}${itemsHtml}`;
        }).join('')}
      </div>
    </div>`;
  }

  // Signaal: Morgen herinnering
  const morgenAfspraken = getAfspraken().filter(a => a.type === 'datum' && a.datum === tomorrow());
  if(morgenAfspraken.length > 0){
    signalenHtml += `<div style="background:rgba(168,138,155,.04);border:1px dashed rgba(168,138,155,.2);border-radius:var(--radius-sm);padding:.5rem .8rem;margin-bottom:.4rem">
      <p style="font-size:.85rem;color:var(--purple)">📌 Morgen is er iets gepland</p>
    </div>`;
  }

  if(signalenHtml){
    html += `<div style="margin-top:.6rem">${signalenHtml}</div>`;
  }

  // ════════════════════════════════════════════
  //  MOMENT — vast blok, vaste plek, MAX 1 ITEM (prioriteit)
  // ════════════════════════════════════════════
  let momentHtml = '';

  // Dagafsluiting (na 20:00) — prioriteit 2
  if(!momentHtml && uurNu >= 20 && !vrijeDagActief){
    const dagSc = getDagritmeScore();
    const AFSLUITING_TEKSTEN = dagSc.gedaan > 0
      ? [`Tim heeft vandaag ${dagSc.gedaan} ${dagSc.gedaan===1?'ding':'dingen'} voor je gedaan.`,
         `Vandaag was Tim er ${dagSc.gedaan}× voor jou.`,
         `Tim regelde vandaag ${dagSc.gedaan} ${dagSc.gedaan===1?'taak':'taken'}. De rest is voor jullie.`]
      : ['Vandaag was rustig. Dat is ook goed.',
         'Soms is er niets nodig. Geniet van de avond.',
         'Een rustige dag. De avond is van jullie.'];
    momentHtml += `<div style="text-align:center;padding:.8rem;background:rgba(196,138,138,.04);border-radius:var(--radius);border:1px solid rgba(196,138,138,.08)">
      <p style="font-size:.85rem;color:var(--text2);line-height:1.5">${pickStabiel(AFSLUITING_TEKSTEN, today()+'lisafsluiting')}</p>
    </div>`;
  }

  // Na-moment reflectie — prioriteit 1 (hoogste)
  if(!momentHtml && faseActief(4) && heeftMomentReflectieNodig('lisanne')){
    const LIS_STARTERS = pickStabiel([
      ['Ik vond het fijn dat je...','Het moment dat ik zag dat je...','Waar ik nog aan dacht daarna...'],
      ['Wat me opviel bij jou...','Wat me blij maakte...','Wat me ontroerde...']
    ], today()+'lisstarters');
    momentHtml += `<div class="card" style="border-color:rgba(214,179,106,.15)">
      <p style="font-size:.75rem;color:var(--warm);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.4rem">Terugblik</p>

  // Wekelijkse oefening — prioriteit 4
  if(!momentHtml && faseActief(4) && !isOefeningGedaan() && !isOefeningOvergeslagen()){
    const oefL = getWeekOefening();
    if(oefL){
      const catLabelL = oefL.cat === 'verbinding' ? 'Verbinding' : 'Dynamiek';
      const catKleurL = oefL.cat === 'verbinding' ? 'var(--accent)' : 'var(--purple)';
      momentHtml += `<div class="card" style="border-color:${oefL.cat==='verbinding' ? 'rgba(196,138,138,.2)' : 'rgba(168,138,155,.2)'}">

  }

  // Praise — prioriteit 5 (laagste)
  if(!momentHtml){
  const praiseTeksten = [
    'Je hebt de laatste tijd een paar leuke dingen geprobeerd. Tim merkt dat.',
    'Dit soort kleine momenten maken meer verschil dan je denkt.',
    'Dat je dit af en toe doet, maakt Tim blij.',

  ];
  const ervaringen = (state.ervaringLog||[]);

  const laatstePraise = LS.get('l_laatstePraise', null);
  const praiseGetoond = laatstePraise && daysSince(laatstePraise) < 14;
  if(fijnCount >= 3 && ervaringen.length >= 5 && !praiseGetoond){

      <p style="font-size:.9rem;color:var(--text2);line-height:1.5;margin:0">${pickStabiel(praiseTeksten, today()+'praise')}</p>
    </div>`;
    LS.set('l_laatstePraise', today());
  }
  } // einde !momentHtml praise check

  // ── P1: Bewustwordingsvraag (1 op 3, na 'ja') ──
  if(!momentHtml && moetBewustwordingVraag()){
    const vraag = getBewustwordingVraag();
    momentHtml += `<div class="card" style="border-color:rgba(214,179,106,.15)">
      <p style="font-size:.75rem;color:var(--warm);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.4rem">Even nadenken</p>
      <p style="font-size:.9rem;color:var(--text2);margin-bottom:.6rem">${vraag}</p>
      <div style="display:flex;gap:.4rem;flex-wrap:wrap">
        <button class="btn btn-ghost" style="flex:1;font-size:.82rem" onclick="beantwoordBewustwording('ja')">Ja</button>
        <button class="btn btn-ghost" style="flex:1;font-size:.82rem" onclick="beantwoordBewustwording('beetje')">Een beetje</button>
        <button class="btn btn-ghost" style="flex:1;font-size:.82rem" onclick="beantwoordBewustwording('nee')">Nee</button>
      </div>
    </div>`;
  }

  // ── P2: Lisanne's Micro-keuze ──
  if(!momentHtml && moetMicroKeuzeSuggestie()){
    const mk = startMicroKeuze();
    if(mk){
      momentHtml += `<div class="card" style="border-color:rgba(168,138,155,.25);background:rgba(168,138,155,.04)">
        <p style="font-size:.75rem;color:var(--purple);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.4rem">Kies even voor Tim</p>
        <p style="font-size:.9rem;color:var(--text2);margin-bottom:.7rem">${mk.vraag}</p>
        <div style="display:flex;gap:.5rem">
          <button class="btn btn-ghost" style="flex:1;font-size:.9rem;padding:.6rem" onclick="kiesMicroKeuze('A')">${mk.optieA}</button>
          <button class="btn btn-ghost" style="flex:1;font-size:.9rem;padding:.6rem" onclick="kiesMicroKeuze('B')">${mk.optieB}</button>
        </div>
        <p style="font-size:.72rem;color:var(--text3);text-align:center;margin-top:.4rem">Het maakt niet uit wat je kiest. Het gaat erom dat jij het zegt.</p>
      </div>`;
    }
  } else {
    const mkActief = toonMicroKeuze();
    if(mkActief && !mkActief.gekozen){
      momentHtml += `<div class="card" style="border-color:rgba(168,138,155,.25);background:rgba(168,138,155,.04)">
        <p style="font-size:.75rem;color:var(--purple);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.4rem">Kies even voor Tim</p>
        <p style="font-size:.9rem;color:var(--text2);margin-bottom:.7rem">${mkActief.vraag}</p>
        <div style="display:flex;gap:.5rem">
          <button class="btn btn-ghost" style="flex:1;font-size:.9rem;padding:.6rem" onclick="kiesMicroKeuze('A')">${mkActief.optieA}</button>
          <button class="btn btn-ghost" style="flex:1;font-size:.9rem;padding:.6rem" onclick="kiesMicroKeuze('B')">${mkActief.optieB}</button>
        </div>
        <p style="font-size:.72rem;color:var(--text3);text-align:center;margin-top:.4rem">Het maakt niet uit wat je kiest. Het gaat erom dat jij het zegt.</p>
      </div>`;
    }
  }

  // ── P2: Lisanne's Oefening van de week ──
  if(heeftActieveOefening()){
    const oefState = getOefeningState();
    const oef = OEFENING_POOL.find(o => o.id === oefState.actief.id);
    if(oef){
      momentHtml += `<div class="card" style="border-color:rgba(214,179,106,.25);background:rgba(214,179,106,.04)">
        <p style="font-size:.7rem;color:var(--warm);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.3rem">Oefening</p>
        <p style="font-size:.95rem;color:var(--text1);font-weight:500;margin-bottom:.3rem">${oef.titel}</p>
        <p style="font-size:.8rem;color:var(--text3);margin-bottom:.5rem">${oef.focus}</p>
        <p style="font-size:.9rem;color:var(--text2);line-height:1.5;margin-bottom:.7rem">${oef.instructie}</p>
        <p style="font-size:.8rem;color:var(--text2);margin-bottom:.4rem">${oef.terugblik}</p>
        <div style="display:flex;flex-direction:column;gap:.3rem">
          ${oef.terugblikOpties.map(opt => `<button class="btn btn-ghost" style="text-align:left;font-size:.85rem;padding:.5rem .7rem" onclick="beantwoordOefeningTerugblik('${opt.replace(/'/g,"\\'")}')">${opt}</button>`).join('')}
        </div>
      </div>`;
    }
  } else if(!momentHtml && moetOefeningSuggestie()){
    startOefening();
    const oefState = getOefeningState();
    const oef = OEFENING_POOL.find(o => o.id === oefState.actief.id);
    if(oef){
      momentHtml += `<div class="card" style="border-color:rgba(214,179,106,.25);background:rgba(214,179,106,.04)">
        <p style="font-size:.7rem;color:var(--warm);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.3rem">Oefening</p>
        <p style="font-size:.95rem;color:var(--text1);font-weight:500;margin-bottom:.3rem">${oef.titel}</p>
        <p style="font-size:.8rem;color:var(--text3);margin-bottom:.5rem">${oef.focus}</p>
        <p style="font-size:.9rem;color:var(--text2);line-height:1.5;margin-bottom:.7rem">${oef.instructie}</p>
        <p style="font-size:.8rem;color:var(--text2);margin-bottom:.4rem">${oef.terugblik}</p>
        <div style="display:flex;flex-direction:column;gap:.3rem">
          ${oef.terugblikOpties.map(opt => `<button class="btn btn-ghost" style="text-align:left;font-size:.85rem;padding:.5rem .7rem" onclick="beantwoordOefeningTerugblik('${opt.replace(/'/g,"\\'")}')">${opt}</button>`).join('')}
        </div>
      </div>`;
    }
  }

  // Render moment-blok als er inhoud is
  if(momentHtml){
    html += `<div style="margin-top:.8rem;display:flex;flex-direction:column;gap:.5rem">${momentHtml}</div>`;
  }

  // ── SNELLE ACTIES VERPLAATST NAAR PLANNEN ──
  // (Vandaag = flow/reageren, geen planner-functies)

  return html;
}

function renderRegelen(state){
  let html = '';

  // ════════════════════════════════════════════
  //  ACTIES — primaire knoppen bovenaan
  // ════════════════════════════════════════════
  html += `<div style="display:flex;gap:.5rem;margin-bottom:.8rem">
    <button class="btn btn-primary" style="flex:1;font-size:.9rem;padding:.8rem" onclick="toggleLisanneBericht()">💬 Iets zeggen</button>
    <button class="btn btn-secondary" style="flex:1;font-size:.9rem;padding:.8rem" onclick="openKiezenFlow()">🎯 Iets kiezen</button>
  </div>`;

  // ── BERICHTJE-COMPOSER (alleen in Plannen) ──
  const alGestuurdLisanne = getBerichtjes().find(b => b.van === 'lisanne' && b.datum === today());
  if(!alGestuurdLisanne){
    html += `<div id="lisanneBerichtInput" style="display:none;margin-bottom:.8rem;max-width:320px;margin-left:auto;margin-right:auto">
      <textarea id="lisanneBerichtTekst" placeholder="Typ een berichtje voor Tim..." maxlength="120"
        style="width:100%;min-height:44px;padding:.6rem;border-radius:var(--radius-sm);border:1px solid var(--card-border);background:var(--surface);color:var(--text);font-family:inherit;font-size:.85rem;resize:none;margin-bottom:.4rem"></textarea>
      <button class="btn btn-primary" style="width:100%;font-size:.85rem" onclick="submitLisanneBericht()">Verstuur</button>
    </div>`;
  } else {
    html += `<div id="lisanneBerichtInput" style="display:none;margin-bottom:.8rem;text-align:center">
      <p style="font-size:.85rem;color:var(--text3)">Je hebt vandaag al een berichtje gestuurd.</p>
    </div>`;
  }

  // ── KIEZEN-FLOW (verborgen, opent bij klik) ──
  html += `<div id="kiezenFlowPanel" style="display:none;margin-bottom:.8rem">
    <p style="font-size:.85rem;color:var(--text2);margin-bottom:.5rem;text-align:center">Wat voor soort idee?</p>
    <div style="display:flex;flex-direction:column;gap:.4rem">
      <button class="modal-option" onclick="startInitiatief('klein')" style="text-align:left;padding:.7rem .9rem">🌱 Iets kleins <span style="font-size:.8rem;color:var(--text3);margin-left:.3rem">micro-moment</span></button>
      <button class="modal-option" onclick="startInitiatief('groter')" style="text-align:left;padding:.7rem .9rem">🔗 Vastmaken <span style="font-size:.8rem;color:var(--text3);margin-left:.3rem">bondage-moment</span></button>
      <button class="modal-option" onclick="startInitiatief('avond')" style="text-align:left;padding:.7rem .9rem">✨ Sessie <span style="font-size:.8rem;color:var(--text3);margin-left:.3rem">een hele avond</span></button>
    </div>
  </div>`;

  // ════════════════════════════════════════════
  //  TIM'S DAG
  // ════════════════════════════════════════════
  const dagState = getDagritmeState();
  const vandaagStr = today();
  const dagBlocks = dagState.days[vandaagStr]?.blocks || {};
  const dagSc = getDagritmeScore();

  if(!isRustigeDag()){
    const dagBlokken = getDagritmeBlokkenVandaag().filter(b => b.kind === 'choice');
    const uurNuDag = debugNow().getHours();
    if(dagBlokken.length > 0){
      const huidigeGroepIdx = uurNuDag < 12 ? 0 : (uurNuDag < 17 ? 1 : 2);
      const groepLabels = DAGRITME_LISANNE_GROEPEN.map((g, i) => {
        const isActief = i === huidigeGroepIdx;
        return isActief
          ? `<span style="color:var(--purple);font-weight:600">${g.label}</span>`
          : `<span style="color:var(--text3)">${g.label}</span>`;
      });

      let feedbackTekst = '';
      if(dagSc.gedaan > 0){
        feedbackTekst = `<p style="font-size:.8rem;color:var(--success);margin-top:.3rem">Tim heeft vandaag ${dagSc.gedaan} ${dagSc.gedaan===1?'ding':'dingen'} gedaan</p>`;
      } else if(uurNuDag >= 12){
        feedbackTekst = `<p style="font-size:.8rem;color:var(--text3);margin-top:.3rem">Tim is nog niet begonnen</p>`;
      }

      const vandaagAfspraken = opschonenAfspraken().filter(a => a.type === 'datum' && a.datum === vandaagStr);
      let afspraakInCard = '';
      if(vandaagAfspraken.length > 0){
        afspraakInCard = vandaagAfspraken.map(a =>
          `<p style="font-size:.8rem;color:var(--purple);margin-top:.2rem">📌 ${a.tekst}</p>`
        ).join('');
      }

      const morgenDatum = getMorgen();
      const morgenBlocks = dagState.days[morgenDatum]?.blocks || {};
      const morgenOverrides = Object.values(morgenBlocks).filter(bs => bs.override).length;
      const morgenLabel = morgenOverrides > 0 ? `Morgen (${morgenOverrides}) →` : 'Morgen →';

      html += `<div class="card" style="border-color:rgba(168,138,155,.15)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem">
          <p style="font-size:.8rem;color:var(--purple);text-transform:uppercase;letter-spacing:.5px">Tim's dag</p>
        </div>
        <p style="font-size:.9rem;letter-spacing:.3px">${groepLabels.join(' · ')}</p>
        ${feedbackTekst}
        ${afspraakInCard}
        <div style="display:flex;gap:.8rem;margin-top:.5rem">
          <button onclick="openDagritmeOverrideModal()" style="all:unset;font-size:.85rem;color:var(--purple);cursor:pointer;padding:.4rem 0;min-height:44px">Aanpassen →</button>
          <button onclick="openDagritmeOverrideModal('morgen')" style="all:unset;font-size:.85rem;color:var(--text3);cursor:pointer;padding:.4rem 0;min-height:44px">${morgenLabel}</button>
        </div>
      </div>`;
    }
  }

  // ════════════════════════════════════════════
  //  AFSPRAKEN + snelle opties
  // ════════════════════════════════════════════
  const alleAfspraken = opschonenAfspraken();
  const toekomstigeAfspraken = alleAfspraken.filter(a => !(a.type === 'datum' && a.datum === vandaagStr));

  html += `<div style="margin:.5rem 0">`;
  html += `<p style="font-size:.75rem;color:var(--purple);margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.5px">Afspraken</p>`;

  if(toekomstigeAfspraken.length > 0){
    toekomstigeAfspraken.forEach(a => {
      const typeLabel = a.type === 'week' ? 'deze week' : a.type === 'datum' ? a.datum : '';
      const gezienLabel = a.gezien ? `<span style="font-size:.75rem;color:var(--purple);margin-left:.4rem">✓ gezien</span>` : '';
      html += `<div class="afspraak-balk">
        <span class="afspraak-tekst">${a.tekst}${gezienLabel}</span>
        ${typeLabel ? `<span class="afspraak-type">${typeLabel}</span>` : ''}
        <button class="afspraak-verwijder" onclick="verwijderAfspraak('${a.id}')" title="Verwijder">✕</button>
      </div>`;
    });
  } else {
    html += `<p style="font-size:.85rem;color:var(--text3);padding:.3rem 0">Geen afspraken</p>`;
  }

  // Snelle afspraak-opties
  html += `<div style="display:flex;gap:.3rem;margin-top:.4rem;flex-wrap:wrap">
    <button onclick="openAfspraakModalMetType('vanavond')" style="all:unset;font-size:.8rem;color:var(--purple);cursor:pointer;padding:.4rem .6rem;border:1px solid rgba(168,138,155,.2);border-radius:var(--radius-sm);min-height:36px">Vanavond</button>
    <button onclick="openAfspraakModalMetType('morgen')" style="all:unset;font-size:.8rem;color:var(--purple);cursor:pointer;padding:.4rem .6rem;border:1px solid rgba(168,138,155,.2);border-radius:var(--radius-sm);min-height:36px">Morgen</button>
    <button onclick="openAfspraakModalMetType('week')" style="all:unset;font-size:.8rem;color:var(--purple);cursor:pointer;padding:.4rem .6rem;border:1px solid rgba(168,138,155,.2);border-radius:var(--radius-sm);min-height:36px">Deze week</button>
    <button onclick="openAfspraakModalMetType('datum')" style="all:unset;font-size:.8rem;color:var(--purple);cursor:pointer;padding:.4rem .6rem;border:1px solid rgba(168,138,155,.2);border-radius:var(--radius-sm);min-height:36px">+ Datum</button>
  </div>`;
  html += `</div>`;

  // ════════════════════════════════════════════
  //  TERUGKIJKEN
  // ════════════════════════════════════════════
  const weekOvz = getWeekOverzicht();
  const maandBal = getMaandBalans();
  const heeftTerugkijk = weekOvz.totaalGedaan > 2 || maandBal.totaal > 20;
  if(heeftTerugkijk){
    html += `<div style="padding:.6rem 0;margin-top:.3rem;border-top:1px solid var(--card-border)">
      <p style="font-size:.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.3rem">Terugkijken</p>`;
    if(weekOvz.totaalGedaan > 2){
      html += `<p style="font-size:.85rem;color:var(--text2);margin-bottom:.2rem">Deze week: Tim hielp ${weekOvz.totaalGedaan}× mee</p>`;
    }
    if(maandBal.totaal > 20){
      const pctZelf = Math.round((maandBal.zelfGekozen / maandBal.totaal) * 100);
      html += `<p style="font-size:.8rem;color:var(--text3)">Afgelopen 30 dagen: Tim koos ${pctZelf}% zelf</p>`;
    }
    html += `</div>`;
  }

  return html;
}

  html += `<div class="info-panel" style="margin-bottom:1rem">
    <p class="section-label">Jullie basis</p>
    <p style="font-size:.85rem;color:var(--text2);line-height:1.6;margin-bottom:.2rem">Als iets niet goed voelt, zeg je dat.</p>
    <p style="font-size:.85rem;color:var(--text2);line-height:1.6;margin-bottom:.2rem">Jij kiest, Tim mag altijd stop zeggen.</p>
    <p style="font-size:.85rem;color:var(--text2);line-height:1.6">Niks moet. Alles mag stoppen.</p>
  </div>`;

  // ── HANDLEIDING ──
  html += renderHandleiding();

  // ── HOE WERKT DIT ──
  html += `<div style="text-align:center;margin-top:1.5rem">
    <a onclick="toonOnboardingOpnieuw()" style="font-size:.8rem;color:var(--text3);cursor:pointer;text-decoration:underline">Onboarding opnieuw bekijken</a>
  </div>`;

  // ── INSTELLINGEN ──
  html += `<div style="text-align:center;margin-top:1rem">
    <a onclick="openSettings()" style="font-size:.8rem;color:var(--text3);cursor:pointer;text-decoration:underline">Instellingen</a>
  </div>`;

  return html;
}

function renderHandleiding(){
  let html = `<input class="search-bar" type="text" placeholder="Zoek item..." oninput="filterHandleiding(this.value)">`;

  const groepen = {};
  const groepNamen = {bondage:'Bondage',sensorisch:'Sensorisch',stimulatie:'Stimulatie','e-stim':'E-stim',overig:'Overig',aanraking:'Aanraking'};

  Object.values(SPULLEN_DB).forEach(item => {
    if(!groepen[item.groep]) groepen[item.groep] = [];
    groepen[item.groep].push(item);
  });

  const favorieten = LS.get('l_favorieten',[]);

  for(const [groep, items] of Object.entries(groepen)){
    html += `<div class="handleiding-groep" data-groep="${groep}">`;
    html += `<div class="groep-titel">${groepNamen[groep]||groep}</div>`;
    items.forEach(item => {
      const isFav = favorieten.includes(item.key);
      html += `<div class="item-card" data-naam="${item.naam.toLowerCase()}">
        <div class="item-header" onclick="toggleItem(this)">
          <span>${item.naam}</span>
          <span>
            <span class="item-fav" onclick="event.stopPropagation();toggleFav('${item.key}')">${isFav?'⭐':'☆'}</span>
            ▼
          </span>
        </div>
        <div class="item-body">
          <div class="item-body-inner">
            <p>${item.handleiding}</p>
            ${item.tip ? `<div class="item-tip">💡 ${item.tip}</div>` : ''}
            ${item.veiligheid ? `<div class="item-warning">⚠️ ${item.veiligheid}</div>` : ''}
            ${item.vastmaakTekst ? `<p style="margin-top:.5rem;font-style:italic;color:var(--text3)">Als vastmaakmoment: ${item.vastmaakTekst}</p>` : ''}
            ${item.combineerNietMet.length > 0 ? `<p style="font-size:.8rem;color:var(--text3);margin-top:.4rem">Niet combineren met: ${item.combineerNietMet.map(k=>SPULLEN_DB[k]?.naam||k).join(', ')}</p>` : ''}
          </div>
        </div>
      </div>`;
    });
    html += `</div>`;
  }
  return html;
}

function renderVoortgangsBalk(gedaan, total, streak){
  if(total === 0) return '';
  const pct = Math.round((gedaan / total) * 100);
  const kleur = pct === 100 ? 'var(--success)' : 'var(--accent)';
  let html = `<div style="max-width:200px;margin:0 auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.25rem">
      <span style="font-size:.75rem;color:var(--text3)">${gedaan} van ${total}</span>
      ${streak >= 2 ? `<span style="font-size:.75rem;color:var(--text3)">🔥 ${streak} dagen</span>` : ''}
    </div>
    <div style="height:6px;background:var(--surface);border-radius:3px;overflow:hidden">
      <div style="height:100%;width:${pct}%;background:${kleur};border-radius:3px;transition:width .3s"></div>
    </div>
  </div>`;
  return html;
}

function renderDagplanAccordion(blokken, blocks, uur, actiefDef){
  const unseenOverrides = getUnseenFutureOverrides();
  const hasUnseen = unseenOverrides.length > 0;
  let html = `<div style="text-align:center;margin:.6rem 0 .3rem">
    <button id="dagplanToggle" onclick="toggleDagplan()" style="all:unset;font-size:.85rem;color:var(--text2);cursor:pointer;padding:.6rem 1.2rem;min-height:44px">
      Vandaag ${hasUnseen ? '<span style="display:inline-block;width:6px;height:6px;background:var(--purple);border-radius:50%;margin-left:4px;vertical-align:middle"></span>' : ''} ${uiState.dagplanOpen ? '▲' : '▼'}
    </button>
  </div>
  <div id="dagplanAccordion" style="display:${uiState.dagplanOpen ? 'block' : 'none'}">`;

  blokken.forEach(def => {
    if(def.kind === 'empty') return;
    const bst = blocks[def.id] || {};
    const completed = isBlokCompleted(bst);
    const overrideAct = hasActiveOverride(bst);
    const interact = getBlokInteractivity(def, bst, uur);
    const isActive = actiefDef && def.id === actiefDef.id;

    let icoon = '○', kleur = 'var(--text3)';
    if(completed){ icoon='✓'; kleur='var(--success)'; }
    else if(isActive){ icoon='●'; kleur='var(--purple)'; }
    if(overrideAct && !completed){ icoon='💬'; kleur='var(--purple)'; }
    // Non-actionable fixed blocks without override: show as dash
    if(!isActionable(def, bst) && !completed){ icoon='—'; kleur='var(--text3)'; }

    let info = '';
    if(completed && overrideAct) info = bst.override.text;
    else if(completed && bst.choiceLabel) info = bst.choiceLabel;
    else if(overrideAct) info = bst.override.text;

    const infoHtml = info ? ` — <span style="font-style:italic;color:var(--text3)">${info.substring(0,40)}${info.length>40?'...':''}</span>` : '';
    const canClick = interact !== 'locked' && isActionable(def, bst);
    const isOpenRow = uiState.dagplanOpenRow === def.id;

    html += `<div class="dagplan-row" data-blokid="${def.id}" style="padding:.7rem .8rem;border-radius:var(--radius-sm);margin-bottom:.2rem;min-height:44px;display:flex;align-items:center;${!canClick?'opacity:.4;':'cursor:pointer;'}${isActive?'background:rgba(168,138,155,.06);':''}" ${canClick?`onclick="openDagplanBlok('${def.id}')"`:''}>
      <span style="color:${kleur};font-size:.85rem">${icoon} ${def.label}${infoHtml}</span>
    </div>`;

    // Uitklapbaar detail
    html += `<div id="dagplanDetail_${def.id}" style="display:${isOpenRow?'block':'none'};padding:.4rem .6rem .6rem 1.2rem;margin-bottom:.3rem">`;
    if(!canClick){
      html += `<p style="font-size:.8rem;color:var(--text3)">${def.kind==='fixed'?def.framing:'Nog niet aan de beurt'}</p>`;
    } else if(interact === 'readOnly' && overrideAct){
      html += `<div style="background:rgba(168,138,155,.06);border-radius:var(--radius-sm);padding:.5rem;margin-bottom:.3rem">
        <p style="font-size:.8rem;color:var(--purple);font-weight:600">Lisanne heeft iets voor je klaar.</p>
        <p style="font-size:.85rem;color:var(--text1)">${bst.override.text}</p>
      </div>
      <p style="font-size:.75rem;color:var(--text3)">Straks kun je dit afvinken.</p>`;
    } else if(completed){
      const doneLabel = overrideAct ? bst.override.text : (bst.choiceLabel || 'Gedaan');
      html += `<p style="font-size:.85rem;color:var(--success)">✓ ${doneLabel}</p>`;
    } else if(overrideAct){
      html += `<div style="background:rgba(168,138,155,.06);border-radius:var(--radius-sm);padding:.5rem;margin-bottom:.4rem">
        <p style="font-size:.8rem;color:var(--purple);font-weight:600">Lisanne heeft iets voor je klaar.</p>
        <p style="font-size:.85rem;color:var(--text1)">${bst.override.text}</p>
      </div>
      <button class="btn btn-primary" style="width:100%;font-size:.85rem" onclick="dagritmeOverrideDoneMetFeedback(this,'${def.id}')">✓ Gedaan</button>`;
    } else if(def.kind === 'choice'){
      const opties = getBlokOpties(def);
      html += `<div style="display:flex;flex-direction:column;gap:.3rem">`;
      opties.forEach(o => {
        html += `<button class="btn btn-ghost dagritme-keuze" style="text-align:left;justify-content:flex-start;font-size:.85rem;padding:.6rem .8rem" onclick="dagritmeKeuzeMetFeedback(this,'${def.id}','${o.id}')">${o.tekst}</button>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  });

  // Score + streak met voortgangsbalk
  const dagScore = getDagritmeScore();
  const streak = getDagritmeStreak();
  html += `<div style="padding:.5rem .4rem;margin-top:.3rem">`;
  if(dagScore.total > 0) html += renderVoortgangsBalk(dagScore.gedaan, dagScore.total, streak);
  html += `</div></div>`;
  return html;
}

function renderTimReactie(){
  let html = '';
  const state = getDisciplineState();
  const recentMoment = state.momentLog.find(m => daysSince(m.datum) < 3);

  html += `<button class="btn btn-warm btn-full btn-lg" style="margin-bottom:1.2rem" onclick="logMoment()">
    ✓ Er was een moment
  </button>`;

  if(recentMoment){
    const recentReactie = state.reactieLog.find(r => daysSince(r.datum) < 3);
    if(!recentReactie){
      html += `<div class="card" style="border-color:rgba(214,179,106,.2)">
        <div class="card-title">Reactie-training</div>
        <div class="card-text">${pickStabiel(REACTIE_PROMPTS, today()+'reactie')}</div>
      </div>`;
    } else {
      html += `<div class="card">
        <div class="card-text" style="color:var(--success)">✓ Je hebt gereageerd. Lisanne waardeert dat.</div>
