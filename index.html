// ─── Dagritme Override Modal ─────────────────────────────────
let modalToonAlles = false;

function renderBlokInModal(b, blocks){
  const bs = blocks[b.id] || {};
  const override = bs.override;
  const label = b.kind === 'fixed' ? b.label + ' (' + b.sub.toLowerCase() + ')' : b.label;

  let html = `<div style="background:var(--surface);border:1px solid var(--card-border);border-radius:var(--radius-sm);padding:.7rem;margin-bottom:.4rem">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:.85rem;color:var(--text1)">${label}</span>`;

  if(override){
    html += `<button onclick="verwijderDagritmeOverride('${b.id}')" style="all:unset;font-size:.75rem;color:var(--danger);cursor:pointer;padding:.3rem;min-height:44px;min-width:44px;display:flex;align-items:center;justify-content:center">✕</button>`;
  }
  html += `</div>`;

  const blokDone = isBlokCompleted(bs);
  if(blokDone && !override){
    const doneLabel = bs.choiceLabel || 'Gedaan';
    html += `<p style="font-size:.75rem;color:var(--success);margin-top:.2rem">✓ Tim heeft dit al gedaan: ${doneLabel}</p>`;
  } else if(override){
    html += `<p style="font-size:.8rem;color:var(--purple);margin-top:.3rem;font-style:italic">"${override.text}"</p>`;
  } else if(b.vast.length > 0 || b.wildcards.length > 0){
    html += `<p style="font-size:.75rem;color:var(--text3);margin-top:.2rem">Tim kiest zelf</p>`;
  } else {
    html += `<p style="font-size:.75rem;color:var(--text3);margin-top:.2rem">Vrij</p>`;
  }

  if(!override){
        // Quick-pick opties (Tim's keuzes + extra's + Lisanne's eigen)
        const qOpties = getBlokOpties(b);
        const alleOpties = [...b.vast, ...b.wildcards];
        const extraOpties = alleOpties.filter(o => !qOpties.find(q => q.id === o.id)).slice(0,2);
        const quickOpties = [...qOpties, ...extraOpties];
        // Lisanne's eigen veelgebruikte opties
        const lisanneEigen = getLisanneQuickPicks();
        const eigenNietInStandaard = lisanneEigen.filter(c =>
          !alleOpties.find(o => o.tekst.toLowerCase() === c.tekst.toLowerCase())
        );

        html += `<div id="dagritmeInput_${b.id}" style="display:none;margin-top:.4rem">`;
        if(quickOpties.length > 0 || eigenNietInStandaard.length > 0){
          html += `<p style="font-size:.7rem;color:var(--text3);margin-bottom:.3rem">Kies één of meerdere:</p>
          <div style="display:flex;flex-wrap:wrap;gap:.25rem;margin-bottom:.4rem">`;
          quickOpties.forEach(o => {
            html += `<button data-override-optie="${o.tekst.replace(/"/g,'&quot;')}" onclick="toggleOverrideOptie('${b.id}','${o.tekst.replace(/'/g,"&#39;")}')" style="all:unset;font-size:.85rem;color:var(--text1);cursor:pointer;padding:.5rem .7rem;border-radius:var(--radius-sm);background:rgba(168,138,155,.06);border:1px solid rgba(168,138,155,.15);transition:all .15s;min-height:44px;display:flex;align-items:center">${o.tekst}</button>`;
          });
          // Lisanne's eigen opties (andere stijl: accent border)
          eigenNietInStandaard.forEach(c => {
            html += `<button data-override-optie="${c.tekst.replace(/"/g,'&quot;')}" onclick="toggleOverrideOptie('${b.id}','${c.tekst.replace(/'/g,"&#39;")}')" style="all:unset;font-size:.85rem;color:var(--purple);cursor:pointer;padding:.5rem .7rem;border-radius:var(--radius-sm);background:rgba(168,138,155,.04);border:1px dashed rgba(168,138,155,.3);transition:all .15s;min-height:44px;display:flex;align-items:center">${c.tekst}</button>`;
          });
          html += `</div>
          <div id="overrideSummary_${b.id}" style="display:none;flex-wrap:wrap;align-items:center;margin-bottom:.4rem"></div>
          <p style="font-size:.7rem;color:var(--text3);margin-bottom:.3rem">Extra opdracht typen:</p>`;
        }
        html += `<textarea id="dagritmeText_${b.id}" placeholder="Wat moet Tim doen?" maxlength="120"
            style="width:100%;min-height:40px;padding:.5rem;border-radius:var(--radius-sm);border:1px solid var(--card-border);background:var(--bg);color:var(--text);font-family:inherit;font-size:.85rem;resize:none;margin-bottom:.3rem"></textarea>
          <button id="overrideBevestig_${b.id}" onclick="bevestigOverrideMulti('${b.id}')" class="btn btn-primary" style="width:100%;font-size:.85rem;padding:.4rem">Instellen</button>
        </div>
        <button onclick="toonDagritmeInput('${b.id}')" id="dagritmeBtn_${b.id}" style="all:unset;font-size:.85rem;color:var(--purple);cursor:pointer;margin-top:.3rem;display:block;padding:.5rem 0;min-height:44px">${getToonButtonText()}</button>`;
      }

  html += `</div>`;
  return html;
}

function renderDagritmeOverrideModal(){
  const isMorgen = dagritmeModalDag === 'morgen';
  const doelDatum = isMorgen ? getMorgen() : today();
  const blokken = (isMorgen ? getDagritmeBlokkenVoorDag(doelDatum) : getDagritmeBlokkenVandaag()).filter(b => b.kind !== 'empty');
  const blocks = getDagBlocks(doelDatum);
  const toon = getLisanneToon();

  let titel = isMorgen ? 'Morgen' : 'Vandaag';
  if(toon === 1) titel += ' — een idee voor Tim';
  else if(toon === 3) titel += ' — opdracht voor Tim';
  else titel += ' — Tim\'s dag';

  const dagToggle = `<div style="display:flex;gap:.5rem;margin-bottom:1rem">
    <button onclick="dagritmeModalDag='vandaag';renderApp();setTimeout(()=>{const m=document.getElementById('dagritmeModal');if(m)m.classList.add('show')},50)"
      style="all:unset;padding:.3rem .8rem;font-size:.82rem;border-radius:var(--radius-sm);cursor:pointer;${!isMorgen?'background:var(--purple);color:white':'color:var(--purple);border:1px solid rgba(168,138,155,.3)'}">Vandaag</button>
    <button onclick="dagritmeModalDag='morgen';renderApp();setTimeout(()=>{const m=document.getElementById('dagritmeModal');if(m)m.classList.add('show')},50)"
      style="all:unset;padding:.3rem .8rem;font-size:.82rem;border-radius:var(--radius-sm);cursor:pointer;${isMorgen?'background:var(--purple);color:white':'color:var(--purple);border:1px solid rgba(168,138,155,.3)'}">Morgen</button>
  </div>`;

  let html = `<div class="modal-overlay" id="dagritmeModal">
    <div class="modal" style="max-height:85vh;overflow-y:auto">
      <h3>${titel}</h3>
      ${dagToggle}
      <p style="font-size:.85rem;color:var(--text2);margin-bottom:1rem">Kies een moment en geef Tim een opdracht. Of laat hem zelf kiezen.</p>`;

  // Splits in openstaand vs. afgerond
  const openBlokken = [];
  const gedaanBlokken = [];
  blokken.forEach(b => {
    const bs = blocks[b.id] || {};
    if(isBlokCompleted(bs) && !hasActiveOverride(bs)) gedaanBlokken.push(b);
    else openBlokken.push(b);
  });

  // Openstaande blokken gegroepeerd
  DAGRITME_LISANNE_GROEPEN.forEach(groep => {
    const groepOpen = openBlokken.filter(b => groep.blokIds.includes(b.id));
    if(groepOpen.length === 0) return;
    html += `<div style="margin-bottom:1rem">
      <p style="font-size:.8rem;color:var(--purple);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.4rem">${groep.label}</p>`;
    groepOpen.forEach(b => { html += renderBlokInModal(b, blocks); });
    html += `</div>`;
  });

  // Gedane blokken achter "Toon alles"
  if(gedaanBlokken.length > 0){
    html += `<div style="text-align:center;margin:.5rem 0">
      <button onclick="toggleModalToonAlles()" style="all:unset;font-size:.8rem;color:var(--text3);cursor:pointer;padding:.5rem;min-height:44px">
        ${modalToonAlles ? '▲ Verberg afgerond' : `▼ Afgerond vandaag (${gedaanBlokken.length})`}
      </button>
    </div>`;
    if(modalToonAlles){
      gedaanBlokken.forEach(b => { html += renderBlokInModal(b, blocks); });
    }
  }

  html += `<button class="modal-close" onclick="closeDagritmeModal()">Klaar</button>
    </div>
  </div>`;
  return html;
}

// Multi-select state voor Lisanne's override modal
let overrideSelectie = {};

function removeOverrideOptie(blokId, index){
  if(!overrideSelectie[blokId]) return;
  overrideSelectie[blokId].splice(index, 1);
  renderOverrideSelectie(blokId);
}

function toggleOverrideOptie(blokId, tekst){
  if(!overrideSelectie[blokId]) overrideSelectie[blokId] = [];
  const idx = overrideSelectie[blokId].indexOf(tekst);
  if(idx >= 0) overrideSelectie[blokId].splice(idx, 1);
  else overrideSelectie[blokId].push(tekst);
  renderOverrideSelectie(blokId);
}

function renderOverrideSelectie(blokId){
  // Update selected-state op knoppen
  const container = $('#dagritmeInput_'+blokId);
  if(!container) return;
  const buttons = container.querySelectorAll('[data-override-optie]');
  const sel = overrideSelectie[blokId] || [];
  buttons.forEach(btn => {
    const t = btn.getAttribute('data-override-optie');
    if(sel.includes(t)){
      btn.style.background = 'rgba(168,138,155,.25)';
      btn.style.borderColor = 'var(--purple)';
      btn.style.fontWeight = '600';
    } else {
      btn.style.background = 'rgba(168,138,155,.06)';
      btn.style.borderColor = 'rgba(168,138,155,.15)';
      btn.style.fontWeight = 'normal';
    }
  });
  // Update selectie-samenvatting
  const summary = $('#overrideSummary_'+blokId);
  if(summary){
    if(sel.length > 0){
      summary.innerHTML = sel.map((s, i) => `<span style="display:inline-block;font-size:.75rem;background:rgba(168,138,155,.15);color:var(--purple);padding:.15rem .4rem;border-radius:8px;margin:.1rem .15rem .1rem 0">${s} <span onclick="removeOverrideOptie('${blokId}',${i})" style="cursor:pointer;opacity:.7">✕</span></span>`).join('');
      summary.style.display = 'flex';
    } else {
      summary.innerHTML = '';
      summary.style.display = 'none';
    }
  }
  // Update bevestig-knop tekst
  const btn = $('#overrideBevestig_'+blokId);
  if(btn){
    const tekstVeld = $('#dagritmeText_'+blokId);
    const heeftTekst = tekstVeld && tekstVeld.value.trim();
    const totaal = sel.length + (heeftTekst ? 1 : 0);
    btn.textContent = totaal > 1 ? `Instellen (${totaal} taken)` : 'Instellen';
  }
}

function bevestigOverrideMulti(blokId){
  const sel = overrideSelectie[blokId] || [];
  const tekstVeld = $('#dagritmeText_'+blokId);
  const extraTekst = tekstVeld ? tekstVeld.value.trim() : '';
  const alles = [...sel];
  if(extraTekst) alles.push(extraTekst);
  if(alles.length === 0) return;
  const doelDatum = dagritmeModalDag === 'morgen' ? getMorgen() : today();
  setDagritmeOverride(blokId, alles.join(' + '), doelDatum);
  delete overrideSelectie[blokId];
  closeDagritmeModal();
}

function getWeekOefening(){
  // 1 oefening per week, afwisselend verbinding en dynamiek
  const weekNr = Math.floor(daysSince('2025-01-01') / 7);
  const cat = weekNr % 2 === 0 ? 'verbinding' : 'dynamiek';
  const niveau = getSuggestieState().niveau || 1;
  const beschikbaar = OEFENINGEN_POOL.filter(o => o.cat === cat && o.niveau <= niveau);
  return pickStabiel(beschikbaar, 'oefening_week_' + weekNr);
}

  const isDatum = btn.dataset.type === 'datum';
  const picker = $('#afspraakDatumPicker');
  if(picker) picker.style.display = isDatum ? 'block' : 'none';
  const extra = $('#datumExtraSection');
  if(extra){
    extra.style.display = isDatum ? 'block' : 'none';
    // Reset extra section bij type-wissel
    const inner = $('#datumExtraInner');
    if(inner) inner.style.display = 'none';
    const toggle = $('#datumExtraToggle');
    if(toggle) toggle.textContent = 'Meer opties ▼';
    const timSectie = $('#timZichtbaarSectie');
    if(timSectie) timSectie.style.display = 'none';
    const zichtCheck = $('#voorbZichtbaar');
    if(zichtCheck) zichtCheck.checked = false;
  }
}
function toggleDatumExtra(){
  const inner = $('#datumExtraInner');
  if(!inner) return;
  const open = inner.style.display === 'none';
  inner.style.display = open ? 'block' : 'none';
  const toggle = $('#datumExtraToggle');
  if(toggle) toggle.textContent = open ? 'Minder opties ▲' : 'Meer opties ▼';
}
function toggleTimZichtbaar(){
  const check = $('#voorbZichtbaar');
  const sectie = $('#timZichtbaarSectie');
  if(sectie) sectie.style.display = check && check.checked ? 'block' : 'none';
}
function selectDatumCat(btn){
  const was = btn.classList.contains('active');
  btn.parentElement.querySelectorAll('.afspraak-cat-btn').forEach(b => b.classList.remove('active'));

  _itemsKlaarSelectie = [];

let _voorbTempLijst = [];
function renderVoorbLijst(){
  const el = $('#voorbLijst');
  if(!el) return;
  el.innerHTML = _voorbTempLijst.map((v,i) => `<div class="voorb-item"><span>• ${v}</span><button onclick="verwijderVoorb(${i})">×</button></div>`).join('');
  const invoer = $('#voorbInvoer');
  if(invoer) invoer.style.display = _voorbTempLijst.length >= 4 ? 'none' : 'flex';
  // Hide used chips
  $$('.voorb-chip').forEach(c => { c.style.opacity = _voorbTempLijst.includes(c.textContent) ? '.4' : '1'; c.style.pointerEvents = _voorbTempLijst.includes(c.textContent) ? 'none' : 'auto'; });
}
function voegVoorbToe(){
  const inp = $('#voorbInput');
  if(!inp || !inp.value.trim()) return;
  if(_voorbTempLijst.length >= 4) return;
  _voorbTempLijst.push(inp.value.trim());
  inp.value = '';
  renderVoorbLijst();
}
function voegVoorbChipToe(tekst){
  if(_voorbTempLijst.length >= 4 || _voorbTempLijst.includes(tekst)) return;
  _voorbTempLijst.push(tekst);
  renderVoorbLijst();
}
function verwijderVoorb(i){
  _voorbTempLijst.splice(i, 1);
  renderVoorbLijst();
}

    { groep:'Boeien & riemen', items:[
      {key:'collar',label:'Halsband'},{key:'polsboeien',label:'Polsboeien'},{key:'enkelboeien',label:'Enkelboeien'},

    ]},

    ]}
  ],

    ]},

    ]}

let _itemsKlaarSelectie = [];


function renderItemsKlaarChips(cat){
  const container = $('#itemsKlaarChips');
  if(!container) return;
  const config = ITEMS_KLAAR_CONFIG[cat];
  if(!config){ container.innerHTML = ''; return; }
  let html = '';
  config.forEach(g => {
    html += `<p style="font-size:.7rem;color:var(--text3);margin-bottom:.3rem;margin-top:.4rem">${g.groep}</p>`;
    html += `<div style="display:flex;gap:.4rem;flex-wrap:wrap">`;
    g.items.forEach(item => {
      const active = _itemsKlaarSelectie.includes(item.key);
      html += `<button class="voorb-chip${active?' item-chip-active':''}" onclick="toggleItemChip('${item.key}')" style="${active?'background:rgba(168,138,155,.2);border-color:var(--purple);color:var(--purple)':''}">${active?'✓ ':''}${item.label}</button>`;
    });
    html += `</div>`;
  });
  container.innerHTML = html;
}

function toggleItemChip(key){
  if(_itemsKlaarSelectie.includes(key)){
    _itemsKlaarSelectie = _itemsKlaarSelectie.filter(k => k !== key);
  } else {
    if(_itemsKlaarSelectie.length >= 6) return;
    _itemsKlaarSelectie.push(key);
  }
  const catBtn = document.querySelector('.afspraak-cat-btn.active');
  if(catBtn) renderItemsKlaarChips(catBtn.dataset.cat);
}

function toonItemsSectie(cat){
  const section = $('#itemsKlaarSection');
  if(!section) return;
  if(cat === 'vastmaak' || cat === 'sessie'){
    section.style.display = 'block';
    renderItemsKlaarChips(cat);
  } else {
    section.style.display = 'none';
  }
}

function bevestigAfspraak(){
  const tekst = $('#afspraakTekst').value;
  if(!tekst || tekst.trim().length < 3){
    $('#afspraakTekst').style.borderColor = 'var(--danger)';
    return;
  }
  const typeBtn = document.querySelector('.afspraak-type-btn.active');
  const type = typeBtn ? typeBtn.dataset.type : 'doorlopend';
  let datumVal = null;
  if(type === 'datum'){
    const datumInput = $('#afspraakDatum');
    datumVal = datumInput ? datumInput.value : null;
    if(!datumVal){
      if(datumInput) datumInput.style.borderColor = 'var(--danger)';
      return;
    }
  }
  // Datum-specifieke velden
  let categorie = null;
  let voorbereidingen = [];
  let voorbereidingenZichtbaar = false;
  if(type === 'datum'){
    const catBtn = document.querySelector('.afspraak-cat-btn.active');
    if(catBtn) categorie = catBtn.dataset.cat;
    voorbereidingen = [..._voorbTempLijst];
    const zichtCheck = $('#voorbZichtbaar');
    voorbereidingenZichtbaar = zichtCheck ? zichtCheck.checked : false;
  }
  const items = (type === 'datum') ? [..._itemsKlaarSelectie] : [];
  const ok = voegAfspraakToe(tekst, type, datumVal, categorie, voorbereidingen, voorbereidingenZichtbaar, items);
  if(ok){
    _voorbTempLijst = [];
    _itemsKlaarSelectie = [];
    closeAfspraakModal();
    toonBevestiging('✓ Afgesproken');
    renderApp();
  }
}

function startInitiatief(grootte){
  closeModal();
  const state = getSuggestieState();
  // Avond = lange-avond pool, niet alleen sessie
  // sessie ~40%, vastmaak ~30%, opdracht ~20%, relationeel ~10%
  const avondCats = ['sessie','sessie','sessie','sessie','vastmaak','vastmaak','vastmaak','opdracht','opdracht','relationeel'];
  // Na nee/rustig: geen sessie in avond-pool
  const vorigeStatus = state.historie.length > 0 ? state.historie[state.historie.length-1].status : null;
  const avondPool = (vorigeStatus === 'nee' || vorigeStatus === 'rustig')
    ? avondCats.filter(c => c !== 'sessie')
    : avondCats;
  const catMap = {klein:['micro','relationeel'],groter:['vastmaak','opdracht'],avond:avondPool};
  const catArray = catMap[grootte] || ['micro'];
  // Bij avond: kies gewogen categorie, anders: gebruik alle cats
  const cats = grootte === 'avond' ? [pick(catArray)] : catArray;
  const recenteIds = state.historie.slice(-10).map(h=>h.id);
  const lisanneFavs = state.lisanneFavorieten || [];
  const fijnIds = (state.ervaringLog||[]).filter(e => e.val === 'fijn').map(e => {
    const h = state.historie.find(h2 => h2.datum === e.datum && h2.status === 'ja');
    return h ? h.id : null;
  }).filter(Boolean);

  // Zwaarte-limiet per grootte
  const maxZwaarte = grootte === 'klein' ? state.niveau
                   : grootte === 'groter' ? state.niveau + 1
                   : state.niveau + 1; // avond

  let pool = SUGGESTIE_POOL.filter(s =>
    cats.includes(s.cat) &&
    !recenteIds.includes(s.id) &&
    s.zwaarte <= maxZwaarte
  );
  if(pool.length === 0) pool = SUGGESTIE_POOL.filter(s => cats.includes(s.cat) && s.zwaarte <= maxZwaarte);

  // ── INITIATIEF-PAD: veilige haven ──
  // 80% voorkeur voor favorieten + fijne ervaringen + humor/relationeel
  if(grootte === 'klein'){
    pool = pool.flatMap(s => {
      let copies = [s];
      if(lisanneFavs.includes(s.id)) copies.push(s, s, s); // 4x kans
      if(fijnIds.includes(s.id)) copies.push(s, s);         // 3x kans
      if(s.id.startsWith('fun')) copies.push(s);             // 2x kans humor
      return copies;
    });
  }
  // 🔥 Groter: mag buiten comfort, maar favorieten nog steeds boost
  if(grootte === 'groter'){
    pool = pool.flatMap(s => {
      let copies = [s];
      if(lisanneFavs.includes(s.id)) copies.push(s, s); // 3x kans
      if(fijnIds.includes(s.id)) copies.push(s);          // 2x kans
      return copies;
    });
  }
  // ✨ Avond: alle relevante sessies, lichte boost voor favorieten
  if(grootte === 'avond'){
    pool = pool.flatMap(s => {
      let copies = [s];
      if(lisanneFavs.includes(s.id)) copies.push(s); // 2x kans
      return copies;
    });
  }

  const gekozen = pool.length > 0 ? pick(pool) : null;
  if(gekozen){
    state.huidig = { ...gekozen, datum: today(), bron: 'initiatief' };
    saveSuggestieState(state);
    const log = LS.get('l_initiatief_log', []);
    log.push({ datum: today() });
    LS.set('l_initiatief_log', log);
  }
  renderApp();
}

function logDiscipline(taakId, gedaan){

  state.log = state.log.filter(l => l.datum !== today());

/// Evaluatie functies
function logEvaluatie(keuze){
  LS.set('l_laatsteEvaluatie', today());
  const evaluaties = LS.get('l_evaluaties', []);
  evaluaties.push({ datum: today(), keuze });
  LS.set('l_evaluaties', evaluaties);
  if(keuze === 'goed'){ toonBevestiging('✓ Genoteerd'); renderApp(); }
  else if(keuze === 'meer'){
    const content = $('#app').querySelector('.content');
    if(content){
      content.innerHTML = `<div class="card" style="border-color:rgba(196,138,138,.25)">
        <div class="card-title">Wat mag er meer?</div>
        <div style="display:flex;flex-direction:column;gap:.6rem;margin-top:.8rem">
          <button class="experience-btn" onclick="logEvaluatieDetail('vaker')"><span>Vaker</span></button>
          <button class="experience-btn" onclick="logEvaluatieDetail('intensiever')"><span>Iets intensiever</span></button>
          <button class="experience-btn" onclick="logEvaluatieDetail('variatie')"><span>Meer variatie</span></button>
        </div>
      </div>`;
    }
  } else if(keuze === 'veel'){
    LS.set('l_pauzeAanpassing', (LS.get('l_pauzeAanpassing',0)) + 1);
    renderApp();
  } else if(keuze === 'pauze'){
    const state = getSuggestieState();
    state.stilteWeek = true;
    saveSuggestieState(state);
    renderApp();
  }
}

function logEvaluatieDetail(detail){
  const evaluaties = LS.get('l_evaluaties', []);
  if(evaluaties.length > 0) evaluaties[evaluaties.length-1].detail = detail;
  LS.set('l_evaluaties', evaluaties);
  if(detail === 'vaker'){
    LS.set('l_pauzeAanpassing', Math.max(-2, (LS.get('l_pauzeAanpassing',0)) - 1));
    LS.set('l_minDagenSessie', Math.max(12, (LS.get('l_minDagenSessie', 14)) - 2));
  }
  else if(detail === 'intensiever'){
    const state = getSuggestieState();
    if(state.niveau < 3) state.niveau++;
    saveSuggestieState(state);
  }
  else if(detail === 'variatie'){
    const cur = LS.get('l_exploreRate', 0.15);
    LS.set('l_exploreRate', Math.min(0.35, cur + 0.05));
  }
  toonBevestiging('✓ Genoteerd');
  renderApp();
}

function debugSimuleerWeek(){
  // Simuleer 7 dagen: elke dag een suggestie accepteren
  const results = [];
  for(let i=0; i<7; i++){
    DEBUG.offset += 1;
    const state = getSuggestieState();
    state.huidig = null;
    const s = kiesSuggestie(state);
    if(s){
      state.huidig = { ...s, datum: today() };
      saveSuggestieState(state);
      const keuze = pick(['ja','ja','ja','nee','ander']);
      results.push(`Dag ${i+1}: ${s.cat} "${s.id}" → ${keuze}`);
      verwerkKeuze(keuze);
    } else {
      results.push(`Dag ${i+1}: geen suggestie`);
    }
  }
  alert('Week gesimuleerd:\n\n' + results.join('\n'));
  renderApp();
}
