// Item-validatie: check combineerNietMet en vereist
function isTemplateItemsValid(suggestie){
  if(!suggestie.items || suggestie.items.length < 2) return true;
  for(let i = 0; i < suggestie.items.length; i++){
    const itemA = SPULLEN_DB[suggestie.items[i]];
    if(!itemA) return false; // onbekend item → reject
    if(itemA.vereist && itemA.vereist.length > 0){
      for(const req of itemA.vereist){
        if(!suggestie.items.includes(req) && !SPULLEN_DB[req]) return false;
      }
    }
    for(let j = i+1; j < suggestie.items.length; j++){
      if(itemA.combineerNietMet && itemA.combineerNietMet.includes(suggestie.items[j])) return false;
    }
  }
  return true;
}

const KERN_TYPES = ['stem','correctie','timing','positie','item','beslissing'];

function getBegroeting(naam){
  const h = debugNow().getHours();
  const t = h < 12 ? 'Goedemorgen' : h < 18 ? 'Goedemiddag' : 'Fijne avond';
  return `${t}, ${naam}`;
}
function getDominantType(state){
  const hist = (state.typeHistorie || []).slice(-5)
    .filter(h => h.status === 'ja' && KERN_TYPES.includes(h.type));
  if(hist.length === 0) return null;
  const counts = {};
  hist.forEach(h => counts[h.type] = (counts[h.type]||0)+1);
  return Object.entries(counts).sort((a,b) => b[1]-a[1])[0][0];
}

function isAfgekoeld(state, type){
  return (state.typeHistorie || []).some(h =>
    h.type === type && h.status === 'nee' && daysSince(h.datum) < 14
  );
}

function heeftDrieKeerJa(state, type){
  const recent = (state.typeHistorie || []).slice(-3);
  return recent.length === 3 && recent.every(h => h.type === type && h.status === 'ja');
}

function needsEvaluatie(){
  const state = getSuggestieState();
  const wc = state.weekCounter || 0;
  if(wc < 2) return false;
  if((wc - 1) % 4 === 0){
    const laatsteEval = LS.get('l_laatsteEvaluatie', null);
    if(!laatsteEval || daysSince(laatsteEval) > 14) return true;
  }
  return false;
}

function isOnboarding(){
  const start = LS.get('l_startdatum', null);
  if(!start) return true;
  return daysSince(start) < 7;
}

function getWeekMaxSuggesties(){
  // Max suggesties per week, groeit mee met fases
  const startDatum = LS.get('l_startdatum', null);
  const dagenActief = startDatum ? daysSince(startDatum) : 0;
  if(dagenActief < 21) return 3;       // Fase 1-3: max 3 per week
  if(dagenActief < 42) return 4;       // Fase 4: max 4 per week
  return 5;                            // Fase 5+: max 5 per week
}

function getSuggestiesDezeWeek(state){
  const ws = getWeekStart();
  return state.historie.filter(h => h.datum >= ws).length;
}

function moetNieuweSuggestie(state){
  // P1: Ruzie-modus blokkeert Spoor C suggesties
  if(isRuzieModus()) return false;
  if(state.huidig){
    // Suggestie van vandaag: bewaar
    if(state.huidig.datum === today()) return false;
    // Suggestie van gisteren of ouder: automatisch vervangen door nieuwe
    // (voorkomt dat dezelfde suggestie dagenlang blijft staan)
    state.huidig = null;
    saveSuggestieState(state);
    return true;
  }
  // Onboarding blokkeert niet meer — zachte suggesties komen via kiesSuggestie
  if(state.historie.length === 0) return true;
  if(needsEvaluatie()) return false;

  // Weekmaximum verwijderd — minDagen is voldoende pacing

  const laatsteDatum = LS.get('l_lastSuggestieDatum', null);
  if(!laatsteDatum) return true;

  const dagenSinds = daysSince(laatsteDatum);
  const frequentie = LS.get('l_frequentie', 'normaal');
  const pauzeAanpassing = LS.get('l_pauzeAanpassing', 0);

  let minDagen;
  if(frequentie === 'rustig') minDagen = 4 + pauzeAanpassing;
  else if(frequentie === 'vaker') minDagen = 1 + pauzeAanpassing;
  else minDagen = 2 + pauzeAanpassing;

  minDagen = Math.max(1, minDagen);
  return dagenSinds >= minDagen;
}

// 4-SPOREN ARCHITECTUUR
// Spoor 1: Relatie/Plezier (warmte, humor, samen-zijn)
// Spoor 2: Bevestiging & Intimiteit (gezien worden, complimenten)
// Spoor 3: Speelsheid & Spanning (anticipatie, plagen, nieuwheid)
// Spoor 4: Dynamiek (opdrachten, items, sessies — met verborgen progressie)
// ═══════════════════════════════════════════════════════════════

function getSpoor4(s){
  // Expliciet spoor4 veld heeft voorrang
  if(s.spoor4) return s.spoor4;
  // Mechanisme-gebaseerd
  if(s.mechanisme === 'bevestiging') return 2;
  if(s.mechanisme === 'anticipatie' || s.mechanisme === 'nieuwheid') return 3;
  if(s.mechanisme === 'presence') return 1;
  // Category-gebaseerd
  if(s.cat === 'opdracht' || s.cat === 'vastmaak' || s.cat === 'sessie') return 4;
  // ID-prefix gebaseerd
  if(s.id){
    if(s.id.startsWith('gw') || s.id.startsWith('gj')) return 1;
    if(s.id.startsWith('bv')) return 2;
    if(s.id.startsWith('an') || s.id.startsWith('nw')) return 3;
    if(s.id.startsWith('on') || s.id.startsWith('la')) return s.minDagen >= 14 ? 4 : 2;
  }
  // Vibe-gebaseerd
  if(s.vibe === 'warm' && s.cat === 'relationeel') return 1;
  if(s.vibe === 'speels' && s.zwaarte <= 1) return 3;
  if(s.vibe === 'controle') return 4;
  // Relationeel zonder controle → spoor 1 of 2
  if(s.cat === 'relationeel') return s.subtiel ? 1 : 2;
  // Micro licht → spoor 2, micro zwaarder → spoor 4
  if(s.cat === 'micro') return s.zwaarte <= 1 ? 2 : 4;
  // Fallback
  return 1;
}

// ─── STATE UITBREIDING: Spoor4 tracking ───
function getSpoor4State(){
  return LS.get('l_spoor4', {
    fase: 0,                // 0=gewoon samen, 1=kleine signalen, etc.
    stap: 1,                // huidige stap binnen actief leerpad
    energieVandaag: null,   // 'laag','normaal','goed' (null=niet ingevuld)
    weekSpoorTelling: {},   // {1:2, 2:1, 3:0, 4:1} deze week
    laatsteSpoor: null,     // spoor van gisteren
    successReeks: 0,        // opeenvolgende 'fijn' reacties
    laatsteSuccessLoop: null, // datum van laatste success-bericht
    eigenInitiatiefCount: 0,  // totaal eigen initiatief
    laatsteNeutralReactie: null, // datum
    laatsteLeerpad: null,       // vorig actief leerpad (voor fase-overgang detectie)
    laatsteTerugblik: null      // datum van laatste terugblik-card
  });
}
function saveSpoor4State(s){ LS.set('l_spoor4', s) }

// ─── Periodieke leerpad-terugblik afhandeling ───
function beantwoordLeerpadTerugblik(antwoord){
  const s4 = getSpoor4State();
  s4.laatsteTerugblik = today();
  // Log het antwoord voor inzicht
  const tbLog = LS.get('l_leerpadTerugblikLog', []);
  tbLog.push({datum: today(), fase: s4.fase || 0, antwoord: antwoord});
  LS.set('l_leerpadTerugblikLog', tbLog);
  LS.set('l_leerpadTerugblik_'+today(), true);
  saveSpoor4State(s4);
  renderApp();
}

// ─── Spoor4 week reset ───
function resetSpoor4Week(){
  const s4 = getSpoor4State();
  const ws = getWeekStart();
  if(s4._laatsteWeekReset !== ws){
    s4.weekSpoorTelling = {1:0, 2:0, 3:0, 4:0};
    s4._laatsteWeekReset = ws;
    saveSpoor4State(s4);
  }
}

// ═══════════════════════════════════════════════════════════════
// ONTWERPPRINCIPE: geen lege dagen, alleen lichtere dagen.
// Elke feature mag maximaal één harde gate hebben.
// De rest past toon/zwaarte/type aan — niet blokkeren.
// Stilteweek = lichte week. Onboarding = zachte week.
// Feedback verfijnt, maar is nooit vereist.
// ═══════════════════════════════════════════════════════════════
function kiesSuggestie(state){
  const s4 = getSpoor4State();
  resetSpoor4Week();

  // ── SCHEDULER DEBUG LOG ──
  window._schedulerLog = {
    totaal: SUGGESTIE_POOL.length,
    naEnergie: 0,
    naRecent: 0,
    naZwaarte: 0,
    naGates: 0,
    naRemmen: 0,
    kandidaten: 0,
    dagtype: null,
    forceerZacht: false,
    zachteReeks: 0,
    gekozen: null,
    reden: null,
    filters: []
  };

  const startDatum = LS.get('l_startdatum', null);
  const dagenActief = startDatum ? daysSince(startDatum) : 0;
  const now = debugNow();
  const dagVanWeek = now.getDay(); // 0=zo, 5=vr, 6=za
  const hour = now.getHours();
  const recenteIds = state.historie.slice(-15).map(h => h.id);
  const aantalJa = state.historie.filter(h => h.status === 'ja').length;

  // ═══════════════════════════════════════
  // STAP 0: Bailout checks (bestaande logica behouden)
  // ═══════════════════════════════════════
  const vorige3Weken = state.historie.filter(h => daysSince(h.datum) < 21);
  const alleNee = vorige3Weken.length > 0 && vorige3Weken.every(h => h.status === 'nee');
  const initiatiefsLastMonth = LS.get('l_initiatief_log', []).filter(i => daysSince(i.datum) < 30).length;
  const tevelTeveel = state.ervaringLog.filter(e => e.val === 'teveel' && daysSince(e.datum) < 30).length;
  if(alleNee && initiatiefsLastMonth === 0 && tevelTeveel >= 2) return null;

  // Stilteweek (elke 4e week)
  state.weekCounter = (state.weekCounter||0);
  const ws = getWeekStart();
  const vorige_ws = LS.get('l_laatsteWeekStart','');
  if(ws !== vorige_ws){ state.weekCounter++; LS.set('l_laatsteWeekStart', ws); }
  // ONTWERPPRINCIPE: geen lege dagen, alleen lichtere dagen.
  // Stilteweek = lichte week: alleen zachte/relationele suggesties, geen zware opbouw.
  state.stilteWeek = (state.weekCounter % 4 === 0) && state.weekCounter > 0;
  if(state.stilteWeek){
    if(state.lopend){ state.lopend = null; saveSuggestieState(state); }
    // Niet return null — doorvallen naar zachte suggestie-selectie
  }

  // Uitgestelde suggestie
  if(state.uitgesteld && state.uitgesteld.cat){
    const dagenSinds = daysSince(state.uitgesteld.terugOp);
    if(dagenSinds >= 2 && dagenSinds <= 5){
      const cat = state.uitgesteld.cat;
      state.uitgesteld = null; saveSuggestieState(state);
      const pool = SUGGESTIE_POOL.filter(s => s.cat === cat && !recenteIds.includes(s.id) && s.zwaarte <= state.niveau + 1);
      return pool.length > 0 ? pick(pool) : null;
    }
  }

  // Lopende suggestie verlopen
  if(state.lopend && isLopendExpired(state)){ state.lopend = null; saveSuggestieState(state); }

  // ═══════════════════════════════════════
  // STAP 0: Stilteweek = lichte week (zachte suggesties)
  // ═══════════════════════════════════════
  if(state.stilteWeek){
    let pool = SUGGESTIE_POOL.filter(s =>
      (s.cat === 'relationeel' || (getSpoor4(s) === 1 && s.zwaarte <= 1))
      && !recenteIds.includes(s.id) && !isSuggestieGeblokkeerd(state, s.id)
    );
    if(pool.length === 0) pool = SUGGESTIE_POOL.filter(s => s.cat === 'relationeel' && s.zwaarte <= 1);
    window._schedulerLog.dagtype = 'stilte_licht';
    window._schedulerLog.kandidaten = pool.length;
    const _gekozenS = pool.length > 0 ? pick(pool) : null;
    window._schedulerLog.gekozen = _gekozenS ? _gekozenS.id + ' (stilte_licht)' : 'GEEN';
    return _gekozenS;
  }

  // ═══════════════════════════════════════
  // STAP 1: Energiecheck
  // ═══════════════════════════════════════
  const energie = s4.energieVandaag || 'normaal';
  if(energie === 'laag'){
    // Alleen zachte dingen: presence + gewoon_jullie
    let pool = SUGGESTIE_POOL.filter(s => {
      const sp = getSpoor4(s);
      return sp === 1 && !recenteIds.includes(s.id) && s.zwaarte <= 1;
    });
    if(pool.length === 0) pool = SUGGESTIE_POOL.filter(s => s.cat === 'relationeel' && s.zwaarte <= 1);
    window._schedulerLog.dagtype = 'energie_laag';
    window._schedulerLog.naEnergie = pool.length;
    window._schedulerLog.kandidaten = pool.length;
    const _gekozenE = pool.length > 0 ? pick(pool) : null;
    window._schedulerLog.gekozen = _gekozenE ? _gekozenE.id + ' (energie_laag)' : 'GEEN';
    return _gekozenE;
  }

  // ═══════════════════════════════════════
  // STAP 2: Soft reset check
  // ═══════════════════════════════════════
  const laatsteActiviteit = state.historie.length > 0 ? state.historie[state.historie.length-1].datum : null;
  const dagenGemist = laatsteActiviteit ? daysSince(laatsteActiviteit) : 0;
  let forceerZacht = false;
  if(dagenGemist >= 3 && state.historie.length > 0){
    forceerZacht = true;
    // Soft reset bericht wordt in renderVandaag afgehandeld
  }

  // ═══════════════════════════════════════
  // STAP 3: Failsafe checks
  // ═══════════════════════════════════════
  const laatsteErvaring = (state.ervaringLog||[]).slice(-1)[0];
  const laatsteErvaringVal = laatsteErvaring ? laatsteErvaring.val : null;
  const dagenSindsLaatsteErvaring = laatsteErvaring ? daysSince(laatsteErvaring.datum) : 999;

  // Na "teveel" → 2 dagen alleen zacht
  if(laatsteErvaringVal === 'teveel' && dagenSindsLaatsteErvaring <= 2){
    forceerZacht = true;
  }

  // Na "reactie_viel_tegen" → volgende dag zacht
  if(laatsteErvaringVal === 'reactie_viel_tegen' && dagenSindsLaatsteErvaring <= 1){
    forceerZacht = true;
  }

  // Na 2× nee achter elkaar → zachte herstart
  const laatste2Status = state.historie.slice(-2);
  const reedsNee = laatste2Status.length >= 2 && laatste2Status.every(h => ['nee','rustig','nietnu','niksvoormij'].includes(h.status));
  if(reedsNee) forceerZacht = true;

  // Zwaarte-golf: na zware suggestie → max licht
  const laatsteZwaarte = state.historie.length > 0 ? (function(){
    const s = SUGGESTIE_POOL.find(x => x.id === state.historie[state.historie.length-1].id);
    return s ? s.zwaarte : 1;
  })() : 1;
  const maxZwaarte = laatsteZwaarte >= 2 ? 1 : (state.niveau + 1);

  // Zacht modus uit bestaand systeem
  if(isZachtModus()) forceerZacht = true;
  window._schedulerLog.forceerZacht = forceerZacht;

  // ═══════════════════════════════════════
  // STAP 4: Fase 0 check (eerste 5 dagen)
  // ═══════════════════════════════════════
  if(s4.fase === 0 && dagenActief < 5){
    let pool = SUGGESTIE_POOL.filter(s =>
      s.leerpad === 0 && !recenteIds.includes(s.id)
    );
    if(pool.length === 0) pool = SUGGESTIE_POOL.filter(s => s.leerpad === 0);
    if(pool.length === 0){
      // Fallback: gewoon_jullie
      pool = SUGGESTIE_POOL.filter(s => s.id && s.id.startsWith('gj') && !recenteIds.includes(s.id));
    }
    return pool.length > 0 ? pick(pool) : null;
  }
  // Fase 0 → fase 1 transitie
  if(s4.fase === 0 && dagenActief >= 5){
    s4.fase = 1;
    s4.stap = 1;
    saveSpoor4State(s4);
  }

  // ═══════════════════════════════════════
  // STAP 4b: zachteReeks bewaking
  // ═══════════════════════════════════════
  const _zachteReeks = LS.get('l_zachteReeks', 0);
  // Als 3+ zachte dagen op rij EN geen echte safety-reden → zachtheid doorbreken
  const _isSafetyZacht = (laatsteErvaringVal === 'teveel' && dagenSindsLaatsteErvaring <= 2);
  if(_zachteReeks >= 3 && forceerZacht && !_isSafetyZacht){
    forceerZacht = false; // Doorbreek inertia-zachtheid
    window._schedulerLog.reden = 'zachteReeks doorbroken (' + _zachteReeks + ' dagen)';
  }

  // ═══════════════════════════════════════
  // STAP 5: Bepaal dagtype
  // ═══════════════════════════════════════
  let dagtype;
  const isKindTijd = isMilouAanwezig(); // Milou erbij = alleen subtiele suggesties

  if(forceerZacht){
    // Na soft reset, teveel, of nee-reeks
    dagtype = pick(['gewoon_jullie','presence','bevestiging','gewoon_jullie']);
  } else if(dagVanWeek === 0){
    // Zondag: rust of reflectie
    const isReflectieDag = [14,28,42,56,70,84].some(d => Math.abs(dagenActief - d) <= 1);
    dagtype = isReflectieDag ? 'reflectie' : 'rust';
    if(dagtype === 'rust'){
      // Licht of niks
      dagtype = pick(['gewoon_jullie','presence','rust']);
      if(dagtype === 'rust') return null; // Echte rustdag
    }
  } else if(dagVanWeek === 5){
    // Vrijdag: Milou thuis → digitaal of avond
    dagtype = weightedPick([
      ['digitaal_bevestiging', 35],
      ['digitaal_anticipatie', 25],
      ['gewoon_jullie', 25],
      ['presence', 15]
    ]);
  } else if(dagVanWeek === 6){
    // Zaterdag: licht
    dagtype = weightedPick([
      ['gewoon_jullie', 35],
      ['presence', 25],
      ['bevestiging', 25],
      ['licht_focus', 15]
    ]);
  } else {
    // Ma-Do: weekbalans
    const wst = s4.weekSpoorTelling || {1:0, 2:0, 3:0, 4:0};
    const focusCount = (wst[4]||0);
    const bevestigingCount = (wst[2]||0);

    if(focusCount < 2){
      dagtype = weightedPick([
        ['focus', 45],
        ['bevestiging', 25],
        ['gewoon_jullie', 20],
        ['presence', 10]
      ]);
    } else if(bevestigingCount < 1){
      dagtype = weightedPick([
        ['bevestiging', 40],
        ['focus', 25],
        ['gewoon_jullie', 20],
        ['presence', 15]
      ]);
    } else {
      dagtype = weightedPick([
        ['gewoon_jullie', 25],
        ['doorloop', 20],
        ['anticipatie', 15],
        ['nieuwheid', 15],
        ['presence', 15],
        ['bevestiging', 10]
      ]);
    }

    window._schedulerLog.dagtype = dagtype;
    // Energieboost: goed → meer focus
    if(energie === 'goed' && focusCount < 3 && dagtype !== 'focus'){
      if(Math.random() < 0.2) dagtype = 'focus';
    }
  }

  // ═══════════════════════════════════════
  // STAP 6: Opbouw-gates (bestaande logica)
  // ═══════════════════════════════════════
  const opdrachtOpen = dagenActief >= 7 && aantalJa >= 2;
  const vastmaakOpen = dagenActief >= 21 && aantalJa >= 3;
  const sessieOpen = dagenActief >= 35 && aantalJa >= 5;

  // Anti-clustering avond-dingen
  const lastEvening = LS.get('l_lastEveningDate', null);
  const dagenSindsEvening = lastEvening ? daysSince(lastEvening) : 999;
  const avondBlocked = dagenSindsEvening < 2;

  // ═══════════════════════════════════════
  // STAP 7: Kies suggestie op basis van dagtype
  // ═══════════════════════════════════════

  function _basisFilter(s){
    if(recenteIds.includes(s.id)) return false;
    if(s.zwaarte > maxZwaarte) return false;
    if(isKindTijd && s.subtiel === false) return false;
    if(!isTemplateItemsValid(s)) return false;
    if(s.actieType && isAfgekoeld(state, s.actieType)) return false;
    if(isSuggestieGeblokkeerd(state, s.id)) return false;
    if(s.minDagen && s.minDagen > 0 && dagenActief < s.minDagen) return false;
    return true;
  }

  function _nietRecent(s, n){
    const recentN = state.historie.slice(-n).map(h => h.id);
    return !recentN.includes(s.id);
  }

  // Bepaal actief leerpad en stap
  const actiefPad = _bepaalActiefLeerpad(state, s4);
  const huidigeStap = _bepaalHuidigeStap(actiefPad, state, s4);

  // Track leerpad-overgang voor fase-overgang berichten
  if(s4.fase !== actiefPad){
    s4.laatsteLeerpad = s4.fase;
    s4.fase = actiefPad;
    saveSpoor4State(s4);
  }

  let pool = [];
  let gekozenSpoor = null;

  switch(dagtype){
    case 'focus':
      // Focus op actief leerpad — kern-suggesties krijgen voorrang
      // Stap 1: probeer eerst kern-suggesties van het actieve leerpad
      const _kernPool = SUGGESTIE_POOL.filter(s => {
        if(!_basisFilter(s)) return false;
        if(s.leerpad !== actiefPad) return false;
        // Stretch-suggesties alleen tonen na voldoende positieve ervaringen
        if(s.stretch){
          const _lpFijn = state.historie.filter(h => h.suggestieId && SUGGESTIE_POOL.find(x => x.id === h.suggestieId && x.leerpad === actiefPad) && h.ervaring === 'fijn').length;
          if(_lpFijn < 3) return false;
        }
        return true;
      });
      if(_kernPool.length >= 2){
        pool = _kernPool;
      } else {
        // Stap 2: fallback naar spoor-gebaseerde filter + kern-suggesties
        pool = SUGGESTIE_POOL.filter(s => {
          if(!_basisFilter(s)) return false;
          // Kern-suggesties van actief leerpad altijd ok
          if(s.leerpad === actiefPad) return true;
          // Verder filteren op spoor
          const sp = getSpoor4(s);
          if(sp !== 4 && actiefPad >= 3) return false;
          if(actiefPad === 1) return sp <= 2;
          if(actiefPad === 2) return sp <= 3;
          return true;
        });
      }
      // Taalvariant: eerste 21 dagen zacht
      if(dagenActief < 21 && pool.length > 1){
        const zachte = pool.filter(s => s.taalVariant !== 'direct');
        if(zachte.length >= 2) pool = zachte;
      }
      // Opbouw-gate op categorieën
      if(!opdrachtOpen) pool = pool.filter(s => s.cat !== 'opdracht');
      if(!vastmaakOpen || avondBlocked) pool = pool.filter(s => s.cat !== 'vastmaak');
      if(!sessieOpen || avondBlocked) pool = pool.filter(s => s.cat !== 'sessie');
      gekozenSpoor = 4;
      break;

    case 'licht_focus':
      // Zaterdag: lichte focus, lagere zwaarte
      pool = SUGGESTIE_POOL.filter(s => {
        if(!_basisFilter(s)) return false;
        if(s.zwaarte > 1) return false;
        const sp = getSpoor4(s);
        return sp <= 2; // Alleen spoor 1-2 voor licht
      });
      gekozenSpoor = 1;
      break;

    case 'bevestiging':
    case 'digitaal_bevestiging':
      pool = SUGGESTIE_POOL.filter(s => {
        if(!_basisFilter(s)) return false;
        if(!_nietRecent(s, 5)) return false;
        const sp = getSpoor4(s);
        if(sp !== 2) return false;
        // Vrijdag: alleen digitaal
        if(dagtype === 'digitaal_bevestiging' && s.type !== 'digitaal' && s.type !== 'op_afstand') return false;
        return true;
      });
      gekozenSpoor = 2;
      break;

    case 'gewoon_jullie':
      pool = SUGGESTIE_POOL.filter(s => {
        if(!_basisFilter(s)) return false;
        if(!_nietRecent(s, 7)) return false;
        // gewoon_jullie, samen-eruit, of relationeel met lage zwaarte
        return (s.id && (s.id.startsWith('gj') || s.id.startsWith('gw') || s.id.startsWith('se'))) ||
               (s.cat === 'relationeel' && s.zwaarte <= 1 && (s.vibe === 'warm' || s.vibe === 'speels'));
      });
      gekozenSpoor = 1;
      break;

    case 'presence':
      pool = SUGGESTIE_POOL.filter(s => {
        if(!_basisFilter(s)) return false;
        if(!_nietRecent(s, 7)) return false;
        return s.mechanisme === 'presence' || (s.id && s.id.startsWith('pr'));
      });
      gekozenSpoor = 1;
      break;

    case 'anticipatie':
    case 'digitaal_anticipatie':
      // Frequentie-check
      const anticipatieRecent = state.historie.slice(-5).filter(h => {
        const s = SUGGESTIE_POOL.find(x => x.id === h.id);
        return s && s.mechanisme === 'anticipatie';
      }).length;
      if(dagenActief < 14 && anticipatieRecent >= 1){
        // Fallback naar gewoon_jullie
        pool = SUGGESTIE_POOL.filter(s => _basisFilter(s) && s.cat === 'relationeel' && s.zwaarte <= 1);
      } else {
        pool = SUGGESTIE_POOL.filter(s => {
          if(!_basisFilter(s)) return false;
          if(!_nietRecent(s, 7)) return false;
          if(s.mechanisme !== 'anticipatie') return false;
          if(dagtype === 'digitaal_anticipatie' && s.type !== 'digitaal' && s.type !== 'op_afstand') return false;
          return true;
        });
      }
      gekozenSpoor = 3;
      break;

    case 'nieuwheid':
      const nieuwheidRecent = state.historie.slice(-10).filter(h => {
        const s = SUGGESTIE_POOL.find(x => x.id === h.id);
        return s && s.mechanisme === 'nieuwheid';
      }).length;
      if(dagenActief < 14 && nieuwheidRecent >= 1){
        pool = SUGGESTIE_POOL.filter(s => _basisFilter(s) && s.cat === 'relationeel' && s.zwaarte <= 1);
      } else {
        pool = SUGGESTIE_POOL.filter(s => {
          if(!_basisFilter(s)) return false;
          if(!_nietRecent(s, 14)) return false;
          return s.mechanisme === 'nieuwheid' || (s.id && s.id.startsWith('nw'));
        });
      }
      gekozenSpoor = 3;
      break;

    case 'doorloop':
      // Eerdere leerpaden herhalen
      pool = SUGGESTIE_POOL.filter(s => {
        if(!_basisFilter(s)) return false;
        if(!_nietRecent(s, 7)) return false;
        if(s.leerpad !== undefined && s.leerpad < actiefPad && s.leerpad > 0) return true;
        // Of gewoon bevestiging/presence als doorloop
        const sp = getSpoor4(s);
        return sp <= 2 && s.zwaarte <= 1;
      });
      gekozenSpoor = 1;
      break;

    case 'reflectie':
      // Reflectie wordt apart afgehandeld in renderVandaag
      return null;

    default:
      // Fallback
      pool = SUGGESTIE_POOL.filter(s => _basisFilter(s) && s.cat === 'relationeel');
      gekozenSpoor = 1;
  }

  // ═══════════════════════════════════════
  // FALLBACKS
  // ═══════════════════════════════════════
  if(pool.length === 0){
    // Probeer bevestiging
    pool = SUGGESTIE_POOL.filter(s => _basisFilter(s) && getSpoor4(s) === 2);
  }
  if(pool.length === 0){
    // Probeer gewoon_jullie / relationeel
    pool = SUGGESTIE_POOL.filter(s => s.cat === 'relationeel' && s.zwaarte <= 1 && (!s.minDagen || s.minDagen <= dagenActief));
  }
  if(pool.length === 0){
    pool = SUGGESTIE_POOL.filter(s => s.cat === 'relationeel');
  }

  // ═══════════════════════════════════════
  // BESTAANDE VERFIJNINGEN (behouden)
  // ═══════════════════════════════════════

  // Week-herhaling dempen
  const jaDezeWeek = state.historie.filter(h => h.status === 'ja' && daysSince(h.datum) < 7).map(h => h.id);
  if(jaDezeWeek.length > 0){
    const frisse = pool.filter(s => !jaDezeWeek.includes(s.id));
    if(frisse.length >= 2){
      pool = [...frisse, ...frisse, ...pool.filter(s => jaDezeWeek.includes(s.id))];
    }
  }

  // Milou-erbij boost: als Milou aanwezig, digitaal/subtiel voorrang
  if(isMilouAanwezig()){
    pool = pool.flatMap(s => {
      if(s.type === 'op_afstand' || s.type === 'digitaal') return [s, s, s];
      return [s];
    });
  }

  // Stem-rem: niet 2× verbaal achter elkaar
  if(state.laatsteActieType === 'stem'){
    const nietStem = pool.filter(s => s.actieType !== 'stem');
    if(nietStem.length > 0) pool = [...nietStem, ...nietStem, ...pool.filter(s => s.actieType === 'stem')];
  }

  // Humor-boost: na 2+ serieuze suggesties
  const serieuzeReeks = state.historie.slice(-3).filter(h => {
    const sug = SUGGESTIE_POOL.find(s => s.id === h.id);
    return sug && sug.zwaarte >= 2;
  }).length;
  if(serieuzeReeks >= 2){
    pool = pool.flatMap(s => (s.id && s.id.startsWith('hm')) ? [s, s, s] : [s]);
  }

  // Vibe-limiet: max 2× zelfde vibe in 7 dagen
  const vibeHistorie = state.historie.filter(h => h.datum && daysSince(h.datum) < 7).map(h => {
    const s = SUGGESTIE_POOL.find(x => x.id === h.id);
    return s ? s.vibe : null;
  }).filter(Boolean);
  const vibeTellingen = {};
  vibeHistorie.forEach(v => { vibeTellingen[v] = (vibeTellingen[v]||0) + 1; });
  const overvoerdeVibes = Object.keys(vibeTellingen).filter(v => vibeTellingen[v] >= 2);
  if(overvoerdeVibes.length > 0){
    const vibeFiltered = pool.filter(s => !overvoerdeVibes.includes(s.vibe));
    if(vibeFiltered.length >= 2) pool = vibeFiltered;
  }

  // Week-intensiteit: na ≥3 zware in 7 dagen → forceer licht
  const zwaarIn7d = state.historie.filter(h => daysSince(h.datum) < 7).filter(h => {
    const s = SUGGESTIE_POOL.find(x => x.id === h.id);
    return s && s.zwaarte >= 2;
  }).length;
  if(zwaarIn7d >= 3){
    const lichtPool = pool.filter(s => s.zwaarte <= 1);
    if(lichtPool.length >= 2) pool = lichtPool;
  }

  // Wens-boost (bestaande logica)
  const actieveWens = getTimWens();
  if(actieveWens && daysSince(actieveWens.datum) < 14){
    pool = pool.flatMap(s => {
      let boost = 1;
      if(actieveWens.type === 'spanning'){
        if(s.vibe === 'spanning' || s.vibe === 'controle') boost = 3;
        if(s.cat === 'vastmaak' || s.cat === 'sessie') boost = 3;
      } else if(actieveWens.type === 'aanraking'){
        if(s.items && s.items.length > 0) boost = 3;
        if(s.actieType === 'item') boost = 3;
      } else if(actieveWens.type === 'leiding'){
        if(s.vibe === 'controle') boost = 3;
        if(s.cat === 'opdracht') boost = 2;
      }
      if(actieveWens.type === 'vrij' && getSpoor(s) === 'C') boost = 2;
      return Array(boost).fill(s);
    });
  }

  // Comfort-level boost (bestaande logica)
  const comfortState = getComfortState();
  if(comfortState){
    pool = pool.flatMap(s => {
      const spoor = getSpoor(s);
      const cs = comfortState[spoor];
      if(!cs) return [s];
      const copies = 1 + Math.floor(cs.niveau);
      return Array(Math.min(copies, 4)).fill(s);
    });
  }

  // Thema-boost (bestaande logica)
  const themaState = getThemaState();
  const actiefThema = themaState.actiefThema;
  pool = pool.flatMap(s => {
    const sThema = getThema(s);
    if(sThema === 0) return [s];
    if(sThema === actiefThema) return [s, s, s];
    if(sThema === actiefThema - 1) return [s, s];
    if(sThema > actiefThema + 1) return [];
    return [s];
  });

  // ═══ successReeks escalatie ═══
  // 2x fijn = iets steviger binnen zelfde spoor
  // 3x fijn = combo-suggesties boost
  // 4x fijn = stretch-light boost
  const _sr = s4.successReeks || 0;
  if(_sr >= 2 && pool.length > 2){
    // Boost suggesties met zwaarte 2 (iets steviger)
    const _stevigerPool = pool.filter(s => s.zwaarte >= 2);
    if(_stevigerPool.length >= 2){
      pool = [...pool, ..._stevigerPool]; // Dubbele kans
    }
  }
  if(_sr >= 3 && pool.length > 2){
    // Boost combo-suggesties (opbouw=true)
    const _comboPool = pool.filter(s => s.opbouw === true);
    if(_comboPool.length >= 1){
      pool = [...pool, ..._comboPool, ..._comboPool]; // Triple kans
    }
  }
  if(_sr >= 4 && pool.length > 2){
    // Boost stretch-suggesties
    const _stretchPool = pool.filter(s => s.stretch === true);
    if(_stretchPool.length >= 1){
      pool = [...pool, ..._stretchPool, ..._stretchPool];
    }
  }

  // Ruzie-modus (bestaande logica)
  if(isRuzieModus()){
    const spoorAPool = pool.filter(s => getSpoor(s) === 'A');
    if(spoorAPool.length >= 2) pool = spoorAPool;
  }

  // Datum-afspraak boost (bestaande logica)
  const vandaagDatumCat = getAfspraken().filter(a => a.type === 'datum' && a.datum === today() && a.categorie).map(a => a.categorie);
  if(vandaagDatumCat.length > 0 && !reedsNee){
    const boostCat = vandaagDatumCat[0];
    const recentCats = state.historie.slice(-3).map(h => h.cat);
    const recentCatCount = recentCats.filter(c => c === boostCat).length;
    if(recentCatCount < 2){
      pool = pool.flatMap(s => s.cat === boostCat ? [s, s, s] : [s]);
    }
  }

  // Ontdekking tempo (bestaande logica)
  const _ontdStatus = getOntdekkingStatus();
  if(_ontdStatus.tempoOmlaag){
    pool = pool.filter(s => !(s.id && s.id.startsWith('on')));
    if(pool.length === 0) pool = SUGGESTIE_POOL.filter(s => s.cat === 'relationeel' && s.zwaarte <= 1);
  }

  // ═══════════════════════════════════════
  // STAP 8: Update spoor4 tracking
  // ═══════════════════════════════════════
  if(gekozenSpoor){
    s4.weekSpoorTelling[gekozenSpoor] = (s4.weekSpoorTelling[gekozenSpoor]||0) + 1;
    s4.laatsteSpoor = gekozenSpoor;
    saveSpoor4State(s4);
  }

  // ═══════════════════════════════════════
  // STAP 9: Pick
  // ═══════════════════════════════════════
  // Deduplicate pool for count
  const _uniquePool = [...new Set(pool.map(s=>s.id))];
  window._schedulerLog.kandidaten = _uniquePool.length;
  const _gekozen = pick(pool);
  window._schedulerLog.gekozen = _gekozen ? _gekozen.id + ' (' + _gekozen.cat + ', z' + _gekozen.zwaarte + ')' : 'GEEN';
  // Track zachteReeks
  if(_gekozen){
    const _isZacht = _gekozen.zwaarte <= 1 && (_gekozen.cat === 'relationeel' || _gekozen.vibe === 'warm' || _gekozen.vibe === 'zacht');
    const _zr = LS.get('l_zachteReeks', 0);
    if(_isZacht){
      LS.set('l_zachteReeks', _zr + 1);
    } else {
      LS.set('l_zachteReeks', 0);
    }
    window._schedulerLog.zachteReeks = LS.get('l_zachteReeks', 0);
  }
  return _gekozen;
}

// ─── Helper: weightedPick ───
function weightedPick(options){
  // options = [['label', gewicht], ...]
  const totaal = options.reduce((s,o) => s + o[1], 0);
  let r = Math.random() * totaal;
  for(const [label, gewicht] of options){
    r -= gewicht;
    if(r <= 0) return label;
  }
  return options[options.length-1][0];
}

// ─── Helper: bepaalActiefLeerpad ───
function _bepaalActiefLeerpad(state, s4){
  // Fase 0 al afgehandeld, begin bij 1
  if(s4.fase < 1) return 1;

  const historie = state.historie || [];
  let hoogstePad = 1;

  for(let pad = 1; pad <= 6; pad++){
    const padHistorie = historie.filter(h => {
      const s = SUGGESTIE_POOL.find(x => x.id === h.id);
      return s && (s.leerpad === pad || (getSpoor4(s) === 4 && pad >= 3));
    });
    const afgerond = padHistorie.filter(h => h.status === 'ja').length;
    const eigenInit = padHistorie.filter(h => {
      const s = SUGGESTIE_POOL.find(x => x.id === h.id);
      return s && s.eigenInitiatief;
    }).length;

    // Doorstroomeis: 3 afgerond + 1 eigen initiatief
    if(afgerond >= 3 && eigenInit >= 1){
      hoogstePad = Math.max(hoogstePad, pad + 1);
    }

    // Grote stap checkpoint (LP3+)
    if(pad >= 3){
      const recenteTeveel = (state.ervaringLog||[]).filter(e => e.val === 'teveel' && daysSince(e.datum) < 7).length;
      if(recenteTeveel > 0) hoogstePad = Math.min(hoogstePad, pad);
    }
  }

  // Max pad 6
  hoogstePad = Math.min(hoogstePad, 6);

  // Update fase in state
  if(hoogstePad !== s4.fase){
    s4.fase = hoogstePad;
    saveSpoor4State(s4);
  }

  return hoogstePad;
}

// ─── Helper: bepaalHuidigeStap ───
function _bepaalHuidigeStap(pad, state, s4){
  // Per pad: check hoeveel "fijn" bij elke stap
  const ervaringLog = state.ervaringLog || [];
  let stap = 1;

  for(let checkStap = 1; checkStap <= 4; checkStap++){
    const stapErvaringen = ervaringLog.filter(e => {
      const s = SUGGESTIE_POOL.find(x => x.id === e.suggestieId);
      return s && (s.leerpad === pad) && (s.stap === checkStap);
    });
    const fijn = stapErvaringen.filter(e => e.val === 'fijn').length;
    const teveel = stapErvaringen.filter(e => e.val === 'teveel').length;
    const pogingen = stapErvaringen.length;

    if(fijn >= 2){
      stap = checkStap + 1; // Door naar volgende stap
    } else if(pogingen >= 4){
      stap = checkStap + 1; // Na 4 pogingen door (zachter)
    } else if(teveel >= 2){
      stap = Math.max(1, checkStap - 1); // Terug
      break;
    } else {
      stap = checkStap; // Huidige stap
      break;
    }
  }

  return Math.min(stap, 4); // Max stap 4
}

function verwerkKeuze(keuze){ // 'ja','nee','ander'
  const state = getSuggestieState();
  if(!state.huidig) return;

  const vorigeCat = state.huidig.cat;

  state.historie.push({
    id: state.huidig.id,
    datum: today(),
    status: keuze,
    cat: vorigeCat
  });

  // Track datum voor kalenderpauze
  if(keuze !== 'ander') LS.set('l_lastSuggestieDatum', today());
  if(vorigeCat === 'sessie') LS.set('l_lastSessieDatum', today());
  if(vorigeCat === 'vastmaak' || vorigeCat === 'sessie') LS.set('l_lastEveningDate', today());

  // Comfort-spiraal: typeHistorie
  const actieType = state.huidig.actieType;
  if(actieType && keuze !== 'ander'){
    if(!state.typeHistorie) state.typeHistorie = [];
    const status = (keuze === 'ja') ? 'ja' : 'nee';
    state.typeHistorie.push({ type: actieType, status, datum: today() });
    if(state.typeHistorie.length > 20) state.typeHistorie = state.typeHistorie.slice(-20);
  }

  // Escalatie/deëscalatie
  const laatste3 = state.historie.slice(-3);
  if(keuze === 'ja'){
    if(state.huidig.lopend){
      state.lopend = {
        id: state.huidig.id, cat: state.huidig.cat, tekst: state.huidig.tekst,
        startDatum: today(), duurDagen: state.huidig.duurDagen || 1
      };
    }
    // Selectieve ervaringscheck: niet na elke micro
    const huidigeZwaarte = state.huidig.zwaarte || 1;
    const gedaneCats = [...new Set(state.historie.slice(0,-1).map(h=>h.cat))];
    const eersteKeerCat = !gedaneCats.includes(vorigeCat);
    const vraagErvaring = huidigeZwaarte >= 2 || eersteKeerCat || Math.random() < 0.33;
    state.wachtOpErvaring = vraagErvaring;
    state.wachtOpErvaringDatum = vraagErvaring ? today() : null;
    const alJa = laatste3.every(h => h.status === 'ja');
    if(alJa && state.niveau < 3) state.niveau++;
  } else if(keuze === 'rustig'){
    // Afwijzing — telt als 'nee' voor escalatie
    const laatste2 = state.historie.slice(-2);
    const alNee = laatste2.every(h => h.status === 'nee' || h.status === 'rustig' || h.status === 'nietnu' || h.status === 'niksvoormij');
    if(alNee && state.niveau > 1) state.niveau--;
  }

  state.laatsteCategorie = vorigeCat;
  state.laatsteActieType = actieType || null;

  // ─── 4-SPOREN TRACKING ───
  if(keuze === 'ja' || keuze === 'nee'){
    const s4 = getSpoor4State();
    const sug = SUGGESTIE_POOL.find(s => s.id === state.huidig?.id);
    if(sug){
      const spoor = getSpoor4(sug);
      // Track eigen initiatief
      if(sug.eigenInitiatief && keuze === 'ja'){
        s4.eigenInitiatiefCount = (s4.eigenInitiatiefCount||0) + 1;
      }
    }
    saveSpoor4State(s4);
  }

  state.huidig = null;

  // Counter: suggesties bekeken zonder afwijzing (voor advanced gate lesjes)
  if(keuze === 'ja'){
    LS.set('l_sugZonderAfwijzing', (LS.get('l_sugZonderAfwijzing', 0)) + 1);
  }

  // Wens auto-expire check na elke keuze
  if(keuze === 'ja') checkWensExpiry();

  if(keuze === 'ander'){
    // FIX: Block 'ander' during ruzie-modus (alleen Spoor A)
    if(isRuzieModus()){
      state.huidig = null;
      saveSuggestieState(state);
      toonBevestiging('Rustige periode — geen alternatieven');
      renderApp();
      return;
    }
    anderCount = (anderCount||0) + 1;
    const recenteIds = state.historie.slice(-15).map(h => h.id);
    let pool;
    if(anderCount >= 3){
      anderCount = 0;
      const andereCats = ['micro','opdracht','relationeel','vastmaak'].filter(c => c !== vorigeCat);
      pool = SUGGESTIE_POOL.filter(s =>
        andereCats.includes(s.cat) &&
        !recenteIds.includes(s.id) &&
        !isSuggestieGeblokkeerd(state, s.id) && // FIX: Check blokkering
        s.zwaarte <= state.niveau + 1
      );
    } else {
      pool = SUGGESTIE_POOL.filter(s =>
        s.cat === vorigeCat &&
        !recenteIds.includes(s.id) &&
        !isSuggestieGeblokkeerd(state, s.id) && // FIX: Check blokkering
        s.zwaarte <= state.niveau + 1
      );
      if(pool.length === 0) pool = SUGGESTIE_POOL.filter(s => s.cat === vorigeCat && !isSuggestieGeblokkeerd(state, s.id));
    }
    if(pool.length === 0) pool = SUGGESTIE_POOL.filter(s => s.cat === 'micro'); // FIX: Ultieme fallback
    const nieuwe = pool.length > 0 ? pick(pool) : null;
    if(nieuwe){
      state.huidig = { ...nieuwe, datum: today() };
    } else {
      state.huidig = null;
      saveSuggestieState(state);
      const app = document.getElementById('app');
      if(app){
        const container = app.querySelector('.suggestie-card');
        if(container) {
          container.outerHTML = `<div class="empty-state" style="padding:2rem 1rem;text-align:center">
            <p style="font-size:1rem;color:var(--text2);margin-bottom:.5rem">Even geen nieuw idee.</p>
            <p style="font-size:.85rem;color:var(--text3)">Morgen is er weer iets.</p>
          </div>`;
        } else {
          renderApp();
        }
      }
      return;
    }
  } else if(keuze === 'lichter'){
    // Iets lichters nu, maar onthoud dat deze categorie over 2-3 dagen terug moet komen
    state.uitgesteld = { cat: vorigeCat, terugOp: today() };
    // Geef nu iets lichters
    const lichterCat = {sessie:'vastmaak', vastmaak:'micro', opdracht:'micro', micro:'micro', relationeel:'relationeel'}[vorigeCat] || 'micro';
    const recenteIds = state.historie.slice(-15).map(h => h.id);
    let pool = SUGGESTIE_POOL.filter(s =>
      s.cat === lichterCat &&
      !recenteIds.includes(s.id) &&
      s.zwaarte <= state.niveau + 1
    );
    if(pool.length === 0) pool = SUGGESTIE_POOL.filter(s => s.cat === lichterCat);
    const nieuwe = pool.length > 0 ? pick(pool) : null;
    if(nieuwe){
      state.huidig = { ...nieuwe, datum: today() };
    }
  }
  // 'rustig' → geen nieuwe suggestie, rustige avond

  saveSuggestieState(state);
  // P1: Update thema-tracking en comfortzone
  if(keuze === 'ja' || keuze === 'rustig' || keuze === 'nee'){
    const sugId = state.historie.length > 0 ? state.historie[state.historie.length-1].id : null;
    if(sugId){
      updateThemaScore(sugId, keuze === 'ja' ? 'ja' : 'nee');
      if(keuze === 'ja') updateComfort(sugId, true);
      else updateComfort(sugId, false);
    }
  }
  // P1: Check veiligheidsklep
  checkVeiligheidsklep();
  if(keuze === 'ja') toonBevestiging('✓ Aangenomen');
  else if(keuze === 'rustig') toonBevestiging('✓ Rustige avond');
  renderApp();
}

// "Niet nu" = korte rem. Suggestie komt later (volgende week) terug.
function verwerkNietNu(){
  const state = getSuggestieState();
  if(!state.huidig) return;
  const id = state.huidig.id;
  state.historie.push({ id, datum: today(), status:'nietnu', cat: state.huidig.cat });
  if(!state.korteRem) state.korteRem = [];
  state.korteRem.push({ id, datum: today(), terugNa: 7 });
  state.korteRem = state.korteRem.filter(r => daysSince(r.datum) < 30);
  LS.set('l_lastSuggestieDatum', today());
  LS.set('l_sugZonderAfwijzing', 0); // Reset counter
  // FIX: Track thema/comfort bij afwijzing
  updateThemaScore(id, 'nee');
  updateComfort(id, false);
  state.huidig = null;
  saveSuggestieState(state);
  toonBevestiging('✓ Een andere keer');
  renderApp();
}

// "Niks voor mij" = lange rem. Verdwijnt 4-8 weken, komt alleen terug in zachtere vorm.
function verwerkNiksVoorMij(){
  const state = getSuggestieState();
  if(!state.huidig) return;
  const id = state.huidig.id;
  const cat = state.huidig.cat;
  const actieType = state.huidig.actieType;
  state.historie.push({ id, datum: today(), status:'niksvoormij', cat });
  // Lange rem: 4-8 weken (random, zodat het niet voorspelbaar is)
  if(!state.langeRem) state.langeRem = [];
  const weken = 4 + Math.floor(Math.random() * 5); // 4-8 weken
  state.langeRem.push({ id, cat, actieType: actieType||null, datum: today(), terugNaDagen: weken * 7 });
  // Tel negatieven voor deze categorie — bij 3+ zachte reset
  const recentNegatief = state.historie.slice(-10).filter(h =>
    (h.status === 'niksvoormij' || h.status === 'nietnu') && h.cat === cat
  );
  if(recentNegatief.length >= 3){
    // Zachte reset: verlaag niveau en switch focus
    if(state.niveau > 1) state.niveau--;
  }
  LS.set('l_lastSuggestieDatum', today());
  LS.set('l_sugZonderAfwijzing', 0); // Reset counter
  // FIX: Track thema/comfort bij afwijzing
  updateThemaScore(id, 'nee');
  updateComfort(id, false);
  state.huidig = null;
  saveSuggestieState(state);
  toonBevestiging('✓ Begrepen');
  toonTimAfwijzingSignaal(id, cat);
  renderApp();
}

// Check of een suggestie-id geblokkeerd is door korte of lange rem
function isSuggestieGeblokkeerd(state, id){
  // Korte rem: check of afkoelperiode voorbij is
  const korteRem = (state.korteRem || []).find(r => r.id === id);
  if(korteRem && daysSince(korteRem.datum) < (korteRem.terugNa || 7)) return true;
  // Lange rem: check of terugkeerperiode voorbij is
  const langeRem = (state.langeRem || []).find(r => r.id === id);
  if(langeRem && daysSince(langeRem.datum) < (langeRem.terugNaDagen || 28)) return true;
  return false;
}

// Periodieke herwaardering: "Zijn er dingen die anders voelen?" (na maanden, zacht)
function getHerwaarderingVraag(){
  const state = getSuggestieState();
  const langeRem = state.langeRem || [];
  // Alleen als er items zijn die 8+ weken geleden afgewezen zijn
  const verlopen = langeRem.filter(r => daysSince(r.datum) > (r.terugNaDagen || 28) + 14);
  if(verlopen.length === 0) return null;
  // Max 1x per 8 weken vragen
  const laatsteHerw = LS.get('l_laatsteHerwaardering', null);
  if(laatsteHerw && daysSince(laatsteHerw) < 56) return null;
  return { aantalItems: verlopen.length };
}

function bevestigHerwaardering(accepteer){
  if(accepteer){
    const state = getSuggestieState();
    // Verwijder verlopen lange-rem items zodat ze weer in de pool komen
    state.langeRem = (state.langeRem || []).filter(r => daysSince(r.datum) <= (r.terugNaDagen || 28) + 14);
    saveSuggestieState(state);
  }
  LS.set('l_laatsteHerwaardering', today());
  renderApp();
}

// ─── P0: Lisanne-waardering systeem ─────────────────────────
function getWaardering(){
  const state = getSuggestieState();
  const hist = state.historie || [];
  const laatsteJa = hist.slice().reverse().find(h => h.status === 'ja');
  if(!laatsteJa) return null;
  // Tonen als het binnen 48 uur was
  if(daysSince(laatsteJa.datum) > 2) return null;
  // Niet tonen als al gezien
  const laatsteWaard = LS.get('l_laatsteWaardering', null);
  if(laatsteWaard === laatsteJa.datum) return null;
  // Waarderingsteksten per context
  const eersteKeer = hist.filter(h => h.status === 'ja').length <= 1;
  const sug = SUGGESTIE_POOL.find(s => s.id === laatsteJa.id);
  const wasZwaar = sug && sug.zwaarte >= 2;
  if(eersteKeer) return { tekst: 'Je probeerde iets nieuws. Dat is al veel.', emoji: '✨' };
  if(wasZwaar) return { tekst: 'Dit vroeg moed. Goed dat je het deed.', emoji: '💛' };
  // Wisselende zachte waardering
  const waarderingen = [
    { tekst: 'Fijn dat je dit deed.', emoji: '🌿' },
    { tekst: 'Dat was lief van je.', emoji: '💛' },
    { tekst: 'Je doet precies genoeg.', emoji: '🌸' },
    { tekst: 'Tim waardeert dit soort dingen.', emoji: '💛' }
  ];
  return waarderingen[Math.abs(hashStr(laatsteJa.datum + laatsteJa.id)) % waarderingen.length];
}

function dismissWaardering(){
  const state = getSuggestieState();
  const laatsteJa = (state.historie||[]).slice().reverse().find(h => h.status === 'ja');
  if(laatsteJa) LS.set('l_laatsteWaardering', laatsteJa.datum);
  renderApp();
}

// ─── P0: Undo systeem ──────────────────────────────────────
let _undoTimer = null;
let _undoData = null;

function logErvaringMetUndo(val){
  const state = getSuggestieState();
  const laatsteJa = state.historie.slice().reverse().find(h => h.status === 'ja');
  // Bewaar huidige staat voor undo
  _undoData = {
    val,
    prevWachtOpErvaring: state.wachtOpErvaring,
    prevErvaringLogLen: (state.ervaringLog||[]).length
  };
  // Voer de logErvaring uit
  logErvaring(val);
  // Registreer interactie voor engagement-tracking
  registreerInteractie();
  // Reflectievraag (30% kans) of ontdekking-vraag (20% kans extra)
  const _reflKans = Math.random();
  const _startDatum = LS.get('l_startdatum', null);
  const _dagenActief = _startDatum ? daysSince(_startDatum) : 0;
  const _huidigeSug = getSuggestieState().huidig;
  const _huidigeCat = _huidigeSug ? _huidigeSug.cat : null;

  // Directe reflectieVraag uit suggestie (4-sporen systeem)
  const _laatsteJaSug = state.historie.slice().reverse().find(h => h.status === 'ja');
  if(_laatsteJaSug && val === 'fijn'){
    const _sugObj = SUGGESTIE_POOL.find(s => s.id === _laatsteJaSug.id);
    if(_sugObj && _sugObj.reflectieVraag){
      LS.set('l_reflectieVraag', { tekst: _sugObj.reflectieVraag, context: _sugObj.tekst, datum: today(), ervaring: val });
    }
  }

  if(_reflKans < 0.30 && !LS.get('l_reflectieVraag')){
    // Probeer eerst een ontdekking-vraag (als er een past)
    let _gekozenVraag = null;
    if(_dagenActief >= 14){
      const _ontdVragen = ONTDEKKING_VRAGEN.filter(v =>
        v.na.includes(val) &&
        _dagenActief >= v.minDagen &&
        (!_huidigeCat || v.context.includes(_huidigeCat))
      );
      if(_ontdVragen.length > 0 && Math.random() < 0.4){
        _gekozenVraag = _ontdVragen[Math.floor(Math.random() * _ontdVragen.length)];
      }
    }
    // Anders een gewone reflectievraag
    if(!_gekozenVraag){
      const _mogelijkeVragen = REFLECTIE_VRAGEN.filter(v => v.na.includes(val));
      if(_mogelijkeVragen.length > 0){
        _gekozenVraag = _mogelijkeVragen[Math.floor(Math.random() * _mogelijkeVragen.length)];
      }
    }
    if(_gekozenVraag){
      LS.set('l_reflectieVraag', { tekst: _gekozenVraag.tekst, datum: today(), ervaring: val });
    }
  }
  // Toon undo toast
  toonUndoToast(val);
}

function toonUndoToast(val){
  // Verwijder bestaande toast
  const existing = document.querySelector('.undo-toast');
  if(existing) existing.remove();
  if(_undoTimer) clearTimeout(_undoTimer);
  const warmLabels = { fijn:'Mooi moment.', neutraal:'Oké, begrepen.', teveel:'Goed dat je het zegt.', reactie_viel_tegen:'Begrepen.' };
  const toast = document.createElement('div');
  toast.className = 'undo-toast';
  toast.innerHTML = `<span>&#x2728; ${warmLabels[val]||'Begrepen.'}</span><button onclick="undoErvaring()">Ongedaan maken</button>`;
  document.body.appendChild(toast);
  _undoTimer = setTimeout(() => {
    toast.remove();
    _undoData = null;
    _undoTimer = null;
  }, 30000); // 30 seconden
}

function undoErvaring(){
  if(!_undoData) return;
  const state = getSuggestieState();
  // Verwijder laatste ervaringLog entry
  if(state.ervaringLog && state.ervaringLog.length > (_undoData.prevErvaringLogLen || 0)){
    state.ervaringLog.pop();
  }
  // FIX: Herstel de ORIGINELE wachtOpErvaring staat
  state.wachtOpErvaring = _undoData.prevWachtOpErvaring !== undefined ? _undoData.prevWachtOpErvaring : true;
  state.wachtOpErvaringDatum = state.wachtOpErvaring ? today() : null;
  saveSuggestieState(state);
  // Opruimen
  const toast = document.querySelector('.undo-toast');
  if(toast) toast.remove();
  if(_undoTimer) clearTimeout(_undoTimer);
  _undoData = null;
  _undoTimer = null;
  toonBevestiging('↩ Ongedaan gemaakt');
  renderApp();
}

// Helper: simpele string hash voor deterministische keuzes
function hashStr(s){
  let h=0; for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;} return h;
}

// ─── P0: Positieve terugblik voor rustdagen ─────────────────
function getPositieveTerugblik(){
  const state = getSuggestieState();
  // Positieve terugblik: feedback OF gedrag telt
  const fijne = (state.ervaringLog||[]).filter(e => e.val === 'fijn' && e.sugTekst);
  // Fallback: geaccepteerde suggesties als er geen "fijn" feedback is
  let bronnen = fijne;
  if(bronnen.length === 0){
    const geaccepteerd = (state.historie||[]).filter(h => h.status === 'ja');
    if(geaccepteerd.length === 0) return null;
    // Maak terugblik-items van geaccepteerde suggesties
    const recent = geaccepteerd.slice(-5);
    const resultaat = [];
    for(const h of recent){
      const sug = SUGGESTIE_POOL.find(s => s.id === h.id);
      if(sug){
        const t = sug.tekst || '';
        resultaat.push({ tekst: t.substring(0, 60) + (t.length > 60 ? '…' : ''), datum: h.datum });
      }
    }
    return resultaat.length > 0 ? resultaat.slice(0,2) : null;
  }
  // Kies max 2 recente positieve momenten
  const gesorteerd = bronnen.slice().sort((a,b) => b.datum > a.datum ? 1 : -1);
  const resultaat = [];
  for(let i=0; i<Math.min(2, gesorteerd.length); i++){
    const t = gesorteerd[i].sugTekst || '';
    resultaat.push({
      tekst: t.substring(0, 60) + (t.length > 60 ? '…' : ''),
      datum: gesorteerd[i].datum
    });
  }
  return resultaat;
}


// ─── Tim's Discipline Logic ─────────────────────────────────
function getDisciplineState(){
  return LS.get('t_discipline',{
    log:[], // [{datum,taakId,gedaan:bool}]
    momentLog:[], // [{datum}]
    reactieLog:[], // [{datum,notitie}]
    emotieLog:[] // [{datum,emotie,wie:'tim'}]
  });
}
function saveDisciplineState(s){ LS.set('t_discipline',s) }

function getDisciplineStreak(){
  const state = getDisciplineState();
  const log = state.log.slice().sort((a,b) => b.datum.localeCompare(a.datum));
  let streak = 0;
  let checkDate = new Date(debugNow());
  // Als vandaag nog niet gelogd, begin bij gisteren
  if(!log.find(l => l.datum === today())) checkDate.setDate(checkDate.getDate() - 1);
  for(let i = 0; i < 60; i++){
    const ds = checkDate.toISOString().split('T')[0];
    const entry = log.find(l => l.datum === ds);
    if(entry && entry.gedaan) streak++;
    else break;
    checkDate.setDate(checkDate.getDate() - 1);
  }
  return streak;
}

function getDagTaak(){
  const state = getDisciplineState();
  const vandaag = today();
  const alGedaan = state.log.find(l => l.datum === vandaag);
  if(alGedaan) return { taak: DISCIPLINE_POOL.find(t=>t.id===alGedaan.taakId), gedaan: alGedaan.gedaan };

  // Kies nieuwe taak — deterministic per dag (zelfde dag = zelfde taak)
  const recenteIds = state.log.slice(-7).map(l => l.taakId);
  let pool = DISCIPLINE_POOL.filter(t => !recenteIds.includes(t.id));
  if(pool.length === 0) pool = DISCIPLINE_POOL;
  let hash = 0;
  for(let i = 0; i < vandaag.length; i++) hash = ((hash << 5) - hash) + vandaag.charCodeAt(i);
  return { taak: pool[Math.abs(hash) % pool.length], gedaan: null };
}

function getWeekScore(){
  const state = getDisciplineState();
  const ws = getWeekStart();
  const weekLogs = state.log.filter(l => l.datum >= ws);
  const gedaan = weekLogs.filter(l => l.gedaan).length;
  return { gedaan, total: weekLogs.length };
}

function getWarmte(){
  const week = getWeekScore();
  const state = getDisciplineState();
  const recenteMomenten = state.momentLog.filter(m => daysSince(m.datum) < 14).length;

  // Dagritme score (laatste 7 dagen)
  const dagState = getDagritmeState();
  let dagDoneCount = 0;
  const weekGeleden = new Date(debugNow()); weekGeleden.setDate(weekGeleden.getDate()-7);
  const ws7 = weekGeleden.toISOString().split('T')[0];
  for(const datum in dagState.days){
    if(datum >= ws7){
      const blks = dagState.days[datum].blocks || {};
      for(const bId in blks){ if(isBlokCompleted(blks[bId])) dagDoneCount++; }
    }
  }
  const dagRitmeScore = Math.min(dagDoneCount / 10, 1);

  const discScore = week.total > 0 ? week.gedaan / week.total : 0;
  const momentScore = Math.min(recenteMomenten / 2, 1);

  const totaal = (discScore * 0.3) + (momentScore * 0.3) + (dagRitmeScore * 0.4);
  if(totaal > 0.55) return 'warm';
  if(totaal > 0.3) return 'neutraal';
  return 'koud';
}


// ─── Dagritme Logic ─────────────────────────────────────────────
// ─── Dagritme Data Model ─────────────────────────────────────
// State per datum: { days: { "2026-03-05": { blocks: { blockId: BlockState } } } }
// BlockState: { choiceId, choiceLabel, chosenAt, doneAt, override: { text, createdAt, seenAt, completedAt } }

function getDagritmeState(){ return LS.get('t_dagritme2',{ days:{} }) }
function saveDagritmeState(s){ LS.set('t_dagritme2',s) }

// Read-only: returns copy of blocks for datum (never mutates LS)
function getDagBlocks(datum){
  const state = getDagritmeState();
  return (state.days[datum] && state.days[datum].blocks) ? state.days[datum].blocks : {};
}
// Read-only: returns copy of blockstate (never mutates LS)
function getBlockState(datum, blokId){
  const blocks = getDagBlocks(datum);
  return blocks[blokId] || {};
}
function saveBlockState(datum, blokId, bs){
  const state = getDagritmeState();
  if(!state.days[datum]) state.days[datum] = { blocks:{} };
  state.days[datum].blocks[blokId] = bs;
  // Cleanup: verwijder dagen ouder dan 14 dagen
  const keys = Object.keys(state.days);
  if(keys.length > 20){
    keys.sort();
    const cutoff = keys.length - 14;
    for(let i=0; i<cutoff; i++) delete state.days[keys[i]];
  }
  saveDagritmeState(state);
}

function getWeekNr(){
  const d = new Date(debugNow());
  const start = new Date(d.getFullYear(),0,1);
  return Math.ceil(((d - start)/86400000 + start.getDay()+1)/7);
}

function getDagritmeBlokkenVandaag(){
  const dag = new Date(debugNow()).getDay();
  return DAGRITME_BLOKKEN.filter(b => b.weekdagen.includes(dag));
}

function getDagritmeBlokkenVoorDag(datum){
  // datum = 'YYYY-MM-DD' string
  const d = new Date(datum + 'T12:00:00');
  const dag = d.getDay();
  return DAGRITME_BLOKKEN.filter(b => b.weekdagen.includes(dag));
}

function getMorgen(){
  const d = new Date(debugNow());
  d.setDate(d.getDate() + 1);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function isBlokCompleted(bs){
  if(bs && bs.override){
    // Override wint als die na keuze kwam
    if(bs.chosenAt && bs.override.createdAt > bs.chosenAt){
      return !!bs.override.completedAt;
    }
    if(bs.override.createdAt) return !!bs.override.completedAt;
  }
  return !!bs?.doneAt;
}

function hasActiveOverride(bs){
  if(!bs?.override) return false;
  // Override wint altijd als er geen keuze is, of als override na keuze kwam
  if(!bs.chosenAt) return true;
  return bs.override.createdAt > bs.chosenAt;
}

// Is er iets voor Tim te doen op dit blok? (choice of override)
function isActionable(def, bs){
  if(def.kind === 'choice') return true;
  if(hasActiveOverride(bs)) return true;
  return false;
}

function getActiveBlock(){
  const blokken = getDagritmeBlokkenVandaag();
  const vandaag = today();
  const uur = new Date(debugNow()).getHours();
  const blocks = getDagBlocks(vandaag);

  // Eerste actionable blok waarvan endHour > nu EN niet completed
  for(const def of blokken){
    const bs = blocks[def.id] || {};
    if(isActionable(def, bs) && def.uurRange[1] > uur && !isBlokCompleted(bs)) return def;
  }
  // Fallback: laatste gemiste blok (alleen als max 2 uur geleden afgelopen)
  for(let i = blokken.length - 1; i >= 0; i--){
    const def = blokken[i];
    const bs = blocks[def.id] || {};
    if(isActionable(def, bs) && !isBlokCompleted(bs) && (uur - def.uurRange[1]) <= 2) return def;
  }
  return null; // alles gedaan of te lang geleden
}

function getBlokInteractivity(def, bs, nowHour){
  const isPastOrActive = def.uurRange[0] <= nowHour;
  const overrideActive = hasActiveOverride(bs);
  if(isPastOrActive){
    if(overrideActive) return 'overrideComplete';
    if(def.kind === 'choice') return 'chooseAndComplete';
    return 'fixedOnly';
  }
  // Future
  if(overrideActive) return 'readOnly';
  return 'locked';
}

function getBlokOpties(blok){
  const weekSeed = String(getWeekNr()) + blok.id;
  // Roteer 2 uit vast-pool (niet altijd dezelfde 2)
  let vast2;
  if(blok.vast.length <= 2){
    vast2 = blok.vast;
  } else {
    // Gebruik weeknr als seed om 2 te kiezen
    const idx = pickStabiel(blok.vast, weekSeed);
    const rest = blok.vast.filter(v => v.id !== idx.id);
    const idx2 = pickStabiel(rest, weekSeed + 'b');
    vast2 = [idx, idx2];
  }
  const wc = blok.wildcards;
  if(wc.length === 0) return vast2;
  const wildcard = pickStabiel(wc, weekSeed + 'w');
  return [...vast2, wildcard];
}

function getUnseenFutureOverrides(){
  const vandaag = today();
  const blocks = getDagBlocks(vandaag);
  const uur = new Date(debugNow()).getHours();
  const blokken = getDagritmeBlokkenVandaag();
  const unseen = [];
  for(const def of blokken){
    const bs = blocks[def.id];
    if(bs?.override && !bs.override.seenAt && def.uurRange[0] > uur){
      unseen.push({ def, override: bs.override });
    }
  }
  return unseen;
}

function markOverridesSeen(){
  const vandaag = today();
  const state = getDagritmeState();
  if(!state.days[vandaag]) return;
  const blocks = state.days[vandaag].blocks;
  let changed = false;
  for(const blokId in blocks){
    const bs = blocks[blokId];
    if(bs.override && !bs.override.seenAt){
      bs.override.seenAt = Date.now();
      changed = true;
    }
  }
  if(changed) saveDagritmeState(state);
}

// ─── Lerende quick-picks ─────────────────────────────────────
function leerOverrideTekst(blokId, tekst){
  // Check of het een standaard-optie is (dan niet opslaan)
  const def = DAGRITME_BLOKKEN.find(b => b.id === blokId);
  if(def){
    const standaard = [...def.vast, ...def.wildcards].map(o => o.tekst.toLowerCase());
    // Multi-select: splits op " + " en check elke individuele taak
    const delen = tekst.split(' + ').map(t => t.trim().toLowerCase());
    const isAlleenStandaard = delen.every(d => standaard.includes(d));
    if(isAlleenStandaard) return;
  }
  // Sla individuele delen op (niet de gecombineerde string)
  const delen = tekst.split(' + ').map(t => t.trim());
  delen.forEach(deel => {
    if(!deel || deel.length < 3) return;
    const def2 = DAGRITME_BLOKKEN.find(b => b.id === blokId);
    if(def2){
      const standaard = [...def2.vast, ...def2.wildcards].map(o => o.tekst.toLowerCase());
      if(standaard.includes(deel.toLowerCase())) return;
    }
    const custom = LS.get('l_customOverrides', []);
    // [{tekst, count, laatst}]
    const bestaand = custom.find(c => c.tekst.toLowerCase() === deel.toLowerCase());
    if(bestaand){
      bestaand.count++;
      bestaand.laatst = today();
    } else {
      custom.push({ tekst: deel.substring(0,80), count: 1, laatst: today() });
    }
    // Max 30 onthouden, verwijder oudste als vol
    while(custom.length > 30) custom.shift();
    LS.set('l_customOverrides', custom);
  });
}

function getLisanneQuickPicks(){
  const custom = LS.get('l_customOverrides', []);
  // Alleen tonen als 2+ keer gebruikt
  return custom.filter(c => c.count >= 2).sort((a,b) => b.count - a.count).slice(0,5);
}

function getDagritmeScore(){
  const vandaag = today();
  const blokken = getDagritmeBlokkenVandaag().filter(b => b.kind === 'choice' || hasActiveOverride(getBlockState(vandaag, b.id)));
  const blocks = getDagBlocks(vandaag);
  let gedaan = 0;
  blokken.forEach(def => {
    const bs = blocks[def.id] || {};
    if(isBlokCompleted(bs)) gedaan++;
  });
  return { gedaan, total: blokken.length };
}

function getDagritmeStreak(){
  const state = getDagritmeState();
  let streak = 0;
  let checkDate = new Date(debugNow());
  const vandaag = today();
  // Check of vandaag al iets gedaan
  const todayBlocks = state.days[vandaag]?.blocks || {};
  const todayDone = Object.values(todayBlocks).some(bs => isBlokCompleted(bs));
  if(!todayDone) checkDate.setDate(checkDate.getDate() - 1);
  for(let i = 0; i < 60; i++){
    const ds = checkDate.toISOString().split('T')[0];
    const dayData = state.days[ds];
    if(dayData && dayData.blocks){
      const anyDone = Object.values(dayData.blocks).some(bs => isBlokCompleted(bs));
      if(anyDone) streak++;
      else break;
    } else { break; }
    checkDate.setDate(checkDate.getDate() - 1);
  }
  return streak;
}

function getAutopilotDezeWeek(){
  const ws = getWeekStart();
  let count = 0;
  for(let i = 0; i < 7; i++){
    const d = new Date(ws + 'T12:00:00');
    d.setDate(d.getDate() + i);
    const ds = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    if(ds > today()) break;
    if(LS.get('autopilot_used_'+ds, false)) count++;
  }
  return count;
}

function isAutopilotDag(){
  // Max 3 autopilot-acties per week, min 1 dag rust ertussen
  if(getAutopilotDezeWeek() >= 3) return false;
  // Check of gisteren autopilot was → dan vandaag rust
  const gisteren = new Date(debugNow());
  gisteren.setDate(gisteren.getDate() - 1);
  const gisterenStr = gisteren.getFullYear() + '-' + String(gisteren.getMonth()+1).padStart(2,'0') + '-' + String(gisteren.getDate()).padStart(2,'0');
  if(LS.get('autopilot_used_'+gisterenStr, false)) return false;
  return true;
}

// ═══════════════════════════════════════════════════════════════
// CROSS-DEVICE SYNC — clipboard-gebaseerd
// ═══════════════════════════════════════════════════════════════
function getSyncData(){
  const keys = Object.keys(localStorage).filter(k => k.startsWith('souffleur_'));
  const data = {_v:1, _ts:Date.now(), _d:{}};
  keys.forEach(k => { data._d[k] = localStorage.getItem(k); });
  return data;
}

function compressSync(data){
  try {
    const json = JSON.stringify(data);
    // Simple base64 encoding
    return btoa(unescape(encodeURIComponent(json)));
  } catch(e){ return null; }
}

function decompressSync(str){
  try {
    const json = decodeURIComponent(escape(atob(str.trim())));
    return JSON.parse(json);
  } catch(e){ return null; }
}

async function kopieerSyncCode(){
  const data = getSyncData();
  const code = compressSync(data);
  if(!code){ toonBevestiging('\u274c Sync mislukt'); return; }

  try {
    await navigator.clipboard.writeText(code);
    LS.set('l_laatsteSync', {richting:'export', ts:Date.now()});
    toonBevestiging('\u2713 Sync-code gekopieerd (' + Object.keys(data._d).length + ' items)');
  } catch(e){
    // Fallback: toon code in modal
    toonSyncCodeModal(code, 'export');
  }
}

async function plakSyncCode(){
  try {
    const code = await navigator.clipboard.readText();
    if(!code || code.length < 10){
      toonSyncCodeModal('', 'import');
      return;
    }
    verwerkSyncCode(code);
  } catch(e){
    toonSyncCodeModal('', 'import');
  }
}

function verwerkSyncCode(code){
  const data = decompressSync(code);
  if(!data || !data._d){
    toonBevestiging('\u274c Geen geldige sync-code');
    return;
  }

  const keys = Object.keys(data._d).filter(k => k.startsWith('souffleur_'));
  if(keys.length === 0){
    toonBevestiging('\u274c Geen data gevonden in sync-code');
    return;
  }

  const syncTs = data._ts ? new Date(data._ts) : null;
  const tsLabel = syncTs ? syncTs.toLocaleString('nl-NL', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : 'onbekend';

  if(!confirm('Data van ' + tsLabel + ' importeren? (' + keys.length + ' items)\\nDit vervangt alle huidige data.')) return;

  // Clear + import
  Object.keys(localStorage).filter(k => k.startsWith('souffleur_')).forEach(k => localStorage.removeItem(k));
  keys.forEach(k => { localStorage.setItem(k, data._d[k]); });

  LS.set('l_laatsteSync', {richting:'import', ts:Date.now(), bron:data._ts});
  toonBevestiging('\u2713 Sync voltooid — ' + keys.length + ' items');
  renderApp();
}

function importData(){
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        const keys = Object.keys(data).filter(k => k.startsWith('souffleur_'));
        if(keys.length === 0){ alert('Geen geldige backup gevonden.'); return; }
        if(!confirm('Alle huidige data vervangen door backup? Dit kan niet ongedaan worden.')){ return; }
        // Clear existing
        Object.keys(localStorage).filter(k => k.startsWith('souffleur_')).forEach(k => localStorage.removeItem(k));
        // Import
        keys.forEach(k => { localStorage.setItem(k, data[k]); });
        toonBevestiging('✓ Backup hersteld');
        renderApp();
      } catch(err){
        alert('Fout bij het lezen van het bestand.');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ─── Weekoverzicht + Autonomie-balans ──────────────────────────
function getWeekOverzicht(){
  const state = getDagritmeState();
  let zelfGekozen = 0, gestuurd = 0, totaalGedaan = 0;
  const nu = new Date(debugNow());
  for(let i = 0; i < 7; i++){
    const d = new Date(nu);
    d.setDate(d.getDate() - i);
    const datum = d.toISOString().split('T')[0];
    const dayBlocks = state.days[datum]?.blocks || {};
    Object.entries(dayBlocks).forEach(([blokId, bs]) => {
      if(isBlokCompleted(bs)){
        totaalGedaan++;
        if(hasActiveOverride(bs)) gestuurd++;
        else zelfGekozen++;
      }
    });
  }
  return { zelfGekozen, gestuurd, totaalGedaan };
}

function getMaandBalans(){
  const state = getDagritmeState();
  let zelfGekozen = 0, gestuurd = 0;
  const nu = new Date(debugNow());
  for(let i = 0; i < 30; i++){
    const d = new Date(nu);
    d.setDate(d.getDate() - i);
    const datum = d.toISOString().split('T')[0];
    const dayBlocks = state.days[datum]?.blocks || {};
    Object.entries(dayBlocks).forEach(([blokId, bs]) => {
      if(isBlokCompleted(bs)){
        if(hasActiveOverride(bs)) gestuurd++;
        else zelfGekozen++;
      }
    });
  }
  return { zelfGekozen, gestuurd, totaal: zelfGekozen + gestuurd };
}

// ─── Na-moment reflectie ───────────────────────────────────────
function getReflecties(){
  return LS.get('reflecties', []);
  // [{wie:'tim'|'lisanne', type:'moment'|'week', vraag:String, antwoord:String, datum:String, ts:Number}]
}
function saveReflecties(arr){ LS.set('reflecties', arr) }

function logReflectie(wie, type, vraag, antwoord, extraTekst){
  const arr = getReflecties();
  const entry = { wie, type, vraag, antwoord, datum: today(), ts: Date.now() };
  if(extraTekst) entry.tekst = extraTekst.trim().substring(0,120);
  arr.push(entry);
  while(arr.length > 50) arr.shift();
  saveReflecties(arr);
  // Na moment-reflectie stap 1: toon stap 2 (achterlaten voor partner)
  if(type === 'moment' && !extraTekst){
    const stap2 = $(wie === 'tim' ? '#timMomentStap2' : '#lisanneMomentStap2');
    if(stap2) stap2.style.display = 'block';
    toonBevestiging('✓');
    return; // Niet re-renderen, stap 2 tonen
  }
  toonBevestiging('✓ Opgeslagen');
  renderApp();
}

function kiesReflectieStarter(wie, starter){
  const el = $(wie === 'tim' ? '#timMomentTekst' : '#lisanneMomentTekst');
  if(el){
    el.value = starter + ' ';
    el.focus();
  }
}

function submitMomentReflectieTekst(wie){
  const el = $(wie === 'tim' ? '#timMomentTekst' : '#lisanneMomentTekst');
  if(!el || !el.value.trim()) return;
  // Voeg tekst toe aan laatste moment-reflectie
  const arr = getReflecties();
  const laatste = arr.filter(r => r.wie === wie && r.type === 'moment').pop();
  if(laatste){
    laatste.tekst = el.value.trim().substring(0,120);
    saveReflecties(arr);
  }
  toonBevestiging('✓ Verstuurd');
  renderApp();
}

function heeftMomentReflectieNodig(wie){
  const state = getDisciplineState();
  const recentMoment = state.momentLog.find(m => daysSince(m.datum) < 2 && daysSince(m.datum) >= 0);
  if(!recentMoment) return false;
  // Al beantwoord of overgeslagen?
  const reflecties = getReflecties();
  const alBeantwoord = reflecties.find(r => r.wie === wie && r.type === 'moment' && daysSince(r.datum) < 2);
  if(alBeantwoord) return false;
  const overgeslagen = LS.get('reflectie_skip_'+wie+'_'+recentMoment.datum, false);
  if(overgeslagen) return false;
  // 50% kans — deterministic per dag+wie zodat het niet wisselt bij re-render
  let hash = 0;
  const seed = recentMoment.datum + wie + 'reflectie';
  for(let i=0;i<seed.length;i++) hash=((hash<<5)-hash)+seed.charCodeAt(i);
  return (Math.abs(hash) % 2) === 0;
}
function slaReflectieOver(wie){
  const state = getDisciplineState();
  const recentMoment = state.momentLog.find(m => daysSince(m.datum) < 2);
  if(recentMoment) LS.set('reflectie_skip_'+wie+'_'+recentMoment.datum, true);
  renderApp();
}

function heeftWeekReflectieNodig(wie){
  // Alleen op vrijdag/zaterdag/zondag
  const dag = new Date(debugNow()).getDay();
  if(![0,5,6].includes(dag)) return false;
  const reflecties = getReflecties();
  const ws = getWeekStart();
  return !reflecties.find(r => r.wie === wie && r.type === 'week' && r.datum >= ws);
}

function beidenhebbenWeekReflectieIngevuld(){
  const reflecties = getReflecties();
  const ws = getWeekStart();
  const tim = reflecties.find(r => r.wie === 'tim' && r.type === 'week' && r.datum >= ws);
  const lisanne = reflecties.find(r => r.wie === 'lisanne' && r.type === 'week' && r.datum >= ws);
  return { tim, lisanne, beide: !!(tim && lisanne) };
}

// ─── Notificaties (Notification API, werkt als tab open is) ─────
function initNotificaties(){
  if(!('Notification' in window)) return;
  if(Notification.permission === 'default'){
    // Vraag permission bij eerste interactie (niet meteen)
    document.addEventListener('click', function vraagPermissie(){
      Notification.requestPermission();
      document.removeEventListener('click', vraagPermissie);
    }, { once: true });
  }
  // Plan ochtend-check
  planOchtendNotificatie();
}

function planOchtendNotificatie(){
  const nu = new Date(debugNow());
  const target = new Date(nu);
  target.setHours(7, 30, 0, 0);
  if(nu >= target) target.setDate(target.getDate() + 1);
  const ms = target - nu;
  setTimeout(() => {
    stuurOchtendNotificatie();
    // Plan volgende dag
    setTimeout(planOchtendNotificatie, 1000);
  }, ms);
}

function stuurOchtendNotificatie(){
  if(Notification.permission !== 'granted') return;
  if(isRustigeDag()) return;
  const vandaag = today();
  const blocks = getDagBlocks(vandaag);
  const heeftOverrides = Object.values(blocks).some(bs => bs.override);
  // Alleen notificatie als Lisanne iets heeft klaargezet
  if(heeftOverrides){
    new Notification('Sprankelend', {
      body: 'Lisanne heeft vandaag iets voor je klaarstaan.',
      icon: '💬',
      tag: 'ochtend-' + vandaag,
      silent: false
    });
  }
}

function stuurOverrideNotificatie(blokLabel){
  if(Notification.permission !== 'granted') return;
  if(currentView === 'tim') return; // Tim kijkt al
  new Notification('Sprankelend', {
    body: 'Lisanne heeft ' + blokLabel + ' aangepast.',
    icon: '💬',
    tag: 'override-' + today(),
    silent: false
  });
}

// ─── Experience Logging ─────────────────────────────────────────
function logErvaring(val){
  const state = getSuggestieState();
  // Bij 'fijn': sla suggestie-tekst op voor herinneringen
  const laatsteJaSug = state.historie.slice().reverse().find(h => h.status === 'ja');
  const sugTekst = laatsteJaSug ? (SUGGESTIE_POOL.find(s => s.id === laatsteJaSug.id)||{}).tekst : null;
  state.ervaringLog.push({ datum: today(), val, sugId: laatsteJaSug ? laatsteJaSug.id : null, sugTekst: val === 'fijn' ? sugTekst : null });
  state.wachtOpErvaring = false;

  if(val === 'teveel'){
    const laatste5 = state.ervaringLog.slice(-5);
    if(laatste5.filter(e => e.val === 'teveel').length >= 2 && state.niveau > 1) state.niveau--;
    // Afkoelen in comfort-spiraal
    const laatsteJa = (state.typeHistorie||[]).slice().reverse().find(h => h.status === 'ja');
    if(laatsteJa){
      if(!state.typeHistorie) state.typeHistorie = [];
      state.typeHistorie.push({ type: laatsteJa.type, status: 'nee', datum: today() });
    }
  }

  // ─── SUCCESS LOOP ───
  const s4 = getSpoor4State();
  if(val === 'fijn'){
    s4.successReeks = (s4.successReeks||0) + 1;
    // Na 3+ fijn achter elkaar en niet recent getoond
    if(s4.successReeks >= 3 && (!s4.laatsteSuccessLoop || daysSince(s4.laatsteSuccessLoop) >= 7)){
      s4.laatsteSuccessLoop = today();
      LS.set('l_successLoopBericht', 'Dit gaat goed de afgelopen dagen. Jullie bouwen iets op.');
    }
  } else {
    s4.successReeks = 0;
  }
  // Reactie viel tegen tracking
  if(val === 'reactie_viel_tegen'){
    s4.laatsteNeutralReactie = today();
  }
  saveSpoor4State(s4);

  saveSuggestieState(state);
  renderApp();
}
