/*
  Data model (LS key: 'l_agenda'):
  {
    "2026-03-12": {
      ochtend: { tekst: "...", type: "opdracht"|"afspraak"|"auto" },
      middag:  { tekst: "...", type: "opdracht" },
      avond:   { tekst: "...", type: "opdracht" }
    },
    ...
  }
*/

function getAgenda(){ return LS.get('l_agenda', {}); }
function saveAgenda(a){ LS.set('l_agenda', a); }

function getAgendaDag(datum){
  const a = getAgenda();
  return a[datum] || { ochtend:null, middag:null, avond:null };
}

function setAgendaSlot(datum, dagdeel, tekst, type){
  const a = getAgenda();
  if(!a[datum]) a[datum] = { ochtend:null, middag:null, avond:null };
  if(tekst && tekst.trim()){
    a[datum][dagdeel] = { tekst: tekst.trim(), type: type || 'opdracht' };
  } else {
    a[datum][dagdeel] = null;
  }
  saveAgenda(a);
}

function clearAgendaSlot(datum, dagdeel){
  const a = getAgenda();
  if(a[datum]) { a[datum][dagdeel] = null; saveAgenda(a); }
}

function getAgendaWeekDagen(){
  // Geeft array van 7 datums: vandaag + 6 dagen vooruit
  const result = [];
  const nu = debugNow();
  for(let i = 0; i < 7; i++){
    const d = new Date(nu);
    d.setDate(d.getDate() + i);
    result.push(d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'));
  }
  return result;
}

function dagNaam(datum){
  const d = new Date(datum + 'T12:00:00');
  const nu = debugNow();
  const vandaag = today();
  const morgenStr = getMorgen();
  if(datum === vandaag) return 'Vandaag';
  if(datum === morgenStr) return 'Morgen';
  return ['Zo','Ma','Di','Wo','Do','Vr','Za'][d.getDay()];
}

function dagDatumKort(datum){
  const d = new Date(datum + 'T12:00:00');
  return d.getDate() + ' ' + ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'][d.getMonth()];
}

function getMilouStatusVoorDagdeel(datum, dagdeel){
  // Simpele Milou-check: ma-do school 8-15, rest thuis, na 19 slaapt
  const d = new Date(datum + 'T12:00:00');
  const dag = d.getDay(); // 0=zo, 1=ma...5=vr, 6=za
  const isSchooldag = dag >= 1 && dag <= 4; // ma-do
  if(dagdeel === 'avond') return 'slaapt';
  if(dagdeel === 'ochtend' && isSchooldag) return 'school';
  if(dagdeel === 'middag' && isSchooldag) return 'school'; // tot 15u
  return 'thuis';
}

function getMilouIcon(status){
  if(status === 'school') return '🏫';
  if(status === 'slaapt') return '😴';
  return '🏠';
}

// Quick-pick opties voor agenda per dagdeel
function getAgendaQuickPicks(dagdeel, datum){
  const milou = getMilouStatusVoorDagdeel(datum, dagdeel);
  const picks = [];
  if(dagdeel === 'ochtend'){
    picks.push({tekst:'Maak het bed op zoals ik het wil', type:'opdracht'});
    picks.push({tekst:'Zet drinken klaar voor me', type:'opdracht'});
    picks.push({tekst:'Ruim de keuken op voordat ik er ben', type:'opdracht'});
  } else if(dagdeel === 'middag'){
    if(milou === 'school'){
      picks.push({tekst:'Ik heb plannen met je vanmiddag', type:'opdracht'});
      picks.push({tekst:'Zorg dat de slaapkamer netjes is', type:'opdracht'});
    }
    picks.push({tekst:'Boodschappen halen (lijst volgt)', type:'opdracht'});
    picks.push({tekst:'Doe iets liefs voor me vandaag', type:'opdracht'});
  } else if(dagdeel === 'avond'){
    picks.push({tekst:'Haal drinken en kom naast me zitten', type:'opdracht'});
    picks.push({tekst:'Ik heb plannen met je vanavond', type:'opdracht'});
    picks.push({tekst:'Trek iets aan dat ik leuk vind', type:'opdracht'});
    picks.push({tekst:'Vanavond bepaal ik', type:'opdracht'});
  }
  return picks;
}

let agendaEditSlot = null; // {datum, dagdeel} — welk slot wordt bewerkt
let agendaSelectedDag = null; // welke dag is uitklapt (datum string), null = vandaag

function selectAgendaDag(datum){
  agendaSelectedDag = (agendaSelectedDag === datum) ? null : datum;
  agendaEditSlot = null;
  renderApp();
}

function openAgendaEdit(datum, dagdeel){
  agendaEditSlot = { datum, dagdeel };
  renderApp();
  // Focus op textarea na render
  setTimeout(() => {
    const ta = document.getElementById('agendaEditTA');
    if(ta) ta.focus();
  }, 100);
}

function closeAgendaEdit(){
  agendaEditSlot = null;
  renderApp();
}

function submitAgendaEdit(){
  if(!agendaEditSlot) return;
  const ta = document.getElementById('agendaEditTA');
  if(!ta) return;
  setAgendaSlot(agendaEditSlot.datum, agendaEditSlot.dagdeel, ta.value, 'opdracht');
  agendaEditSlot = null;
  renderApp();
}

function selectAgendaQuickPick(datum, dagdeel, tekst){
  setAgendaSlot(datum, dagdeel, tekst, 'opdracht');
  agendaEditSlot = null;
  renderApp();
}

// ─── Lisanne's Agenda View (horizontale balk + uitklapbare dag) ───

function renderAgenda(){
  const dagen = getAgendaWeekDagen();
  const activeDag = agendaSelectedDag || dagen[0]; // default = vandaag
  let html = '';

  // ── Horizontale weekbalk ──
  html += `<div style="margin-bottom:.6rem"><p style="font-size:.75rem;color:var(--purple);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.4rem">Planning</p>`;
  html += `<div style="display:flex;gap:.2rem;justify-content:space-between">`;
  dagen.forEach((datum, idx) => {
    const naam = dagNaam(datum);
    const dag = getAgendaDag(datum);
    const gevuld = [dag.ochtend, dag.middag, dag.avond].filter(Boolean).length;
    const isActive = datum === activeDag;
    const isVandaag = idx === 0;

    html += `<button onclick="selectAgendaDag('${datum}')" style="all:unset;flex:1;text-align:center;cursor:pointer;padding:.4rem .1rem;border-radius:var(--radius-sm);transition:all .2s;${isActive ? 'background:var(--purple);color:white' : isVandaag ? 'background:rgba(168,138,155,.1);color:var(--text1)' : 'color:var(--text3)'}">
      <span style="display:block;font-size:.72rem;font-weight:${isActive || isVandaag ? '600' : '400'}">${naam}</span>
      ${gevuld > 0 ? `<span style="display:block;margin-top:.15rem;font-size:.5rem;color:${isActive ? 'rgba(255,255,255,.8)' : 'var(--purple)'}">${'●'.repeat(gevuld)}</span>` : `<span style="display:block;margin-top:.15rem;font-size:.5rem;opacity:.2">·</span>`}
    </button>`;
  });
  html += `</div></div>`;

  // ── Detail van geselecteerde dag ──
  const dag = getAgendaDag(activeDag);
  const datumKort = dagDatumKort(activeDag);
  const dagLabel = dagNaam(activeDag);

  html += `<div class="card" style="border-color:rgba(168,138,155,.2)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem">
      <span style="font-size:.85rem;font-weight:600;color:var(--purple)">${dagLabel}</span>
      <span style="font-size:.75rem;color:var(--text3)">${datumKort}</span>
    </div>`;

  ['ochtend','middag','avond'].forEach(dd => {
    const slot = dag[dd];
    const milou = getMilouStatusVoorDagdeel(activeDag, dd);
    const milouIcon = getMilouIcon(milou);
    const ddLabel = dd.charAt(0).toUpperCase() + dd.slice(1);
    const isEdit = agendaEditSlot && agendaEditSlot.datum === activeDag && agendaEditSlot.dagdeel === dd;

    if(isEdit){
      const picks = getAgendaQuickPicks(dd, activeDag);
      html += `<div style="padding:.5rem 0;border-top:1px solid rgba(168,138,155,.08)">
        <div style="display:flex;align-items:center;gap:.3rem;margin-bottom:.4rem">
          <span style="font-size:.75rem">${milouIcon}</span>
          <span style="font-size:.78rem;color:var(--text2);font-weight:500">${ddLabel}</span>
        </div>`;
      if(picks.length > 0){
        html += `<div style="display:flex;flex-wrap:wrap;gap:.25rem;margin-bottom:.4rem">`;
        picks.forEach(p => {
          html += `<button onclick="selectAgendaQuickPick('${activeDag}','${dd}','${p.tekst.replace(/'/g,"&#39;")}')" style="all:unset;font-size:.8rem;color:var(--purple);cursor:pointer;padding:.35rem .5rem;border-radius:var(--radius-sm);background:rgba(168,138,155,.06);border:1px solid rgba(168,138,155,.15);min-height:36px">${p.tekst}</button>`;
        });
        html += `</div>`;
      }
      html += `<textarea id="agendaEditTA" placeholder="Of typ zelf..." maxlength="150"
        style="width:100%;min-height:40px;padding:.5rem;border-radius:var(--radius-sm);border:1px solid var(--card-border);background:var(--bg);color:var(--text);font-family:inherit;font-size:.85rem;resize:none;margin-bottom:.3rem;box-sizing:border-box">${slot ? slot.tekst : ''}</textarea>

          <button class="btn btn-ghost" style="flex:none;font-size:.82rem;padding:.35rem .6rem" onclick="closeAgendaEdit()">Annuleer</button>

        </div>
      </div>`;
    } else if(slot){
      html += `<div style="padding:.35rem 0;border-top:1px solid rgba(168,138,155,.08);display:flex;align-items:center;gap:.4rem;cursor:pointer;min-height:36px" onclick="openAgendaEdit('${activeDag}','${dd}')">

// ─── Tim's Agenda View (horizontale balk + detail) ───

let timAgendaSelectedDag = null; // welke dag Tim bekijkt

function selectTimAgendaDag(datum){
  timAgendaSelectedDag = (timAgendaSelectedDag === datum) ? null : datum;
  renderApp();
}

function renderTimAgenda(){
  const dagen = getAgendaWeekDagen();
  const vandaag = today();
  const activeDag = timAgendaSelectedDag || vandaag;

  // Check of er überhaupt iets in de agenda staat deze week
  let totaalGevuld = 0;
  dagen.forEach(d => {
    const dag = getAgendaDag(d);
    totaalGevuld += [dag.ochtend, dag.middag, dag.avond].filter(Boolean).length;
  });
  if(totaalGevuld === 0) return ''; // Geen agenda items → toon niks

  let html = '';

  // ── Horizontale weekbalk ──
  html += `<div class="card" style="border-color:rgba(168,138,155,.15);margin-bottom:.5rem">
    <p style="font-size:.75rem;color:var(--purple);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.4rem">Lisanne's planning</p>
    <div style="display:flex;gap:.2rem;justify-content:space-between;margin-bottom:.3rem">`;

  dagen.forEach((datum, idx) => {
    const naam = dagNaam(datum);
    const dag = getAgendaDag(datum);
    const gevuld = [dag.ochtend, dag.middag, dag.avond].filter(Boolean).length;
    const isActive = datum === activeDag;
    const isVandaag = idx === 0;

    // Tim ziet 👀 voor toekomstige dagen met items, bolletjes voor vandaag
    const indicator = gevuld > 0
      ? (isVandaag ? `<span style="font-size:.5rem;color:${isActive ? 'rgba(255,255,255,.8)' : 'var(--purple)'}">${'●'.repeat(gevuld)}</span>`
        : `<span style="font-size:.6rem">👀</span>`)
      : `<span style="font-size:.5rem;opacity:.2">·</span>`;

    html += `<button onclick="selectTimAgendaDag('${datum}')" style="all:unset;flex:1;text-align:center;cursor:pointer;padding:.4rem .1rem;border-radius:var(--radius-sm);transition:all .2s;${isActive ? 'background:var(--purple);color:white' : isVandaag ? 'background:rgba(168,138,155,.1);color:var(--text1)' : 'color:var(--text3)'}">
      <span style="display:block;font-size:.72rem;font-weight:${isActive || isVandaag ? '600' : '400'}">${naam}</span>
      <span style="display:block;margin-top:.15rem">${indicator}</span>
    </button>`;
  });
  html += `</div>`;

  // ── Detail van geselecteerde dag ──
  const dag = getAgendaDag(activeDag);
  const gevuld = [dag.ochtend, dag.middag, dag.avond].filter(Boolean).length;
  const isVandaag = activeDag === vandaag;

  if(gevuld > 0){
    if(isVandaag){
      // Vandaag: toon volledige details
      const uurNu = debugNow().getHours();
      ['ochtend','middag','avond'].forEach(dd => {
        const slot = dag[dd];
        if(!slot) return;
        const ddLabel = dd.charAt(0).toUpperCase() + dd.slice(1);
        const isNu = (dd === 'ochtend' && uurNu < 12) || (dd === 'middag' && uurNu >= 12 && uurNu < 19) || (dd === 'avond' && uurNu >= 19);

        html += `<div style="padding:.3rem .4rem;margin-top:.2rem;${isNu ? 'background:rgba(168,138,155,.06);border-radius:var(--radius-sm)' : ''}">
          <span style="font-size:.72rem;color:${isNu ? 'var(--purple)' : 'var(--text3)'};font-weight:${isNu ? '600' : '400'}">${ddLabel}${isNu ? ' ← nu' : ''}</span>
          <p style="font-size:.88rem;color:var(--text1);margin-top:.1rem;line-height:1.4">${slot.tekst}</p>
        </div>`;
      });
    } else {
      // Toekomstige dag: alleen teaser
      html += `<div style="text-align:center;padding:.6rem 0">
        <p style="font-size:.9rem;color:var(--purple)">Lisanne heeft iets voor je gepland 👀</p>
        <p style="font-size:.78rem;color:var(--text3);margin-top:.2rem">${gevuld} ${gevuld === 1 ? 'moment' : 'momenten'} — ${dagNaam(activeDag)}</p>
      </div>`;
    }
  } else {
    html += `<p style="font-size:.8rem;color:var(--text3);text-align:center;padding:.3rem 0;opacity:.6">Niks gepland</p>`;
  }

  html += `</div>`;
  return html;
}

function renderApp(){
  const app = $('#app');

  // Smooth crossfade: fade out, swap content, fade in
  app.classList.add('app-fading');
  requestAnimationFrame(() => { setTimeout(() => {
    _renderAppContent(app);
    app.classList.remove('app-fading');

}

  const showOnb = toonOnboarding || (currentView === 'lisanne' && !LS.get('l_onboarded')) || (currentView === 'tim' && !LS.get('t_onboarded'));

function getDagstatusLinks(energieNu, agSlots, lopend){
  const eLabel = energieNu === 'goed' ? 'Goed' : energieNu === 'laag' ? 'Moe' : 'Normaal';
  const eIcon = energieNu === 'goed' ? '&#x1f60a;' : energieNu === 'laag' ? '&#x1f634;' : '&#x1f33f;';
  let context = '';
  if(lopend){
    context = 'Iets loopt';
  } else if(energieNu === 'laag'){
    context = 'Hou het klein';
  } else if(agSlots.length > 0){
    const nuDeel = new Date().getHours() < 12 ? 'ochtend' : new Date().getHours() < 17 ? 'middag' : 'avond';
    const toekomst = agSlots.filter(s => {
      const order = {ochtend:0, middag:1, avond:2};
      return order[s] >= order[nuDeel];
    });
    if(toekomst.length > 0){
      const dd = toekomst[0] === 'ochtend' ? 'Vanochtend' : toekomst[0] === 'middag' ? 'Vanmiddag' : 'Vanavond';
      context = dd + ' iets gepland';
    } else {
      context = 'Klein moment gehad';
    }
  } else {
    context = energieNu === 'goed' ? 'Mooie dag' : 'Rustige dag';
  }
  return { icon: eIcon, label: eLabel, context: context };
}

function getAgendaPreview(agSlots, lopend){
  if(lopend) return '&#x1f4c5; Moment &#x25be;';
  if(agSlots.length === 0) return '&#x1f4c5; Geen plannen &#x25be;';
  const nuDeel = new Date().getHours() < 12 ? 'ochtend' : new Date().getHours() < 17 ? 'middag' : 'avond';
  const toekomst = agSlots.filter(s => {
    const order = {ochtend:0, middag:1, avond:2};
    return order[s] >= order[nuDeel];
  });
  if(toekomst.length === 0) return '&#x1f4c5; Gedaan &#x25be;';
  const dd = toekomst[0] === 'ochtend' ? 'Ochtend' : toekomst[0] === 'middag' ? 'Middag' : 'Vanavond';
  return '&#x1f4c5; ' + dd + ' &#x25be;';
}

function getHerinnering(){
  const state = getSuggestieState();
  // Herinneringen: ook geaccepteerde suggesties tellen (niet alleen "fijn" feedback)
  const fijne = (state.ervaringLog||[]).filter(e => e.val === 'fijn' && e.sugTekst && daysSince(e.datum) >= 5);
  const geaccepteerd = (state.historie||[]).filter(h => h.status === 'ja' && daysSince(h.datum) >= 5);
  // Gebruik fijne ervaringen als die er zijn, anders geaccepteerde suggesties
  let bronnen = fijne.length > 0 ? fijne : [];
  if(bronnen.length === 0 && geaccepteerd.length > 0){
    // Maak een herinnering van geaccepteerde suggesties
    const sug = SUGGESTIE_POOL.find(s => s.id === geaccepteerd[geaccepteerd.length-1].id);
    if(sug) return sug.tekst;
  }
  if(bronnen.length === 0) return null;
  // Max 1x per 5 dagen — geen random gate
  const laatsteHerinnering = LS.get('l_laatsteHerinnering', null);
  if(laatsteHerinnering && daysSince(laatsteHerinnering) < 5) return null;
  const seed = today() + 'herinnering';
  let h = 0; for(let i=0;i<seed.length;i++){h=((h<<5)-h)+seed.charCodeAt(i);h|=0;}
  const gekozen = bronnen[Math.abs(h % bronnen.length)];
  return gekozen.sugTekst;
}

}

  // ── REFLECTIE-BRIEFJE VAN LISANNE ──
  const lisReflecties = getReflecties().filter(r => r.wie === 'lisanne' && r.type === 'moment' && r.tekst && daysSince(r.datum) < 3);
  const gezienKeyTim = 'reflectie_gezien_tim';

  if(faseActief(4) && heeftMomentReflectieNodig('tim')){

        <button class="btn btn-ghost" style="text-align:left;font-size:.85rem;padding:.6rem .8rem" onclick="logReflectie('tim','moment','Hoe was gisteravond?','goed')">Het was goed</button>
        <button class="btn btn-ghost" style="text-align:left;font-size:.85rem;padding:.6rem .8rem" onclick="logReflectie('tim','moment','Hoe was gisteravond?','onwennig')">Een beetje onwennig</button>
        <button class="btn btn-ghost" style="text-align:left;font-size:.85rem;padding:.6rem .8rem" onclick="logReflectie('tim','moment','Hoe was gisteravond?','weet_niet')">Weet ik niet goed</button>
      </div>
      <div id="timMomentStap2" style="display:none;margin-top:.6rem;border-top:1px solid var(--card-border);padding-top:.5rem">
        <p style="font-size:.85rem;color:var(--text2);margin-bottom:.4rem">Wil je iets achterlaten voor Lisanne?</p>
        <div style="display:flex;flex-direction:column;gap:.25rem;margin-bottom:.4rem">
          ${TIM_STARTERS.map(s => `<button class="btn btn-ghost" style="text-align:left;font-size:.85rem;padding:.5rem .7rem" onclick="kiesReflectieStarter('tim','${s}')">${s}</button>`).join('')}
        </div>
        <textarea id="timMomentTekst" placeholder="..." maxlength="120"
          style="width:100%;min-height:40px;padding:.5rem;border-radius:var(--radius-sm);border:1px solid var(--card-border);background:var(--surface);color:var(--text);font-family:inherit;font-size:.85rem;resize:none;margin-bottom:.3rem"></textarea>
        <button class="btn btn-primary" style="width:100%;font-size:.85rem" onclick="submitMomentReflectieTekst('tim')">Verstuur</button>

      <button onclick="slaReflectieOver('tim')" style="all:unset;font-size:.8rem;color:var(--text3);cursor:pointer;display:block;text-align:center;margin-top:.5rem;padding:.3rem 0;min-height:44px">Sla dit over</button>
    </div>`;
  }

  // ── WEEKREFLECTIE ──
  if(faseActief(4) && heeftWeekReflectieNodig('tim')){
    const weekVraag = getWeekReflectieVraag();
    html += `<div class="card" style="border-color:rgba(196,138,138,.15)">

      <button class="btn btn-primary" style="width:100%;font-size:.85rem" onclick="submitWeekReflectie('tim')">Opslaan</button>

    </div>`;
  } else {
    const wr = beidenhebbenWeekReflectieIngevuld();
    if(wr.beide && wr.lisanne){
      html += `<div class="card" style="border-color:rgba(168,138,155,.15)">
        <p style="font-size:.75rem;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.3rem">Weekvraag — Lisanne's antwoord</p>

  // ── BERICHTJE STUREN NAAR LISANNE ──
  if(faseActief(4)){
    const alGestuurdTim = getBerichtjes().find(b => b.van === 'tim' && b.datum === today());
    if(!alGestuurdTim){
      html += `<div style="text-align:center;margin:.3rem 0 .6rem">

    } else {
      html += `<div style="text-align:center;margin:.3rem 0 .6rem">
        <p style="font-size:.75rem;color:var(--text3)">💬 Je hebt Lisanne vandaag een berichtje gestuurd</p>

  // ── WEKELIJKSE OEFENING ──
  if(faseActief(4)){
    if(!isOefeningGedaan() && !isOefeningOvergeslagen()){
      const oef = getWeekOefening();
      if(oef){
        const catLabel = oef.cat === 'verbinding' ? 'Verbinding' : 'Dynamiek';
