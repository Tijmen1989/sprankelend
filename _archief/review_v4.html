const state = {};
let currentFilter = 'all';
let currentTab = 'suggesties';

function init() {
  const saved = localStorage.getItem('v4review2');
  if (saved) Object.assign(state, JSON.parse(saved));
  render();
  updateStats();
}

function save() {
  localStorage.setItem('v4review2', JSON.stringify(state));
}

function getKey(id) { return typeof id === 'string' ? id : id; }

function setStatus(id, status) {
  const k = getKey(id);
  if (state[k]?.status === status) {
    state[k].status = undefined;
    if (!state[k].note) delete state[k];
  } else {
    state[k] = state[k] || {};
    state[k].status = status;
  }
  save();
  updateCard(id);
  updateStats();
}

function setNote(id, note) {
  const k = getKey(id);
  state[k] = state[k] || {};
  state[k].note = note;
  if (!note && !state[k].status) delete state[k];
  save();
}

function updateCard(id) {
  const card = document.getElementById('card-' + id);
  if (!card) return;
  const k = getKey(id);
  const s = state[k]?.status;
  card.className = 'card' + (s ? ' status-' + s : '');
  card.querySelectorAll('.btn').forEach(b => {
    b.classList.toggle('active', b.dataset.status === s);
  });
  if (currentFilter !== 'all') {
    const cardStatus = state[k]?.status || 'open';
    card.style.display = (currentFilter === 'open' ? !state[k]?.status : cardStatus === currentFilter) ? '' : 'none';
  }
}

function updateStats() {
  const allItems = currentTab === 'suggesties' ? suggestions : lessons;
  let total = 0, yes = 0, no = 0, edit = 0;
  for (const sec of allItems) {
    for (const item of sec.items) {
      total++;
      const s = state[getKey(item.id)]?.status;
      if (s === 'yes') yes++;
      else if (s === 'no') no++;
      else if (s === 'edit') edit++;
    }
  }
  document.getElementById('count-total').textContent = total;
  document.getElementById('count-yes').textContent = yes;
  document.getElementById('count-no').textContent = no;
  document.getElementById('count-edit').textContent = edit;
  document.getElementById('count-open').textContent = total - yes - no - edit;
}

function filterCards(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach((b, i) => {
    const filters = ['all','open','yes','no','edit'];
    b.classList.toggle('active', filters[i] === filter);
  });
  const container = document.getElementById('content-' + currentTab);
  container.querySelectorAll('.card').forEach(card => {
    const id = card.id.replace('card-', '');
    const k = getKey(id.startsWith('L') ? id : parseInt(id));
    const s = state[k]?.status || 'open';
    if (filter === 'all') card.style.display = '';
    else if (filter === 'open') card.style.display = s === 'open' || !state[k]?.status ? '' : 'none';
    else card.style.display = s === filter ? '' : 'none';
  });
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active-tab'));
  document.querySelector(tab === 'suggesties' ? '.tab:first-child' : '.tab:last-child').classList.add('active-tab');
  document.getElementById('content-suggesties').classList.toggle('hidden', tab !== 'suggesties');
  document.getElementById('content-lessen').classList.toggle('hidden', tab !== 'lessen');
  currentFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach((b, i) => b.classList.toggle('active', i === 0));
  updateStats();
}

function renderCards(data, container, isLesson) {
  let html = '';
  for (const sec of data) {
    html += `<div class="section-header${isLesson ? ' lesson' : ''}"><h2>${sec.section}</h2><p>${sec.desc}</p></div>`;
    for (const item of sec.items) {
      const k = getKey(item.id);
      const s = state[k]?.status || '';
      const note = state[k]?.note || '';
      const numClass = isLesson ? 'card-num lesson-num' : 'card-num';
      html += `<div class="card${s ? ' status-'+s : ''}" id="card-${item.id}">
        <div class="card-text"><span class="${numClass}">${item.id}.</span>${item.text}</div>
        ${item.meta ? `<div class="card-meta">${item.meta}</div>` : ''}
        <div class="card-actions">
          <button class="btn btn-yes${s==='yes'?' active':''}" data-status="yes" onclick="setStatus('${item.id}','yes')">Ja</button>
          <button class="btn btn-no${s==='no'?' active':''}" data-status="no" onclick="setStatus('${item.id}','no')">Nee</button>
          <button class="btn btn-edit${s==='edit'?' active':''}" data-status="edit" onclick="setStatus('${item.id}','edit')">Aanpassen</button>
          <input class="note-input" placeholder="Notitie..." value="${note.replace(/"/g,'&quot;')}" oninput="setNote('${item.id}',this.value)">
        </div>
      </div>`;
    }
  }
  document.getElementById(container).innerHTML = html;
}

function render() {
  renderCards(suggestions, 'content-suggesties', false);
  renderCards(lessons, 'content-lessen', true);
}

function generateText() {
  let lines = ['SUGGESTIES V4 — REVIEW RESULTATEN\n'];
  let yes = [], no = [], edit = [];

  function process(data, label) {
    for (const sec of data) {
      for (const item of sec.items) {
        const k = getKey(item.id);
        const s = state[k]?.status;
        const n = state[k]?.note || '';
        const entry = `#${item.id} [${sec.section}]: ${item.text.substring(0,80)}...${n ? '\n   Notitie: ' + n : ''}`;
        if (s === 'yes') yes.push(entry);
        else if (s === 'no') no.push(entry);
        else if (s === 'edit') edit.push(entry);
      }
    }
  }

  process(suggestions, 'Suggesties');
  process(lessons, 'Lessen');

  lines.push(`=== JA (${yes.length}) ===\n${yes.join('\n')}\n`);
  lines.push(`=== AANPASSEN (${edit.length}) ===\n${edit.join('\n')}\n`);
  lines.push(`=== NEE (${no.length}) ===\n${no.join('\n')}`);
  return lines.join('\n');
}

function exportResults() {
  const text = generateText();
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'review_v4_resultaten.txt';
  a.click();
}

function copyResults() {
  const text = generateText();
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-secondary');
    btn.textContent = 'Gekopieerd!';
    setTimeout(() => btn.textContent = 'Kopieer naar klembord', 2000);
  });
}

init();
</script>
