      const sessionData = {
        ...sessionConfig,
        steps: [],
        highlightsGebruikt: [],
        flowIssues: [],
        intensiteitsCurve: [],
        categorieSequence: []
      };

      const sessionStartTijd = Date.now();
      let sessieLogs = [];

      addLog(`⚡ Session ${sessionNum + 1}/${numSessions}: ${sessionConfig.template} | ${sessionConfig.omvang} | ~${numSteps} stappen`, 'info');

      for (let stepNum = 0; stepNum < numSteps; stepNum++) {
        try {
          const prompt = bouwPrompt(stepNum, sessieLogs, sessionConfig, sessionStartTijd);

          let stap = await callAPI(prompt, apiKey, false);
          testStats.totalSteps++;

          const fysiekVoor = bepaalFysiekeStatus(sessieLogs);
          const emFase = bepaalEmotioneleFase(stepNum, sessieLogs, sessionStartTijd, false);

          const validatieResult = valideerStap(stap);
          stap = validatieResult.stap;
          const dataErrors = validatieResult.errors;
          const dataWarnings = validatieResult.warnings;
          const fysiekErrors = valideerFysiekHard(stap, sessieLogs, fysiekVoor);

          const allErrors = [...dataErrors, ...fysiekErrors];
          const zweverigWoorden = detectZweverig(stap.instructie || '');

          stap.errors = allErrors;
          stap.zweverig = zweverigWoorden;
          stap._isRetry = false;

          if (allErrors.length > 0) {
            testStats.retries++;
            addLog(`  ↻ Stap ${stepNum + 1}: ${allErrors.length} fouten, herprobeert...`, 'warning');

            const correctiePrompt = bouwPrompt(stepNum, sessieLogs, sessionConfig, sessionStartTijd, allErrors[0]);
            stap = await callAPI(correctiePrompt, apiKey, true);
            testStats.totalSteps++;

            const validatieResult2 = valideerStap(stap);
            stap = validatieResult2.stap;
            const fysiekErrors2 = valideerFysiekHard(stap, sessieLogs, fysiekVoor);
            stap.errors = fysiekErrors2;
            stap.zweverig = detectZweverig(stap.instructie || '');
            stap._isRetry = true;
          }

          // Store metadata on step
          stap._sessionNum = sessionNum + 1;
          stap._stepNum = stepNum + 1;
          stap._template = sessionConfig.template;
          stap._omvang = sessionConfig.omvang;
          stap._kleur = sessionConfig.kleur;
          stap._beginner = sessionConfig.beginnerModus;
          stap._seksueel = sessionConfig.seksueleSuggesties;
          stap._emFase = emFase.label || emFase.fase;
          stap._fysiekPositie = fysiekVoor.positie;
          stap._fysiekHanden = fysiekVoor.handenPositie;
          stap._fysiekItems = fysiekVoor.boeien.join(', ');
          stap._fysiekSpreadEagle = fysiekVoor.spreadEagle;

          if (stap.errors.length > 0) {
            testStats.failures++;
            for (const err of stap.errors) {
              const type = err.split(':')[0].trim();
              testStats.errorsByType[type] = (testStats.errorsByType[type] || 0) + 1;
              testStats.allErrors.push({
                sessionNum: sessionNum + 1,
                stepNum: stepNum + 1,
                foutType: type,
                foutMelding: err,
                kort: stap.kort || '',
                instructie: stap.instructie || '',
                retrySucsesvol: false,
                template: sessionConfig.template,
                omvang: sessionConfig.omvang,
                fysiekPositie: fysiekVoor.positie,
                fysiekItems: fysiekVoor.boeien.join(', '),
                fysiekHanden: fysiekVoor.handenPositie
              });
            }
            addLog(`  ✗ Stap ${stepNum + 1} "${stap.kort}": ${stap.errors.join('; ')}`, 'error');
          } else {
            if (stap._isRetry) {
              // Mark previous error as retry-successful
              const lastErr = testStats.allErrors[testStats.allErrors.length - 1];
              if (lastErr) lastErr.retrySucsesvol = true;
            }
            addLog(`  ✓ Stap ${stepNum + 1}: ${stap.kort} (${stap.categorie}, Int: ${stap.intensiteit})`, 'success');
          }

          if (stap.zweverig.length > 0) {
            for (const w of stap.zweverig) {
              testStats.zweverigWords[w] = (testStats.zweverigWords[w] || 0) + 1;
            }
          }

          testStats.categoriesUsed[stap.categorie] = (testStats.categoriesUsed[stap.categorie] || 0) + 1;
          testStats.stepTypes[stap.stap_type] = (testStats.stepTypes[stap.stap_type] || 0) + 1;
          testStats.intensities.push(stap.intensiteit);
          testStats.allSteps.push(stap);

          sessionData.intensiteitsCurve.push(stap.intensiteit);
          sessionData.categorieSequence.push(stap.categorie);

          // Track highlights usage
          if (stap.spullen && stap.spullen.length > 0) {
            for (const sp of stap.spullen) {
              for (const hl of sessionConfig.highlights) {
                if (hl.toLowerCase().includes(sp.toLowerCase()) || sp.toLowerCase().includes(hl.toLowerCase().split(' ')[0])) {
                  if (!sessionData.highlightsGebruikt.includes(hl)) sessionData.highlightsGebruikt.push(hl);
                }
              }
            }
          }

          sessieLogs.push(stap);
          sessionData.steps.push(stap);

          await sleep(1500);

        } catch (error) {
          testStats.failures++;
          addLog(`  ✗ Stap ${stepNum + 1}: API Error - ${error.message}`, 'error');
        }
      }

      // Flow analyse
      const cats = sessionData.categorieSequence;
      const ints = sessionData.intensiteitsCurve;
      let heeft3xHerhaling = false;
      for (let i = 2; i < cats.length; i++) {
        if (cats[i] === cats[i-1] && cats[i] === cats[i-2]) heeft3xHerhaling = true;
      }
      let heeftContrast = true;
      for (let i = 1; i < ints.length; i++) {
        if (ints[i-1] >= 4 && ints[i] >= 4) { heeftContrast = false; break; }
      }
      const heeftStilte = cats.some(c => c === 'stilte' || c === 'anticipatie');
      const heeftOpbouw = ints.length >= 4 && ints.slice(0, Math.floor(ints.length/2)).reduce((a,b)=>a+b,0) / Math.floor(ints.length/2) < ints.slice(Math.floor(ints.length/2)).reduce((a,b)=>a+b,0) / (ints.length - Math.floor(ints.length/2));
      const uniqueCats = [...new Set(cats)];
      const numErrors = sessionData.steps.filter(s => s.errors && s.errors.length > 0).length;
      let flowScore = 100;
      if (!heeftOpbouw) flowScore -= 15;
      if (heeft3xHerhaling) flowScore -= 20;
      if (!heeftContrast) flowScore -= 15;
      if (!heeftStilte && sessionData.steps.length > 4) flowScore -= 10;
      if (uniqueCats.length < 3) flowScore -= 10;
      flowScore -= numErrors * 5;
      flowScore = Math.max(0, Math.min(100, flowScore));

      const sessieResult = {
        sessionNum: sessionNum + 1,
        sessionConfig,
        steps: sessionData.steps.length,
        stepsData: sessionData.steps,
        errors: numErrors,
        retries: sessionData.steps.filter(s => s._isRetry).length,
        successRate: sessionData.steps.length > 0 ? Math.round(((sessionData.steps.length - numErrors) / sessionData.steps.length) * 100) : 0,
        highlightsGekozen: sessionConfig.highlights,
        highlightsGebruikt: sessionData.highlightsGebruikt,
        intensiteitsCurve: ints.join(','),
        categorieSequence: cats.join(','),
        uniqueCats: uniqueCats.join(', '),
        numUniqueCats: uniqueCats.length,
        heeftOpbouw,
        heeftStilte,
        heeftContrast,
        heeft3xHerhaling,
        flowScore
      };

      testStats.sessionResults.push(sessieResult);
      testStats.allSessions.push(sessieResult);

      displaySessionBlock(sessionNum, sessionData);

      const progress = Math.round((sessionNum + 1) / numSessions * 100);
      document.getElementById('progressFill').style.width = progress + '%';
      document.getElementById('progressFill').textContent = progress + '%';
    }

    async function startTest() {
      const apiKey = document.getElementById('apiKey').value;
      const numSessions = parseInt(document.getElementById('numSessions').value);

      if (!apiKey) {
        alert('Please enter your API key');
        return;
      }

      testRunning = true;
      testStats = {
        totalSessions: numSessions,
        totalSteps: 0,
        retries: 0,
        failures: 0,
        errorsByType: {},
        categoriesUsed: {},
        stepTypes: {},
        intensities: [],
        zweverigWords: {},
        sessionResults: [],
        allSteps: [],
        allErrors: [],
        allSessions: []
      };

      document.getElementById('startBtn').disabled = true;
      document.getElementById('stopBtn').disabled = false;
      document.getElementById('statusBadge').className = 'status-badge status-running';
      document.getElementById('statusBadge').textContent = 'RUNNING';

      for (let i = 0; i < numSessions && testRunning; i++) {
        await runSession(i, numSessions, apiKey);
      }

      displayRapport();

      document.getElementById('startBtn').disabled = false;
      document.getElementById('stopBtn').disabled = true;
      document.getElementById('exportBtn').disabled = false;
      document.getElementById('statusBadge').className = 'status-badge status-complete';
      document.getElementById('statusBadge').textContent = 'COMPLETE';
      testRunning = false;
      // Geluidje: test is klaar!
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [523, 659, 784].forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.frequency.value = freq;
          osc.type = 'sine';
          gain.gain.value = 0.15;
          osc.start(ctx.currentTime + i * 0.15);
          osc.stop(ctx.currentTime + i * 0.15 + 0.2);
        });
      } catch(e) { /* geen audio support, geen probleem */ }
    }

    function stopTest() {
      testRunning = false;
      document.getElementById('startBtn').disabled = false;
      document.getElementById('stopBtn').disabled = true;
      document.getElementById('statusBadge').className = 'status-badge';
      document.getElementById('statusBadge').textContent = 'STOPPED';
      addLog('Test stopped by user.', 'warning');
    }

        // Set column widths based on header lengths
        if (aoa[0]) {
          ws['!cols'] = aoa[0].map((h, i) => {
            const hLen = String(h).length;
            const maxData = Math.max(...aoa.slice(1, 20).map(r => String(r[i] || '').length));
            let w = Math.max(hLen, Math.min(maxData, 60)) + 2;
            if (String(h).toLowerCase().includes('instructie')) w = 80;
            if (String(h).toLowerCase().includes('non_verbaal') || String(h).toLowerCase().includes('waarom') || String(h).toLowerCase().includes('bevestiging')) w = 40;
            return { wch: w };
          });
        }
        // Freeze top row
        ws['!freeze'] = { xSplit: 0, ySplit: 1 };
        // Auto-filter
        if (aoa.length > 1 && aoa[0]) {
          ws['!autofilter'] = { ref: XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: aoa.length - 1, c: aoa[0].length - 1 } }) };

        'Item', 'Categorie', 'Keer Gebruikt', 'Keer Correct', 'Keer Fout',
        '% Sessies Gebruikt', 'Gem. Stap Positie',
        'In Vrij', 'In Bondage', 'In Senso', 'In Intiem',
        'Nooit Gebruikt'
      ];
      const totalSess = testStats.allSessions.length || 1;
      const itemRows = Object.entries(itemStats).map(([key, d]) => [
        d.naam, d.categorie, d.gebruikt, d.correct, d.fout,
        Math.round((d.sessies.size / totalSess) * 100) + '%',
        d.posities.length > 0 ? (d.posities.reduce((a,b) => a+b, 0) / d.posities.length).toFixed(1) : '-',
        d.perTemplate['vrij'] || 0, d.perTemplate['bondage'] || 0,
        d.perTemplate['senso'] || 0, d.perTemplate['intiem'] || 0,
        d.gebruikt === 0 ? 'JA' : ''
      ]).sort((a, b) => b[2] - a[2]);
      addSheet('Items Analyse', [itemHeader, ...itemRows]);

      // ── TAB 6: FLOW & POSITIE ──
      // Deel A: Per stappositie
      const posStats = {};
      for (const stap of testStats.allSteps) {
        const pos = stap._stepNum;
        if (!posStats[pos]) posStats[pos] = { count: 0, fouten: 0, intensiteiten: [], cats: {} };
        posStats[pos].count++;
        if (stap.errors && stap.errors.length > 0) posStats[pos].fouten++;
        posStats[pos].intensiteiten.push(stap.intensiteit || 3);
        const c = stap.categorie || 'onbekend';
        posStats[pos].cats[c] = (posStats[pos].cats[c] || 0) + 1;
      }

      const flowData = [
        ['═══ STAPPOSITIE ANALYSE ═══'],
        ['Stap#', 'Aantal Stappen', 'Foutrate%', 'Gem. Intensiteit', 'Meest Voorkomende Categorie'],
      ];
      for (const pos of Object.keys(posStats).sort((a,b) => a-b)) {
        const d = posStats[pos];
        const topCat = Object.entries(d.cats).sort((a,b) => b[1]-a[1])[0];
        flowData.push([
          parseInt(pos), d.count,
          Math.round((d.fouten / d.count) * 100) + '%',
          (d.intensiteiten.reduce((a,b) => a+b, 0) / d.intensiteiten.length).toFixed(1),
          topCat ? topCat[0] + ' (' + topCat[1] + 'x)' : '-'
        ]);
      }

      // Deel B: Per template vergelijking
      flowData.push([''], ['═══ TEMPLATE VERGELIJKING ═══']);
      flowData.push(['Template', 'Sessies', 'Gem. Stappen', 'Success Rate', 'Gem. Flow Score', 'Top Categorie']);
      for (const [t, d] of Object.entries(templateStats)) {
        const catCount = {};
        testStats.allSteps.filter(s => s._template === t).forEach(s => { catCount[s.categorie] = (catCount[s.categorie] || 0) + 1; });
        const topCat = Object.entries(catCount).sort((a,b) => b[1]-a[1])[0];
        flowData.push([
          t, d.sessies, (d.stappen / d.sessies).toFixed(1),
          d.stappen > 0 ? Math.round(((d.stappen - d.fouten) / d.stappen) * 100) + '%' : '0%',
          Math.round(d.flowScores.reduce((a,b) => a+b, 0) / d.flowScores.length),
          topCat ? topCat[0] : '-'
        ]);
      }

      // Deel C: Per omvang vergelijking
      const omvangStats = {};
      for (const s of testStats.allSessions) {
        const o = s.sessionConfig.omvang;
        if (!omvangStats[o]) omvangStats[o] = { sessies: 0, stappen: 0, fouten: 0, flowScores: [] };
        omvangStats[o].sessies++;
        omvangStats[o].stappen += s.steps;
        omvangStats[o].fouten += s.errors;
        omvangStats[o].flowScores.push(s.flowScore);
      }
      const verwacht = { simpel: '3-5', rustig: '5-8', uitgebreid: '8-12', verras: '5-10' };
      flowData.push([''], ['═══ OMVANG VERGELIJKING ═══']);
      flowData.push(['Omvang', 'Sessies', 'Gem. Stappen', 'Verwacht', 'Success Rate', 'Gem. Flow Score']);
      for (const [o, d] of Object.entries(omvangStats)) {
        flowData.push([
          o, d.sessies, (d.stappen / d.sessies).toFixed(1), verwacht[o] || '?',
          d.stappen > 0 ? Math.round(((d.stappen - d.fouten) / d.stappen) * 100) + '%' : '0%',
          Math.round(d.flowScores.reduce((a,b) => a+b, 0) / d.flowScores.length)
        ]);
      }

      // Deel D: Categorieën overzicht
      flowData.push([''], ['═══ CATEGORIEËN OVERZICHT ═══']);
      flowData.push(['Categorie', 'Keer Gebruikt', '% van Stappen', 'Gem. Intensiteit', 'Gem. Stap Positie']);
      const catStats = {};
      for (const stap of testStats.allSteps) {
        const c = stap.categorie || 'onbekend';
        if (!catStats[c]) catStats[c] = { count: 0, ints: [], posities: [] };
        catStats[c].count++;
        catStats[c].ints.push(stap.intensiteit || 3);
        catStats[c].posities.push(stap._stepNum);
      }
      for (const [c, d] of Object.entries(catStats).sort((a,b) => b[1].count - a[1].count)) {
        flowData.push([
          c, d.count,
          Math.round((d.count / testStats.allSteps.length) * 100) + '%',
          (d.ints.reduce((a,b) => a+b, 0) / d.ints.length).toFixed(1),
          (d.posities.reduce((a,b) => a+b, 0) / d.posities.length).toFixed(1)
        ]);
      }

      addSheet('Flow & Positie', flowData);

      // ── TAB 7: ZWEVERIG & TOON ──
      const zwevHeader = ['Woord', 'Keer Gevonden', 'Sessie#', 'Stap#', 'Context (zin)'];
      const zwevRows = [];
      for (const stap of testStats.allSteps) {
        if (!stap.zweverig || stap.zweverig.length === 0) continue;
        const instr = stap.instructie || '';
        for (const w of stap.zweverig) {
          // Extract sentence containing the word
          const sentences = instr.split(/[.!?]+/).filter(s => s.toLowerCase().includes(w.toLowerCase()));
          const context = sentences.length > 0 ? sentences[0].trim() : instr.slice(0, 100);
          zwevRows.push([
            w,
            testStats.zweverigWords[w] || 1,
            stap._sessionNum, stap._stepNum,
            context
          ]);
        }
      }
      // Sort by word frequency
      zwevRows.sort((a, b) => b[1] - a[1]);
      addSheet('Zweverig & Toon', [zwevHeader, ...zwevRows]);

      // ── DOWNLOAD ──
      const datum = new Date().toISOString().slice(0,10);
      XLSX.writeFile(wb, `test_rapport_${datum}.xlsx`);
      addLog('📊 Excel rapport geëxporteerd!', 'success');
    }
  </script>
</body>
